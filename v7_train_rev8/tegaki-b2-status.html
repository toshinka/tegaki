<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tegaki v8 列車型 - B-2 ステータス車両 (Enhanced)</title>
</head>
<body>
    <!-- ステータスパネル -->
    <div class="status-panel">
        <div class="status-group">
            <div class="status-item">Canvas: <span id="canvas-info">400×400px</span></div>
            <div class="status-item">Tool: <span id="current-tool">ベクターペン</span></div>
            <div class="status-item">Color: <span id="current-color">#800000</span></div>
            <div class="status-item">座標: <span id="coordinates">x: 0, y: 0</span></div>
            <div class="status-item">筆圧: <span id="pressure-monitor">0.0%</span></div>
        </div>
        
        <div class="status-group">
            <div class="status-item">FPS: <span id="fps">60</span></div>
            <div class="status-item">GPU: <span id="gpu-usage">45%</span></div>
            <div class="status-item">Memory: <span id="memory-usage">1.2GB</span></div>
        </div>
    </div>

    <script>
        /**
         * ============================================================
         * Tegaki v8 列車型 - B-2 ステータス車両 (Enhanced)
         * ステータス表示、パフォーマンス監視、情報更新制御
         * ============================================================
         * 
         * 依存: A-2 (EventBus), B-1 (UIController)
         */

        // ==== Performance Monitor - パフォーマンス監視 ====
        window.TEGAKI_PerformanceMonitor = {
            frameCount: 0,
            lastTime: performance.now(),
            isRunning: false,

            /**
             * 監視開始
             */
            start() {
                if (this.isRunning) return;
                this.isRunning = true;

                const update = () => {
                    if (!this.isRunning) return;

                    this.frameCount++;
                    const currentTime = performance.now();

                    if (currentTime - this.lastTime >= 1000) {
                        // FPS計算
                        const fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                        this.updateFPS(fps);

                        // GPU・メモリ使用量シミュレート
                        const gpuUsage = 40 + Math.random() * 20;
                        const memUsage = 1.0 + Math.random() * 0.5;
                        this.updateGPUUsage(gpuUsage.toFixed(0));
                        this.updateMemoryUsage(memUsage.toFixed(1));

                        // カウンタリセット
                        this.frameCount = 0;
                        this.lastTime = currentTime;
                    }

                    requestAnimationFrame(update);
                };

                update();
                console.log('[B-2] パフォーマンス監視開始');
            },

            /**
             * 監視停止
             */
            stop() {
                this.isRunning = false;
                console.log('[B-2] パフォーマンス監視停止');
            },

            /**
             * FPS更新
             */
            updateFPS(fps) {
                const fpsElement = document.getElementById('fps');
                if (fpsElement) {
                    fpsElement.textContent = fps;

                    // 色で状態表現
                    if (fps >= 55) {
                        fpsElement.style.color = '#4caf50'; // 緑
                    } else if (fps >= 30) {
                        fpsElement.style.color = '#ff9800'; // オレンジ
                    } else {
                        fpsElement.style.color = '#f44336'; // 赤
                    }
                }
            },

            /**
             * GPU使用率更新
             */
            updateGPUUsage(usage) {
                const gpuElement = document.getElementById('gpu-usage');
                if (gpuElement) {
                    gpuElement.textContent = usage + '%';
                }
            },

            /**
             * メモリ使用量更新
             */
            updateMemoryUsage(usage) {
                const memoryElement = document.getElementById('memory-usage');
                if (memoryElement) {
                    memoryElement.textContent = usage + 'GB';
                }
            }
        };

        // ==== Status Controller - ステータス制御 ====
        window.TEGAKI_StatusController = {
            isInitialized: false,

            /**
             * ステータス車両初期化
             */
            init() {
                if (this.isInitialized) return;

                this.setupEventListeners();
                this.startPerformanceMonitoring();
                this.updateInitialStatus();

                this.isInitialized = true;
                console.log('[B-2] ステータス車両初期化完了');
            },

            /**
             * EventBusリスナー設定
             */
            setupEventListeners() {
                if (!window.TEGAKI_EventBus) {
                    console.warn('[B-2] EventBusが利用できません');
                    return;
                }

                // 座標更新
                window.TEGAKI_EventBus.on('coordinates-update', (point) => {
                    this.updateCoordinates(point.x, point.y);
                });

                // 筆圧更新
                window.TEGAKI_EventBus.on('pressure-update', (pressure) => {
                    this.updatePressure(pressure);
                });

                // ツール変更
                window.TEGAKI_EventBus.on('tool-changed', (tool) => {
                    this.updateCurrentTool(tool);
                });

                // キャンバスリサイズ
                window.TEGAKI_EventBus.on('canvas-resized', (data) => {
                    this.updateCanvasInfo(data.width, data.height);
                });

                // キャンバス情報更新要求
                window.TEGAKI_EventBus.on('canvas-info-updated', () => {
                    if (window.TEGAKI_STATE) {
                        this.updateCanvasInfo(window.TEGAKI_STATE.canvasWidth, window.TEGAKI_STATE.canvasHeight);
                    }
                });

                console.log('[B-2] EventBusリスナー設定完了');
            },

            /**
             * パフォーマンス監視開始
             */
            startPerformanceMonitoring() {
                window.TEGAKI_PerformanceMonitor.start();
            },

            /**
             * 初期ステータス更新
             */
            updateInitialStatus() {
                // キャンバス情報
                if (window.TEGAKI_STATE) {
                    this.updateCanvasInfo(window.TEGAKI_STATE.canvasWidth, window.TEGAKI_STATE.canvasHeight);
                    this.updateCurrentTool(window.TEGAKI_STATE.currentTool);
                }

                // カラー情報
                this.updateCurrentColor('#800000');

                // 座標初期化
                this.updateCoordinates(0, 0);
                this.updatePressure(0);
            },

            /**
             * 座標更新
             */
            updateCoordinates(x, y) {
                const coordsElement = document.getElementById('coordinates');
                if (coordsElement) {
                    coordsElement.textContent = `x: ${Math.round(x)}, y: ${Math.round(y)}`;
                }
            },

            /**
             * 筆圧更新
             */
            updatePressure(pressure) {
                const pressureElement = document.getElementById('pressure-monitor');
                if (pressureElement) {
                    pressureElement.textContent = pressure.toFixed(1) + '%';

                    // 色で筆圧の強さを表現
                    const opacity = Math.min(1, pressure / 100);
                    const color = `rgba(128, 0, 0, ${0.5 + opacity * 0.5})`;
                    pressureElement.style.color = color;
                }
            },

            /**
             * 現在ツール更新
             */
            updateCurrentTool(tool) {
                const toolElement = document.getElementById('current-tool');
                if (toolElement) {
                    const toolNames = {
                        pen: 'ベクターペン',
                        eraser: '消しゴム',
                        fill: '塗りつぶし',
                        select: '範囲選択'
                    };
                    toolElement.textContent = toolNames[tool] || tool;
                }
            },

            /**
             * キャンバス情報更新
             */
            updateCanvasInfo(width, height) {
                const canvasElement = document.getElementById('canvas-info');
                if (canvasElement) {
                    canvasElement.textContent = `${width}×${height}px`;
                }
            },

            /**
             * 現在色更新
             */
            updateCurrentColor(color) {
                const colorElement = document.getElementById('current-color');
                if (colorElement) {
                    colorElement.textContent = color;
                    colorElement.style.color = color;
                }
            },

            /**
             * ステータスパネル表示切り替え
             */
            toggleStatusPanel() {
                const panel = document.querySelector('.status-panel');
                if (panel) {
                    panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
                }
            },

            /**
             * リアルタイム更新開始
             */
            startRealTimeUpdates() {
                // 定期的な状態更新（パフォーマンス情報以外）
                setInterval(() => {
                    if (window.TEGAKI_STATE) {
                        // ブラシサイズ等の状態に応じた更新があれば実行
                        this.updateToolParameters();
                    }
                }, 100); // 100ms間隔
            },

            /**
             * ツールパラメータ更新
             */
            updateToolParameters() {
                // 必要に応じてツールパラメータの表示更新
                // 現在は基本的にEventBusで処理されているため空実装
            }
        };

        // ============================================================
        // B-2 車両管理
        // ============================================================
        window.TEGAKI_B2 = {
            /**
             * B-2車両初期化
             */
            init() {
                console.log('[B-2] ステータス車両初期化開始');

                // DOM準備待ち
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', () => {
                        this.initializeStatus();
                    });
                } else {
                    this.initializeStatus();
                }
            },

            /**
             * ステータス初期化
             */
            initializeStatus() {
                // A-2車両準備待ち
                const checkA2Ready = () => {
                    if (window.TEGAKI_STATE?.a2Ready && window.TEGAKI_EventBus) {
                        window.TEGAKI_StatusController.init();
                        window.TEGAKI_StatusController.startRealTimeUpdates();
                        
                        console.log('[B-2] ステータス車両初期化完了');
                        
                        if (window.TEGAKI_STATE) {
                            window.TEGAKI_STATE.b2Ready = true;
                        }
                    } else {
                        setTimeout(checkA2Ready, 50);
                    }
                };
                
                checkA2Ready();
            }
        };

        // ============================================================
        // B-2車両自動初期化
        // ============================================================
        if (typeof window !== 'undefined') {
            window.TEGAKI_B2.init();
        }
    </script>
</body>
</html>
