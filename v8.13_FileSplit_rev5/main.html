<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8-LayerDrag対応版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --futaba-maroon: #800000;
            --futaba-light-maroon: #aa5a56;
            --futaba-medium: #cf9c97;
            --futaba-light-medium: #e9c2ba;
            --futaba-cream: #f0e0d6;
            --futaba-background: #ffffee;
            
            --text-primary: #2c1810;
            --text-secondary: #5d4037;
            --text-inverse: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: var(--futaba-background);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 50px 1fr;
            height: 100vh;
            width: 100vw;
            gap: 0;
        }
        
        .sidebar {
            background: var(--futaba-cream);
            border-right: 0px solid var(--futaba-light-medium);
            display: flex;
            flex-direction: column;
            padding: 12px 6px;
            gap: 4px;
            overflow-y: auto;
            position: relative;
            z-index: 100;
        }
        
        .tool-button {
            width: 36px;
            height: 36px;
            border: 2px solid var(--futaba-light-medium);
            background: var(--futaba-background);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--futaba-maroon);
            position: relative;
            user-select: none;
        }
        
        .tool-button svg {
            width: 20px;
            height: 20px;
            stroke: #800000;
        }
        
        .tool-button:hover {
            background: var(--futaba-medium);
            border-color: var(--futaba-light-maroon);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(128, 0, 0, 0.2);
        }
        
        .tool-button.active {
            background: var(--futaba-maroon);
            color: var(--text-inverse);
            border-color: var(--futaba-maroon);
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.3);
        }
        
        .tool-button.active svg {
            stroke: #ffffff;
        }
        
        .tool-separator {
            height: 1px;
            background: var(--futaba-light-medium);
            margin: 4px 2px;
        }
        
        .canvas-area {
            background: var(--futaba-background);
            position: relative;
            overflow: visible;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }
        
        .canvas-container {
            background: var(--futaba-cream);
            display: inline-block;
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.1);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            touch-action: none;
        }
        
        canvas {
            border: none;
            display: block;
            cursor: crosshair;
            touch-action: none;
        }
        
        /* === レイヤーパネル - ドラッグ対応強化 === */
        .layer-panel-container {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        
        .layer-add-button {
            width: 36px;
            height: 36px;
            background: rgba(240, 224, 214, 0.85);
            border: none;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 2px 8px rgba(128, 0, 0, 0.08),
                0 1px 3px rgba(128, 0, 0, 0.12);
            backdrop-filter: blur(8px);
            pointer-events: all;
        }
        
        .layer-add-button:hover {
            background: rgba(240, 224, 214, 0.95);
            transform: scale(1.1);
            box-shadow: 
                0 4px 16px rgba(128, 0, 0, 0.12),
                0 2px 6px rgba(128, 0, 0, 0.16);
        }
        
        .layer-add-button svg {
            width: 18px;
            height: 18px;
            stroke: #800000;
        }
        
        /* レイヤーパネル - ドラッグ最適化デザイン */
        .layer-panel-items {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: transparent;
            border-radius: 12px;
            padding: 12px;
            backdrop-filter: blur(4px);
            pointer-events: all;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        /* レイヤーアイテム - ドラッグ対応 */
        .layer-item {
            width: 180px;
            height: 64px;
            background: rgba(240, 224, 214, 0.85);
            border: none;
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: grid;
            grid-template-columns: 20px 1fr 48px;
            grid-template-rows: 1fr 1fr;
            gap: 4px 8px;
            align-items: center;
            user-select: none;
            position: relative;
            
            box-shadow: 
                0 2px 8px rgba(128, 0, 0, 0.08),
                0 1px 3px rgba(128, 0, 0, 0.12);
            backdrop-filter: blur(8px);
        }
        
        .layer-item:hover {
            background: rgba(240, 224, 214, 0.95);
            box-shadow: 
                0 4px 16px rgba(128, 0, 0, 0.12),
                0 2px 6px rgba(128, 0, 0, 0.16);
            transform: translateY(-1px);
        }
        
        .layer-item.active {
            background: rgba(233, 194, 186, 0.9);
            box-shadow: 
                0 4px 20px rgba(128, 0, 0, 0.2),
                0 2px 8px rgba(128, 0, 0, 0.25);
            transform: translateY(-1px);
        }
        
        /* ドラッグ状態のスタイル */
        .layer-item.dragging {
            background: rgba(128, 0, 0, 0.15);
            transform: scale(1.05) rotate(3deg);
            box-shadow: 0 8px 32px rgba(128, 0, 0, 0.4);
            z-index: 1000;
            pointer-events: none;
        }
        
        .layer-item.drag-over {
            background: rgba(170, 90, 86, 0.3);
            transform: scale(1.02);
            border: 2px dashed var(--futaba-maroon);
        }
        
        .layer-item.drop-above {
            border-top: 3px solid var(--futaba-maroon);
            margin-top: 6px;
        }
        
        .layer-item.drop-below {
            border-bottom: 3px solid var(--futaba-maroon);
            margin-bottom: 6px;
        }
        
        /* ドラッグハンドル */
        .layer-drag-handle {
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 32px;
            background: linear-gradient(to right, 
                transparent 0%, 
                rgba(128, 0, 0, 0.3) 50%, 
                transparent 100%);
            cursor: grab;
            opacity: 0;
            transition: opacity 0.2s ease;
            border-radius: 0 4px 4px 0;
        }
        
        .layer-item:hover .layer-drag-handle {
            opacity: 1;
        }
        
        .layer-drag-handle:active {
            cursor: grabbing;
        }
        
        /* ドラッグプレビュー */
        .drag-preview {
            position: fixed;
            pointer-events: none;
            z-index: 2000;
            opacity: 0.8;
            transform: rotate(3deg);
        }
        
        .layer-visibility {
            grid-column: 1;
            grid-row: 1 / 3;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s ease;
            align-self: center;
        }
        
        .layer-visibility:hover {
            background: rgba(207, 156, 151, 0.3);
        }
        
        .layer-visibility svg {
            width: 16px;
            height: 16px;
            stroke: #800000;
        }
        
        .layer-visibility.hidden svg {
            opacity: 0.3;
        }
        
        .layer-opacity {
            grid-column: 2;
            grid-row: 1;
            font-size: 10px;
            color: var(--text-secondary);
            font-family: monospace;
            align-self: start;
            margin-top: 2px;
        }
        
        .layer-name {
            grid-column: 2;
            grid-row: 2;
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            align-self: end;
            margin-bottom: 2px;
        }
        
        .layer-thumbnail {
            grid-column: 3;
            grid-row: 1 / 3;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 238, 0.8);
            border: 1px solid rgba(207, 156, 151, 0.3);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: center;
        }
        
        .layer-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 3px;
        }
        
        .layer-thumbnail-placeholder {
            width: 24px;
            height: 24px;
            background: rgba(207, 156, 151, 0.4);
            border-radius: 2px;
            opacity: 0.5;
        }
        
        .layer-delete-button {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s ease;
            background: rgba(128, 0, 0, 0.1);
            opacity: 0;
        }
        
        .layer-item:hover .layer-delete-button {
            opacity: 1;
        }
        
        .layer-delete-button:hover {
            background: rgba(128, 0, 0, 0.2);
        }
        
        .layer-delete-button svg {
            width: 10px;
            height: 10px;
            stroke: #800000;
        }
        
        /* ポップアップパネル */
        .popup-panel {
            position: fixed;
            background: rgba(240, 224, 214, 0.95);
            border: 2px solid var(--futaba-maroon);
            border-radius: 16px;
            box-shadow: 
                0 12px 32px rgba(128, 0, 0, 0.3),
                0 4px 16px rgba(128, 0, 0, 0.15);
            padding: 20px;
            z-index: 2000;
            backdrop-filter: blur(16px);
            display: none;
            user-select: none;
            min-width: 280px;
        }
        
        .popup-panel.show {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: scale(0.9) translateY(-10px);
                backdrop-filter: blur(4px);
            }
            to { 
                opacity: 1; 
                transform: scale(1) translateY(0);
                backdrop-filter: blur(16px);
            }
        }
        
        .popup-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--futaba-maroon);
            margin-bottom: 16px;
            text-align: center;
            border-bottom: 2px solid var(--futaba-light-medium);
            padding-bottom: 8px;
        }
        
        .setting-group {
            margin-bottom: 16px;
        }
        
        .setting-label {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .slider {
            flex: 1;
            height: 6px;
            background: rgba(207, 156, 151, 0.5);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }
        
        .slider-track {
            height: 100%;
            background: var(--futaba-maroon);
            border-radius: 3px;
            transition: width 0.1s ease;
        }
        
        .slider-handle {
            width: 16px;
            height: 16px;
            background: var(--futaba-maroon);
            border: 2px solid rgba(255, 255, 238, 0.9);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.3);
        }
        
        .slider-handle:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.2);
        }
        
        .slider-value {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
            min-width: 50px;
            text-align: right;
        }
        
        .size-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .size-input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid rgba(207, 156, 151, 0.5);
            border-radius: 6px;
            background: rgba(255, 255, 238, 0.8);
            font-family: monospace;
            font-size: 14px;
            text-align: center;
        }
        
        .size-input:focus {
            outline: none;
            border-color: var(--futaba-maroon);
            background: rgba(255, 255, 238, 0.95);
        }
        
        .size-multiply {
            color: var(--futaba-maroon);
            font-weight: bold;
            font-size: 16px;
        }
        
        .action-button {
            padding: 10px 16px;
            border: 2px solid var(--futaba-maroon);
            border-radius: 8px;
            background: rgba(255, 255, 238, 0.8);
            color: var(--futaba-maroon);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        
        .action-button:hover {
            background: var(--futaba-maroon);
            color: var(--text-inverse);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(128, 0, 0, 0.3);
        }
        
        .status-panel {
            position: fixed;
            bottom: 20px;
            left: 70px;
            right: 20px;
            background: rgba(240, 224, 214, 0.9);
            border: 2px solid rgba(207, 156, 151, 0.6);
            border-radius: 12px;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 
                0 4px 16px rgba(128, 0, 0, 0.1),
                0 2px 8px rgba(128, 0, 0, 0.05);
            backdrop-filter: blur(12px);
            z-index: 50;
        }
        
        .status-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* モダンなスクロールバー */
        .layer-panel-items::-webkit-scrollbar {
            width: 4px;
        }
        
        .layer-panel-items::-webkit-scrollbar-track {
            background: rgba(207, 156, 151, 0.2);
            border-radius: 2px;
        }
        
        .layer-panel-items::-webkit-scrollbar-thumb {
            background: rgba(128, 0, 0, 0.4);
            border-radius: 2px;
        }
        
        .layer-panel-items::-webkit-scrollbar-thumb:hover {
            background: rgba(128, 0, 0, 0.6);
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="sidebar">
            <div class="tool-button" id="resize-tool" title="リサイズ">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-scaling-icon lucide-scaling"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M14 15H9v-5"/><path d="M16 3h5v5"/><path d="M21 3 9 15"/></svg>
            </div>
            
            <div class="tool-separator"></div>
                   
            <div class="tool-button active" id="pen-tool" title="ベクターペン (P)">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pen-line-icon lucide-pen-line"><path d="M13 21h8"/><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>
            </div>
            
            <div class="tool-button" id="eraser-tool" title="消しゴム (E)">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eraser-icon lucide-eraser"><path d="M21 21H8a2 2 0 0 1-1.42-.587l-3.994-3.999a2 2 0 0 1 0-2.828l10-10a2 2 0 0 1 2.829 0l5.999 6a2 2 0 0 1 0 2.828L12.834 21"/><path d="m5.082 11.09 8.828 8.828"/></svg>
            </div>
        </div>
        
        <div class="canvas-area">
            <div class="canvas-container" id="canvas-container">
                <div id="drawing-canvas"></div>
            </div>
        </div>
    </div>
    
    <!-- 右側中央レイヤーパネル - ドラッグ対応 -->
    <div class="layer-panel-container" id="layer-panel-container">
        <div class="layer-add-button" id="add-layer-btn" title="レイヤー追加">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-copy-plus-icon lucide-copy-plus"><line x1="15" x2="15" y1="12" y2="18"/><line x1="12" x2="18" y1="15" y2="15"/><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        </div>
        
        <div class="layer-panel-items" id="layer-list">
            <!-- レイヤーアイテムが動的に生成される -->
        </div>
    </div>
    
    <!-- ポップアップパネル（ペンツール） -->
    <div class="popup-panel" id="pen-settings" style="left: 60px; top: 100px;">
        <div class="popup-title">ベクターペンツール設定</div>
        
        <div class="setting-group">
            <div class="setting-label">サイズ</div>
            <div class="slider-container">
                <div class="slider" id="pen-size-slider">
                    <div class="slider-track" id="pen-size-track"></div>
                    <div class="slider-handle" id="pen-size-handle"></div>
                </div>
                <div class="slider-value" id="pen-size-value">16.0px</div>
            </div>
        </div>
        
        <div class="setting-group">
            <div class="setting-label">不透明度</div>
            <div class="slider-container">
                <div class="slider" id="pen-opacity-slider">
                    <div class="slider-track" id="pen-opacity-track"></div>
                    <div class="slider-handle" id="pen-opacity-handle"></div>
                </div>
                <div class="slider-value" id="pen-opacity-value">85.0%</div>
            </div>
        </div>
    </div>
    
    <!-- ポップアップパネル（リサイズ） -->
    <div class="popup-panel" id="resize-settings" style="left: 60px; top: 150px;">
        <div class="popup-title">キャンバスリサイズ</div>
        
        <div class="setting-group">
            <div class="setting-label">キャンバスサイズ</div>
            <div class="size-input-group">
                <input type="number" class="size-input" id="canvas-width" min="100" max="4096" value="400">
                <div class="size-multiply">×</div>
                <input type="number" class="size-input" id="canvas-height" min="100" max="4096" value="400">
            </div>
        </div>
        
        <div class="setting-group">
            <div class="action-button" id="apply-resize">適用</div>
        </div>
    </div>
    
    <div class="status-panel">
        <div class="status-group">
            <div class="status-item">Canvas: <span id="canvas-info">400×400px</span></div>
            <div class="status-item">Tool: <span id="current-tool">ベクターペン</span></div>
            <div class="status-item">Layer: <span id="current-layer">背景</span></div>
            <div class="status-item">座標: <span id="coordinates">x: 0, y: 0</span></div>
            <div class="status-item">Transform: <span id="transform-info">scale: 1.0</span></div>
        </div>
        
        <div class="status-group">
            <div class="status-item">FPS: <span id="fps">60</span></div>
            <div class="status-item">History: <span id="history-info">1/10</span></div>
        </div>
    </div>

    <!-- PixiJS v8 and Essential Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.13.0/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    
    <!-- Core Drawing Engine -->
    <script>
        /**
         * DrawingEngine.js - Core Drawing Engine (レイヤードラッグ対応版)
         * 
         * 追加機能:
         * - レイヤードラッグ&ドロップ機能
         * - レイヤー順序変更
         * - ドラッグ中のビジュアルフィードバック
         * - スムーズなアニメーション効果
         */
        (function() {
            'use strict';
            
            // === ENGINE CONFIGURATION ===
            const ENGINE_CONFIG = {
                version: '8.0-LayerDrag-v1',
                canvas: { width: 400, height: 400 },
                rendering: { antialias: true, resolution: 1 },
                debug: false,
                history: { maxSize: 10, autoSaveInterval: 500 },
                transform: { minScale: 0.1, maxScale: 5.0, initialScale: 1.0 },
                thumbnail: { 
                    size: 48, 
                    updateThrottle: 100,
                    pointDensity: 1.5
                },
                layerDrag: {
                    dragThreshold: 5,
                    animationDuration: 300,
                    previewOffset: { x: 10, y: 10 }
                }
            };
            
            const log = (message, ...args) => {
                if (ENGINE_CONFIG.debug) console.log(message, ...args);
            };

            // === NATIVE JS UTILITIES ===
            const utils = {
                clamp: (value, min, max) => Math.max(min, Math.min(max, value)),
                last: (array) => array[array.length - 1],
                remove: (array, predicate) => {
                    const indices = [];
                    for (let i = array.length - 1; i >= 0; i--) {
                        if (predicate(array[i])) {
                            indices.push(i);
                            array.splice(i, 1);
                        }
                    }
                    return indices.length;
                },
                reverse: (array) => [...array].reverse(),
                throttle: (func, delay) => {
                    let timeoutId;
                    let lastExecTime = 0;
                    return function (...args) {
                        const currentTime = Date.now();
                        
                        if (currentTime - lastExecTime > delay) {
                            func.apply(this, args);
                            lastExecTime = currentTime;
                        } else {
                            clearTimeout(timeoutId);
                            timeoutId = setTimeout(() => {
                                func.apply(this, args);
                                lastExecTime = Date.now();
                            }, delay - (currentTime - lastExecTime));
                        }
                    };
                }
            };

            // === LAYER DRAG MANAGER ===
            class LayerDragManager {
                constructor(layerManager) {
                    this.layerManager = layerManager;
                    this.dragState = {
                        isDragging: false,
                        draggedLayer: null,
                        draggedElement: null,
                        startPosition: { x: 0, y: 0 },
                        currentPosition: { x: 0, y: 0 },
                        dragPreview: null,
                        dropTarget: null,
                        dropPosition: 'none' // 'above', 'below', 'none'
                    };
                    
                    this.initialize();
                }

                initialize() {
                    this.setupEventListeners();
                }

                setupEventListeners() {
                    // レイヤーリストでのドラッグイベント
                    document.addEventListener('mousedown', (e) => this.onMouseDown(e));
                    document.addEventListener('mousemove', (e) => this.onMouseMove(e));
                    document.addEventListener('mouseup', (e) => this.onMouseUp(e));
                    
                    // ドラッグ中のキャンセル処理
                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape' && this.dragState.isDragging) {
                            this.cancelDrag();
                        }
                    });
                }

                onMouseDown(e) {
                    const layerItem = e.target.closest('.layer-item');
                    const dragHandle = e.target.closest('.layer-drag-handle');
                    
                    if (!layerItem || (!dragHandle && !layerItem.contains(e.target))) {
                        return;
                    }

                    // 削除ボタンやその他のコントロールがクリックされた場合はドラッグしない
                    if (e.target.closest('.layer-delete-button, .layer-visibility')) {
                        return;
                    }

                    const layerId = parseInt(layerItem.dataset.layerId);
                    const layer = this.layerManager.layers.items.find(l => l.id === layerId);
                    
                    if (!layer || layer.isBackground) {
                        return; // 背景レイヤーはドラッグ不可
                    }

                    this.startDrag(layerItem, layer, e);
                }

                startDrag(element, layer, event) {
                    this.dragState.isDragging = true;
                    this.dragState.draggedLayer = layer;
                    this.dragState.draggedElement = element;
                    this.dragState.startPosition = { x: event.clientX, y: event.clientY };
                    this.dragState.currentPosition = { x: event.clientX, y: event.clientY };

                    // ドラッグ中スタイルを適用
                    element.classList.add('dragging');
                    document.body.style.cursor = 'grabbing';
                    document.body.style.userSelect = 'none';

                    // ドラッグプレビューを作成
                    this.createDragPreview(element, event);

                    event.preventDefault();
                }

                createDragPreview(element, event) {
                    const preview = element.cloneNode(true);
                    preview.classList.remove('dragging', 'active');
                    preview.classList.add('drag-preview');
                    preview.style.width = element.offsetWidth + 'px';
                    preview.style.height = element.offsetHeight + 'px';
                    preview.style.left = (event.clientX + ENGINE_CONFIG.layerDrag.previewOffset.x) + 'px';
                    preview.style.top = (event.clientY + ENGINE_CONFIG.layerDrag.previewOffset.y) + 'px';
                    
                    document.body.appendChild(preview);
                    this.dragState.dragPreview = preview;
                }

                onMouseMove(e) {
                    if (!this.dragState.isDragging) return;

                    this.dragState.currentPosition = { x: e.clientX, y: e.clientY };

                    // ドラッグプレビューを移動
                    if (this.dragState.dragPreview) {
                        this.dragState.dragPreview.style.left = (e.clientX + ENGINE_CONFIG.layerDrag.previewOffset.x) + 'px';
                        this.dragState.dragPreview.style.top = (e.clientY + ENGINE_CONFIG.layerDrag.previewOffset.y) + 'px';
                    }

                    // ドロップターゲットの検出
                    this.updateDropTarget(e);

                    e.preventDefault();
                }

                updateDropTarget(event) {
                    const layerItems = document.querySelectorAll('.layer-item:not(.dragging)');
                    let newDropTarget = null;
                    let newDropPosition = 'none';

                    for (const item of layerItems) {
                        const rect = item.getBoundingClientRect();
                        const centerY = rect.top + rect.height / 2;
                        
                        if (event.clientX >= rect.left && event.clientX <= rect.right &&
                            event.clientY >= rect.top && event.clientY <= rect.bottom) {
                            
                            newDropTarget = item;
                            newDropPosition = event.clientY < centerY ? 'above' : 'below';
                            break;
                        }
                    }

                    // ドロップターゲットの変更を処理
                    if (newDropTarget !== this.dragState.dropTarget || 
                        newDropPosition !== this.dragState.dropPosition) {
                        
                        this.clearDropIndicators();
                        
                        if (newDropTarget) {
                            if (newDropPosition === 'above') {
                                newDropTarget.classList.add('drop-above');
                            } else if (newDropPosition === 'below') {
                                newDropTarget.classList.add('drop-below');
                            }
                        }
                        
                        this.dragState.dropTarget = newDropTarget;
                        this.dragState.dropPosition = newDropPosition;
                    }
                }

                clearDropIndicators() {
                    document.querySelectorAll('.layer-item').forEach(item => {
                        item.classList.remove('drop-above', 'drop-below', 'drag-over');
                    });
                }

                onMouseUp(e) {
                    if (!this.dragState.isDragging) return;

                    // ドロップを実行
                    if (this.dragState.dropTarget && this.dragState.dropPosition !== 'none') {
                        this.executeDrop();
                    }

                    this.endDrag();
                }

                executeDrop() {
                    const draggedLayer = this.dragState.draggedLayer;
                    const targetLayerId = parseInt(this.dragState.dropTarget.dataset.layerId);
                    const dropPosition = this.dragState.dropPosition;

                    // レイヤー順序を変更
                    const success = this.layerManager.reorderLayer(
                        draggedLayer.id,
                        targetLayerId,
                        dropPosition
                    );

                    if (success) {
                        // UI を更新
                        setTimeout(() => {
                            if (window.UICallbacks?.onLayerListUpdated) {
                                window.UICallbacks.onLayerListUpdated(this.layerManager.getLayerList());
                            }
                        }, 50);
                    }
                }

                endDrag() {
                    if (this.dragState.draggedElement) {
                        this.dragState.draggedElement.classList.remove('dragging');
                    }

                    this.clearDropIndicators();

                    if (this.dragState.dragPreview) {
                        document.body.removeChild(this.dragState.dragPreview);
                    }

                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';

                    // 状態をリセット
                    this.dragState = {
                        isDragging: false,
                        draggedLayer: null,
                        draggedElement: null,
                        startPosition: { x: 0, y: 0 },
                        currentPosition: { x: 0, y: 0 },
                        dragPreview: null,
                        dropTarget: null,
                        dropPosition: 'none'
                    };
                }

                cancelDrag() {
                    this.endDrag();
                }
            }

            // === IMPROVED THUMBNAIL MANAGER ===
            class LayerThumbnailManager {
                constructor(drawingEngine) {
                    this.engine = drawingEngine;
                    this.thumbnailCache = new Map();
                    this.updateThrottledMap = new Map();
                }

                generateLayerThumbnail(layerId) {
                    if (!this.engine?.layerManager) return null;

                    try {
                        const layer = this.engine.layerManager.layers.items.find(l => l.id === layerId);
                        if (!layer) return null;

                        const canvas = document.createElement('canvas');
                        canvas.width = ENGINE_CONFIG.thumbnail.size;
                        canvas.height = ENGINE_CONFIG.thumbnail.size;
                        const ctx = canvas.getContext('2d');

                        const scaleX = ENGINE_CONFIG.thumbnail.size / ENGINE_CONFIG.canvas.width;
                        const scaleY = ENGINE_CONFIG.thumbnail.size / ENGINE_CONFIG.canvas.height;
                        const scale = Math.min(scaleX, scaleY);

                        if (layer.isBackground) {
                            ctx.fillStyle = '#f0e0d6';
                            ctx.fillRect(0, 0, ENGINE_CONFIG.thumbnail.size, ENGINE_CONFIG.thumbnail.size);
                        } else {
                            ctx.clearRect(0, 0, ENGINE_CONFIG.thumbnail.size, ENGINE_CONFIG.thumbnail.size);
                        }

                        if (layer.paths && layer.paths.length > 0) {
                            layer.paths.forEach(path => {
                                this.drawPathToThumbnail(ctx, path, scale);
                            });
                        }

                        const dataUrl = canvas.toDataURL();
                        this.thumbnailCache.set(layerId, dataUrl);

                        if (window.UICallbacks?.onLayerThumbnailUpdated) {
                            window.UICallbacks.onLayerThumbnailUpdated(layerId, dataUrl);
                        }

                        log('📸 Layer thumbnail generated:', layerId);
                        return dataUrl;

                    } catch (error) {
                        console.error('[ThumbnailManager] Generation failed for layer:', layerId, error);
                        return null;
                    }
                }

                drawPathToThumbnail(ctx, path, scale) {
                    if (!path.points || path.points.length === 0) return;

                    const color = this.colorToRgba(path.color, path.opacity);
                    ctx.fillStyle = color;

                    path.points.forEach(point => {
                        const x = point.x * scale;
                        const y = point.y * scale;
                        const radius = (path.size / 2) * scale;

                        if (radius > 0.1) {
                            ctx.beginPath();
                            ctx.arc(x, y, radius, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    });
                }

                colorToRgba(color, opacity) {
                    const r = (color >> 16) & 0xFF;
                    const g = (color >> 8) & 0xFF;
                    const b = color & 0xFF;
                    return `rgba(${r}, ${g}, ${b}, ${opacity})`;
                }

                generateLayerThumbnailThrottled(layerId) {
                    if (!this.updateThrottledMap.has(layerId)) {
                        this.updateThrottledMap.set(layerId, utils.throttle(() => {
                            this.generateLayerThumbnail(layerId);
                        }, ENGINE_CONFIG.thumbnail.updateThrottle));
                    }
                    
                    this.updateThrottledMap.get(layerId)();
                }

                updateAllThumbnails() {
                    if (!this.engine?.layerManager) return;
                    
                    const layers = this.engine.layerManager.getLayerList();
                    layers.forEach(layer => {
                        this.generateLayerThumbnail(layer.id);
                    });
                }

                clearCache() {
                    this.thumbnailCache.clear();
                }
            }

            // === TRANSFORM SYSTEM ===
            class TransformSystem {
                constructor() {
                    this.viewportTransform = {
                        x: 0, y: 0,
                        targetX: 0, targetY: 0,
                        scale: ENGINE_CONFIG.transform.initialScale,
                        targetScale: ENGINE_CONFIG.transform.initialScale
                    };
                    this.updateScheduled = false;
                }

                screenToWorld(screenPoint) {
                    const viewport = this.viewportTransform;
                    return {
                        x: (screenPoint.x - viewport.x) / viewport.scale,
                        y: (screenPoint.y - viewport.y) / viewport.scale
                    };
                }

                worldToScreen(worldPoint) {
                    const viewport = this.viewportTransform;
                    return {
                        x: worldPoint.x * viewport.scale + viewport.x,
                        y: worldPoint.y * viewport.scale + viewport.y
                    };
                }

                moveViewport(deltaX, deltaY) {
                    this.viewportTransform.targetX += deltaX;
                    this.viewportTransform.targetY += deltaY;
                    
                    const maxOffset = {
                        x: (window.innerWidth - 310) / 2,
                        y: window.innerHeight / 2
                    };
                    
                    this.viewportTransform.targetX = utils.clamp(
                        this.viewportTransform.targetX, 
                        -maxOffset.x * 2, 
                        maxOffset.x * 2
                    );
                    this.viewportTransform.targetY = utils.clamp(
                        this.viewportTransform.targetY, 
                        -maxOffset.y * 2, 
                        maxOffset.y * 2
                    );
                    
                    this.scheduleUpdate();
                }

                scaleViewport(scaleDelta, centerPoint = null) {
                    this.viewportTransform.targetScale = utils.clamp(
                        this.viewportTransform.targetScale * scaleDelta,
                        ENGINE_CONFIG.transform.minScale,
                        ENGINE_CONFIG.transform.maxScale
                    );
                    this.scheduleUpdate();
                }

                resetViewport() {
                    this.viewportTransform.targetX = 0;
                    this.viewportTransform.targetY = 0;
                    this.viewportTransform.targetScale = ENGINE_CONFIG.transform.initialScale;
                    this.scheduleUpdate();
                }

                scheduleUpdate() {
                    this.updateScheduled = true;
                }

                updateTransforms() {
                    if (!this.updateScheduled) return;

                    const vt = this.viewportTransform;
                    
                    vt.x = vt.x + (vt.targetX - vt.x) * 0.2;
                    vt.y = vt.y + (vt.targetY - vt.y) * 0.2;
                    vt.scale = vt.scale + (vt.targetScale - vt.scale) * 0.2;

                    this.applyViewportTransform();

                    if (Math.abs(vt.targetX - vt.x) < 0.1 && 
                        Math.abs(vt.targetY - vt.y) < 0.1 &&
                        Math.abs(vt.targetScale - vt.scale) < 0.001) {
                        vt.x = vt.targetX;
                        vt.y = vt.targetY;
                        vt.scale = vt.targetScale;
                        this.updateScheduled = false;
                    }
                }

                applyViewportTransform() {
                    const container = document.getElementById('canvas-container');
                    if (!container) return;

                    const vt = this.viewportTransform;
                    const viewportCenter = {
                        x: (window.innerWidth - 310) / 2,
                        y: window.innerHeight / 2
                    };

                    const offset = {
                        x: viewportCenter.x + vt.x,
                        y: viewportCenter.y + vt.y
                    };

                    container.style.transform = 
                        `translate3d(${offset.x}px, ${offset.y}px, 0) translate(-50%, -50%) scale(${vt.scale})`;
                    container.style.left = '0px';
                    container.style.top = '0px';

                    this._notifyTransformUpdated();
                }

                _notifyTransformUpdated() {
                    if (window.UICallbacks?.onTransformUpdated) {
                        window.UICallbacks.onTransformUpdated({
                            scale: this.viewportTransform.scale.toFixed(2)
                        });
                    }
                }

                getTransformState() {
                    return {
                        viewport: { ...this.viewportTransform }
                    };
                }

                restoreTransformState(state) {
                    if (state.viewport) {
                        this.viewportTransform = { ...state.viewport };
                        this.applyViewportTransform();
                    }
                }
            }

            // === LAYER MANAGER (ドラッグ対応版) ===
            class LayerManager {
                constructor(drawingEngine, transformSystem) {
                    this.engine = drawingEngine;
                    this.transform = transformSystem;
                    this.layers = {
                        items: [],
                        activeId: null,
                        nextId: 1
                    };
                    this.historyManager = null;
                    this.dragManager = null;
                }

                setHistoryManager(historyManager) {
                    this.historyManager = historyManager;
                }

                initialize() {
                    this.createBackgroundLayer();
                    this.createLayer('レイヤー1');
                    this.setActiveLayer(1);
                    
                    // ドラッグマネージャーを初期化
                    this.dragManager = new LayerDragManager(this);
                }

                createBackgroundLayer() {
                    const layer = this._createLayerObject(0, '背景', true);

                    const backgroundGraphics = new PIXI.Graphics();
                    backgroundGraphics.rect(0, 0, ENGINE_CONFIG.canvas.width, ENGINE_CONFIG.canvas.height);
                    backgroundGraphics.fill(0xf0e0d6);
                    layer.container.addChild(backgroundGraphics);
                    layer.backgroundGraphics = backgroundGraphics;

                    this.layers.items.push(layer);
                    this.engine.containers.world.addChild(layer.container);
                    this.layers.activeId = layer.id;

                    return layer;
                }

                createLayer(name = null) {
                    const layer = this._createLayerObject(
                        this.layers.nextId++, 
                        name || `レイヤー${this.layers.nextId - 1}`, 
                        false
                    );

                    this.layers.items.push(layer);
                    this.engine.containers.world.addChild(layer.container);
                    
                    if (this.historyManager) {
                        setTimeout(() => {
                            this.historyManager.createSnapshot(`レイヤー「${layer.name}」追加`, layer.id);
                        }, 100);
                    }

                    this._notifyLayerCreated(layer);
                    return layer;
                }

                _createLayerObject(id, name, isBackground) {
                    const container = new PIXI.Container();
                    container.name = name;
                    container.visible = true;

                    return {
                        id,
                        name,
                        container,
                        visible: true,
                        paths: [],
                        isBackground,
                        layerTransform: {
                            x: 0, y: 0,
                            rotation: 0,
                            scaleX: 1, scaleY: 1
                        }
                    };
                }

                // === 新機能: レイヤー順序変更 ===
                reorderLayer(draggedLayerId, targetLayerId, position) {
                    const draggedIndex = this.layers.items.findIndex(l => l.id === draggedLayerId);
                    const targetIndex = this.layers.items.findIndex(l => l.id === targetLayerId);

                    if (draggedIndex === -1 || targetIndex === -1 || draggedIndex === targetIndex) {
                        return false;
                    }

                    const draggedLayer = this.layers.items[draggedIndex];
                    
                    // 背景レイヤーは移動できない
                    if (draggedLayer.isBackground) {
                        return false;
                    }

                    // レイヤーを配列から削除
                    this.layers.items.splice(draggedIndex, 1);

                    // 新しい位置を計算
                    let newIndex = targetIndex;
                    if (draggedIndex < targetIndex) {
                        newIndex--; // 削除によってインデックスが1つ減る
                    }

                    if (position === 'below') {
                        newIndex++;
                    }

                    // 新しい位置に挿入
                    this.layers.items.splice(newIndex, 0, draggedLayer);

                    // PixiJSコンテナの順序も更新
                    this.updatePixiContainerOrder();

                    // 履歴に記録
                    if (this.historyManager) {
                        setTimeout(() => {
                            this.historyManager.createSnapshot(`レイヤー「${draggedLayer.name}」順序変更`);
                        }, 100);
                    }

                    log('🔄 Layer reordered:', draggedLayerId, 'to position', newIndex);
                    return true;
                }

                updatePixiContainerOrder() {
                    // 全てのレイヤーコンテナを一度削除
                    this.layers.items.forEach(layer => {
                        this.engine.containers.world.removeChild(layer.container);
                    });

                    // 新しい順序で再追加 (背景が最初、その後は配列順)
                    this.layers.items.forEach(layer => {
                        this.engine.containers.world.addChild(layer.container);
                    });
                }

                deleteLayer(layerId) {
                    if (this.layers.items.length <= 1) return false;

                    const layer = this.layers.items.find(l => l.id === layerId);
                    if (!layer) return false;

                    layer.paths.forEach(path => path.graphics.destroy());
                    this.engine.containers.world.removeChild(layer.container);
                    layer.container.destroy();

                    utils.remove(this.layers.items, l => l.id === layerId);

                    if (this.layers.activeId === layerId) {
                        const lastLayer = utils.last(this.layers.items);
                        this.layers.activeId = lastLayer ? lastLayer.id : null;
                    }

                    if (this.historyManager) {
                        setTimeout(() => {
                            this.historyManager.createSnapshot(`レイヤー「${layer.name}」削除`);
                        }, 100);
                    }

                    this._notifyLayerDeleted(layerId);
                    this._notifyActiveLayerChanged();
                    return true;
                }

                setActiveLayer(layerId) {
                    const layer = this.layers.items.find(l => l.id === layerId);
                    if (layer) {
                        this.layers.activeId = layerId;
                        this._notifyActiveLayerChanged();
                        return true;
                    }
                    return false;
                }

                toggleLayerVisibility(layerId) {
                    const layer = this.layers.items.find(l => l.id === layerId);
                    if (layer) {
                        layer.visible = !layer.visible;
                        layer.container.visible = layer.visible;

                        if (this.historyManager) {
                            const action = layer.visible ? '表示' : '非表示';
                            setTimeout(() => {
                                this.historyManager.createSnapshot(`レイヤー「${layer.name}」${action}`, layer.id);
                            }, 100);
                        }

                        this._notifyLayerVisibilityChanged(layerId, layer.visible);
                        return true;
                    }
                    return false;
                }

                getActiveLayer() {
                    return this.layers.items.find(l => l.id === this.layers.activeId);
                }

                getLayerList() {
                    return this.layers.items.map(layer => ({
                        id: layer.id,
                        name: layer.name,
                        visible: layer.visible,
                        isActive: layer.id === this.layers.activeId
                    }));
                }

                addPathToActiveLayer(path) {
                    const activeLayer = this.getActiveLayer();
                    if (activeLayer) {
                        activeLayer.paths.push(path);
                        activeLayer.container.addChild(path.graphics);

                        if (this.engine.thumbnailManager) {
                            this.engine.thumbnailManager.generateLayerThumbnailThrottled(activeLayer.id);
                        }

                        if (path.isComplete && this.historyManager) {
                            setTimeout(() => {
                                this.historyManager.createSnapshot('描画', activeLayer.id);
                            }, ENGINE_CONFIG.history.autoSaveInterval);
                        }
                    }
                }

                _notifyLayerCreated(layer) {
                    if (window.UICallbacks?.onLayerCreated) {
                        window.UICallbacks.onLayerCreated({
                            id: layer.id,
                            name: layer.name,
                            visible: layer.visible
                        });
                    }
                }

                _notifyLayerDeleted(layerId) {
                    if (window.UICallbacks?.onLayerDeleted) {
                        window.UICallbacks.onLayerDeleted(layerId);
                    }
                }

                _notifyActiveLayerChanged() {
                    const activeLayer = this.getActiveLayer();
                    if (activeLayer && window.UICallbacks?.onActiveLayerChanged) {
                        window.UICallbacks.onActiveLayerChanged(activeLayer.id, activeLayer.name);
                    }
                }

                _notifyLayerVisibilityChanged(layerId, visible) {
                    if (window.UICallbacks?.onLayerVisibilityChanged) {
                        window.UICallbacks.onLayerVisibilityChanged(layerId, visible);
                    }
                }
            }

            // === TRANSFORM HISTORY MANAGER ===
            class TransformHistoryManager {
                constructor(transformSystem, layerManager) {
                    this.transform = transformSystem;
                    this.layers = layerManager;
                    this.history = [];
                    this.currentIndex = -1;
                    this.maxSize = ENGINE_CONFIG.history.maxSize;
                    this.isPerformingOperation = false;
                }

                createSnapshot(actionName = 'Unknown Action', changedLayerId = null) {
                    if (this.isPerformingOperation) return;

                    const snapshot = {
                        id: `snap_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
                        timestamp: Date.now(),
                        actionName: actionName,
                        transformState: this.transform.getTransformState(),
                        activeLayerId: this.layers.layers.activeId,
                        changedLayers: changedLayerId ? 
                            this.serializeLayer(changedLayerId) : 
                            this.serializeActiveLayers()
                    };

                    this.history = this.history.slice(0, this.currentIndex + 1);
                    this.history.push(snapshot);

                    if (this.history.length > this.maxSize) {
                        this.history.shift();
                    } else {
                        this.currentIndex++;
                    }

                    this._notifyHistoryUpdated();
                    log('📸 Snapshot:', actionName, 'Index:', this.currentIndex);
                }

                serializeActiveLayers() {
                    const activeLayer = this.layers.getActiveLayer();
                    if (!activeLayer) return {};

                    return {
                        [activeLayer.id]: {
                            id: activeLayer.id,
                            name: activeLayer.name,
                            visible: activeLayer.visible,
                            recentPaths: activeLayer.paths.slice(-5).map(path => ({
                                id: path.id,
                                points: [...path.points],
                                color: path.color,
                                size: path.size,
                                opacity: path.opacity,
                                isComplete: path.isComplete
                            }))
                        }
                    };
                }

                serializeLayer(layerId) {
                    const layer = this.layers.layers.items.find(l => l.id === layerId);
                    if (!layer) return {};

                    return {
                        [layerId]: {
                            id: layer.id,
                            name: layer.name,
                            visible: layer.visible,
                            paths: layer.paths.map(path => ({
                                id: path.id,
                                points: [...path.points],
                                color: path.color,
                                size: path.size,
                                opacity: path.opacity,
                                isComplete: path.isComplete
                            }))
                        }
                    };
                }

                undo() {
                    if (this.currentIndex <= 0) return false;

                    this.currentIndex--;
                    this.restoreSnapshot(this.history[this.currentIndex]);
                    log('↶ Undo to:', this.currentIndex);
                    return true;
                }

                redo() {
                    if (this.currentIndex >= this.history.length - 1) return false;

                    this.currentIndex++;
                    this.restoreSnapshot(this.history[this.currentIndex]);
                    log('↷ Redo to:', this.currentIndex);
                    return true;
                }

                restoreSnapshot(snapshot) {
                    this.isPerformingOperation = true;

                    try {
                        this.transform.restoreTransformState(snapshot.transformState);
                        this.restoreLayersFromSnapshot(snapshot.changedLayers);
                        this.layers.setActiveLayer(snapshot.activeLayerId);
                    } finally {
                        this.isPerformingOperation = false;
                    }

                    this._notifyHistoryUpdated();
                }

                restoreLayersFromSnapshot(changedLayers) {
                    Object.values(changedLayers).forEach(layerData => {
                        const existingLayer = this.layers.layers.items.find(l => l.id === layerData.id);
                        if (existingLayer) {
                            existingLayer.visible = layerData.visible;
                            existingLayer.container.visible = layerData.visible;

                            if (layerData.paths || layerData.recentPaths) {
                                const pathsToRestore = layerData.paths || layerData.recentPaths;
                                this.restoreLayerPaths(existingLayer, pathsToRestore);
                            }
                        }
                    });

                    if (window.UICallbacks?.onLayerListUpdated) {
                        window.UICallbacks.onLayerListUpdated(this.layers.getLayerList());
                    }
                }

                restoreLayerPaths(layer, pathsData) {
                    layer.paths.forEach(path => {
                        if (path.graphics && path.graphics.destroy) {
                            path.graphics.destroy();
                        }
                    });
                    layer.container.removeChildren();

                    if (layer.isBackground && layer.backgroundGraphics) {
                        layer.container.addChild(layer.backgroundGraphics);
                    }

                    layer.paths = pathsData.map(pathData => {
                        const path = {
                            id: pathData.id,
                            graphics: new PIXI.Graphics(),
                            points: [...pathData.points],
                            color: pathData.color,
                            size: pathData.size,
                            opacity: pathData.opacity,
                            isComplete: pathData.isComplete
                        };

                        this.redrawPath(path);
                        layer.container.addChild(path.graphics);
                        
                        return path;
                    });
                }

                redrawPath(path) {
                    path.graphics.clear();
                    if (path.points.length === 0) return;

                    path.points.forEach(point => {
                        path.graphics.circle(point.x, point.y, path.size / 2);
                        path.graphics.fill({ color: path.color, alpha: path.opacity });
                    });
                }

                _notifyHistoryUpdated() {
                    if (window.UICallbacks?.onHistoryUpdated) {
                        window.UICallbacks.onHistoryUpdated(this.currentIndex + 1, this.history.length);
                    }
                }

                initialize() {
                    this.createSnapshot('初期状態');
                }
            }

            // === DRAWING TOOLS ===
            class DrawingTools {
                constructor(drawingEngine, layerManager, transformSystem) {
                    this.engine = drawingEngine;
                    this.layers = layerManager;
                    this.transform = transformSystem;
                    this.currentTool = 'pen';
                    this.brushSize = 16.0;
                    this.brushColor = 0x800000;
                    this.opacity = 0.85;
                    this.drawing = { active: false, path: null, lastPoint: null };
                }

                selectTool(tool) {
                    this.currentTool = tool;
                    this._notifyToolChanged();
                }

                setBrushSize(size) {
                    this.brushSize = utils.clamp(Math.round(size * 10) / 10, 0.1, 100);
                }

                setOpacity(opacity) {
                    this.opacity = utils.clamp(Math.round(opacity * 1000) / 1000, 0, 1);
                }

                getToolSettings(toolType = null) {
                    const tool = toolType || this.currentTool;
                    return {
                        size: this.brushSize,
                        opacity: this.opacity,
                        color: this.brushColor
                    };
                }

                startDrawing(canvasX, canvasY, isPanning) {
                    if (isPanning) return false;
                    
                    this.drawing.active = true;
                    this.drawing.lastPoint = { x: canvasX, y: canvasY };

                    const color = this.currentTool === 'eraser' ? 0xf0e0d6 : this.brushColor;
                    const alpha = this.currentTool === 'eraser' ? 1.0 : this.opacity;

                    this.drawing.path = this.engine.createPath(canvasX, canvasY, this.brushSize, color, alpha);
                    
                    const activeLayer = this.layers.getActiveLayer();
                    if (activeLayer) {
                        activeLayer.paths.push(this.drawing.path);
                        activeLayer.container.addChild(this.drawing.path.graphics);
                        
                        if (this.engine.thumbnailManager) {
                            this.engine.thumbnailManager.generateLayerThumbnailThrottled(activeLayer.id);
                        }
                    }
                    
                    return true;
                }

                continueDrawing(canvasX, canvasY, isPanning) {
                    if (!this.drawing.active || !this.drawing.path || isPanning) return;

                    this.engine.extendPath(this.drawing.path, canvasX, canvasY);
                    
                    const activeLayer = this.layers.getActiveLayer();
                    if (activeLayer && this.engine.thumbnailManager) {
                        this.engine.thumbnailManager.generateLayerThumbnailThrottled(activeLayer.id);
                    }
                    
                    this.drawing.lastPoint = { x: canvasX, y: canvasY };
                }

                stopDrawing() {
                    if (this.drawing.path) {
                        this.drawing.path.isComplete = true;
                        
                        const activeLayer = this.layers.getActiveLayer();
                        if (activeLayer) {
                            if (this.engine.thumbnailManager) {
                                setTimeout(() => {
                                    this.engine.thumbnailManager.generateLayerThumbnail(activeLayer.id);
                                }, 50);
                            }
                            
                            if (this.layers.historyManager) {
                                setTimeout(() => {
                                    this.layers.historyManager.createSnapshot('描画', activeLayer.id);
                                }, ENGINE_CONFIG.history.autoSaveInterval);
                            }
                        }
                    }
                    this.drawing = { active: false, path: null, lastPoint: null };
                }

                _notifyToolChanged() {
                    if (window.UICallbacks?.onToolChanged) {
                        const toolNames = { pen: 'ベクターペン', eraser: '消しゴム' };
                        window.UICallbacks.onToolChanged(this.currentTool, toolNames[this.currentTool]);
                    }
                }
            }

            // === SYSTEM MONITOR ===
            class SystemMonitor {
                constructor() {
                    this.frameCount = 0;
                    this.lastTime = performance.now();
                }

                start() {
                    const update = () => {
                        this.frameCount++;
                        const currentTime = performance.now();

                        if (currentTime - this.lastTime >= 1000) {
                            const fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                            
                            if (window.UICallbacks?.onFPSUpdated) {
                                window.UICallbacks.onFPSUpdated(fps);
                            }

                            this.frameCount = 0;
                            this.lastTime = currentTime;
                        }

                        requestAnimationFrame(update);
                    };

                    update();
                }
            }

            // === DRAWING ENGINE ===
            class DrawingEngine {
                constructor(transformSystem) {
                    this.transform = transformSystem;
                    this.app = null;
                    this.containers = { camera: null, world: null, ui: null };
                    this.paths = [];
                    this.tools = null;
                    this.layerManager = null;
                    this.thumbnailManager = null;
                }

                async initialize() {
                    this.app = new PIXI.Application();
                    await this.app.init({
                        width: ENGINE_CONFIG.canvas.width,
                        height: ENGINE_CONFIG.canvas.height,
                        background: 0xf0e0d6,
                        backgroundAlpha: 1,
                        antialias: ENGINE_CONFIG.rendering.antialias,
                        resolution: ENGINE_CONFIG.rendering.resolution,
                        autoDensity: false
                    });

                    this.setupContainers();
                    this.setupInteraction();

                    this.thumbnailManager = new LayerThumbnailManager(this);

                    return true;
                }

                setupContainers() {
                    this.containers.camera = new PIXI.Container();
                    this.containers.world = new PIXI.Container();
                    this.containers.ui = new PIXI.Container();

                    const maskGraphics = new PIXI.Graphics();
                    maskGraphics.rect(0, 0, ENGINE_CONFIG.canvas.width, ENGINE_CONFIG.canvas.height);
                    maskGraphics.fill(0x000000);
                    this.app.stage.addChild(maskGraphics);
                    this.containers.camera.mask = maskGraphics;

                    this.containers.camera.addChild(this.containers.world);
                    this.app.stage.addChild(this.containers.camera);
                    this.app.stage.addChild(this.containers.ui);

                    this.containers.world.x = 0;
                    this.containers.world.y = 0;
                    this.containers.world.scale.set(1);
                }

                setupInteraction() {
                    this.containers.camera.eventMode = "static";
                    this.containers.camera.hitArea = new PIXI.Rectangle(0, 0, ENGINE_CONFIG.canvas.width, ENGINE_CONFIG.canvas.height);

                    this.containers.camera.on('pointerdown', (e) => this.onPointerDown(e));
                    this.containers.camera.on('pointermove', (e) => this.onPointerMove(e));
                    this.containers.camera.on('pointerup', (e) => this.onPointerUp(e));
                    this.containers.camera.on('pointerupoutside', (e) => this.onPointerUp(e));
                    this.containers.camera.on('pointercancel', (e) => this.onPointerUp(e));
                }

                onPointerDown(event) {
                    const spacePressed = window.DrawingEngineAPI._spacePressed;
                    const originalEvent = event.data.originalEvent;

                    if (spacePressed) {
                        event.stopPropagation();
                    } else {
                        if (originalEvent.pointerType === 'pen' && originalEvent.pressure === 0) {
                            return;
                        }

                        this.tools.startDrawing(event.global.x, event.global.y, spacePressed);
                    }
                }

                onPointerMove(event) {
                    const spacePressed = window.DrawingEngineAPI._spacePressed;
                    const originalEvent = event.data.originalEvent;

                    if (spacePressed) {
                        this._notifyCoordinatesUpdated(event.global.x, event.global.y);
                        return;
                    } else {
                        if (originalEvent.pointerType === 'pen' && originalEvent.pressure === 0) {
                            return;
                        }

                        this.tools.continueDrawing(event.global.x, event.global.y, spacePressed);
                        this._notifyCoordinatesUpdated(event.global.x, event.global.y);
                    }
                }

                onPointerUp(event) {
                    const spacePressed = window.DrawingEngineAPI._spacePressed;

                    if (!spacePressed) {
                        this.tools.stopDrawing();
                    }
                }

                createPath(x, y, size, color, opacity) {
                    const path = {
                        id: `path_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                        graphics: new PIXI.Graphics(),
                        points: [],
                        color, size, opacity,
                        isComplete: false
                    };

                    path.graphics.circle(x, y, size / 2);
                    path.graphics.fill({ color: path.color, alpha: path.opacity });

                    path.points.push({ x, y, size });

                    this.paths.push(path);
                    return path;
                }

                extendPath(path, x, y) {
                    if (!path || path.points.length === 0) return;

                    const lastPoint = utils.last(path.points);
                    const distance = Math.sqrt((x - lastPoint.x) ** 2 + (y - lastPoint.y) ** 2);

                    if (distance < ENGINE_CONFIG.thumbnail.pointDensity) return;

                    const steps = Math.max(1, Math.ceil(distance / ENGINE_CONFIG.thumbnail.pointDensity));
                    for (let i = 1; i <= steps; i++) {
                        const t = i / steps;
                        const px = lastPoint.x + (x - lastPoint.x) * t;
                        const py = lastPoint.y + (y - lastPoint.y) * t;

                        path.graphics.circle(px, py, path.size / 2);
                        path.graphics.fill({ color: path.color, alpha: path.opacity });

                        path.points.push({ x: px, y: py, size: path.size });
                    }
                }

                resize(newWidth, newHeight) {
                    ENGINE_CONFIG.canvas.width = newWidth;
                    ENGINE_CONFIG.canvas.height = newHeight;

                    this.app.renderer.resize(newWidth, newHeight);

                    if (this.containers.camera.mask) {
                        this.containers.camera.mask.clear();
                        this.containers.camera.mask.rect(0, 0, newWidth, newHeight);
                        this.containers.camera.mask.fill(0x000000);
                    }

                    this.containers.camera.hitArea = new PIXI.Rectangle(0, 0, newWidth, newHeight);

                    this.layerManager.layers.items.forEach(layer => {
                        if (layer.isBackground && layer.backgroundGraphics) {
                            layer.backgroundGraphics.clear();
                            layer.backgroundGraphics.rect(0, 0, newWidth, newHeight);
                            layer.backgroundGraphics.fill(0xf0e0d6);
                        }
                    });

                    setTimeout(() => {
                        this.thumbnailManager.updateAllThumbnails();
                    }, 200);

                    if (window.UICallbacks?.onCanvasResized) {
                        window.UICallbacks.onCanvasResized(newWidth, newHeight);
                    }
                }

                clear() {
                    this.paths.forEach(path => path.graphics.destroy());
                    this.paths = [];

                    this.layerManager.layers.items.forEach(layer => {
                        layer.paths = [];
                        layer.container.removeChildren();
                        if (layer.isBackground && layer.backgroundGraphics) {
                            layer.container.addChild(layer.backgroundGraphics);
                        }
                    });

                    this.thumbnailManager.clearCache();
                    setTimeout(() => {
                        this.thumbnailManager.updateAllThumbnails();
                    }, 100);
                }

                _notifyCoordinatesUpdated(x, y) {
                    if (window.UICallbacks?.onCoordinatesUpdated) {
                        window.UICallbacks.onCoordinatesUpdated(Math.round(x), Math.round(y));
                    }
                }
            }

            // === ENGINE INSTANCE ===
            let engineInstance = null;

            // === API IMPLEMENTATION ===
            window.DrawingEngineAPI = {
                _spacePressed: false,

                initialize: async (containerElement) => {
                    if (engineInstance) {
                        console.error('[DrawingEngine] Already initialized');
                        return false;
                    }

                    try {
                        const transformSystem = new TransformSystem();
                        const drawingEngine = new DrawingEngine(transformSystem);
                        
                        await drawingEngine.initialize();
                        
                        containerElement.appendChild(drawingEngine.app.canvas);

                        const layerManager = new LayerManager(drawingEngine, transformSystem);
                        const drawingTools = new DrawingTools(drawingEngine, layerManager, transformSystem);
                        const historyManager = new TransformHistoryManager(transformSystem, layerManager);
                        const systemMonitor = new SystemMonitor();

                        drawingEngine.tools = drawingTools;
                        drawingEngine.layerManager = layerManager;
                        layerManager.setHistoryManager(historyManager);

                        layerManager.initialize();
                        systemMonitor.start();
                        historyManager.initialize();

                        drawingEngine.app.ticker.add(() => transformSystem.updateTransforms());

                        engineInstance = {
                            transformSystem,
                            drawingEngine,
                            layerManager,
                            drawingTools,
                            historyManager,
                            systemMonitor
                        };

                        log('🎨 DrawingEngine initialized (LayerDrag-v1)');
                        return true;

                    } catch (error) {
                        console.error('[DrawingEngine] Initialization failed:', error.message);
                        return false;
                    }
                },

                destroy: () => {
                    if (!engineInstance) return;

                    try {
                        if (engineInstance.drawingEngine?.thumbnailManager) {
                            engineInstance.drawingEngine.thumbnailManager.clearCache();
                        }
                        if (engineInstance.drawingEngine?.app) {
                            engineInstance.drawingEngine.app.destroy(true);
                        }
                        engineInstance = null;
                        log('🎨 DrawingEngine destroyed');
                    } catch (error) {
                        console.error('[DrawingEngine] Destroy failed:', error.message);
                    }
                },

                resize: (width, height) => {
                    if (!engineInstance) return false;
                    try {
                        engineInstance.drawingEngine.resize(width, height);
                        return true;
                    } catch (error) {
                        console.error('[DrawingEngine] Resize failed:', error.message);
                        return false;
                    }
                },

                clear: () => {
                    if (!engineInstance) return false;
                    try {
                        engineInstance.drawingEngine.clear();
                        return true;
                    } catch (error) {
