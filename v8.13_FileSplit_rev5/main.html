                        console.error('[DrawingEngine] Clear failed:', error.message);
                        return false;
                    }
                },

                setActiveTool: (toolType, settings = {}) => {
                    if (!engineInstance) return false;
                    try {
                        engineInstance.drawingTools.selectTool(toolType);
                        
                        if (settings.size !== undefined) {
                            engineInstance.drawingTools.setBrushSize(settings.size);
                        }
                        if (settings.opacity !== undefined) {
                            engineInstance.drawingTools.setOpacity(settings.opacity);
                        }
                        
                        return true;
                    } catch (error) {
                        console.error('[DrawingEngine] SetActiveTool failed:', error.message);
                        return false;
                    }
                },

                getActiveTool: () => {
                    if (!engineInstance) return null;
                    return engineInstance.drawingTools.currentTool;
                },

                getToolSettings: (toolType = null) => {
                    if (!engineInstance) return {};
                    return engineInstance.drawingTools.getToolSettings(toolType);
                },

                createLayer: (name = null) => {
                    if (!engineInstance) return null;
                    try {
                        const layer = engineInstance.layerManager.createLayer(name);
                        return layer ? layer.id : null;
                    } catch (error) {
                        console.error('[DrawingEngine] CreateLayer failed:', error.message);
                        return null;
                    }
                },

                deleteLayer: (layerId) => {
                    if (!engineInstance) return false;
                    try {
                        return engineInstance.layerManager.deleteLayer(layerId);
                    } catch (error) {
                        console.error('[DrawingEngine] DeleteLayer failed:', error.message);
                        return false;
                    }
                },

                setActiveLayer: (layerId) => {
                    if (!engineInstance) return false;
                    try {
                        return engineInstance.layerManager.setActiveLayer(layerId);
                    } catch (error) {
                        console.error('[DrawingEngine] SetActiveLayer failed:', error.message);
                        return false;
                    }
                },

                toggleLayerVisibility: (layerId) => {
                    if (!engineInstance) return false;
                    try {
                        return engineInstance.layerManager.toggleLayerVisibility(layerId);
                    } catch (error) {
                        console.error('[DrawingEngine] ToggleLayerVisibility failed:', error.message);
                        return false;
                    }
                },

                getLayerList: () => {
                    if (!engineInstance) return [];
                    try {
                        return engineInstance.layerManager.getLayerList();
                    } catch (error) {
                        console.error('[DrawingEngine] GetLayerList failed:', error.message);
                        return [];
                    }
                },

                // === 新機能: レイヤー順序変更 ===
                reorderLayer: (draggedLayerId, targetLayerId, position) => {
                    if (!engineInstance) return false;
                    try {
                        return engineInstance.layerManager.reorderLayer(draggedLayerId, targetLayerId, position);
                    } catch (error) {
                        console.error('[DrawingEngine] ReorderLayer failed:', error.message);
                        return false;
                    }
                },

                resetViewport: () => {
                    if (!engineInstance) return false;
                    try {
                        engineInstance.transformSystem.resetViewport();
                        return true;
                    } catch (error) {
                        console.error('[DrawingEngine] ResetViewport failed:', error.message);
                        return false;
                    }
                },

                moveViewport: (deltaX, deltaY) => {
                    if (!engineInstance) return false;
                    try {
                        engineInstance.transformSystem.moveViewport(deltaX, deltaY);
                        return true;
                    } catch (error) {
                        console.error('[DrawingEngine] MoveViewport failed:', error.message);
                        return false;
                    }
                },

                undo: () => {
                    if (!engineInstance) return false;
                    try {
                        return engineInstance.historyManager.undo();
                    } catch (error) {
                        console.error('[DrawingEngine] Undo failed:', error.message);
                        return false;
                    }
                },

                redo: () => {
                    if (!engineInstance) return false;
                    try {
                        return engineInstance.historyManager.redo();
                    } catch (error) {
                        console.error('[DrawingEngine] Redo failed:', error.message);
                        return false;
                    }
                },

                createSnapshot: (actionName = 'Unknown Action') => {
                    if (!engineInstance) return false;
                    try {
                        engineInstance.historyManager.createSnapshot(actionName);
                        return true;
                    } catch (error) {
                        console.error('[DrawingEngine] CreateSnapshot failed:', error.message);
                        return false;
                    }
                },

                updateThumbnail: (layerId) => {
                    if (!engineInstance?.drawingEngine?.thumbnailManager) return false;
                    try {
                        engineInstance.drawingEngine.thumbnailManager.generateLayerThumbnail(layerId);
                        return true;
                    } catch (error) {
                        console.error('[DrawingEngine] UpdateThumbnail failed:', error.message);
                        return false;
                    }
                },

                updateAllThumbnails: () => {
                    if (!engineInstance?.drawingEngine?.thumbnailManager) return false;
                    try {
                        engineInstance.drawingEngine.thumbnailManager.updateAllThumbnails();
                        return true;
                    } catch (error) {
                        console.error('[DrawingEngine] UpdateAllThumbnails failed:', error.message);
                        return false;
                    }
                },

                setSpacePressed: (pressed) => {
                    window.DrawingEngineAPI._spacePressed = pressed;
                }
            };

            log('🎨 DrawingEngine.js loaded (LayerDrag-v1)');

        })();
    </script>
    
    <!-- メインアプリケーション -->
    <script>
        /**
         * 🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8-LayerDrag対応版
         * UI Controller - レイヤードラッグ機能統合版
         * 
         * 新機能:
         * - レイヤーのドラッグ&ドロップ並び替え
         * - ビジュアルフィードバック付きドラッグ操作
         * - スムーズなレイヤー順序変更
         * - ドラッグハンドルの表示
         */
        
        // === UTILITIES ===
        const utils = {
            clamp: (value, min, max) => Math.max(min, Math.min(max, value))
        };

        // === UI CALLBACKS IMPLEMENTATION ===
        window.UICallbacks = {
            onLayerCreated: (layerInfo) => {
                if (window.futabaApp?.ui) {
                    window.futabaApp.ui.updateLayerUI();
                }
            },

            onLayerDeleted: (layerId) => {
                if (window.futabaApp?.ui) {
                    window.futabaApp.ui.updateLayerUI();
                }
            },

            onActiveLayerChanged: (layerId, layerName) => {
                if (window.futabaApp?.ui) {
                    window.futabaApp.ui.updateLayerUI();
                    window.futabaApp.ui.updateStatusDisplay('current-layer', layerName);
                }
            },

            onLayerVisibilityChanged: (layerId, visible) => {
                if (window.futabaApp?.ui) {
                    window.futabaApp.ui.updateLayerUI();
                }
            },

            onLayerListUpdated: (layerList) => {
                if (window.futabaApp?.ui) {
                    window.futabaApp.ui.updateLayerUI();
                }
            },

            onLayerThumbnailUpdated: (layerId, thumbnailData) => {
                const layerItem = document.querySelector(`[data-layer-id="${layerId}"] .layer-thumbnail img`);
                if (layerItem) {
                    layerItem.src = thumbnailData;
                } else {
                    const thumbnail = document.querySelector(`[data-layer-id="${layerId}"] .layer-thumbnail`);
                    if (thumbnail) {
                        thumbnail.innerHTML = `<img src="${thumbnailData}" alt="">`;
                    }
                }
            },

            onToolChanged: (toolType, toolName) => {
                if (window.futabaApp?.ui) {
                    window.futabaApp.ui.updateStatusDisplay('current-tool', toolName);
                    window.futabaApp.ui.updateToolButtons(toolType);
                }
            },

            onTransformUpdated: (transformState) => {
                if (window.futabaApp?.ui) {
                    window.futabaApp.ui.updateStatusDisplay('transform-info', `scale: ${transformState.scale}`);
                }
            },

            onCoordinatesUpdated: (x, y) => {
                if (window.futabaApp?.ui) {
                    window.futabaApp.ui.updateStatusDisplay('coordinates', `x: ${x}, y: ${y}`);
                }
            },

            onHistoryUpdated: (currentIndex, totalCount) => {
                if (window.futabaApp?.ui) {
                    window.futabaApp.ui.updateStatusDisplay('history-info', `${currentIndex}/${totalCount}`);
                }
            },

            onFPSUpdated: (fps) => {
                if (window.futabaApp?.ui) {
                    window.futabaApp.ui.updateStatusDisplay('fps', fps);
                }
            },

            onCanvasResized: (width, height) => {
                if (window.futabaApp?.ui) {
                    window.futabaApp.ui.updateStatusDisplay('canvas-info', `${width}×${height}px`);
                }
            }
        };

        // === HAMMER.JS POSITION MANAGER ===
        class HammerJSPositionManager {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.state = { 
                    panning: false,
                    initialized: false,
                    gestureActive: false,
                    lastDelta: { x: 0, y: 0 },
                    panStarted: false
                };
                this.hammer = null;
            }

            initialize() {
                setTimeout(() => {
                    this.setupHammerJS();
                    this.state.initialized = true;
                }, 100);
            }

            setupHammerJS() {
                this.hammer = new Hammer(this.container);

                this.hammer.get('pan').set({ 
                    direction: Hammer.DIRECTION_ALL,
                    threshold: 5,
                    pointers: 1
                });

                this.hammer.on('panstart', (e) => this.onPanStart(e));
                this.hammer.on('panmove', (e) => this.onPanMove(e));
                this.hammer.on('panend pancancel', (e) => this.onPanEnd(e));
            }

            onPanStart(event) {
                if (!window.futabaApp?.spacePressed) return;

                if (event.srcEvent.pointerType === 'pen' && event.srcEvent.pressure === 0) {
                    return;
                }

                this.state.panning = true;
                this.state.gestureActive = true;
                this.state.panStarted = true;
                
                this.state.lastDelta.x = 0;
                this.state.lastDelta.y = 0;
            }

            onPanMove(event) {
                if (!this.state.panning || !window.futabaApp?.spacePressed) return;

                if (event.srcEvent.pointerType === 'pen' && event.srcEvent.pressure === 0) {
                    return;
                }

                const { deltaX, deltaY } = event;
                
                let actualDeltaX, actualDeltaY;
                
                if (this.state.panStarted) {
                    actualDeltaX = deltaX;
                    actualDeltaY = deltaY;
                    this.state.panStarted = false;
                } else {
                    actualDeltaX = deltaX - this.state.lastDelta.x;
                    actualDeltaY = deltaY - this.state.lastDelta.y;
                }

                if (Math.abs(actualDeltaX) < 0.5 && Math.abs(actualDeltaY) < 0.5) {
                    this.state.lastDelta.x = deltaX;
                    this.state.lastDelta.y = deltaY;
                    return;
                }

                window.DrawingEngineAPI?.moveViewport(actualDeltaX, actualDeltaY);

                this.state.lastDelta.x = deltaX;
                this.state.lastDelta.y = deltaY;
            }

            onPanEnd(event) {
                if (!this.state.panning) return;

                this.state.panning = false;
                this.state.gestureActive = false;
                this.state.panStarted = false;
                
                this.state.lastDelta.x = 0;
                this.state.lastDelta.y = 0;
            }

            destroy() {
                if (this.hammer) {
                    this.hammer.destroy();
                    this.hammer = null;
                }
            }
        }

        // === IMPROVED SHORTCUT MANAGER ===
        class ShortcutManager {
            constructor(appController) {
                this.app = appController;
                this.keyStates = new Set();
            }

            initialize() {
                document.addEventListener('keydown', (e) => this.handleKeyDown(e));
                document.addEventListener('keyup', (e) => this.handleKeyUp(e));

                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'y')) {
                        e.preventDefault();
                    }
                });
            }

            handleKeyDown(e) {
                const keyCombo = this.getKeyCombo(e);
                if (this.keyStates.has(keyCombo)) return;
                this.keyStates.add(keyCombo);

                if (this.isInputFocused()) return;

                if (e.code === 'Space') {
                    this.app.spacePressed = true;
                    window.DrawingEngineAPI?.setSpacePressed(true);
                    e.preventDefault();
                    return;
                }

                if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
                    window.DrawingEngineAPI?.undo();
                    e.preventDefault();
                    return;
                }

                if ((e.ctrlKey || e.metaKey) && 
                    (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
                    window.DrawingEngineAPI?.redo();
                    e.preventDefault();
                    return;
                }

                if (e.key.toLowerCase() === 'p') {
                    window.DrawingEngineAPI?.setActiveTool('pen', {
                        size: 16.0,
                        opacity: 0.85
                    });
                    this.app.ui.updateToolButtons('pen');
                    e.preventDefault();
                    return;
                }

                if (e.key.toLowerCase() === 'e') {
                    window.DrawingEngineAPI?.setActiveTool('eraser', {
                        size: 20.0
                    });
                    this.app.ui.updateToolButtons('eraser');
                    e.preventDefault();
                    return;
                }

                if (e.code === 'ArrowUp' && !this.app.spacePressed) {
                    this.moveLayerDown();
                    e.preventDefault();
                    return;
                }

                if (e.code === 'ArrowDown' && !this.app.spacePressed) {
                    this.moveLayerUp();
                    e.preventDefault();
                    return;
                }

                if (e.code === 'Home') {
                    window.DrawingEngineAPI?.resetViewport();
                    e.preventDefault();
                    return;
                }

                if (this.app.spacePressed) {
                    const moveMap = {
                        'ArrowLeft': [10, 0],
                        'ArrowRight': [-10, 0],
                        'ArrowUp': [0, 10],
                        'ArrowDown': [0, -10]
                    };

                    if (moveMap[e.code]) {
                        window.DrawingEngineAPI?.moveViewport(...moveMap[e.code]);
                        e.preventDefault();
                    }
                }
            }

            handleKeyUp(e) {
                const keyCombo = this.getKeyCombo(e);
                this.keyStates.delete(keyCombo);

                if (e.code === 'Space') {
                    this.app.spacePressed = false;
                    window.DrawingEngineAPI?.setSpacePressed(false);
                }
            }

            getKeyCombo(e) {
                let combo = '';
                if (e.ctrlKey) combo += 'ctrl+';
                if (e.altKey) combo += 'alt+';
                if (e.shiftKey) combo += 'shift+';
                combo += e.code.toLowerCase();
                return combo;
            }

            isInputFocused() {
                const activeElement = document.activeElement;
                return activeElement && (
                    activeElement.tagName === 'INPUT' ||
                    activeElement.tagName === 'TEXTAREA' ||
                    activeElement.contentEditable === 'true'
                );
            }

            moveLayerUp() {
                const layers = window.DrawingEngineAPI?.getLayerList() || [];
                const activeIndex = layers.findIndex(l => l.isActive);

                if (activeIndex > 0) {
                    const targetLayer = layers[activeIndex - 1];
                    window.DrawingEngineAPI?.setActiveLayer(targetLayer.id);
                }
            }

            moveLayerDown() {
                const layers = window.DrawingEngineAPI?.getLayerList() || [];
                const activeIndex = layers.findIndex(l => l.isActive);

                if (activeIndex < layers.length - 1) {
                    const targetLayer = layers[activeIndex + 1];
                    window.DrawingEngineAPI?.setActiveLayer(targetLayer.id);
                }
            }
        }

        // === UNIFIED UI CONTROLLER (ドラッグ対応版) ===
        class UnifiedUIController {
            constructor() {
                this.activePopup = null;
                this.sliders = new Map();
                this.dragState = { active: false, offset: { x: 0, y: 0 } };
            }

            initialize() {
                this.setupEventDelegation();
                this.setupSliders();
                this.setupResize();
                this.updateCanvasInfo();
            }

            setupEventDelegation() {
                document.addEventListener('click', (e) => {
                    const toolButton = e.target.closest('.tool-button');
                    if (toolButton && !toolButton.classList.contains('disabled')) {
                        this.handleToolClick(toolButton);
                        return;
                    }

                    const layerAddBtn = e.target.closest('#add-layer-btn');
                    if (layerAddBtn) {
                        const layerId = window.DrawingEngineAPI?.createLayer();
                        if (layerId) {
                            window.DrawingEngineAPI?.setActiveLayer(layerId);
                        }
                        return;
                    }

                    if (!e.target.closest('.popup-panel') && 
                        !e.target.closest('.tool-button') &&
                        !e.target.closest('.layer-panel-container')) {
                        this.closeAllPopups();
                    }
                });

                document.querySelectorAll('.popup-panel').forEach(popup => {
                    const title = popup.querySelector('.popup-title');
                    if (title) {
                        title.style.cursor = 'move';
                        title.addEventListener('mousedown', (e) => this.startDrag(e, popup));
                    }
                });

                document.addEventListener('mousemove', (e) => this.onDrag(e));
                document.addEventListener('mouseup', () => this.stopDrag());
            }

            handleToolClick(button) {
                const toolId = button.id;
                
                const toolMap = {
                    'pen-tool': () => {
                        this.activateTool('pen');
                        this.togglePopup('pen-settings');
                    },
                    'eraser-tool': () => {
                        this.activateTool('eraser');
                        this.closeAllPopups();
                    },
                    'resize-tool': () => {
                        this.togglePopup('resize-settings');
                    }
                };
                
                const handler = toolMap[toolId];
                if (handler) handler();
            }

            activateTool(tool) {
                const settings = this.getToolSettings(tool);
                window.DrawingEngineAPI?.setActiveTool(tool, settings);
                
                this.updateToolButtons(tool);
                
                const canvas = document.querySelector('#drawing-canvas canvas');
                if (canvas) {
                    canvas.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair';
                }
            }

            getToolSettings(tool) {
                if (tool === 'pen') {
                    const sizeSlider = this.sliders.get('pen-size-slider');
                    const opacitySlider = this.sliders.get('pen-opacity-slider');
                    
                    return {
                        size: sizeSlider ? sizeSlider.value : 16.0,
                        opacity: opacitySlider ? opacitySlider.value / 100 : 0.85
                    };
                }
                return {};
            }

            updateToolButtons(activeTool) {
                document.querySelectorAll('.tool-button').forEach(btn => btn.classList.remove('active'));
                const toolBtn = document.getElementById(activeTool + '-tool');
                if (toolBtn) toolBtn.classList.add('active');
            }

            togglePopup(popupId) {
                const popup = document.getElementById(popupId);
                if (!popup) return;
                
                if (this.activePopup && this.activePopup !== popup) {
                    this.activePopup.classList.remove('show');
                }
                
                const isVisible = popup.classList.contains('show');
                popup.classList.toggle('show', !isVisible);
                this.activePopup = isVisible ? null : popup;
            }

            startDrag(e, popup) {
                this.dragState.active = popup;
                const rect = popup.getBoundingClientRect();
                this.dragState.offset.x = e.clientX - rect.left;
                this.dragState.offset.y = e.clientY - rect.top;
                e.preventDefault();
            }

            onDrag(e) {
                if (!this.dragState.active) return;
                
                const x = utils.clamp(e.clientX - this.dragState.offset.x, 0, 
                    window.innerWidth - this.dragState.active.offsetWidth);
                const y = utils.clamp(e.clientY - this.dragState.offset.y, 0, 
                    window.innerHeight - this.dragState.active.offsetHeight);
                
                this.dragState.active.style.left = x + 'px';
                this.dragState.active.style.top = y + 'px';
            }

            stopDrag() {
                this.dragState.active = false;
            }

            setupSliders() {
                this.createSlider('pen-size-slider', 0.1, 100, 16.0, (value) => {
                    this.updateToolSetting('pen', 'size', value);
                    return value.toFixed(1) + 'px';
                });
                
                this.createSlider('pen-opacity-slider', 0, 100, 85.0, (value) => {
                    this.updateToolSetting('pen', 'opacity', value / 100);
                    return value.toFixed(1) + '%';
                });
            }

            createSlider(sliderId, min, max, initial, callback) {
                const container = document.getElementById(sliderId);
                if (!container) return;

                const track = container.querySelector('.slider-track');
                const handle = container.querySelector('.slider-handle');
                const valueDisplay = container.parentNode.querySelector('.slider-value');

                if (!track || !handle || !valueDisplay) return;

                const slider = {
                    value: initial, min, max, callback, track, handle, valueDisplay, dragging: false
                };

                this.sliders.set(sliderId, slider);

                const update = (value) => {
                    slider.value = utils.clamp(value, min, max);
                    const percentage = ((slider.value - min) / (max - min)) * 100;
                    
                    track.style.width = percentage + '%';
                    handle.style.left = percentage + '%';
                    valueDisplay.textContent = callback(slider.value);
                };

                const getValue = (clientX) => {
                    const rect = container.getBoundingClientRect();
                    const percentage = utils.clamp((clientX - rect.left) / rect.width, 0, 1);
                    return min + (percentage * (max - min));
                };

                container.addEventListener('mousedown', (e) => {
                    slider.dragging = true;
                    update(getValue(e.clientX));
                    e.preventDefault();
                });

                document.addEventListener('mousemove', (e) => {
                    if (slider.dragging) update(getValue(e.clientX));
                });

                document.addEventListener('mouseup', () => {
                    slider.dragging = false;
                });

                update(initial);
            }

            updateToolSetting(tool, setting, value) {
                const currentSettings = window.DrawingEngineAPI?.getToolSettings(tool) || {};
                currentSettings[setting] = value;
                window.DrawingEngineAPI?.setActiveTool(tool, currentSettings);
            }

            setupResize() {
                const applyButton = document.getElementById('apply-resize');
                if (applyButton) {
                    applyButton.addEventListener('click', () => this.applyResize());
                }
            }

            applyResize() {
                const widthInput = document.getElementById('canvas-width');
                const heightInput = document.getElementById('canvas-height');

                if (widthInput && heightInput) {
                    const width = parseInt(widthInput.value);
                    const height = parseInt(heightInput.value);

                    if (width >= 100 && width <= 4096 && height >= 100 && height <= 4096) {
                        window.DrawingEngineAPI?.resize(width, height);
                        this.closeAllPopups();
                        window.DrawingEngineAPI?.createSnapshot(`キャンバスを${width}×${height}にリサイズ`);
                    }
                }
            }

            updateLayerUI() {
                const layerList = document.getElementById('layer-list');
                if (!layerList) return;

                layerList.innerHTML = '';

                const layers = window.DrawingEngineAPI?.getLayerList() || [];
                const reversedLayers = [...layers].reverse();

                reversedLayers.forEach((layer) => {
                    const layerItem = document.createElement('div');
                    layerItem.className = `layer-item ${layer.isActive ? 'active' : ''}`;
                    layerItem.dataset.layerId = layer.id;
                    
                    const eyeIcon = layer.visible ? 
                        '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>' :
                        '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>';

                    const deleteIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="m18 6-12 12"/><path d="m6 6 12 12"/></svg>';

                    layerItem.innerHTML = `
                        <div class="layer-visibility ${layer.visible ? '' : 'hidden'}" data-action="toggle-visibility">
                            ${eyeIcon}
                        </div>
                        <div class="layer-opacity">100%</div>
                        <div class="layer-name">${layer.name}</div>
                        <div class="layer-thumbnail">
                            <div class="layer-thumbnail-placeholder"></div>
                        </div>
                        <div class="layer-delete-button" data-action="delete-layer">
                            ${deleteIcon}
                        </div>
                    `;

                    layerItem.addEventListener('click', (e) => {
                        const action = e.target.closest('[data-action]')?.dataset.action;
                        if (action === 'toggle-visibility') {
                            window.DrawingEngineAPI?.toggleLayerVisibility(layer.id);
                            e.stopPropagation();
                        } else if (action === 'delete-layer') {
                            window.DrawingEngineAPI?.deleteLayer(layer.id);
                            e.stopPropagation();
                        } else {
                            window.DrawingEngineAPI?.setActiveLayer(layer.id);
                        }
                    });

                    layerList.appendChild(layerItem);
                });

                setTimeout(() => {
                    layers.forEach(layer => {
                        window.DrawingEngineAPI?.updateThumbnail(layer.id);
                    });
                }, 100);
            }

            updateStatusDisplay(elementId, text) {
                const element = document.getElementById(elementId);
                if (element) {
                    element.textContent = text;
                }
            }

            updateCanvasInfo() {
                this.updateStatusDisplay('canvas-info', '400×400px');
            }

            closeAllPopups() {
                document.querySelectorAll('.popup-panel').forEach(popup => {
                    popup.classList.remove('show');
                });
                this.activePopup = null;
            }
        }

        // === APP CONTROLLER ===
        class AppController {
            constructor() {
                this.spacePressed = false;
                this.ui = new UnifiedUIController();
                this.positionManager = new HammerJSPositionManager();
                this.shortcutManager = new ShortcutManager(this);
            }

            async initialize() {
                const requiredLibs = {
                    pixi: window.PIXI,
                    gsap: window.gsap,
                    Hammer: window.Hammer,
                    drawingEngine: window.DrawingEngineAPI
                };

                for (const [name, lib] of Object.entries(requiredLibs)) {
                    if (!lib) {
                        throw new Error(`Library ${name} not found`);
                    }
                }

                const canvasContainer = document.getElementById('drawing-canvas');
                const engineInitialized = await window.DrawingEngineAPI.initialize(canvasContainer);
                
                if (!engineInitialized) {
                    throw new Error('DrawingEngine initialization failed');
                }

                this.ui.initialize();
                this.positionManager.initialize();
                this.shortcutManager.initialize();

                this.setupInputHandlers();

                setTimeout(() => this.ui.updateLayerUI(), 100);

                return true;
            }

            setupInputHandlers() {
                window.addEventListener('blur', () => {
                    this.spacePressed = false;
                    window.DrawingEngineAPI?.setSpacePressed(false);
                });

                window.addEventListener('beforeunload', () => {
                    if (this.positionManager && this.positionManager.destroy) {
                        this.positionManager.destroy();
                    }
                    window.DrawingEngineAPI?.destroy();
                });
            }
        }

        // === APPLICATION BOOTSTRAP ===
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                window.futabaApp = new AppController();
                await window.futabaApp.initialize();

                console.log('🎨 Futaba Drawing Tool v8-LayerDrag対応版 完了!');
                console.log('✅ レイヤードラッグ&ドロップ機能');
                console.log('✅ ビジュアルフィードバック');
                console.log('✅ スムーズなレイヤー順序変更');
                console.log('✅ ドラッグハンドルの表示');

            } catch (error) {
                console.error('💥 Application startup failed:', error);
                const canvasArea = document.querySelector('.canvas-area');
                if (canvasArea) {
                    canvasArea.innerHTML = `
                        <div style="text-align: center; color: var(--futaba-maroon); font-size: 18px; padding: 40px;">
                            <div>⚠️ アプリケーションの初期化に失敗しました</div>
                        </div>
                    `;
                }
            }
        });
    </script>
