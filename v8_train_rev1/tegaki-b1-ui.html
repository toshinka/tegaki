<script>
/**
 * 🚋 B1-UI: ユーザーインターフェース
 * @provides: サイドバー, ポップアップ, ツール選択
 * @depends: A1-Core, A2-Integration
 * @role: UI制御
 */

window.Tegaki = window.Tegaki || {};

Tegaki.B1 = (() => {
    "use strict";
    
    // ==== UI Controller ====
    class UIController {
        constructor() {
            this.activePopup = null;
            this.sliders = new Map();
            this.isDragging = false;
            this.dragOffset = { x: 0, y: 0 };
        }
        
        init() {
            console.log('[B1-UI] UI初期化開始');
            
            this.generateToolButtons();
            this.generatePopups();
            this.setupToolButtons();
            this.setupPopups();
            this.setupSliders();
            this.setupPresets();
            this.setupResize();
            this.setupCheckboxes();
            
            console.log('[B1-UI] ✅ UI初期化完了');
        }
        
        generateToolButtons() {
            const sidebar = document.getElementById('sidebar');
            if (!sidebar) return;
            
            // v7rev2のツールボタン配置を完全移植
            sidebar.innerHTML = `
                <div class="tool-button disabled" id="download-tool" title="ダウンロード">
                    <img src="https://cdn.jsdelivr.net/npm/@tabler/icons/icons/outline/book-download.svg" alt="download">
                </div>
                
                <div class="tool-button" id="resize-tool" data-popup="resize-settings" title="リサイズ">
                    <img src="https://cdn.jsdelivr.net/npm/@tabler/icons/icons/outline/resize.svg" alt="resize">
                </div>
                
                <div class="tool-separator"></div>
                       
                <div class="tool-button disabled" id="palette-tool" title="カラーパレット">
                    <img src="https://cdn.jsdelivr.net/npm/lucide-static/icons/palette.svg" alt="palette">
                </div>
         
                <div class="tool-button active" id="pen-tool" data-popup="pen-settings" title="ベクターペン">
                    <img src="https://cdn.jsdelivr.net/npm/lucide-static/icons/pencil-line.svg" alt="pen">
                </div>
                
                <div class="tool-button" id="eraser-tool" title="消しゴム">
                    <img src="https://cdn.jsdelivr.net/npm/lucide-static/icons/eraser.svg" alt="eraser">
                </div>
                
                <div class="tool-separator"></div>
                
                <div class="tool-button disabled" id="fill-tool" title="塗りつぶし">
                    <img src="https://cdn.jsdelivr.net/npm/lucide-static/icons/paint-bucket.svg" alt="fill">
                </div>
                
                <div class="tool-button disabled" id="select-tool" title="範囲選択">
                    <img src="https://cdn.jsdelivr.net/npm/lucide-static/icons/box-select.svg" alt="select">
                </div>
                
                <div class="tool-separator"></div>
                
                <div class="tool-button disabled" id="settings-tool" title="設定">
                    <img src="https://cdn.jsdelivr.net/npm/@tabler/icons/icons/outline/settings.svg" alt="settings">
                </div>
            `;
        }
        
        generatePopups() {
            const body = document.body;
            
            // ペン設定ポップアップ
            const penPopup = document.createElement('div');
            penPopup.className = 'popup-panel pen-settings draggable';
            penPopup.id = 'pen-settings';
            penPopup.style.left = '60px';
            penPopup.style.top = '100px';
            penPopup.innerHTML = `
                <div class="popup-title">ベクターペンツール設定</div>
                
                <div class="setting-group">
                    <div class="size-presets" id="size-presets">
                        <div class="size-preset-item" data-size="1">
                            <div class="size-preview-circle" style="width: 0.5px; height: 0.5px; background: #800000;"></div>
                            <div class="size-preview-label">1</div>
                            <div class="size-preview-percent">85%</div>
                        </div>
                        <div class="size-preset-item" data-size="2">
                            <div class="size-preview-circle" style="width: 2px; height: 2px; background: #800000;"></div>
                            <div class="size-preview-label">2</div>
                            <div class="size-preview-percent">85%</div>
                        </div>
                        <div class="size-preset-item" data-size="4">
                            <div class="size-preview-circle" style="width: 4px; height: 4px; background: #800000;"></div>
                            <div class="size-preview-label">4</div>
                            <div class="size-preview-percent">85%</div>
                        </div>
                        <div class="size-preset-item" data-size="8">
                            <div class="size-preview-circle" style="width: 8px; height: 8px; background: #800000;"></div>
                            <div class="size-preview-label">8</div>
                            <div class="size-preview-percent">85%</div>
                        </div>
                        <div class="size-preset-item active" data-size="16">
                            <div class="size-preview-circle" style="width: 16px; height: 16px; background: #800000;"></div>
                            <div class="size-preview-label">16</div>
                            <div class="size-preview-percent">85%</div>
                        </div>
                        <div class="size-preset-item" data-size="32">
                            <div class="size-preview-circle" style="width: 20px; height: 20px; background: #800000;"></div>
                            <div class="size-preview-label">32</div>
                            <div class="size-preview-percent">85%</div>
                        </div>
                    </div>
                </div>
                
                <div class="setting-group">
                    <div class="setting-label">サイズ</div>
                    <div class="slider-controls">
                        <div class="slider-button small" id="pen-size-decrease-small">-0.1</div>
                        <div class="slider-button small" id="pen-size-decrease">-1</div>
                        <div class="slider-button small" id="pen-size-decrease-large">-10</div>
                        <div class="slider-container" style="flex: 1; margin-bottom: 0;">
                            <div class="slider" id="pen-size-slider">
                                <div class="slider-track" id="pen-size-track"></div>
                                <div class="slider-handle" id="pen-size-handle"></div>
                            </div>
                            <div class="slider-value" id="pen-size-value">16.0px</div>
                        </div>
                        <div class="slider-button small" id="pen-size-increase-small">+0.1</div>
                        <div class="slider-button small" id="pen-size-increase">+1</div>
                        <div class="slider-button small" id="pen-size-increase-large">+10</div>
                    </div>
                </div>
                
                <div class="setting-group">
                    <div class="setting-label">不透明度</div>
                    <div class="slider-controls">
                        <div class="slider-button small" id="pen-opacity-decrease-small">-0.1</div>
                        <div class="slider-button small" id="pen-opacity-decrease">-1</div>
                        <div class="slider-button small" id="pen-opacity-decrease-large">-10</div>
                        <div class="slider-container" style="flex: 1; margin-bottom: 0;">
                            <div class="slider" id="pen-opacity-slider">
                                <div class="slider-track" id="pen-opacity-track"></div>
                                <div class="slider-handle" id="pen-opacity-handle"></div>
                            </div>
                            <div class="slider-value" id="pen-opacity-value">85.0%</div>
                        </div>
                        <div class="slider-button small" id="pen-opacity-increase-small">+0.1</div>
                        <div class="slider-button small" id="pen-opacity-increase">+1</div>
                        <div class="slider-button small" id="pen-opacity-increase-large">+10</div>
                    </div>
                </div>
                
                <div class="setting-group">
                    <div class="setting-label">筆圧</div>
                    <div class="slider-controls">
                        <div class="slider-button small" id="pen-pressure-decrease-small">-0.1</div>
                        <div class="slider-button small" id="pen-pressure-decrease">-1</div>
                        <div class="slider-button small" id="pen-pressure-decrease-large">-10</div>
                        <div class="slider-container" style="flex: 1; margin-bottom: 0;">
                            <div class="slider" id="pen-pressure-slider">
                                <div class="slider-track" id="pen-pressure-track"></div>
                                <div class="slider-handle" id="pen-pressure-handle"></div>
                            </div>
                            <div class="slider-value" id="pen-pressure-value">50.0%</div>
                        </div>
                        <div class="slider-button small" id="pen-pressure-increase-small">+0.1</div>
                        <div class="slider-button small" id="pen-pressure-increase">+1</div>
                        <div class="slider-button small" id="pen-pressure-increase-large">+10</div>
                    </div>
                </div>
                
                <div class="setting-group">
                    <div class="setting-label">線補正</div>
                    <div class="slider-controls">
                        <div class="slider-button small" id="pen-smoothing-decrease-small">-0.1</div>
                        <div class="slider-button small" id="pen-smoothing-decrease">-1</div>
                        <div class="slider-button small" id="pen-smoothing-decrease-large">-10</div>
                        <div class="slider-container" style="flex: 1; margin-bottom: 0;">
                            <div class="slider" id="pen-smoothing-slider">
                                <div class="slider-track" id="pen-smoothing-track"></div>
                                <div class="slider-handle" id="pen-smoothing-handle"></div>
                            </div>
                            <div class="slider-value" id="pen-smoothing-value">30.0%</div>
                        </div>
                        <div class="slider-button small" id="pen-smoothing-increase-small">+0.1</div>
                        <div class="slider-button small" id="pen-smoothing-increase">+1</div>
                        <div class="slider-button small" id="pen-smoothing-increase-large">+10</div>
                    </div>
                </div>
                
                <div class="setting-group">
                    <div class="checkbox-container">
                        <div class="checkbox-left">
                            <div class="checkbox checked" id="pressure-sensitivity"></div>
                            <div class="checkbox-label">筆圧感度 (120Hz対応)</div>
                        </div>
                    </div>
                    
                    <div class="checkbox-container">
                        <div class="checkbox-left">
                            <div class="checkbox checked" id="edge-smoothing"></div>
                            <div class="checkbox-label">エッジスムージング</div>
                        </div>
                    </div>
                    
                    <div class="checkbox-container">
                        <div class="checkbox-left">
                            <div class="checkbox checked" id="gpu-acceleration"></div>
                            <div class="checkbox-label">GPU加速</div>
                        </div>
                        <div class="checkbox-status">遅延: 0.6ms</div>
                    </div>
                </div>
            `;
            
            body.appendChild(penPopup);
            
            // リサイズ設定ポップアップ
            const resizePopup = document.createElement('div');
            resizePopup.className = 'popup-panel resize-settings draggable';
            resizePopup.id = 'resize-settings';
            resizePopup.style.left = '60px';
            resizePopup.style.top = '150px';
            resizePopup.innerHTML = `
                <div class="popup-title">キャンバスリサイズ</div>
                
                <div class="setting-group">
                    <div class="setting-label">キャンバスサイズ</div>
                    <div class="size-input-group">
                        <div class="size-input-field">
                            <input type="number" class="size-input" id="canvas-width" min="100" max="4096" value="400">
                        </div>
                        <div class="size-multiply">×</div>
                        <div class="size-input-field">
                            <input type="number" class="size-input" id="canvas-height" min="100" max="4096" value="400">
                        </div>
                    </div>
                </div>
                
                <div class="setting-group">
                    <div class="setting-label">プリセット</div>
                    <div class="resize-buttons">
                        <div class="resize-button" data-size="344,135">344×135</div>
                        <div class="resize-button" data-size="400,400">400×400</div>
                        <div class="resize-button" data-size="800,600">800×600</div>
                    </div>
                </div>
                
                <div class="setting-group">
                    <div class="resize-buttons">
                        <div class="resize-button" id="apply-resize">適用</div>
                    </div>
                </div>
            `;
            
            body.appendChild(resizePopup);
        }
        
        setupToolButtons() {
            document.querySelectorAll('.tool-button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (btn.classList.contains('disabled')) return;
                    this.handleToolClick(e.currentTarget);
                });
            });
        }
        
        handleToolClick(button) {
            const toolId = button.id;
            const popupId = button.getAttribute('data-popup');
            
            if (toolId === 'pen-tool') {
                this.setTool('pen');
            } else if (toolId === 'eraser-tool') {
                this.setTool('eraser');
            }
            
            if (popupId) {
                this.togglePopup(popupId);
            }
        }
        
        setTool(tool) {
            // B3-Toolsに委譲
            if (Tegaki.B3 && Tegaki.B3.setTool) {
                Tegaki.B3.setTool(tool);
            }
            
            document.querySelectorAll('.tool-button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tool + '-tool').classList.add('active');
        }
        
        togglePopup(popupId) {
            const popup = document.getElementById(popupId);
            if (!popup) return;
            
            if (this.activePopup && this.activePopup !== popup) {
                this.activePopup.classList.remove('show');
            }
            
            const isVisible = popup.classList.contains('show');
            popup.classList.toggle('show', !isVisible);
            this.activePopup = isVisible ? null : popup;
        }
        
        setupSliders() {
            // v7rev2のスライダー設定を完全移植
            this.createSlider('pen-size-slider', 0.1, 100, 16.0, (value) => {
                if (Tegaki.B3 && Tegaki.B3.setBrushSize) {
                    Tegaki.B3.setBrushSize(value);
                }
                this.updateSizePresets();
                return value.toFixed(1) + 'px';
            });
            
            this.createSlider('pen-opacity-slider', 0, 100, 85.0, (value) => {
                if (Tegaki.B3 && Tegaki.B3.setOpacity) {
                    Tegaki.B3.setOpacity(value / 100);
                }
                this.updateSizePresets();
                return value.toFixed(1) + '%';
            });
            
            this.createSlider('pen-pressure-slider', 0, 100, 50.0, (value) => {
                if (Tegaki.B3 && Tegaki.B3.setPressure) {
                    Tegaki.B3.setPressure(value / 100);
                }
                return value.toFixed(1) + '%';
            });
            
            this.createSlider('pen-smoothing-slider', 0, 100, 30.0, (value) => {
                if (Tegaki.B3 && Tegaki.B3.setSmoothing) {
                    Tegaki.B3.setSmoothing(value / 100);
                }
                return value.toFixed(1) + '%';
            });
            
            this.setupSliderButtons();
        }
        
        createSlider(sliderId, min, max, initial, callback) {
            const container = document.getElementById(sliderId);
            if (!container) return;
            
            const track = container.querySelector('.slider-track');
            const handle = container.querySelector('.slider-handle');
            const valueDisplay = container.parentNode.querySelector('.slider-value');
            
            const sliderData = {
                value: initial,
                min, max, callback,
                track, handle, valueDisplay,
                isDragging: false
            };
            
            this.sliders.set(sliderId, sliderData);
            
            const updateSlider = (value) => {
                sliderData.value = Math.max(min, Math.min(max, value));
                const percentage = ((sliderData.value - min) / (max - min)) * 100;
                
                track.style.width = percentage + '%';
                handle.style.left = percentage + '%';
                valueDisplay.textContent = callback(sliderData.value);
            };
            
            const getValueFromPosition = (clientX) => {
                const rect = container.getBoundingClientRect();
                const percentage = (clientX - rect.left) / rect.width;
                return min + (percentage * (max - min));
            };
            
            container.addEventListener('mousedown', (e) => {
                sliderData.isDragging = true;
                updateSlider(getValueFromPosition(e.clientX));
                e.preventDefault();
            });
            
            document.addEventListener('mousemove', (e) => {
                if (sliderData.isDragging) updateSlider(getValueFromPosition(e.clientX));
            });
            
            document.addEventListener('mouseup', () => {
                sliderData.isDragging = false;
            });
            
            updateSlider(initial);
        }
        
        setupSliderButtons() {
            const adjustValue = (sliderId, delta) => {
                const slider = this.sliders.get(sliderId);
                if (slider) {
                    const newValue = slider.value + delta;
                    const clampedValue = Math.max(slider.min, Math.min(slider.max, newValue));
                    slider.value = clampedValue;
                    
                    const percentage = ((clampedValue - slider.min) / (slider.max - slider.min)) * 100;
                    slider.track.style.width = percentage + '%';
                    slider.handle.style.left = percentage + '%';
                    slider.valueDisplay.textContent = slider.callback(clampedValue);
                }
            };
            
            // v7rev2の全調整ボタンを移植
            const buttonMap = [
                ['pen-size-decrease-small', 'pen-size-slider', -0.1],
                ['pen-size-decrease', 'pen-size-slider', -1],
                ['pen-size-decrease-large', 'pen-size-slider', -10],
                ['pen-size-increase-small', 'pen-size-slider', 0.1],
                ['pen-size-increase', 'pen-size-slider', 1],
                ['pen-size-increase-large', 'pen-size-slider', 10],
                ['pen-opacity-decrease-small', 'pen-opacity-slider', -0.1],
                ['pen-opacity-decrease', 'pen-opacity-slider', -1],
                ['pen-opacity-decrease-large', 'pen-opacity-slider', -10],
                ['pen-opacity-increase-small', 'pen-opacity-slider', 0.1],
                ['pen-opacity-increase', 'pen-opacity-slider', 1],
                ['pen-opacity-increase-large', 'pen-opacity-slider', 10],
                ['pen-pressure-decrease-small', 'pen-pressure-slider', -0.1],
                ['pen-pressure-decrease', 'pen-pressure-slider', -1],
                ['pen-pressure-decrease-large', 'pen-pressure-slider', -10],
                ['pen-pressure-increase-small', 'pen-pressure-slider', 0.1],
                ['pen-pressure-increase', 'pen-pressure-slider', 1],
                ['pen-pressure-increase-large', 'pen-pressure-slider', 10],
                ['pen-smoothing-decrease-small', 'pen-smoothing-slider', -0.1],
                ['pen-smoothing-decrease', 'pen-smoothing-slider', -1],
                ['pen-smoothing-decrease-large', 'pen-smoothing-slider', -10],
                ['pen-smoothing-increase-small', 'pen-smoothing-slider', 0.1],
                ['pen-smoothing-increase', 'pen-smoothing-slider', 1],
                ['pen-smoothing-increase-large', 'pen-smoothing-slider', 10]
            ];
            
            buttonMap.forEach(([buttonId, sliderId, delta]) => {
                const button = document.getElementById(buttonId);
                if (button) {
                    button.addEventListener('click', () => {
                        adjustValue(sliderId, delta);
                        if (sliderId.includes('size') || sliderId.includes('opacity')) {
                            this.updateSizePresets();
                        }
                    });
                }
            });
        }
        
        setupPresets() {
            document.querySelectorAll('.size-preset-item').forEach(preset => {
                preset.addEventListener('click', () => {
                    const size = parseFloat(preset.getAttribute('data-size'));
                    if (Tegaki.B3 && Tegaki.B3.setBrushSize) {
                        Tegaki.B3.setBrushSize(size);
                    }
                    this.updateSliderValue('pen-size-slider', size);
                    this.updateSizePresets();
                });
            });
        }
        
        setupResize() {
            document.querySelectorAll('.resize-button[data-size]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const [width, height] = btn.getAttribute('data-size').split(',').map(Number);
                    document.getElementById('canvas-width').value = width;
                    document.getElementById('canvas-height').value = height;
                });
            });
            
            const applyButton = document.getElementById('apply-resize');
            if (applyButton) {
                applyButton.addEventListener('click', () => {
                    const width = parseInt(document.getElementById('canvas-width').value);
                    const height = parseInt(document.getElementById('canvas-height').value);
                    
                    if (Tegaki.A2 && Tegaki.A2.getCoordinator) {
                        const coordinator = Tegaki.A2.getCoordinator();
                        if (coordinator) {
                            coordinator.handleResize(width, height, false);
                        }
                    }
                    
                    this.closeAllPopups();
                });
            }
        }
        
        setupCheckboxes() {
            document.querySelectorAll('.checkbox').forEach(checkbox => {
                checkbox.addEventListener('click', () => {
                    checkbox.classList.toggle('checked');
                });
            });
        }
        
        setupPopups() {
            document.querySelectorAll('.popup-panel.draggable').forEach(popup => {
                this.makeDraggable(popup);
            });
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.popup-panel') && !e.target.closest('.tool-button')) {
                    this.closeAllPopups();
                }
            });
        }
        
        makeDraggable(popup) {
            let isDragging = false;
            let dragOffset = { x: 0, y: 0 };
            
            popup.addEventListener('mousedown', (e) => {
                if (e.target === popup || e.target.closest('.popup-title')) {
                    isDragging = true;
                    popup.classList.add('dragging');
                    
                    const rect = popup.getBoundingClientRect();
                    dragOffset.x = e.clientX - rect.left;
                    dragOffset.y = e.clientY - rect.top;
                    e.preventDefault();
                }
            });
            
            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const x = Math.max(0, Math.min(e.clientX - dragOffset.x, window.innerWidth - popup.offsetWidth));
                    const y = Math.max(0, Math.min(e.clientY - dragOffset.y, window.innerHeight - popup.offsetHeight));
                    
                    popup.style.left = x + 'px';
                    popup.style.top = y + 'px';
                }
            });
            
            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    popup.classList.remove('dragging');
                }
            });
        }
        
        updateSliderValue(sliderId, value) {
            const slider = this.sliders.get(sliderId);
            if (slider) {
                slider.value = value;
                const percentage = ((value - slider.min) / (slider.max - slider.min)) * 100;
                slider.track.style.width = percentage + '%';
                slider.handle.style.left = percentage + '%';
                slider.valueDisplay.textContent = slider.callback(value);
            }
        }
        
        updateSizePresets() {
            const currentSize = Tegaki.B3 ? Tegaki.B3.getBrushSize() : 16.0;
            const currentOpacity = Tegaki.B3 ? Math.round(Tegaki.B3.getOpacity() * 100) : 85;
            
            document.querySelectorAll('.size-preset-item').forEach(preset => {
                const presetSize = parseFloat(preset.getAttribute('data-size'));
                const circle = preset.querySelector('.size-preview-circle');
                const label = preset.querySelector('.size-preview-label');
                const percent = preset.querySelector('.size-preview-percent');
                
                // アクティブ状態の更新
                const isActive = Math.abs(presetSize - currentSize) < 0.1;
                preset.classList.toggle('active', isActive);
                
                // 円のサイズ更新（0.5-20pxの範囲で線形変換）
                let circleSize;
                if (isActive) {
                    circleSize = Math.max(0.5, Math.min(20, (currentSize / 100) * 19.5 + 0.5));
                } else {
                    circleSize = Math.max(0.5, Math.min(20, (presetSize / 100) * 19.5 + 0.5));
                }
                
                circle.style.width = circleSize + 'px';
                circle.style.height = circleSize + 'px';
                
                // 不透明度の適用
                const opacity = Tegaki.B3 ? Tegaki.B3.getOpacity() : 0.85;
                circle.style.opacity = opacity;
                
                // ラベルの更新
                if (isActive) {
                    label.textContent = currentSize.toFixed(1);
                } else {
                    label.textContent = presetSize.toString();
                }
                
                // パーセント表示の更新
                percent.textContent = currentOpacity + '%';
            });
        }
        
        closeAllPopups() {
            document.querySelectorAll('.popup-panel').forEach(popup => {
                popup.classList.remove('show');
            });
            this.activePopup = null;
        }
        
        hasActivePopup() {
            return this.activePopup !== null;
        }
    }
    
    // ==== UI State ====
    const state = {
        controller: null,
        isInitialized: false
    };
