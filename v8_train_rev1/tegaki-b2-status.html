<script>
/**
 * 🚋 B2-Status: ステータス表示
 * @provides: ステータスバー, FPS監視, 座標表示
 * @depends: A1-Core, A2-Integration
 * @role: 監視・表示
 */

window.Tegaki = window.Tegaki || {};

Tegaki.B2 = (() => {
    "use strict";
    
    // ==== Performance Monitor ====
    class PerformanceMonitor {
        constructor() {
            this.frameCount = 0;
            this.lastTime = performance.now();
            this.isRunning = false;
        }
        
        start() {
            if (this.isRunning) return;
            
            this.isRunning = true;
            const update = () => {
                if (!this.isRunning) return;
                
                this.frameCount++;
                const currentTime = performance.now();
                
                if (currentTime - this.lastTime >= 1000) {
                    const fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                    this.updateFPS(fps);
                    
                    this.frameCount = 0;
                    this.lastTime = currentTime;
                    
                    // GPU使用率とメモリ使用量の簡易シミュレーション（v7rev2互換）
                    this.updateGPUUsage();
                    this.updateMemoryUsage();
                }
                
                requestAnimationFrame(update);
            };
            
            update();
        }
        
        stop() {
            this.isRunning = false;
        }
        
        updateFPS(fps) {
            const fpsElement = document.getElementById('fps');
            if (fpsElement) {
                fpsElement.textContent = fps;
            }
        }
        
        updateGPUUsage() {
            const gpuElement = document.getElementById('gpu-usage');
            if (gpuElement) {
                // v7rev2の簡易GPU監視を移植
                const baseUsage = 45;
                const variance = Math.sin(Date.now() / 2000) * 10;
                const gpu = Math.round(baseUsage + variance);
                gpuElement.textContent = gpu + '%';
            }
        }
        
        updateMemoryUsage() {
            const memoryElement = document.getElementById('memory-usage');
            if (memoryElement) {
                // v7rev2の簡易メモリ監視を移植
                const baseMemory = 1.2;
                const paths = Tegaki.A1 && Tegaki.A1.getEngine ? Tegaki.A1.getEngine().paths?.length || 0 : 0;
                const memoryUsage = (baseMemory + paths * 0.001).toFixed(1);
                memoryElement.textContent = memoryUsage + 'GB';
            }
        }
    }
    
    // ==== Status Controller ====
    class StatusController {
        constructor() {
            this.monitor = new PerformanceMonitor();
            this.statusElements = {};
        }
        
        init() {
            console.log('[B2-Status] ステータス初期化開始');
            
            this.generateStatusPanel();
            this.cacheElements();
            this.updateInitialValues();
            this.monitor.start();
            
            console.log('[B2-Status] ✅ ステータス初期化完了');
        }
        
        generateStatusPanel() {
            const statusPanel = document.getElementById('status-panel');
            if (!statusPanel) return;
            
            // v7rev2のステータスパネル構造を完全移植
            statusPanel.innerHTML = `
                <div class="status-group">
                    <div class="status-item">Canvas: <span id="canvas-info">400×400px</span></div>
                    <div class="status-item">Tool: <span id="current-tool">ベクターペン</span></div>
                    <div class="status-item">Color: <span id="current-color">#800000</span></div>
                    <div class="status-item">座標: <span id="coordinates">x: 0, y: 0</span></div>
                    <div class="status-item">筆圧: <span id="pressure-monitor">0.0%</span></div>
                </div>
                
                <div class="status-group">
                    <div class="status-item">FPS: <span id="fps">60</span></div>
                    <div class="status-item">GPU: <span id="gpu-usage">45%</span></div>
                    <div class="status-item">Memory: <span id="memory-usage">1.2GB</span></div>
                </div>
            `;
        }
        
        cacheElements() {
            this.statusElements = {
                canvasInfo: document.getElementById('canvas-info'),
                currentTool: document.getElementById('current-tool'),
                currentColor: document.getElementById('current-color'),
                coordinates: document.getElementById('coordinates'),
                pressureMonitor: document.getElementById('pressure-monitor'),
                fps: document.getElementById('fps'),
                gpuUsage: document.getElementById('gpu-usage'),
                memoryUsage: document.getElementById('memory-usage')
            };
        }
        
        updateInitialValues() {
            // v7rev2の初期値を完全移植
            this.updateCanvasInfo(400, 400);
            this.updateToolInfo('ベクターペン');
            this.updateColorInfo('#800000');
            this.updateCoordinates(0, 0);
            this.updatePressure('0.0');
        }
        
        updateCanvasInfo(width, height) {
            if (this.statusElements.canvasInfo) {
                this.statusElements.canvasInfo.textContent = `${width}×${height}px`;
            }
        }
        
        updateToolInfo(tool) {
            if (this.statusElements.currentTool) {
                const toolNames = { 
                    pen: 'ベクターペン', 
                    eraser: '消しゴム' 
                };
                this.statusElements.currentTool.textContent = toolNames[tool] || tool;
            }
        }
        
        updateColorInfo(color) {
            if (this.statusElements.currentColor) {
                this.statusElements.currentColor.textContent = color;
            }
        }
        
        updateCoordinates(x, y) {
            if (this.statusElements.coordinates) {
                this.statusElements.coordinates.textContent = `x: ${x}, y: ${y}`;
            }
        }
        
        updatePressure(pressure) {
            if (this.statusElements.pressureMonitor) {
                this.statusElements.pressureMonitor.textContent = pressure + '%';
            }
        }
        
        // パフォーマンス統計取得
        getPerformanceStats() {
            const engine = Tegaki.A1 ? Tegaki.A1.getEngine() : null;
            if (!engine) return null;
            
            return {
                fps: parseInt(this.statusElements.fps?.textContent || '0'),
                gpu: parseInt(this.statusElements.gpuUsage?.textContent || '0'),
                memory: parseFloat(this.statusElements.memoryUsage?.textContent || '0'),
                paths: engine.paths?.length || 0,
                totalPoints: engine.paths?.reduce((sum, path) => sum + (path.points?.length || 0), 0) || 0
            };
        }
        
        // リアルタイム更新開始
        startRealTimeUpdates() {
            this.monitor.start();
        }
        
        // リアルタイム更新停止
        stopRealTimeUpdates() {
            this.monitor.stop();
        }
    }
    
    // ==== Status State ====
    const state = {
        controller: null,
        isInitialized: false
    };
    
    // ==== Public API ====
    async function initStatus() {
        console.log('[B2-Status] ステータス監視初期化開始');
        
        try {
            // ステータスコントローラー初期化
            state.controller = new StatusController();
            state.controller.init();
            
            state.isInitialized = true;
            console.log('[B2-Status] ✅ ステータス監視初期化完了');
            
        } catch (error) {
            console.error('[B2-Status] ❌ ステータス初期化失敗:', error);
            throw error;
        }
    }
    
    function getController() {
        if (!state.isInitialized) {
            throw new Error('[B2-Status] Controller not initialized');
        }
        return state.controller;
    }
    
    // 外部API（A2-Integrationから呼び出し）
    function updateCanvasInfo(width, height) {
        if (state.controller) {
            state.controller.updateCanvasInfo(width, height);
        }
    }
    
    function updateToolInfo(tool) {
        if (state.controller) {
            state.controller.updateToolInfo(tool);
        }
    }
    
    function updateColorInfo(color) {
        if (state.controller) {
            state.controller.updateColorInfo(color);
        }
    }
    
    function updateCoordinates(x, y) {
        if (state.controller) {
            state.controller.updateCoordinates(x, y);
        }
    }
    
    function updatePressure(pressure) {
        if (state.controller) {
            state.controller.updatePressure(pressure);
        }
    }
    
    function getPerformanceStats() {
        return state.controller ? state.controller.getPerformanceStats() : null;
    }
    
    function isReady() {
        return state.isInitialized && state.controller;
    }
    
    // 外部アクセス用API
    return {
        initStatus,
        getController,
        updateCanvasInfo,
        updateToolInfo,
        updateColorInfo,
        updateCoordinates,
        updatePressure,
        getPerformanceStats,
        isReady,
        get state() { return state; }
    };
})();
</script>
