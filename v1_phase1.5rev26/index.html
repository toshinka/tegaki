<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 ふたば☆ちゃんねる風ベクターお絵描きツール - Phase1.5</title>
    <!-- 🎯 UI設計方針: 
         - Undo/Redoボタン削除（Ctrl+Z/Ctrl+Yショートカットのみ）
         - キャンバス移動系ボタン削除（Space/Ctrl+0ショートカットのみ）
         - 必要最小限のツールボタンのみ表示
         - 車輪の再発明防止：PixiJS拡張ライブラリ積極活用
         - @pixi/graphics-smooth対応で滑らかな線描画 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --futaba-maroon: #800000;
            --futaba-light-maroon: #aa5a56;
            --futaba-medium: #cf9c97;
            --futaba-light-medium: #e9c2ba;
            --futaba-cream: #f0e0d6;
            --futaba-background: #ffffee;
            
            --text-primary: #2c1810;
            --text-secondary: #5d4037;
            --text-inverse: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: var(--futaba-background);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 50px 1fr;
            height: 100vh;
            width: 100vw;
            gap: 0;
        }
        
        .sidebar {
            background: var(--futaba-cream);
            border-right: 2px solid var(--futaba-light-medium);
            display: flex;
            flex-direction: column;
            padding: 12px 6px;
            gap: 4px;
            overflow-y: auto;
            position: relative;
            z-index: 100;
        }
        
        .tool-button {
            width: 36px;
            height: 36px;
            border: 2px solid var(--futaba-light-medium);
            background: var(--futaba-background);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--futaba-maroon);
            position: relative;
            user-select: none;
        }
        
        .tool-button svg {
            width: 20px;
            height: 20px;
        }
        
        /* ふたば風統一アイコンスタイル */
        .futaba-icon {
            width: 20px;
            height: 20px;
            stroke: var(--futaba-maroon);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        
        .tool-button:hover {
            background: var(--futaba-medium);
            border-color: var(--futaba-light-maroon);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(128, 0, 0, 0.2);
        }
        
        .tool-button.active {
            background: var(--futaba-maroon);
            color: var(--text-inverse);
            border-color: var(--futaba-maroon);
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.3);
        }
        
        /* アクティブ状態のアイコンスタイル */
        .tool-button.active .futaba-icon {
            stroke: var(--text-inverse);
        }
        
        .tool-button.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        /* 無効状態のアイコンスタイル */
        .tool-button.disabled .futaba-icon {
            opacity: 0.4;
        }
        
        .tool-button.disabled:hover {
            transform: none;
            box-shadow: none;
        }
        
        .tool-separator {
            height: 1px;
            background: var(--futaba-light-medium);
            margin: 4px 2px;
        }
        
        .canvas-area {
            background: var(--futaba-background);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .canvas-container {
            background: transparent;
            border: none;
            border-radius: 0;
            box-shadow: none;
            overflow: visible;
            position: relative;
        }
        
        #canvas-container {
            display: block;
        }
        
        #canvas-container canvas {
            display: block;
            cursor: crosshair;
        }
        
        .status-panel {
            position: fixed;
            bottom: 20px;
            left: 70px;
            right: 20px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-medium);
            border-radius: 12px;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.1);
            z-index: 50;
        }
        
        .status-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* ショートカットヒント表示（Phase1.5追加） */
        .shortcut-hints {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-medium);
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 10px;
            color: var(--text-secondary);
            z-index: 60;
            max-width: 200px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        
        .shortcut-hints:hover {
            opacity: 1;
        }
        
        .shortcut-hint {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }
        
        .shortcut-hint:last-child {
            margin-bottom: 0;
        }
        
        .shortcut-key {
            font-weight: bold;
            color: var(--futaba-maroon);
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="sidebar">
            <!-- アイコンはJavaScriptで動的に生成・配置 -->
            <div class="tool-button disabled" id="download-tool" title="ダウンロード"></div>
            <div class="tool-button disabled" id="resize-tool" title="リサイズ"></div>
            
            <div class="tool-separator"></div>
                   
            <div class="tool-button disabled" id="palette-tool" title="カラーパレット"></div>
            <div class="tool-button active" id="pen-tool" title="ベクターペン (P)"></div>
            <div class="tool-button" id="eraser-tool" title="消しゴム (E)"></div>
            
            <div class="tool-separator"></div>
            
            <div class="tool-button disabled" id="fill-tool" title="塗りつぶし"></div>
            <div class="tool-button disabled" id="select-tool" title="範囲選択"></div>
            
            <div class="tool-separator"></div>
            
            <div class="tool-button" id="layers-tool" title="レイヤー"></div>
            <div class="tool-button disabled" id="settings-tool" title="設定"></div>
        </div>
        
        <div class="canvas-area">
            <div class="canvas-container">
                <div id="canvas-container"></div>
            </div>
        </div>
    </div>
    
    <!-- ショートカットヒント表示（Phase1.5追加） -->
    <div class="shortcut-hints">
        <div class="shortcut-hint">
            <span>ペン:</span>
            <span class="shortcut-key">P</span>
        </div>
        <div class="shortcut-hint">
            <span>消しゴム:</span>
            <span class="shortcut-key">E</span>
        </div>
        <div class="shortcut-hint">
            <span>パン:</span>
            <span class="shortcut-key">Space</span>
        </div>
        <div class="shortcut-hint">
            <span>リセット:</span>
            <span class="shortcut-key">Ctrl+0</span>
        </div>
        <div class="shortcut-hint">
            <span>取消:</span>
            <span class="shortcut-key">Ctrl+Z</span>
        </div>
        <div class="shortcut-hint">
            <span>やり直し:</span>
            <span class="shortcut-key">Ctrl+Y</span>
        </div>
    </div>
    
    <div class="status-panel">
        <div class="status-group">
            <div class="status-item">Canvas: <span id="canvas-info">400×400px</span></div>
            <div class="status-item">Tool: <span id="current-tool">ベクターペン</span></div>
            <div class="status-item">Color: <span id="current-color">#800000</span></div>
            <div class="status-item">座標: <span id="coordinates">x: 0, y: 0</span></div>
        </div>
        
        <div class="status-group">
            <div class="status-item">Phase: <span id="phase-info">1.5</span></div>
            <div class="status-item">Smooth: <span id="smooth-graphics">Auto</span></div>
            <div class="status-item">Layers: <span id="layer-count">2</span></div>
            <div class="status-item">Tools: <span id="tool-count">2</span></div>
        </div>
    </div>

    
  <!-- node_modules統合・ローカル読み込み - CORS制限回避 -->

    <!-- PixiJS v7 本体 -->
    <script src="./node_modules/pixi.js/dist/pixi.min.js"></script>
    
    <!-- @pixi/ui: UIコンポーネント -->
    <script src="./node_modules/@pixi/ui/dist/ui.min.js"></script>
    
    <!-- @pixi/layers: レイヤー機能 -->
    <script src="./node_modules/@pixi/layers/dist/layers.min.js"></script>
    
    <!-- @pixi/gif: GIF機能 -->
    <script src="./node_modules/@pixi/gif/dist/gif.min.js"></script>
    
    <!-- GSAP: アニメーション -->
    <script src="./node_modules/gsap/dist/gsap.min.js"></script>

　　<!-- pixi-graphics-smooth: ペンスムーシング -->
　　<script src="./node_modules/@pixi/graphics-smooth/dist/pixi-graphics-smooth.js"></script>


  <!-- 🔧 Phase1.5修正版読み込み順序（CoordinateManager修正対応） -->
 
    <!-- Base Utilities -->
    <script src="./js/utils/error-manager.js"></script>
    <script src="./js/utils/config-manager.js"></script>
    <script src="./js/utils/event-bus.js"></script>
    <script src="./js/utils/coordinate-manager.js"></script>
    <script src="./js/utils/navigation-manager.js"></script>
    <script src="./js/utils/record-manager.js"></script>
    <script src="./js/utils/shortcut-manager.js"></script>
    <script src="./js/utils/minimal-deps.js"></script>
    
    <!-- Managers -->
    <script src="./managers/canvas-manager.js"></script>
    
    <!-- Tools (正しい順序で読み込み) -->
    <script src="./tools/abstract-tool.js"></script>
    <script src="./tools/pen-tool.js"></script>
    <script src="./tools/eraser-tool.js"></script>
    
    <!-- Tool Manager (ツール定義後) -->
    <script src="./managers/tool-manager.js"></script>
    
    <!-- Application Core -->
    <script src="./js/app-core.js"></script>
    <script src="./js/tegaki-application.js"></script>
    <script src="./js/main.js"></script>
    
    <!-- Assets -->
    <script src="./assets/icons.js"></script>
    
    <!-- Debug (開発用) -->
    <script src="./debug/phase15-integration-test.js"></script>
    
    <!-- Bootstrap (最後) -->
    <script src="./js/bootstrap.js"></script>

    <!-- Phase1.5デバッグ用（開発時のみ・本番では削除推奨） -->
    <script>
        // ブラウザコンソールからの手動デバッグ関数
        window.debugTegaki = function() {
            if (window.Tegaki?.TegakiApplicationInstance) {
                const app = window.Tegaki.TegakiApplicationInstance;
                console.log('🧪 Phase1.5デバッグ情報:', app.getPhase15DebugInfo());
                console.log('🧪 Phase1.5機能テスト:', app.testPhase15Features());
                
                // 初期ツール強制選択テスト
                if (typeof app.forceSelectInitialTool === 'function') {
                    console.log('🔧 初期ツール強制選択テスト:', app.forceSelectInitialTool());
                }
            } else {
                console.warn('⚠️ TegakiApplication未初期化');
            }
        };
        
        // Phase1.5統合テスト実行
        window.runPhase15Test = function() {
            if (window.Tegaki?.runPhase15Test) {
                return window.Tegaki.runPhase15Test();
            } else {
                console.warn('⚠️ Phase1.5統合テスト未利用可能');
            }
        };
        
        // 初期化完了後の自動状況確認
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                if (window.Tegaki?.TegakiApplicationInstance) {
                    console.log('📊 Phase1.5初期化後状況確認');
                    window.debugTegaki();
                } else {
                    console.warn('⚠️ TegakiApplication初期化未完了');
                }
            }, 2000); // 2秒後に自動確認
        });
    </script>
</body>
</html>
