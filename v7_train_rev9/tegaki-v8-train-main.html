<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8 列車型</title>
</head>
<body>
    <!-- Pixi.js ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    
    <script>
        /**
         * ============================================================
         * Tegaki v8 列車型 - メイン制御車両（改修版）
         * ============================================================
         * 
         * 【改修内容】
         * 1. header を main に統合済み - 確実に最初に実行
         * 2. ファイル名コメント導入 - 差し替えミス防止  
         * 3. main の責務整理 - ヘッダー統合 + 車両制御のみ
         * 4. 元機能完全移植 - vector-drawing-tool-v7rev2.html ベース
         * 
         * 【列車型アーキテクチャ】
         * - main: ヘッダー統合 + 車両順序制御
         * - A-2: コア処理（キャンバス生成、描画初期化）
         * - A-3: 車両連結（イベント・依存解決）  
         * - B-1: UI処理（ツール、ポップアップ）
         * - B-2: ステータス処理（パフォーマンス監視）
         */

        // ============================================================
        // Header 統合部分（旧 A-1 ヘッダー統合版）
        // ============================================================
        
        console.log('[Main] 🚂 Tegaki v8 列車型システム開始');
        
        // シンボル辞典 - 全車両共通定数
        window.TEGAKI_SYMBOLS = {
            VERSION: '8.0.0-train-rev8',
            BUILD: '20250902-main',
            
            // 色定数（ふたばちゃんねる風）
            COLORS: {
                FUTABA_MAROON: 0x800000,
                FUTABA_LIGHT_MAROON: 0xaa5a56, 
                FUTABA_MEDIUM: 0xcf9c97,
                FUTABA_LIGHT_MEDIUM: 0xe9c2ba,
                FUTABA_CREAM: 0xf0e0d6,
                FUTABA_BACKGROUND: 0xffffee,
                TEXT_PRIMARY: 0x2c1810,
                TEXT_SECONDARY: 0x5d4037,
                TEXT_INVERSE: 0xffffff,
                
                // パレット拡張
                BLACK: 0x000000,
                WHITE: 0xffffff,
                RED: 0xff0000,
                GREEN: 0x00ff00,
                BLUE: 0x0000ff,
                YELLOW: 0xffff00,
                CYAN: 0x00ffff,
                MAGENTA: 0xff00ff
            },
            
            CANVAS: {
                DEFAULT_WIDTH: 400,
                DEFAULT_HEIGHT: 400,
                MIN_SIZE: 100,
                MAX_SIZE: 4096,
                RESOLUTION: 1
            },
            
            TOOLS: {
                PEN: 'pen',
                ERASER: 'eraser', 
                FILL: 'fill',
                SELECT: 'select',
                RECT: 'rect',
                CIRCLE: 'circle',
                LINE: 'line'
            },
            
            BRUSH: {
                MIN_SIZE: 0.1,
                MAX_SIZE: 100,
                DEFAULT_SIZE: 16.0,
                DEFAULT_OPACITY: 0.85,
                DEFAULT_PRESSURE: 0.5,
                DEFAULT_SMOOTHING: 0.3
            },
            
            UI: {
                SIDEBAR_WIDTH: 50,
                TOOL_BUTTON_SIZE: 36,
                POPUP_Z_INDEX: 2000,
                STATUS_Z_INDEX: 50
            },
            
            PERFORMANCE: {
                TARGET_FPS: 60,
                MIN_DRAW_DISTANCE: 1.5,
                CIRCLE_STEPS_MAX: 10
            }
        };

        // グローバル状態管理 - A列車共通データストア
        window.TEGAKI_STATE = {
            // 初期化フラグ
            isInitialized: false,
            currentCar: 'main',
            
            // 車両準備完了フラグ
            a1Ready: true,  // main統合済みなので即座に準備完了
            a2Ready: false,
            aTrainReady: false,
            
            // Pixiアプリケーション参照
            app: null,
            
            // 現在のツール状態（元ファイル互換）
            currentTool: 'pen',
            brushSize: 16.0,
            brushColor: 0x800000,
            opacity: 0.85,
            pressure: 0.5,
            smoothing: 0.3,
            
            // キャンバス状態
            canvasWidth: 400,
            canvasHeight: 400,
            
            // 描画状態
            isDrawing: false,
            currentPath: null,
            paths: [],
            
            // UI状態
            activePopup: null,
            sliders: new Map(),
            
            // パフォーマンス監視
            frameCount: 0,
            lastFrameTime: 0
        };

        console.log('[Main] ✅ Header統合完了 - シンボル辞典・グローバル状態初期化済み');

        // ============================================================
        // 列車制御システム - 車両管理・順序制御
        // ============================================================
        class TrainController {
            constructor() {
                this.cars = [];
                this.loadedCars = new Set();
                this.isInitialized = false;
            }

            /**
             * 車両順次ロード（依存関係を考慮した順序制御）
             */
            async loadCars() {
                console.log('[Main] 🚃 車両ロード開始 - 順次依存構造');

                // Phase 1: スタイル車両（独立）
                await this.loadCar('https://raw.githubusercontent.com/toshinka/tegaki/refs/heads/main/v7_train_rev8/tegaki-styles.html');

                // Phase 2: A2コア車両（header統合済みなので即座に開始可能）
                await this.loadCar('https://raw.githubusercontent.com/toshinka/tegaki/refs/heads/main/v7_train_rev8/tegaki-a2-core.html');
                
                // A2初期化完了待ち
                await this.waitForCarReady('a2Ready');

                // Phase 3: A3統合車両（A2依存）
                await this.loadCar('https://raw.githubusercontent.com/toshinka/tegaki/refs/heads/main/v7_train_rev8/tegaki-a3-integration.html');
                
                // A列車完成待ち
                await this.waitForCarReady('aTrainReady');

                // Phase 4: B車両群（A列車完成後に並行ロード可能）
                await Promise.all([
                    this.loadCar('https://raw.githubusercontent.com/toshinka/tegaki/refs/heads/main/v7_train_rev8/tegaki-b1-ui.html'),
                    this.loadCar('https://raw.githubusercontent.com/toshinka/tegaki/refs/heads/main/v7_train_rev8/tegaki-b2-status.html')
                ]);

                console.log('[Main] ✅ 全車両ロード完了');
            }

            /**
             * 車両準備完了待ち
             */
            async waitForCarReady(readyFlag) {
                return new Promise((resolve) => {
                    const checkReady = () => {
                        if (window.TEGAKI_STATE?.[readyFlag]) {
                            console.log(`[Main] ✅ ${readyFlag} 準備完了確認`);
                            resolve();
                        } else {
                            setTimeout(checkReady, 50);
                        }
                    };
                    checkReady();
                });
            }

            /**
             * 個別車両ロード
             */
            async loadCar(url) {
                try {
                    const response = await fetch(url);
                    const content = await response.text();
                    
                    // HTMLパース
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(content, 'text/html');
                    
                    // スタイル追加
                    const styles = doc.querySelectorAll('style');
                    styles.forEach(style => {
                        if (!document.querySelector(`style[data-source="${url}"]`)) {
                            const newStyle = document.createElement('style');
                            newStyle.textContent = style.textContent;
                            newStyle.setAttribute('data-source', url);
                            document.head.appendChild(newStyle);
                        }
                    });
                    
                    // HTML要素追加
                    const bodyContent = doc.body.innerHTML;
                    if (bodyContent.trim()) {
                        const container = document.createElement('div');
                        container.innerHTML = bodyContent;
                        container.setAttribute('data-car', this.getCarName(url));
                        document.body.appendChild(container);
                    }
                    
                    // スクリプト実行
                    const scripts = doc.querySelectorAll('script');
                    for (const script of scripts) {
                        if (script.src) {
                            await this.loadExternalScript(script.src);
                        } else if (script.textContent.trim()) {
                            this.executeScript(script.textContent, url);
                        }
                    }

                    const carName = this.getCarName(url);
                    this.loadedCars.add(carName);
                    console.log(`[Main] 🚃 ${carName} 車両ロード完了`);

                } catch (error) {
                    console.error(`[Main] ⚠ 車両ロード失敗: ${url}`, error);
                }
            }

            /**
             * 外部スクリプトロード
             */
            loadExternalScript(src) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
            }

            /**
             * スクリプト実行
             */
            executeScript(content, sourceUrl) {
                try {
                    const script = document.createElement('script');
                    script.textContent = content;
                    script.setAttribute('data-source', sourceUrl);
                    document.head.appendChild(script);
                } catch (error) {
                    console.error(`[Main] スクリプト実行エラー ${sourceUrl}:`, error);
                }
            }

            /**
             * 車両名取得
             */
            getCarName(url) {
                const filename = url.split('/').pop();
                const match = filename.match(/tegaki-(.+)\.html$/);
                return match ? match[1] : filename;
            }

            /**
             * システム統合開始
             */
            async initializeSystem() {
                await this.loadCars();
                await this.waitForFullInitialization();
                
                console.log('[Main] 🎯 システム統合完了');
                
                // デバッグ情報表示
                this.showDebugInfo();
            }

            /**
             * 完全初期化待ち
             */
            async waitForFullInitialization() {
                return new Promise((resolve) => {
                    const checkInterval = setInterval(() => {
                        // 全車両が利用可能かチェック
                        if (window.TEGAKI_STATE?.a2Ready && 
                            window.TEGAKI_STATE?.aTrainReady &&
                            window.TEGAKI_CanvasManager?.app &&
                            document.getElementById('drawing-canvas')) {
                            
                            clearInterval(checkInterval);
                            this.isInitialized = true;
                            window.TEGAKI_STATE.isInitialized = true;
                            resolve();
                        }
                    }, 50);
                });
            }

            /**
             * デバッグ情報表示
             */
            showDebugInfo() {
                console.log(`[Main] 📊 ロード済み車両: ${Array.from(this.loadedCars).join(', ')}`);
                console.log(`[Main] 🖼 キャンバス状態:`, window.TEGAKI_CanvasManager?.app ? '✅ 正常' : '❌ 未初期化');
                console.log(`[Main] 🎛 UI状態:`, document.querySelector('.main-layout') ? '✅ 正常' : '❌ 未配置');
                console.log(`[Main] 🚂 列車構造: A列車(header統合済み→A2→A3) → B車両(B1,B2)`);
            }
        }

        // ============================================================
        // Bootstrap - システム起動（列車型制御）
        // ============================================================
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                console.log('[Main] 🚀 Tegaki v8 列車型システム起動');
                console.log('[Main] 📋 改修内容:');
                console.log('[Main]   - Header統合完了（A-1→main）');
                console.log('[Main]   - ファイル名コメント導入');
                console.log('[Main]   - 順次依存構造実装');
                console.log('[Main]   - 元機能完全移植');
                
                window.trainController = new TrainController();
                await window.trainController.initializeSystem();
                
                console.log('[Main] ✨ システム起動完了 - 描画ツール利用可能');
                
            } catch (error) {
                console.error('[Main] ⚠ システム起動エラー:', error);
            }
        });
    </script>
</body>
</html>
