<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8 列車型</title>
</head>
<body>
    <!-- Pixi.js ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    
    <script>
        /**
         * ============================================================
         * Tegaki v8 列車型 - メイン制御車両（修正版）
         * vector-drawing-tool-v7rev2.html を列車化分割したメインファイル
         * ============================================================
         */

        console.log('[Main] 🚂 Tegaki v8 列車型システム開始');
        
        // ============================================================
        // Header統合部分（A-1統合済み）
        // ============================================================
        
        // シンボル辞典（元ファイルのCSS変数を移植）
        window.TEGAKI_SYMBOLS = {
            VERSION: '8.0.0-train-fixed',
            BUILD: '20250902-split',
            
            // 元ファイルの色定数（CSS変数から移植）
            COLORS: {
                FUTABA_MAROON: 0x800000,
                FUTABA_LIGHT_MAROON: 0xaa5a56,
                FUTABA_MEDIUM: 0xcf9c97,
                FUTABA_LIGHT_MEDIUM: 0xe9c2ba,
                FUTABA_CREAM: 0xf0e0d6,
                FUTABA_BACKGROUND: 0xffffee,
                TEXT_PRIMARY: 0x2c1810,
                TEXT_SECONDARY: 0x5d4037,
                TEXT_INVERSE: 0xffffff
            },
            
            CANVAS: {
                DEFAULT_WIDTH: 400,
                DEFAULT_HEIGHT: 400,
                MIN_SIZE: 100,
                MAX_SIZE: 4096,
                RESOLUTION: 1
            },
            
            BRUSH: {
                MIN_SIZE: 0.1,
                MAX_SIZE: 100,
                DEFAULT_SIZE: 16.0,
                DEFAULT_OPACITY: 0.85,
                DEFAULT_PRESSURE: 0.5,
                DEFAULT_SMOOTHING: 0.3
            },
            
            TOOLS: {
                PEN: 'pen',
                ERASER: 'eraser'
            }
        };

        // グローバル状態管理（元ファイルの状態構造を保持）
        window.TEGAKI_STATE = {
            // 車両準備フラグ
            a1Ready: true, // header統合済み
            a2Ready: false,
            aTrainReady: false,
            
            // 現在のツール状態（元ファイル互換）
            currentTool: 'pen',
            brushSize: 16.0,
            brushColor: 0x800000,
            opacity: 0.85,
            pressure: 0.5,
            smoothing: 0.3,
            
            // キャンバス状態
            canvasWidth: 400,
            canvasHeight: 400,
            
            // 描画状態
            isDrawing: false,
            currentPath: null,
            paths: [],
            
            // UI状態
            activePopup: null,
            sliders: new Map(),
            
            // パフォーマンス監視
            frameCount: 0,
            lastFrameTime: 0
        };

        console.log('[Main] ✅ Header統合完了 - シンボル辞典・グローバル状態初期化済み');

        // ============================================================
        // 列車制御システム
        // ============================================================
        class TrainController {
            constructor() {
                this.cars = [];
                this.loadedCars = new Set();
                this.isInitialized = false;
            }

            /**
             * 車両順次ロード
             */
            async loadCars() {
                console.log('[Main] 🚃 車両ロード開始 - 修正版依存構造');

                try {
                    // Phase 1: スタイル車両（独立）
                    await this.loadCar('https://raw.githubusercontent.com/toshinka/tegaki/refs/heads/main/v7_train_rev9/tegaki-styles.html');

                    // Phase 2: B-1 UI車両（HTML構造先行配置）
                    await this.loadCar('https://raw.githubusercontent.com/toshinka/tegaki/refs/heads/main/v7_train_rev9/tegaki-b1-ui.html');
                    
                    // UI配置完了待ち
                    await this.waitForElement('drawing-canvas');

                    // Phase 3: A-2コア車両（UI配置後に初期化）
                    await this.loadCar('https://raw.githubusercontent.com/toshinka/tegaki/refs/heads/main/v7_train_rev9/tegaki-a2-core.html');
                    await this.waitForCarReady('a2Ready');

                    // Phase 4: B-2ステータス車両
                    await this.loadCar('https://raw.githubusercontent.com/toshinka/tegaki/refs/heads/main/v7_train_rev9/tegaki-b2-status.html');

                    // Phase 5: A-3統合車両（最終統合）
                    await this.loadCar('https://raw.githubusercontent.com/toshinka/tegaki/refs/heads/main/v7_train_rev9/tegaki-a3-integration.html');
                    await this.waitForCarReady('aTrainReady');

                    console.log('[Main] ✅ 全車両ロード完了');
                } catch (error) {
                    console.error('[Main] ⚠ 車両ロードエラー:', error);
                    throw error;
                }
            }

            /**
             * 車両準備完了待ち
             */
            async waitForCarReady(readyFlag) {
                return new Promise((resolve) => {
                    const checkReady = () => {
                        if (window.TEGAKI_STATE?.[readyFlag]) {
                            console.log(`[Main] ✅ ${readyFlag} 準備完了確認`);
                            resolve();
                        } else {
                            setTimeout(checkReady, 50);
                        }
                    };
                    checkReady();
                });
            }

            /**
             * DOM要素存在待ち
             */
            async waitForElement(elementId) {
                return new Promise((resolve) => {
                    const checkElement = () => {
                        const element = document.getElementById(elementId);
                        if (element) {
                            console.log(`[Main] ✅ ${elementId} 要素配置確認`);
                            resolve();
                        } else {
                            setTimeout(checkElement, 50);
                        }
                    };
                    checkElement();
                });
            }

            /**
             * 個別車両ロード
             */
            async loadCar(url) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${url}`);
                    }
                    
                    const content = await response.text();
                    
                    // HTMLパース
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(content, 'text/html');
                    
                    // スタイル追加
                    const styles = doc.querySelectorAll('style');
                    styles.forEach(style => {
                        if (!document.querySelector(`style[data-source="${url}"]`)) {
                            const newStyle = document.createElement('style');
                            newStyle.textContent = style.textContent;
                            newStyle.setAttribute('data-source', url);
                            document.head.appendChild(newStyle);
                        }
                    });
                    
                    // HTML要素追加
                    const bodyContent = doc.body.innerHTML;
                    if (bodyContent.trim()) {
                        const container = document.createElement('div');
                        container.innerHTML = bodyContent;
                        container.setAttribute('data-car', this.getCarName(url));
                        document.body.appendChild(container);
                    }
                    
                    // スクリプト実行（修正版）
                    const scripts = doc.querySelectorAll('script');
                    for (const script of scripts) {
                        if (script.src) {
                            await this.loadExternalScript(script.src);
                        } else if (script.textContent && script.textContent.trim()) {
                            this.executeScript(script.textContent, url);
                        }
                    }

                    const carName = this.getCarName(url);
                    this.loadedCars.add(carName);
                    console.log(`[Main] 🚃 ${carName} 車両ロード完了`);

                } catch (error) {
                    console.error(`[Main] ⚠ 車両ロード失敗: ${url}`, error);
                    throw error;
                }
            }

            /**
             * 外部スクリプトロード
             */
            loadExternalScript(src) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
            }

            /**
             * スクリプト実行（エラー修正版）
             */
            executeScript(content, sourceUrl) {
                try {
                    // eval使用でスクリプト実行エラーを回避
                    eval(`(function() {
                        ${content}
                    })()`);
                } catch (error) {
                    console.error(`[Main] スクリプト実行エラー ${sourceUrl}:`, error);
                }
            }

            /**
             * 車両名取得
             */
            getCarName(url) {
                const filename = url.split('/').pop();
                const match = filename.match(/tegaki-(.+)\.html$/);
                return match ? match[1] : filename;
            }

            /**
             * システム統合開始
             */
            async initializeSystem() {
                await this.loadCars();
                await this.waitForFullInitialization();
                
                console.log('[Main] 🎯 システム統合完了');
                this.showDebugInfo();
            }

            /**
             * 完全初期化待ち
             */
            async waitForFullInitialization() {
                return new Promise((resolve) => {
                    const checkInterval = setInterval(() => {
                        if (window.TEGAKI_STATE?.a2Ready && 
                            window.TEGAKI_CanvasManager?.app &&
                            document.getElementById('drawing-canvas')) {
                            
                            clearInterval(checkInterval);
                            this.isInitialized = true;
                            window.TEGAKI_STATE.isInitialized = true;
                            resolve();
                        }
                    }, 50);
                });
            }

            /**
             * デバッグ情報表示
             */
            showDebugInfo() {
                console.log(`[Main] 📊 ロード済み車両: ${Array.from(this.loadedCars).join(', ')}`);
                console.log(`[Main] 🖼 キャンバス状態:`, window.TEGAKI_CanvasManager?.app ? '✅ 正常' : '❌ 未初期化');
                console.log(`[Main] 🎛 UI状態:`, document.querySelector('.main-layout') ? '✅ 正常' : '❌ 未配置');
            }
        }

        // ============================================================
        // Bootstrap - システム起動
        // ============================================================
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                console.log('[Main] 🚀 Tegaki v8 列車型システム起動');
                console.log('[Main] 📋 vector-drawing-tool-v7rev2.html ベース列車化版');
                
                window.trainController = new TrainController();
                await window.trainController.initializeSystem();
                
                console.log('[Main] ✨ システム起動完了 - 描画ツール利用可能');
                
            } catch (error) {
                console.error('[Main] ⚠ システム起動エラー:', error);
            }
        });
    </script>
</body>
</html>
