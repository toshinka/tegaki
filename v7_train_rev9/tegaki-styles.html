<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tegaki v8 列車型 - スタイル車両</title>
    
    <style>
        /**
         * ============================================================
         * Tegaki v8 列車型 - スタイル車両
         * ============================================================
         * 
         * 【責務】
         * - 全体CSSスタイル集約
         * - ふたばちゃんねる風デザイン定義
         * - レスポンシブ・アニメーション定義
         * - 独立改修可能なスタイル管理
         * 
         * 【特徴】
         * - PixiJS v7/v8両対応
         * - 軽量化・最適化済み
         * - GPU加速対応デザイン
         */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --futaba-maroon: #800000;
            --futaba-light-maroon: #aa5a56;
            --futaba-medium: #cf9c97;
            --futaba-light-medium: #e9c2ba;
            --futaba-cream: #f0e0d6;
            --futaba-background: #ffffee;
            
            --text-primary: #2c1810;
            --text-secondary: #5d4037;
            --text-inverse: #ffffff;
            
            --transition-fast: 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.3s ease-out;
            
            --shadow-light: 0 2px 4px rgba(128, 0, 0, 0.1);
            --shadow-medium: 0 4px 12px rgba(128, 0, 0, 0.2);
            --shadow-heavy: 0 8px 32px rgba(128, 0, 0, 0.3);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: var(--futaba-background);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 50px 1fr;
            height: 100vh;
            width: 100vw;
            gap: 0;
        }
        
        /* ============================================================
         * サイドバー - ツールボタン配置エリア
         * ============================================================ */
        .sidebar {
            background: var(--futaba-cream);
            border-right: 2px solid var(--futaba-light-medium);
            display: flex;
            flex-direction: column;
            padding: 12px 6px;
            gap: 4px;
            overflow-y: auto;
            position: relative;
            z-index: 100;
        }
        
        .tool-button {
            width: 36px;
            height: 36px;
            border: 2px solid var(--futaba-light-medium);
            background: var(--futaba-background);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-smooth);
            color: var(--futaba-maroon);
            position: relative;
            user-select: none;
        }
        
        .tool-button svg,
        .tool-button img {
            width: 20px;
            height: 20px;
        }
        
        .tool-button:hover {
            background: var(--futaba-medium);
            border-color: var(--futaba-light-maroon);
            transform: scale(1.05);
            box-shadow: var(--shadow-medium);
        }
        
        .tool-button.active {
            background: var(--futaba-maroon);
            color: var(--text-inverse);
            border-color: var(--futaba-maroon);
            box-shadow: var(--shadow-light);
        }
        
        .tool-button.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .tool-button.disabled:hover {
            transform: none;
            box-shadow: none;
        }
        
        .tool-separator {
            height: 1px;
            background: var(--futaba-light-medium);
            margin: 4px 2px;
        }
        
        /* ============================================================
         * キャンバスエリア - 描画領域
         * ============================================================ */
        .canvas-area {
            background: var(--futaba-background);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .canvas-container {
            position: relative;
        }
        
        #drawing-canvas {
            display: block;
            cursor: crosshair;
        }
        
        /* ============================================================
         * ポップアップパネル - ツール設定UI
         * ============================================================ */
        .popup-panel {
            position: fixed;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-maroon);
            border-radius: 16px;
            box-shadow: var(--shadow-heavy);
            padding: 20px;
            z-index: 2000;
            backdrop-filter: blur(12px);
            display: none;
            user-select: none;
        }
        
        .popup-panel.show {
            display: block;
            animation: fadeIn var(--transition-slow);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to   { opacity: 1; transform: scale(1); }
        }
        
        .pen-settings {
            width: 320px;
            min-height: 400px;
        }
        
        .resize-settings {
            width: 280px;
        }
        
        .popup-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--futaba-maroon);
            margin-bottom: 16px;
            text-align: center;
            border-bottom: 2px solid var(--futaba-light-medium);
            padding-bottom: 8px;
        }
        
        .setting-group {
            margin-bottom: 16px;
        }
        
        .setting-label {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        /* ============================================================
         * プリセット - サイズプリセット表示
         * ============================================================ */
        .size-presets {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--futaba-background);
            border-radius: 8px;
            border: 1px solid var(--futaba-light-medium);
        }
        
        .size-preset-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px 4px;
            border-radius: 4px;
            transition: all var(--transition-smooth);
            min-width: 40px;
        }
        
        .size-preset-item:hover {
            background: var(--futaba-medium);
        }
        
        .size-preset-item.active {
            background: var(--futaba-maroon);
            color: var(--text-inverse);
        }
        
        .size-preview-circle {
            background: #800000;
            border-radius: 50%;
            transition: all var(--transition-smooth);
            min-width: 0.5px;
            min-height: 0.5px;
        }
        
        .size-preview-label {
            font-size: 10px;
            font-weight: 600;
            margin-top: 2px;
        }
        
        .size-preview-percent {
            font-size: 8px;
            font-weight: 400;
            margin-top: 1px;
            opacity: 0.8;
        }
        
        /* ============================================================
         * スライダー - 値調整UI
         * ============================================================ */
        .slider-container {
            position: relative;
            margin-bottom: 16px;
        }
        
        .slider-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .slider-button {
            width: 24px;
            height: 24px;
            border: 1px solid var(--futaba-medium);
            background: var(--futaba-background);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--futaba-maroon);
            font-size: 10px;
            user-select: none;
            transition: all var(--transition-fast);
        }
        
        .slider-button.small {
            width: 20px;
            height: 20px;
            font-size: 8px;
        }
        
        .slider-button:hover {
            background: var(--futaba-medium);
        }
        
        .slider-button:active {
            transform: scale(0.9);
        }
        
        .slider {
            width: 100%;
            height: 6px;
            background: var(--futaba-light-medium);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            position: relative;
            flex: 1;
        }
        
        .slider-track {
            height: 100%;
            background: var(--futaba-maroon);
            border-radius: 3px;
            transition: width var(--transition-fast);
        }
        
        .slider-handle {
            width: 16px;
            height: 16px;
            background: var(--futaba-maroon);
            border: 2px solid var(--futaba-background);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            box-shadow: var(--shadow-light);
        }
        
        .slider-handle:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.2);
        }
        
        .slider-value {
            position: absolute;
            right: 0;
            top: -20px;
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
            min-width: 40px;
            text-align: right;
        }
        
        /* ============================================================
         * チェックボックス・入力フィールド
         * ============================================================ */
        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background var(--transition-fast);
        }
        
        .checkbox-container:hover {
            background: var(--futaba-light-medium);
        }
        
        .checkbox-left {
            display: flex;
            align-items: center;
        }
        
        .checkbox {
            width: 16px;
            height: 16px;
            border: 2px solid var(--futaba-medium);
            border-radius: 3px;
            margin-right: 8px;
            position: relative;
            background: var(--futaba-background);
            cursor: pointer;
        }
        
        .checkbox.checked {
            background: var(--futaba-maroon);
            border-color: var(--futaba-maroon);
        }
        
        .checkbox.checked::after {
            content: "✓";
            position: absolute;
            color: white;
            font-size: 12px;
            left: 1px;
            top: -2px;
        }
        
        .checkbox-label {
            font-size: 12px;
            color: var(--text-primary);
        }
        
        .checkbox-status {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: monospace;
        }
        
        .size-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .size-input-field {
            flex: 1;
        }
        
        .size-input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid var(--futaba-light-medium);
            border-radius: 6px;
            background: var(--futaba-background);
            font-family: monospace;
            font-size: 14px;
            text-align: center;
        }
        
        .size-input:focus {
            outline: none;
            border-color: var(--futaba-maroon);
        }
        
        .size-multiply {
            color: var(--futaba-maroon);
            font-weight: bold;
            font-size: 16px;
        }
        
        .resize-buttons {
            display: flex;
            gap: 8px;
        }
        
        .resize-button {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--futaba-maroon);
            border-radius: 8px;
            background: var(--futaba-background);
            color: var(--futaba-maroon);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-smooth);
        }
        
        .resize-button:hover {
            background: var(--futaba-maroon);
            color: var(--text-inverse);
        }
        
        .resize-button.primary {
            background: var(--futaba-maroon);
            color: var(--text-inverse);
        }
        
        .resize-button.primary:hover {
            background: var(--futaba-light-maroon);
        }
        
        /* ============================================================
         * ステータスパネル - 描画情報表示
         * ============================================================ */
        .status-panel {
            position: fixed;
            bottom: 20px;
            left: 70px;
            right: 20px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-medium);
            border-radius: 12px;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-medium);
            z-index: 50;
        }
        
        .status-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* ============================================================
         * ドラッグ可能要素 - ポップアップドラッグ
         * ============================================================ */
        .popup-panel.draggable {
            cursor: move;
        }
        
        .popup-panel.dragging {
            cursor: grabbing;
            transform: scale(1.02);
        }
        
        /* ============================================================
         * レスポンシブ対応
         * ============================================================ */
        @media (max-width: 1200px) {
            .popup-panel {
                max-width: 90vw;
            }
        }
        
        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 40px 1fr;
            }
            
            .sidebar {
                padding: 8px 4px;
            }
            
            .tool-button {
                width: 32px;
                height: 32px;
            }
            
            .tool-button svg,
            .tool-button img {
                width: 16px;
                height: 16px;
            }
            
            .popup-panel {
                max-width: 95vw;
                max-height: 90vh;
                overflow-y: auto;
            }
            
            .status-panel {
                left: 50px;
                font-size: 10px;
            }
            
            .status-group {
                gap: 12px;
            }
        }
        
        /* ============================================================
         * 高DPI対応・パフォーマンス最適化
         * ============================================================ */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .tool-button svg,
            .tool-button img {
                image-rendering: -webkit-optimize-contrast;
                image-rendering: crisp-edges;
            }
        }
        
        /* GPU加速対応 */
        .popup-panel,
        .tool-button,
        .slider-handle {
            will-change: transform;
        }
        
        .popup-panel.show {
            transform: translateZ(0);
        }
        
        /* ============================================================
         * アクセシビリティ対応
         * ============================================================ */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        .tool-button:focus-visible,
        .resize-button:focus-visible,
        .slider:focus-visible,
        .checkbox:focus-visible {
            outline: 2px solid var(--futaba-maroon);
            outline-offset: 2px;
        }
        
        /* ============================================================
         * 印刷対応（必要最小限）
         * ============================================================ */
        @media print {
            .sidebar,
            .popup-panel,
            .status-panel {
                display: none !important;
            }
            
            .main-layout {
                grid-template-columns: 1fr;
            }
            
            .canvas-area {
                background: white;
            }
        }
    </style>
</head>
