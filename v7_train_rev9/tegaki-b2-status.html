<!-- File: tegaki-b2-status.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tegaki v8 列車型 - B-2 ステータス車両</title>
</head>
<body>
    <!-- ステータスパネル（元ファイルから移植） -->
    <div class="status-panel">
        <div class="status-group">
            <div class="status-item">Canvas: <span id="canvas-info">400×400px</span></div>
            <div class="status-item">Tool: <span id="current-tool">ベクターペン</span></div>
            <div class="status-item">Color: <span id="current-color">#800000</span></div>
            <div class="status-item">座標: <span id="coordinates">x: 0, y: 0</span></div>
            <div class="status-item">筆圧: <span id="pressure-monitor">0.0%</span></div>
        </div>
        
        <div class="status-group">
            <div class="status-item">FPS: <span id="fps">60</span></div>
            <div class="status-item">GPU: <span id="gpu-usage">45%</span></div>
            <div class="status-item">Memory: <span id="memory-usage">1.2GB</span></div>
        </div>
    </div>

    <script>
        /**
         * ============================================================
         * Tegaki v8 列車型 - B-2 ステータス車両（パフォーマンス監視）
         * ============================================================
         * 
         * 【責務】
         * - ステータス表示・更新
         * - パフォーマンス監視
         * - メモリ・GPU使用率監視
         * - FPS測定
         * - 座標・筆圧監視
         * 
         * 【依存関係】
         * - A列車完成後に独立改修可能
         * - グローバル状態の監視のみ
         */

        console.log('[B-2] 📊 ステータス車両初期化開始');

        // ============================================================
        // Performance Monitor - パフォーマンス監視システム
        // ============================================================
        class PerformanceMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.memoryCheckInterval = null;
                this.statusUpdateInterval = null;
            }
            
            start() {
                console.log('[B-2] 📈 パフォーマンス監視開始');
                this.startFPSMonitoring();
                this.startMemoryMonitoring();
                this.startStatusMonitoring();
            }
            
            startFPSMonitoring() {
                const updateFPS = () => {
                    this.frameCount++;
                    const currentTime = performance.now();
                    
                    if (currentTime - this.lastTime >= 1000) {
                        const fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                        const fpsElement = document.getElementById('fps');
                        if (fpsElement) {
                            fpsElement.textContent = fps;
                        }
                        
                        this.frameCount = 0;
                        this.lastTime = currentTime;
                    }
                    
                    requestAnimationFrame(updateFPS);
                };
                
                updateFPS();
            }
            
            startMemoryMonitoring() {
                this.memoryCheckInterval = setInterval(() => {
                    this.updateMemoryUsage();
                    this.updateGPUUsage();
                }, 2000);
            }
            
            startStatusMonitoring() {
                this.statusUpdateInterval = setInterval(() => {
                    this.updateCanvasInfo();
                    this.updateCoordinates();
                    this.updateToolInfo();
                    this.updatePressureMonitor();
                }, 100);
            }
            
            updateMemoryUsage() {
                const memElement = document.getElementById('memory-usage');
                if (!memElement) return;
                
                if (performance.memory) {
                    const used = performance.memory.usedJSHeapSize;
                    const total = performance.memory.totalJSHeapSize;
                    const limit = performance.memory.jsHeapSizeLimit;
                    
                    const usedMB = Math.round(used / 1048576 * 10) / 10;
                    memElement.textContent = `${usedMB}MB`;
                    
                    // メモリ警告
                    if (used / limit > 0.8) {
                        memElement.style.color = '#ff4444';
                    } else {
                        memElement.style.color = '';
                    }
                } else {
                    // 擬似的なメモリ使用量表示
                    const fakeMem = 1.2 + Math.random() * 0.3;
                    memElement.textContent = `${fakeMem.toFixed(1)}GB`;
                }
            }
            
            updateGPUUsage() {
                const gpuElement = document.getElementById('gpu-usage');
                if (!gpuElement) return;
                
                // 擬似的なGPU使用率（実際のGPU使用率は直接取得困難）
                const baseUsage = window.TEGAKI_STATE?.isDrawing ? 60 : 35;
                const randomVariation = Math.random() * 20 - 10;
                const gpuUsage = Math.max(0, Math.min(100, baseUsage + randomVariation));
                
                gpuElement.textContent = `${Math.round(gpuUsage)}%`;
                
                // GPU負荷警告
                if (gpuUsage > 85) {
                    gpuElement.style.color = '#ff4444';
                } else if (gpuUsage > 70) {
                    gpuElement.style.color = '#ffaa00';
                } else {
                    gpuElement.style.color = '';
                }
            }
            
            updateCanvasInfo() {
                const canvasInfoElement = document.getElementById('canvas-info');
                if (!canvasInfoElement) return;
                
                const state = window.TEGAKI_STATE;
                if (state) {
                    const width = state.canvasWidth || 400;
                    const height = state.canvasHeight || 400;
                    canvasInfoElement.textContent = `${width}×${height}px`;
                }
            }
            
            updateCoordinates() {
                const coordElement = document.getElementById('coordinates');
                if (!coordElement) return;
                
                const state = window.TEGAKI_STATE;
                if (state && typeof state.mouseX === 'number' && typeof state.mouseY === 'number') {
                    coordElement.textContent = `x: ${state.mouseX}, y: ${state.mouseY}`;
                }
            }
            
            updateToolInfo() {
                const toolElement = document.getElementById('current-tool');
                const colorElement = document.getElementById('current-color');
                
                const state = window.TEGAKI_STATE;
                if (!state) return;
                
                if (toolElement) {
                    const toolNames = { 
                        pen: 'ベクターペン', 
                        eraser: '消しゴム',
                        fill: '塗りつぶし',
                        select: '範囲選択'
                    };
                    toolElement.textContent = toolNames[state.currentTool] || state.currentTool;
                }
                
                if (colorElement && state.brushColor !== undefined) {
                    const colorHex = '#' + state.brushColor.toString(16).padStart(6, '0');
                    colorElement.textContent = colorHex;
                }
            }
            
            updatePressureMonitor() {
                const pressureElement = document.getElementById('pressure-monitor');
                if (!pressureElement) return;
                
                const state = window.TEGAKI_STATE;
                if (state && state.isDrawing) {
                    // 擬似的な筆圧値生成（実際の筆圧感知は複雑）
                    const basePressure = state.pressure * 100;
                    const variation = Math.random() * 20;
                    const currentPressure = Math.min(100, basePressure + variation);
                    pressureElement.textContent = `${currentPressure.toFixed(1)}%`;
                } else {
                    pressureElement.textContent = '0.0%';
                }
            }
            
            stop() {
                if (this.memoryCheckInterval) {
                    clearInterval(this.memoryCheckInterval);
                }
                if (this.statusUpdateInterval) {
                    clearInterval(this.statusUpdateInterval);
                }
                console.log('[B-2] 📈 パフォーマンス監視停止');
            }
        }

        // ============================================================
        // Status Controller - ステータス表示制御
        // ============================================================
        class StatusController {
            constructor() {
                this.monitor = new PerformanceMonitor();
                this.isInitialized = false;
            }
            
            init() {
                try {
                    console.log('[B-2] 📊 StatusController初期化開始');
                    
                    // ステータスパネル表示確認
                    const statusPanel = document.querySelector('.status-panel');
                    if (!statusPanel) {
                        throw new Error('ステータスパネルが見つかりません');
                    }
                    
                    // 初期値設定
                    this.initializeStatusDisplay();
                    
                    // 監視開始
                    this.monitor.start();
                    
                    this.isInitialized = true;
                    console.log('[B-2] ✅ StatusController初期化完了');
                    
                } catch (error) {
                    console.error('[B-2] ⚠ StatusController初期化失敗:', error);
                    throw error;
                }
            }
            
            initializeStatusDisplay() {
                // 初期値設定
                const elements = {
                    'canvas-info': '400×400px',
                    'current-tool': 'ベクターペン',
                    'current-color': '#800000',
                    'coordinates': 'x: 0, y: 0',
                    'pressure-monitor': '0.0%',
                    'fps': '60',
                    'gpu-usage': '45%',
                    'memory-usage': '1.2GB'
                };
                
                Object.entries(elements).forEach(([id, text]) => {
                    const element = document.getElementById(id);
                    if (element) {
                        element.textContent = text;
                    }
                });
            }
            
            destroy() {
                this.monitor.stop();
                this.isInitialized = false;
            }
        }

        // ============================================================
        // B-2車両初期化・エクスポート
        // ============================================================
        
        // グローバルエクスポート
        window.TEGAKI_StatusController = null; // 初期化後に設定
        window.TEGAKI_PerformanceMonitor = PerformanceMonitor;

        // B-2車両初期化関数
        window.TEGAKI_B2 = {
            async init() {
                try {
                    console.log('[B-2] 🚃 B-2車両初期化開始');
                    
                    // A列車完了待ち
                    if (!window.TEGAKI_STATE?.aTrainReady) {
                        throw new Error('A列車が未完了です');
                    }
                    
                    // StatusController初期化
                    const statusController = new StatusController();
                    statusController.init();
                    window.TEGAKI_StatusController = statusController;
                    
                    // B-2準備完了フラグ
                    window.TEGAKI_STATE.b2Ready = true;
                    
                    console.log('[B-2] ✅ B-2車両初期化完了 - ステータス監視システム準備完了');
                    
                } catch (error) {
                    console.error('[B-2] ⚠ B-2車両初期化失敗:', error);
                    throw error;
                }
            }
        };

        // B-2車両自動初期化（A列車完了後）
        const initB2 = () => {
            if (window.TEGAKI_STATE?.aTrainReady) {
                window.TEGAKI_B2.init().catch(console.error);
            } else {
                setTimeout(initB2, 50);
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initB2);
        } else {
            initB2();
        }

        console.log('[B-2] 📊 ステータス車両ロード完了 - A列車完了待機中');
    </script>
</body>
</html>
