<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8 列車型</title>
    <meta name="description" content="列車型構造による分割型描画ツール - Pixi v7ベース">
    <style>
        /* リセットCSS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ローディング画面 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffffee, #f0e0d6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
        }
        
        .loading-logo {
            font-size: 2.5rem;
            color: #800000;
            margin-bottom: 2rem;
            font-weight: 600;
        }
        
        .loading-train {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .loading-progress {
            width: 300px;
            height: 4px;
            background: #e9c2ba;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        
        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, #800000, #aa5a56);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .loading-status {
            color: #5d4037;
            font-size: 0.9rem;
            font-family: monospace;
        }
        
        .fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
        
        /* エラー表示 */
        .error-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ffebee;
            border: 2px solid #d32f2f;
            border-radius: 8px;
            padding: 20px;
            max-width: 500px;
            z-index: 10000;
            font-family: monospace;
            display: none;
        }
        
        .error-title {
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .error-message {
            color: #666;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        
        .error-button {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- ローディング画面 -->
    <div id="loading-screen">
        <div class="loading-logo">Tegaki v8 列車型</div>
        <div class="loading-train">🚄</div>
        <div class="loading-progress">
            <div class="loading-bar" id="loading-bar"></div>
        </div>
        <div class="loading-status" id="loading-status">初期化中...</div>
    </div>
    
    <!-- エラーパネル -->
    <div class="error-panel" id="error-panel">
        <div class="error-title">🚨 列車システムエラー</div>
        <div class="error-message" id="error-message"></div>
        <button class="error-button" onclick="location.reload()">再読み込み</button>
    </div>

    <!-- Pixi.js ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    
    <script>
        /**
         * ============================================================
         * Tegaki v8 列車型統合システム - メインファイル
         * ============================================================
         * 
         * 【列車型構造】
         * A-1 → A-2 → A-3 (順次依存)
         * ↓
         * B-1, B-2 (独立改修車両)
         * 
         * 【初期化フロー】
         * 1. A列車の順次読み込み・初期化
         * 2. B車両の並列初期化
         * 3. 統合テスト・動作確認
         */

        // ============================================================
        // メインシステム制御
        // ============================================================
        class TegakiV8TrainSystem {
            constructor() {
                this.loadingProgress = 0;
                this.loadingBar = document.getElementById('loading-bar');
                this.loadingStatus = document.getElementById('loading-status');
                this.errorPanel = document.getElementById('error-panel');
                this.loadingScreen = document.getElementById('loading-screen');
                
                this.carScripts = [];
                this.initializationSteps = [];
            }

            /**
             * システム起動
             */
            async boot() {
                try {
                    console.log('🚄 Tegaki v8 列車型システム起動開始');
                    
                    // 基盤チェック
                    this.updateProgress(5, 'Pixi.js確認中...');
                    await this.checkDependencies();
                    
                    // A列車読み込み・初期化
                    this.updateProgress(10, 'A-1車両読み込み中...');
                    await this.loadA1Car();
                    
                    this.updateProgress(25, 'A-2車両読み込み中...');
                    await this.loadA2Car();
                    
                    this.updateProgress(40, 'A-3車両読み込み中...');
                    await this.loadA3Car();
                    
                    // A列車完成まで待機
                    this.updateProgress(55, 'A列車統合中...');
                    await this.waitForATrain();
                    
                    // B車両読み込み・初期化
                    this.updateProgress(70, 'B-1 UI車両読み込み中...');
                    await this.loadB1Car();
                    
                    this.updateProgress(85, 'B-2 ステータス車両読み込み中...');
                    await this.loadB2Car();
                    
                    // 最終統合テスト
                    this.updateProgress(95, '統合テスト実行中...');
                    await this.runIntegrationTest();
                    
                    // 起動完了
                    this.updateProgress(100, '起動完了!');
                    await this.completeBootup();
                    
                    console.log('✅ Tegaki v8 列車型システム起動完了');
                    
                } catch (error) {
                    this.handleError('システム起動エラー', error);
                }
            }

            /**
             * 依存関係チェック
             */
            async checkDependencies() {
                return new Promise((resolve, reject) => {
                    // Pixi.js確認
                    if (typeof PIXI === 'undefined') {
                        reject(new Error('Pixi.js が読み込まれていません'));
                        return;
                    }
                    
                    // ブラウザAPI確認
                    const requiredAPIs = [
                        'requestAnimationFrame',
                        'addEventListener',
                        'querySelector'
                    ];
                    
                    const missing = requiredAPIs.filter(api => typeof window[api] === 'undefined');
                    if (missing.length > 0) {
                        reject(new Error(`必要なブラウザAPIが不足: ${missing.join(', ')}`));
                        return;
                    }
                    
                    console.log('[Main] 依存関係チェック完了');
                    setTimeout(resolve, 200);
                });
            }

            /**
             * A-1車両読み込み
             */
            async loadA1Car() {
                return this.loadCarScript('A-1', `
                    // A-1車両コード (ヘッダー・ルールブック・ChangeLog)
                    window.TEGAKI_SYMBOLS = {
                        VERSION: '8.0.0-train',
                        BUILD: '20250902-main',
                        
                        COLORS: {
                            FUTABA_MAROON: 0x800000,
                            FUTABA_LIGHT_MAROON: 0xaa5a56,
                            FUTABA_MEDIUM: 0xcf9c97,
                            FUTABA_LIGHT_MEDIUM: 0xe9c2ba,
                            FUTABA_CREAM: 0xf0e0d6,
                            FUTABA_BACKGROUND: 0xffffee,
                            TEXT_PRIMARY: 0x2c1810,
                            TEXT_SECONDARY: 0x5d4037,
                            TEXT_INVERSE: 0xffffff
                        },
                        
                        CANVAS: {
                            DEFAULT_WIDTH: 400,
                            DEFAULT_HEIGHT: 400,
                            MIN_SIZE: 100,
                            MAX_SIZE: 4096,
                            RESOLUTION: 1
                        },
                        
                        TOOLS: {
                            PEN: 'pen',
                            ERASER: 'eraser',
                            FILL: 'fill',
                            SELECT: 'select'
                        },
                        
                        BRUSH: {
                            MIN_SIZE: 0.1,
                            MAX_SIZE: 100,
                            DEFAULT_SIZE: 16.0,
                            DEFAULT_OPACITY: 0.85,
                            DEFAULT_PRESSURE: 0.5,
                            DEFAULT_SMOOTHING: 0.3
                        },
                        
                        PERFORMANCE: {
                            TARGET_FPS: 60,
                            MIN_DRAW_DISTANCE: 1.5,
                            CIRCLE_STEPS_MAX: 10
                        }
                    };

                    window.TEGAKI_STATE = {
                        isInitialized: false,
                        currentCar: 'A-1',
                        app: null,
                        currentTool: 'pen',
                        brushSize: 16.0,
                        brushColor: 0x800000,
                        opacity: 0.85,
                        pressure: 0.5,
                        smoothing: 0.3,
                        canvasWidth: 400,
                        canvasHeight: 400,
                        isDrawing: false,
                        currentPath: null,
                        paths: [],
                        activePopup: null,
                        sliders: new Map(),
                        frameCount: 0,
                        lastFrameTime: 0,
                        a1Ready: true
                    };

                    console.log('[A-1] ヘッダー車両初期化完了');
                `);
            }

            /**
             * A-2車両読み込み
             */
            async loadA2Car() {
                return this.loadCarScript('A-2', `
                    // A-2車両コード (コアマネージャー・イベントバス)
                    window.TEGAKI_EventBus = {
                        listeners: new Map(),
                        on(eventName, callback) {
                            if (!this.listeners.has(eventName)) {
                                this.listeners.set(eventName, []);
                            }
                            this.listeners.get(eventName).push(callback);
                        },
                        emit(eventName, data) {
                            const callbacks = this.listeners.get(eventName);
                            if (callbacks) {
                                callbacks.forEach(callback => {
                                    try {
                                        callback(data);
                                    } catch (error) {
                                        console.error(\`[EventBus] \${eventName} コールバックエラー:\`, error);
                                    }
                                });
                            }
                        },
                        off(eventName, callback) {
                            const callbacks = this.listeners.get(eventName);
                            if (callbacks) {
                                const index = callbacks.indexOf(callback);
                                if (index > -1) {
                                    callbacks.splice(index, 1);
                                }
                            }
                        }
                    };

                    window.TEGAKI_CanvasManager = {
                        app: null,
                        drawingContainer: null,
                        
                        async init() {
                            const { CANVAS, COLORS } = window.TEGAKI_SYMBOLS;
                            const state = window.TEGAKI_STATE;

                            this.app = new PIXI.Application({
                                width: state.canvasWidth,
                                height: state.canvasHeight,
                                backgroundColor: COLORS.FUTABA_BACKGROUND,
                                antialias: true,
                                resolution: CANVAS.RESOLUTION,
                                autoDensity: false
                            });

                            window.TEGAKI_STATE.app = this.app;
                            this.drawingContainer = new PIXI.Container();
                            this.app.stage.addChild(this.drawingContainer);
                            this.setupInteraction();
                            
                            console.log('[A-2] CanvasManager初期化完了');
                        },
                        
                        setupInteraction() {
                            const state = window.TEGAKI_STATE;
                            this.app.stage.interactive = true;
                            this.app.stage.hitArea = new PIXI.Rectangle(0, 0, state.canvasWidth, state.canvasHeight);
                        },
                        
                        resize(width, height, centerContent = false) {
                            if (!this.app) return;
                            const oldWidth = window.TEGAKI_STATE.canvasWidth;
                            const oldHeight = window.TEGAKI_STATE.canvasHeight;
                            
                            window.TEGAKI_STATE.canvasWidth = width;
                            window.TEGAKI_STATE.canvasHeight = height;
                            
                            this.app.renderer.resize(width, height);
                            this.app.stage.hitArea = new PIXI.Rectangle(0, 0, width, height);
                            
                            if (centerContent && this.drawingContainer) {
                                const offsetX = (width - oldWidth) / 2;
                                const offsetY = (height - oldHeight) / 2;
                                this.drawingContainer.x += offsetX;
                                this.drawingContainer.y += offsetY;
                            }
                            
                            window.TEGAKI_EventBus.emit('canvas-resized', { width, height, centerContent });
                        },
                        
                        mountToDOM() {
                            if (!this.app) return;
                            let container = document.getElementById('drawing-canvas');
                            if (!container) {
                                container = document.createElement('div');
                                container.id = 'drawing-canvas';
                                document.body.appendChild(container);
                            }
                            container.appendChild(this.app.view);
                        }
                    };

                    window.TEGAKI_CoordinateManager = {
                        getLocalPointerPosition(event) {
                            const app = window.TEGAKI_STATE.app;
                            if (!app) return { x: 0, y: 0 };
                            
                            const rect = app.view.getBoundingClientRect();
                            const originalEvent = event.data?.originalEvent || event;
                            
                            const x = (originalEvent.clientX - rect.left) * (window.TEGAKI_STATE.canvasWidth / rect.width);
                            const y = (originalEvent.clientY - rect.top) * (window.TEGAKI_STATE.canvasHeight / rect.height);
                            
                            return { x, y };
                        },
                        
                        getDistance(point1, point2) {
                            return Math.sqrt((point1.x - point2.x) ** 2 + (point1.y - point2.y) ** 2);
                        },
                        
                        clampToCanvas(point) {
                            const state = window.TEGAKI_STATE;
                            return {
                                x: Math.max(0, Math.min(state.canvasWidth, point.x)),
                                y: Math.max(0, Math.min(state.canvasHeight, point.y))
                            };
                        }
                    };

                    window.TEGAKI_ToolManager = {
                        setTool(toolName) {
                            const { TOOLS } = window.TEGAKI_SYMBOLS;
                            if (!Object.values(TOOLS).includes(toolName)) {
                                console.error(\`[A-2] 不明なツール: \${toolName}\`);
                                return;
                            }
                            window.TEGAKI_STATE.currentTool = toolName;
                            window.TEGAKI_EventBus.emit('tool-changed', toolName);
                        },
                        
                        setBrushSize(size) {
                            const { BRUSH } = window.TEGAKI_SYMBOLS;
                            const clampedSize = Math.max(BRUSH.MIN_SIZE, Math.min(BRUSH.MAX_SIZE, size));
                            window.TEGAKI_STATE.brushSize = Math.round(clampedSize * 10) / 10;
                            window.TEGAKI_EventBus.emit('brush-size-changed', window.TEGAKI_STATE.brushSize);
                        },
                        
                        setOpacity(opacity) {
                            const clampedOpacity = Math.max(0, Math.min(1, opacity));
                            window.TEGAKI_STATE.opacity = Math.round(clampedOpacity * 1000) / 1000;
                            window.TEGAKI_EventBus.emit('opacity-changed', window.TEGAKI_STATE.opacity);
                        },
                        
                        setPressure(pressure) {
                            const clampedPressure = Math.max(0, Math.min(1, pressure));
                            window.TEGAKI_STATE.pressure = Math.round(clampedPressure * 1000) / 1000;
                            window.TEGAKI_EventBus.emit('pressure-changed', window.TEGAKI_STATE.pressure);
                        },
                        
                        setSmoothing(smoothing) {
                            const clampedSmoothing = Math.max(0, Math.min(1, smoothing));
                            window.TEGAKI_STATE.smoothing = Math.round(clampedSmoothing * 1000) / 1000;
                            window.TEGAKI_EventBus.emit('smoothing-changed', window.TEGAKI_STATE.smoothing);
                        }
                    };

                    window.TEGAKI_STATE.a2Ready = true;
                    console.log('[A-2] コアマネージャー車両初期化完了');
                `);
            }

            /**
             * A-3車両読み込み
             */
            async loadA3Car() {
                return this.loadCarScript('A-3', `
                    // A-3車両コード (統合システム・描画エンジン)
                    window.TEGAKI_DrawingEngine = {
                        paths: [],
                        currentPath: null,

                        createPath(x, y, size, color, opacity, tool = 'pen') {
                            const { COLORS } = window.TEGAKI_SYMBOLS;
                            const canvasManager = window.TEGAKI_CanvasManager;

                            const path = {
                                id: \`path_\${Date.now()}_\${Math.random().toString(36).substr(2, 9)}\`,
                                graphics: new PIXI.Graphics(),
                                points: [],
                                color: tool === 'eraser' ? COLORS.FUTABA_BACKGROUND : color,
                                size: size,
                                opacity: tool === 'eraser' ? 1.0 : opacity,
                                tool: tool,
                                isComplete: false
                            };

                            path.graphics.beginFill(path.color, path.opacity);
                            path.graphics.drawCircle(x, y, size / 2);
                            path.graphics.endFill();

                            path.points.push({ x, y, size });
                            canvasManager.drawingContainer.addChild(path.graphics);
                            this.paths.push(path);
                            
                            window.TEGAKI_EventBus.emit('path-created', path);
                            return path;
                        },

                        drawLine(path, x, y) {
                            if (!path || path.points.length === 0) return;

                            const lastPoint = path.points[path.points.length - 1];
                            const distance = window.TEGAKI_CoordinateManager.getDistance({ x, y }, lastPoint);
                            const { PERFORMANCE } = window.TEGAKI_SYMBOLS;

                            if (distance < PERFORMANCE.MIN_DRAW_DISTANCE) return;

                            const steps = Math.max(1, Math.ceil(distance / PERFORMANCE.MIN_DRAW_DISTANCE));
                            for (let i = 1; i <= steps; i++) {
                                const t = i / steps;
                                const px = lastPoint.x + (x - lastPoint.x) * t;
                                const py = lastPoint.y + (y - lastPoint.y) * t;

                                path.graphics.beginFill(path.color, path.opacity);
                                path.graphics.drawCircle(px, py, path.size / 2);
                                path.graphics.endFill();
                            }

                            path.points.push({ x, y, size: path.size });
                            window.TEGAKI_EventBus.emit('line-drawn', { path, x, y });
                        },

                        clear() {
                            const canvasManager = window.TEGAKI_CanvasManager;
                            this.paths.forEach(path => {
                                canvasManager.drawingContainer.removeChild(path.graphics);
                                path.graphics.destroy();
                            });
                            this.paths = [];
                            this.currentPath = null;
                            window.TEGAKI_EventBus.emit('canvas-cleared');
                        }
                    };

                    window.TEGAKI_InteractionSystem = {
                        isDrawing: false,

                        init() {
                            const app = window.TEGAKI_STATE.app;
                            if (!app) return;

                            app.stage.on('pointerdown', (event) => this.handlePointerDown(event));
                            app.stage.on('pointermove', (event) => this.handlePointerMove(event));
                            app.stage.on('pointerup', () => this.handlePointerUp());
                            app.stage.on('pointerupoutside', () => this.handlePointerUp());
                        },

                        handlePointerDown(event) {
                            if (window.TEGAKI_STATE.activePopup) return;

                            const point = window.TEGAKI_CoordinateManager.getLocalPointerPosition(event);
                            const clampedPoint = window.TEGAKI_CoordinateManager.clampToCanvas(point);
                            
                            this.isDrawing = true;
                            window.TEGAKI_STATE.isDrawing = true;

                            const drawingEngine = window.TEGAKI_DrawingEngine;
                            const state = window.TEGAKI_STATE;

                            drawingEngine.currentPath = drawingEngine.createPath(
                                clampedPoint.x, 
                                clampedPoint.y,
                                state.brushSize,
                                state.brushColor,
                                state.opacity,
                                state.currentTool
                            );

                            window.TEGAKI_STATE.currentPath = drawingEngine.currentPath;
                            window.TEGAKI_EventBus.emit('drawing-started', clampedPoint);
                        },

                        handlePointerMove(event) {
                            const point = window.TEGAKI_CoordinateManager.getLocalPointerPosition(event);
                            const clampedPoint = window.TEGAKI_CoordinateManager.clampToCanvas(point);

                            window.TEGAKI_EventBus.emit('pointer-moved', clampedPoint);

                            if (this.isDrawing && !window.TEGAKI_STATE.activePopup) {
                                const drawingEngine = window.TEGAKI_DrawingEngine;
                                if (drawingEngine.currentPath) {
                                    drawingEngine.drawLine(drawingEngine.currentPath, clampedPoint.x, clampedPoint.y);
                                }
                            }
                        },

                        handlePointerUp() {
                            if (!this.isDrawing) return;

                            this.isDrawing = false;
                            window.TEGAKI_STATE.isDrawing = false;

                            const drawingEngine = window.TEGAKI_DrawingEngine;
                            if (drawingEngine.currentPath) {
                                drawingEngine.currentPath.isComplete = true;
                            }

                            drawingEngine.currentPath = null;
                            window.TEGAKI_STATE.currentPath = null;

                            window.TEGAKI_EventBus.emit('drawing-ended');
                        }
                    };

                    window.TEGAKI_PerformanceMonitor = {
                        frameCount: 0,
                        lastTime: 0,

                        start() {
                            const update = () => {
                                this.frameCount++;
                                const currentTime = performance.now();

                                if (currentTime - this.lastTime >= 1000) {
                                    const fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                                    window.TEGAKI_EventBus.emit('fps-updated', fps);

                                    this.frameCount = 0;
                                    this.lastTime = currentTime;
                                }

                                requestAnimationFrame(update);
                            };

                            update();
                        }
                    };

                    // A-3初期化
                    async function initA3() {
                        await window.TEGAKI_CanvasManager.init();
                        window.TEGAKI_CanvasManager.mountToDOM();
                        window.TEGAKI_InteractionSystem.init();
                        window.TEGAKI_PerformanceMonitor.start();
                        
                        window.TEGAKI_STATE.isInitialized = true;
                        window.TEGAKI_STATE.aTrainReady = true;
                        
                        console.log('[A-3] 統合システム車両初期化完了 - A列車完成');
                        window.TEGAKI_EventBus.emit('a-train-ready');
                    }

                    initA3();
                `);
            }

            /**
             * B-1車両読み込み（UI車両）
             */
            async loadB1Car() {
                // UIスタイルを動的に追加
                const uiStyles = `
                    .main-layout {
                        display: grid;
                        grid-template-columns: 50px 1fr;
                        height: 100vh;
                        width: 100vw;
                        gap: 0;
                    }
                    
                    .sidebar {
                        background: #f0e0d6;
                        border-right: 2px solid #e9c2ba;
                        display: flex;
                        flex-direction: column;
                        padding: 12px 6px;
                        gap: 4px;
                        overflow-y: auto;
                        position: relative;
                        z-index: 100;
                    }
                    
                    .tool-button {
                        width: 36px;
                        height: 36px;
                        border: 2px solid #e9c2ba;
                        background: #ffffee;
                        border-radius: 6px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        cursor: pointer;
                        transition: all 0.2s ease;
                        color: #800000;
                        position: relative;
                        user-select: none;
                    }
                    
                    .tool-button:hover {
                        background: #cf9c97;
                        border-color: #aa5a56;
                        transform: scale(1.05);
                    }
                    
                    .tool-button.active {
                        background: #800000;
                        color: #ffffff;
                        border-color: #800000;
                    }
                    
                    .tool-button.disabled {
                        opacity: 0.4;
                        cursor: not-allowed;
                    }
                    
                    .tool-separator {
                        height: 1px;
                        background: #e9c2ba;
                        margin: 4px 2px;
                    }
                    
                    .canvas-area {
                        background: #ffffee;
                        position: relative;
                        overflow: hidden;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                    }
                    
                    #drawing-canvas {
                        display: block;
                        cursor: crosshair;
                    }
                    
                    .popup-panel {
                        position: fixed;
                        background: #f0e0d6;
                        border: 2px solid #800000;
                        border-radius: 16px;
                        box-shadow: 0 12px 32px rgba(128, 0, 0, 0.3);
                        padding: 20px;
                        z-index: 2000;
                        display: none;
                        user-select: none;
                    }
                    
                    .popup-panel.show {
                        display: block;
                    }
                    
                    .popup-title {
                        font-size: 16px;
                        font-weight: 600;
                        color: #800000;
                        margin-bottom: 16px;
                        text-align: center;
                        border-bottom: 2px solid #e9c2ba;
                        padding-bottom: 8px;
                    }
                    
                    .setting-group {
                        margin-bottom: 16px;
                    }
                    
                    .size-presets {
                        display: flex;
                        justify-content: space-between;
                        gap: 6px;
                        margin-bottom: 16px;
                        padding: 12px;
                        background: #ffffee;
                        border-radius: 8px;
                        border: 1px solid #e9c2ba;
                    }
                    
                    .size-preset-item {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        gap: 4px;
                        cursor: pointer;
                        padding: 6px 4px;
                        border-radius: 4px;
                        transition: all 0.2s ease;
                        min-width: 40px;
                    }
                    
                    .size-preset-item:hover {
                        background: #cf9c97;
                    }
                    
                    .size-preset-item.active {
                        background: #800000;
                        color: #ffffff;
                    }
                    
                    .size-preview-circle {
                        background: #800000;
                        border-radius: 50%;
                        transition: all 0.2s ease;
                    }
                    
                    .slider-container {
                        position: relative;
                        margin-bottom: 16px;
                    }
                    
                    .slider {
                        width: 100%;
                        height: 6px;
                        background: #e9c2ba;
                        border-radius: 3px;
                        cursor: pointer;
                        position: relative;
                    }
                    
                    .slider-track {
                        height: 100%;
                        background: #800000;
                        border-radius: 3px;
                        transition: width 0.1s ease;
                    }
                    
                    .slider-handle {
                        width: 16px;
                        height: 16px;
                        background: #800000;
                        border: 2px solid #ffffee;
                        border-radius: 50%;
                        position: absolute;
                        top: 50%;
                        transform: translate(-50%, -50%);
                        cursor: grab;
                    }
                    
                    .slider-value {
                        position: absolute;
                        right: 0;
                        top: -20px;
                        font-size: 12px;
                        color: #5d4037;
                        font-family: monospace;
                        min-width: 40px;
                        text-align: right;
                    }
                    
                    .status-panel {
                        position: fixed;
                        bottom: 20px;
                        left: 70px;
                        right: 20px;
                        background: #f0e0d6;
                        border: 2px solid #cf9c97;
                        border-radius: 12px;
                        padding: 8px 16px;
                        font-family: monospace;
                        font-size: 11px;
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        z-index: 50;
                    }
                    
                    .status-group {
                        display: flex;
                        align-items: center;
                        gap: 16px;
                    }
                    
                    .status-item {
                        display: flex;
                        align-items: center;
                        gap: 4px;
                    }
                `;

                this.addStyleSheet(uiStyles);

                return this.loadCarScript('B-1', `
                    // B-1車両コード (UI車両)
                    window.TEGAKI_B1_UI = {
                        activePopup: null,
                        sliders: new Map(),

                        init() {
                            this.createUIElements();
                            this.setupToolButtons();
                            this.setupSliders();
                            this.connectToEventBus();
                            this.syncWithState();
                            console.log('[B-1] UI車両初期化完了');
                        },

                        createUIElements() {
                            if (document.querySelector('.main-layout')) return;
                            
                            document.body.innerHTML = \`
                                <div class="main-layout">
                                    <div class="sidebar">
                                        <div class="tool-button active" id="pen-tool" data-popup="pen-settings" title="ベクターペン">🖊</div>
                                        <div class="tool-button" id="eraser-tool" title="消しゴム">🧽</div>
                                        <div class="tool-separator"></div>
                                        <div class="tool-button disabled" id="fill-tool" title="塗りつぶし">🪣</div>
                                        <div class="tool-button disabled" id="select-tool" title="範囲選択">◻</div>
                                    </div>
                                    <div class="canvas-area">
                                        <div class="canvas-container">
                                            <div id="drawing-canvas"></div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="popup-panel" id="pen-settings" style="left: 60px; top: 100px;">
                                    <div class="popup-title">ベクターペンツール設定</div>
                                    <div class="setting-group">
                                        <div class="size-presets">
                                            <div class="size-preset-item" data-size="1">
                                                <div class="size-preview-circle" style="width: 1px; height: 1px;"></div>
                                                <div>1</div>
                                            </div>
                                            <div class="size-preset-item" data-size="4">
                                                <div class="size-preview-circle" style="width: 4px; height: 4px;"></div>
                                                <div>4</div>
                                            </div>
                                            <div class="size-preset-item active" data-size="16">
                                                <div class="size-preview-circle" style="width: 16px; height: 16px;"></div>
                                                <div>16</div>
                                            </div>
                                            <div class="size-preset-item" data-size="32">
                                                <div class="size-preview-circle" style="width: 20px; height: 20px;"></div>
                                                <div>32</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="setting-group">
                                        <div>サイズ</div>
                                        <div class="slider-container">
                                            <div class="slider" id="pen-size-slider">
                                                <div class="slider-track" id="pen-size-track"></div>
                                                <div class="slider-handle" id="pen-size-handle"></div>
                                            </div>
                                            <div class="slider-value" id="pen-size-value">16.0px</div>
                                        </div>
                                    </div>
                                </div>
                            \`;
                        },

                        setupToolButtons() {
                            document.querySelectorAll('.tool-button').forEach(btn => {
                                btn.addEventListener('click', (e) => {
                                    if (btn.classList.contains('disabled')) return;
                                    this.handleToolClick(e.currentTarget);
                                });
                            });
                        },

                        handleToolClick(button) {
                            const toolId = button.id;
                            const popupId = button.getAttribute('data-popup');

                            if (toolId === 'pen-tool') {
                                window.TEGAKI_ToolManager.setTool('pen');
                                this.setActiveToolButton('pen');
                            } else if (toolId === 'eraser-tool') {
                                window.TEGAKI_ToolManager.setTool('eraser');
                                this.setActiveToolButton('eraser');
                            }

                            if (popupId) {
                                this.togglePopup(popupId);
                            }
                        },

                        setActiveToolButton(tool) {
                            document.querySelectorAll('.tool-button').forEach(btn => {
                                btn.classList.remove('active');
                            });
                            document.getElementById(tool + '-tool')?.classList.add('active');
                        },

                        togglePopup(popupId) {
                            const popup = document.getElementById(popupId);
                            if (!popup) return;

                            if (this.activePopup && this.activePopup !== popup) {
                                this.activePopup.classList.remove('show');
                            }

                            const isVisible = popup.classList.contains('show');
                            popup.classList.toggle('show', !isVisible);
                            this.activePopup = isVisible ? null : popup;
                            window.TEGAKI_STATE.activePopup = this.activePopup;
                        },

                        setupSliders() {
                            this.createSlider('pen-size-slider', 0.1, 100, 16.0, (value) => {
                                window.TEGAKI_ToolManager.setBrushSize(value);
                                return value.toFixed(1) + 'px';
                            });

                            document.querySelectorAll('.size-preset-item').forEach(preset => {
                                preset.addEventListener('click', () => {
                                    const size = parseFloat(preset.getAttribute('data-size'));
                                    window.TEGAKI_ToolManager.setBrushSize(size);
                                    this.updateSliderValue('pen-size-slider', size);
                                });
                            });
                        },

                        createSlider(sliderId, min, max, initial, callback) {
                            const container = document.getElementById(sliderId);
                            if (!container) return;

                            const track = container.querySelector('.slider-track');
                            const handle = container.querySelector('.slider-handle');
                            const valueDisplay = container.parentNode.querySelector('.slider-value');

                            const sliderData = {
                                value: initial,
                                min, max, callback,
                                track, handle, valueDisplay,
                                isDragging: false
                            };

                            this.sliders.set(sliderId, sliderData);

                            const updateSlider = (value) => {
                                sliderData.value = Math.max(min, Math.min(max, value));
                                const percentage = ((sliderData.value - min) / (max - min)) * 100;
                                
                                track.style.width = percentage + '%';
                                handle.style.left = percentage + '%';
                                valueDisplay.textContent = callback(sliderData.value);
                            };

                            const getValueFromPosition = (clientX) => {
                                const rect = container.getBoundingClientRect();
                                const percentage = (clientX - rect.left) / rect.width;
                                return min + (percentage * (max - min));
                            };

                            container.addEventListener('mousedown', (e) => {
                                sliderData.isDragging = true;
                                updateSlider(getValueFromPosition(e.clientX));
                                e.preventDefault();
                            });

                            document.addEventListener('mousemove', (e) => {
                                if (sliderData.isDragging) {
                                    updateSlider(getValueFromPosition(e.clientX));
                                }
                            });

                            document.addEventListener('mouseup', () => {
                                sliderData.isDragging = false;
                            });

                            updateSlider(initial);
                        },

                        updateSliderValue(sliderId, value) {
                            const slider = this.sliders.get(sliderId);
                            if (!slider) return;

                            slider.value = value;
                            const percentage = ((value - slider.min) / (slider.max - slider.min)) * 100;
                            slider.track.style.width = percentage + '%';
                            slider.handle.style.left = percentage + '%';
                            slider.valueDisplay.textContent = slider.callback(value);

                            // プリセット更新
                            document.querySelectorAll('.size-preset-item').forEach(preset => {
                                const presetSize = parseFloat(preset.getAttribute('data-size'));
                                const isActive = Math.abs(presetSize - value) < 0.1;
                                preset.classList.toggle('active', isActive);
                            });
                        },

                        connectToEventBus() {
                            window.TEGAKI_EventBus.on('tool-changed', (toolName) => {
                                this.setActiveToolButton(toolName);
                            });

                            window.TEGAKI_EventBus.on('brush-size-changed', (size) => {
                                this.updateSliderValue('pen-size-slider', size);
                            });

                            document.addEventListener('click', (e) => {
                                if (!e.target.closest('.popup-panel') && !e.target.closest('.tool-button')) {
                                    if (this.activePopup) {
                                        this.activePopup.classList.remove('show');
                                        this.activePopup = null;
                                        window.TEGAKI_STATE.activePopup = null;
                                    }
                                }
                            });
                        },

                        syncWithState() {
                            const state = window.TEGAKI_STATE;
                            this.updateSliderValue('pen-size-slider', state.brushSize);
                            this.setActiveToolButton(state.currentTool);
                        }
                    };

                    window.TEGAKI_EventBus.on('a-train-ready', () => {
                        window.TEGAKI_B1_UI.init();
                    });

                    if (window.TEGAKI_STATE?.aTrainReady) {
                        window.TEGAKI_B1_UI.init();
                    }
                `);
            }

            /**
             * B-2車両読み込み（ステータス車両）
             */
            async loadB2Car() {
                return this.loadCarScript('B-2', `
                    // B-2車両コード (ステータス車両)
                    window.TEGAKI_B2_Status = {
                        init() {
                            this.createStatusPanel();
                            this.connectToEventBus();
                            this.startMonitoring();
                            console.log('[B-2] ステータス車両初期化完了');
                        },

                        createStatusPanel() {
                            if (document.querySelector('.status-panel')) return;
                            
                            const statusPanel = document.createElement('div');
                            statusPanel.className = 'status-panel';
                            statusPanel.innerHTML = \`
                                <div class="status-group">
                                    <div class="status-item">Canvas: <span id="canvas-info">400×400px</span></div>
                                    <div class="status-item">Tool: <span id="current-tool">ベクターペン</span></div>
                                    <div class="status-item">座標: <span id="coordinates">x: 0, y: 0</span></div>
                                </div>
                                <div class="status-group">
                                    <div class="status-item">FPS: <span id="fps">60</span></div>
                                    <div class="status-item">Memory: <span id="memory-usage">1.2MB</span></div>
                                </div>
                            \`;
                            document.body.appendChild(statusPanel);
                        },

                        connectToEventBus() {
                            window.TEGAKI_EventBus.on('pointer-moved', (point) => {
                                const coordsElement = document.getElementById('coordinates');
                                if (coordsElement) {
                                    coordsElement.textContent = \`x: \${Math.round(point.x)}, y: \${Math.round(point.y)}\`;
                                }
                            });

                            window.TEGAKI_EventBus.on('tool-changed', (toolName) => {
                                const toolElement = document.getElementById('current-tool');
                                if (toolElement) {
                                    const toolNames = { pen: 'ベクターペン', eraser: '消しゴム' };
                                    toolElement.textContent = toolNames[toolName] || toolName;
                                }
                            });

                            window.TEGAKI_EventBus.on('canvas-resized', ({ width, height }) => {
                                const canvasElement = document.getElementById('canvas-info');
                                if (canvasElement) {
                                    canvasElement.textContent = \`\${width}×\${height}px\`;
                                }
                            });

                            window.TEGAKI_EventBus.on('fps-updated', (fps) => {
                                const fpsElement = document.getElementById('fps');
                                if (fpsElement) {
                                    fpsElement.textContent = fps;
                                }
                            });
                        },

                        startMonitoring() {
                            setInterval(() => {
                                if (performance.memory) {
                                    const used = performance.memory.usedJSHeapSize;
                                    const usage = (used / 1024 / 1024).toFixed(1);
                                    const memoryElement = document.getElementById('memory-usage');
                                    if (memoryElement) {
                                        memoryElement.textContent = usage + 'MB';
                                    }
                                }
                            }, 2000);
                        }
                    };

                    window.TEGAKI_EventBus.on('a-train-ready', () => {
                        window.TEGAKI_B2_Status.init();
                    });

                    if (window.TEGAKI_STATE?.aTrainReady) {
                        window.TEGAKI_B2_Status.init();
                    }
                `);
            }

            /**
             * A列車完成待機
             */
            async waitForATrain() {
                return new Promise((resolve) => {
                    if (window.TEGAKI_STATE?.aTrainReady) {
                        resolve();
                        return;
                    }

                    const checkATrain = () => {
                        if (window.TEGAKI_STATE?.aTrainReady) {
                            resolve();
                        } else {
                            setTimeout(checkATrain, 100);
                        }
                    };

                    checkATrain();
                });
            }

            /**
             * 統合テスト実行
             */
            async runIntegrationTest() {
                return new Promise((resolve, reject) => {
                    try {
                        // 必須システム確認
                        const requiredSystems = [
                            'TEGAKI_SYMBOLS',
                            'TEGAKI_STATE', 
                            'TEGAKI_EventBus',
                            'TEGAKI_CanvasManager',
                            'TEGAKI_CoordinateManager',
                            'TEGAKI_ToolManager',
                            'TEGAKI_DrawingEngine',
                            'TEGAKI_InteractionSystem'
                        ];

                        const missing = requiredSystems.filter(system => !window[system]);
                        
                        if (missing.length > 0) {
                            throw new Error(`統合テスト失敗 - 不足システム: ${missing.join(', ')}`);
                        }

                        // Pixiアプリケーション確認
                        if (!window.TEGAKI_STATE.app) {
                            throw new Error('統合テスト失敗 - Pixiアプリケーションが未初期化');
                        }

                        // UI要素確認
                        if (!document.querySelector('.main-layout')) {
                            throw new Error('統合テスト失敗 - UI要素が未作成');
                        }

                        console.log('✅ 統合テスト完了');
                        setTimeout(resolve, 300);
                        
                    } catch (error) {
                        reject(error);
                    }
                });
            }

            /**
             * 起動完了
             */
            async completeBootup() {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        this.loadingScreen.classList.add('fade-out');
                        setTimeout(() => {
                            this.loadingScreen.style.display = 'none';
                            resolve();
                        }, 500);
                    }, 1000);
                });
            }

            /**
             * 車両スクリプト読み込み
             */
            async loadCarScript(carName, scriptCode) {
                return new Promise((resolve, reject) => {
                    try {
                        const script = document.createElement('script');
                        script.textContent = scriptCode;
                        document.head.appendChild(script);
                        
                        console.log(`[${carName}] 車両読み込み完了`);
                        setTimeout(resolve, 200);
                        
                    } catch (error) {
                        reject(new Error(`[${carName}] 車両読み込み失敗: ${error.message}`));
                    }
                });
            }

            /**
             * スタイルシート追加
             */
            addStyleSheet(css) {
                const style = document.createElement('style');
                style.textContent = css;
                document.head.appendChild(style);
            }

            /**
             * 進捗更新
             */
            updateProgress(percentage, status) {
                if (this.loadingBar) {
                    this.loadingBar.style.width = percentage + '%';
                }
                if (this.loadingStatus) {
                    this.loadingStatus.textContent = status;
                }
                this.loadingProgress = percentage;
            }

            /**
             * エラーハンドリング
             */
            handleError(title, error) {
                console.error(`${title}:`, error);
                
                if (this.errorPanel) {
                    document.getElementById('error-message').textContent = 
                        `${title}\n\n${error.message}\n\n詳細はコンソールを確認してください。`;
                    this.errorPanel.style.display = 'block';
                }
                
                this.loadingScreen.style.display = 'none';
            }
        }

        // ============================================================
        // システム起動
        // ============================================================
        window.addEventListener('DOMContentLoaded', async () => {
            const trainSystem = new TegakiV8TrainSystem();
            await trainSystem.boot();
        });
    </script>
</body>
</html>
