<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線のみ描画版お絵描きツール</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffee;
            color: #800000;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .tool-panel {
            width: 48px;
            background-color: #f0e0d6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px;
            gap: 12px;
            box-shadow: 1px 0 3px rgba(128, 0, 0, 0.1);
            border-right: 1px solid rgba(128, 0, 0, 0.2);
        }
        .tool-button {
            width: 32px;
            height: 32px;
            border: none;
            background-color: transparent;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            color: #800000;
            border: 1px solid transparent;
        }
        .tool-button:hover {
            background-color: rgba(128, 0, 0, 0.1);
            border-color: rgba(128, 0, 0, 0.3);
        }
        .tool-button.active {
            background-color: #800000;
            color: #f0e0d6;
            border-color: #600000;
        }
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffee;
            overflow: hidden;
            padding: 20px;
        }
        #drawing-canvas {
            cursor: crosshair;
            touch-action: none;
            display: block;
            border: 2px solid #800000;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.15);
            max-width: 100%;
            max-height: 100%;
            background-color: #f0e0d6;
        }
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background-color: rgba(240, 224, 214, 0.95);
            border-top: 1px solid rgba(128, 0, 0, 0.3);
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 11px;
            color: #800000;
            gap: 16px;
            backdrop-filter: blur(8px);
        }
        .pressure-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pressure-bar {
            width: 50px;
            height: 4px;
            background-color: rgba(128, 0, 0, 0.2);
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid rgba(128, 0, 0, 0.3);
        }
        .pressure-fill {
            height: 100%;
            background: linear-gradient(90deg, #800000, #a00000);
            transition: width 0.05s ease-out;
            width: 0%;
            border-radius: 1px;
        }
        .render-mode-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .render-toggle {
            padding: 4px 8px;
            font-size: 10px;
            border: 1px solid #800000;
            background: transparent;
            color: #800000;
            cursor: pointer;
            border-radius: 3px;
        }
        .render-toggle.active {
            background: #800000;
            color: #f0e0d6;
        }
    </style>
</head>
<body>
    <div class="tool-panel">
        <button id="pen-tool" class="tool-button active" title="ペン">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 256 256">
                <path d="m227.31,73.37L182.63,28.68a16,16,0,0,0-22.63,0L36.69,152A15.86,15.86,0,0,0,32,163.31V208a16,16,0,0,0,16,16H92.69A15.86,15.86,0,0,0,104,219.31L227.31,96a16,16,0,0,0,0-22.63ZM92.69,208H48V163.31l88-88L180.69,120ZM192,108.68,147.31,64l24-24L216,84.68Z"></path>
            </svg>
        </button>
    </div>
    <div class="canvas-container">
        <canvas id="drawing-canvas"></canvas>
    </div>
    <div class="status-bar">
        <span id="tool-status">ペン: 5px</span>
        <div class="pressure-indicator">
            <span>筆圧:</span>
            <div class="pressure-bar"><div class="pressure-fill"></div></div>
        </div>
        <span>512×512</span>
        <div class="render-mode-controls">
            <button id="line-mode" class="render-toggle active">線のみ</button>
            <button id="stroke-mode" class="render-toggle">筆圧ストローク</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/twgl.js/5.5.4/twgl-full.min.js"></script>
    <script type="module">
        const { getStroke } = await import('https://esm.sh/perfect-freehand@1.2.2');

        // ======= 設定一元管理 =======
        const APP_CONFIG = {
            canvas: { width: 512, height: 512 },
            pen: { size: 5, color: [0.502, 0, 0, 1.0] },
            rendering: { clearColor: [0.941, 0.878, 0.839, 1.0] },
            perfectFreehand: { thinning: 0.5, smoothing: 0.5, streamline: 0.5 },
            renderMode: 'line' // 'line' or 'stroke'
        };

        // ======= 座標系統括 =======
        class CoordinateSystem {
            constructor(canvasWidth, canvasHeight) {
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;
            }

            screenToCanvas(clientX, clientY, canvasRect) {
                const x = ((clientX - canvasRect.left) / canvasRect.width) * this.canvasWidth;
                const y = ((clientY - canvasRect.top) / canvasRect.height) * this.canvasHeight;
                return [x, y];
            }

            canvasToWebGL(x, y) {
                return [
                    (x / this.canvasWidth) * 2.0 - 1.0,
                    -((y / this.canvasHeight) * 2.0 - 1.0)
                ];
            }
        }

        // ======= ストローク状態管理 =======
        class StrokeStore {
            constructor() {
                this.state = {
                    strokes: [],
                    currentPoints: [],
                    isDrawing: false,
                    currentPressure: 0
                };
                this.subscribers = [];
            }

            subscribe(callback) {
                this.subscribers.push(callback);
                return () => this.subscribers = this.subscribers.filter(s => s !== callback);
            }

            getState() { 
                return this.state; 
            }

            _notify() {
                this.subscribers.forEach(callback => callback(this.state));
            }

            startStroke(point) {
                this.state = {
                    ...this.state,
                    currentPoints: [point],
                    isDrawing: true,
                    currentPressure: point[2] || 0.5
                };
                this._notify();
            }

            addPoint(point) {
                if (!this.state.isDrawing) return;
                this.state = {
                    ...this.state,
                    currentPoints: [...this.state.currentPoints, point],
                    currentPressure: point[2] || 0.5
                };
                this._notify();
            }

            endStroke() {
                if (!this.state.isDrawing || this.state.currentPoints.length < 2) {
                    this.state = {
                        ...this.state,
                        currentPoints: [],
                        isDrawing: false,
                        currentPressure: 0
                    };
                    this._notify();
                    return;
                }

                this.state = {
                    ...this.state,
                    strokes: [...this.state.strokes, [...this.state.currentPoints]],
                    currentPoints: [],
                    isDrawing: false,
                    currentPressure: 0
                };
                this._notify();
            }
        }

        // ======= マルチレンダラー（線・ストローク両対応） =======
        class FlexibleRenderer {
            constructor() {
                this.vertexShader = `
                    attribute vec2 a_position;
                    void main() {
                        gl_Position = vec4(a_position, 0, 1);
                    }
                `;
                this.fragmentShader = `
                    precision mediump float;
                    uniform vec4 u_color;
                    void main() {
                        gl_FragColor = u_color;
                    }
                `;
            }

            init(canvas, coordinateSystem) {
                this.canvas = canvas;
                this.coordinates = coordinateSystem;
                this.gl = twgl.getContext(canvas);
                if (!this.gl) throw new Error('WebGL非対応');
                
                this.programInfo = twgl.createProgramInfo(this.gl, [this.vertexShader, this.fragmentShader]);
                this._setupCanvas();
            }

            _setupCanvas() {
                const { gl } = this;
                this.canvas.width = APP_CONFIG.canvas.width;
                this.canvas.height = APP_CONFIG.canvas.height;
                gl.viewport(0, 0, APP_CONFIG.canvas.width, APP_CONFIG.canvas.height);
                gl.clearColor(...APP_CONFIG.rendering.clearColor);
                gl.enable(gl.BLEND);
                gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
            }

            // シンプルな線描画（Perfect Freehandを使わない）
            _renderLine(points) {
                if (points.length < 2) return;

                const { gl, programInfo } = this;
                const webglVertices = [];
                
                for (let i = 0; i < points.length; i++) {
                    const [webglX, webglY] = this.coordinates.canvasToWebGL(points[i][0], points[i][1]);
                    webglVertices.push(webglX, webglY);
                }

                const bufferInfo = twgl.createBufferInfoFromArrays(gl, {
                    a_position: { numComponents: 2, data: new Float32Array(webglVertices) }
                });

                gl.useProgram(programInfo.program);
                twgl.setBuffersAndAttributes(gl, programInfo, bufferInfo);
                twgl.setUniforms(programInfo, { u_color: APP_CONFIG.pen.color });
                gl.lineWidth(APP_CONFIG.pen.size);
                gl.drawArrays(gl.LINE_STRIP, 0, points.length);
            }

            // Perfect Freehandストローク描画
            _renderStroke(points) {
                if (points.length < 2) return;

                try {
                    const outline = getStroke(points, {
                        size: APP_CONFIG.pen.size,
                        ...APP_CONFIG.perfectFreehand
                    });

                    if (outline.length < 3) return;

                    const webglVertices = [];
                    for (let i = 0; i < outline.length; i++) {
                        const [webglX, webglY] = this.coordinates.canvasToWebGL(outline[i][0], outline[i][1]);
                        webglVertices.push(webglX, webglY);
                    }

                    const { gl, programInfo } = this;
                    const bufferInfo = twgl.createBufferInfoFromArrays(gl, {
                        a_position: { numComponents: 2, data: new Float32Array(webglVertices) }
                    });

                    gl.useProgram(programInfo.program);
                    twgl.setBuffersAndAttributes(gl, programInfo, bufferInfo);
                    twgl.setUniforms(programInfo, { u_color: APP_CONFIG.pen.color });
                    gl.drawArrays(gl.TRIANGLE_FAN, 0, outline.length);

                } catch (error) {
                    console.warn('Perfect Freehand処理エラー:', error);
                }
            }

            render(strokeState) {
                this.gl.clear(this.gl.COLOR_BUFFER_BIT);

                const renderMethod = APP_CONFIG.renderMode === 'line' ? 
                    this._renderLine.bind(this) : this._renderStroke.bind(this);

                // 完成したストロークを描画
                strokeState.strokes.forEach(points => {
                    renderMethod(points);
                });

                // 現在描画中のストロークを描画
                if (strokeState.isDrawing && strokeState.currentPoints.length >= 2) {
                    renderMethod(strokeState.currentPoints);
                }
            }
        }

        // ======= 入力処理 =======
        class PointerInputProcessor {
            constructor(canvas, coordinateSystem, strokeStore) {
                this.canvas = canvas;
                this.coordinates = coordinateSystem;
                this.strokeStore = strokeStore;
                this.isPointerDown = false;
                this._setupEventListeners();
            }

            _setupEventListeners() {
                this.canvas.addEventListener('pointerdown', e => this._handlePointerDown(e));
                this.canvas.addEventListener('pointermove', e => this._handlePointerMove(e));
                this.canvas.addEventListener('pointerup', e => this._handlePointerUp(e));
                this.canvas.addEventListener('pointerleave', e => this._handlePointerUp(e));
            }

            _getPoint(e) {
                const rect = this.canvas.getBoundingClientRect();
                const [x, y] = this.coordinates.screenToCanvas(e.clientX, e.clientY, rect);
                const pressure = e.pointerType === 'pen' ? e.pressure : 0.5;
                return [x, y, pressure];
            }

            _handlePointerDown(e) {
                e.preventDefault();
                this.isPointerDown = true;
                this.canvas.setPointerCapture(e.pointerId);
                
                const point = this._getPoint(e);
                this.strokeStore.startStroke(point);
            }

            _handlePointerMove(e) {
                if (!this.isPointerDown) return;
                e.preventDefault();
                
                const point = this._getPoint(e);
                this.strokeStore.addPoint(point);
            }

            _handlePointerUp(e) {
                if (!this.isPointerDown) return;
                e.preventDefault();
                
                this.isPointerDown = false;
                if (e.pointerId !== undefined) {
                    this.canvas.releasePointerCapture(e.pointerId);
                }
                this.strokeStore.endStroke();
            }
        }

        // ======= UI制御 =======
        class StatusBarUI {
            constructor(strokeStore) {
                this.strokeStore = strokeStore;
                this._setupModeToggle();
                this._subscribeToStore();
            }

            _setupModeToggle() {
                const lineModeBtn = document.getElementById('line-mode');
                const strokeModeBtn = document.getElementById('stroke-mode');

                lineModeBtn.addEventListener('click', () => {
                    APP_CONFIG.renderMode = 'line';
                    lineModeBtn.classList.add('active');
                    strokeModeBtn.classList.remove('active');
                    this.strokeStore._notify(); // 再描画を促す
                });

                strokeModeBtn.addEventListener('click', () => {
                    APP_CONFIG.renderMode = 'stroke';
                    strokeModeBtn.classList.add('active');
                    lineModeBtn.classList.remove('active');
                    this.strokeStore._notify(); // 再描画を促す
                });
            }

            _subscribeToStore() {
                this.strokeStore.subscribe(state => {
                    this._updatePressureDisplay(state.currentPressure);
                });
            }

            _updatePressureDisplay(pressure) {
                const pressureFill = document.querySelector('.pressure-fill');
                if (pressureFill) {
                    pressureFill.style.width = `${pressure * 100}%`;
                }
            }
        }

        // ======= メインループ制御 =======
        class RenderController {
            constructor(renderer, strokeStore) {
                this.renderer = renderer;
                this.strokeStore = strokeStore;
                this.animationId = null;
                this._subscribeToStore();
            }

            _subscribeToStore() {
                this.strokeStore.subscribe(state => {
                    this._requestRender(state);
                });
            }

            _requestRender(state) {
                if (this.animationId) return;
                this.animationId = requestAnimationFrame(() => {
                    this.renderer.render(state);
                    this.animationId = null;
                });
            }
        }

        // ======= アプリケーション統括 =======
        class AppController {
            constructor() {
                this._initializeComponents();
                this._startApplication();
            }

            _initializeComponents() {
                this.coordinates = new CoordinateSystem(APP_CONFIG.canvas.width, APP_CONFIG.canvas.height);
                this.strokeStore = new StrokeStore();
                
                const canvas = document.getElementById('drawing-canvas');
                this.renderer = new FlexibleRenderer();
                this.renderer.init(canvas, this.coordinates);
                
                this.inputProcessor = new PointerInputProcessor(canvas, this.coordinates, this.strokeStore);
                this.statusBarUI = new StatusBarUI(this.strokeStore);
                this.renderController = new RenderController(this.renderer, this.strokeStore);
            }

            _startApplication() {
                this.renderer.render(this.strokeStore.getState());
            }
        }

        // アプリケーション起動
        new AppController();
    </script>
</body>
</html>
