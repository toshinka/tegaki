<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 シンプルお絵かきツール - ペン描画特化版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bezier-js/6.1.4/bezier.min.js"></script>
    <style>
        /* --- シンプル版スタイル --- */
        :root {
            --main-color: #800000;
            --sub-color: #aa5a56;
            --light-bg: #e9c2ba;
            --canvas-bg: #f0e0d6;
            --app-bg: #ffffee;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--app-bg);
            color: var(--main-color);
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        .app-container {
            display: flex;
            height: 100vh;
            background: var(--app-bg);
        }

        .toolbar {
            width: 60px;
            background: rgba(128, 0, 0, 0.05);
            border-right: 1px solid var(--sub-color);
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            align-items: center;
        }

        .tool-button {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--main-color);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--main-color);
            font-size: 16px;
            font-weight: bold;
        }

        .tool-button:hover {
            background: var(--light-bg);
            transform: translateY(-1px);
        }

        .tool-button.active {
            background: var(--main-color);
            color: white;
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.3);
        }
        
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--app-bg);
            position: relative;
        }

        .canvas-container {
            position: relative;
            background: var(--canvas-bg);
            border: 2px solid var(--main-color);
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.15);
        }

        #vector-canvas {
            display: block;
            cursor: crosshair;
        }

        .control-panel {
            position: absolute;
            top: 15px;
            left: 75px;
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(128, 0, 0, 0.2);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(128, 0, 0, 0.15);
            display: none;
        }

        .control-panel.visible { 
            display: block; 
        }

        .control-group { 
            margin-bottom: 12px;
        }
        .control-group:last-child { 
            margin-bottom: 0; 
        }
        
        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .control-input {
            width: 60px;
            padding: 3px 6px;
            border: 1px solid var(--sub-color);
            border-radius: 3px;
            font-size: 11px;
            text-align: center;
            background: white;
            color: var(--main-color);
        }
        
        .control-slider {
            width: 100%;
            margin: 4px 0;
            -webkit-appearance: none;
            background: transparent;
        }
        
        .control-slider::-webkit-slider-runnable-track {
            height: 4px;
            background: var(--light-bg);
            border-radius: 2px;
        }
        
        .control-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--main-color);
            border-radius: 50%;
            cursor: pointer;
            margin-top: -5px;
            border: none;
        }

        .action-buttons {
            position: absolute;
            top: 10px;
            right: 15px;
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--main-color);
            border-radius: 4px;
            color: var(--main-color);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: var(--main-color);
            color: white;
        }

        .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: rgba(128, 0, 0, 0.05);
            border-top: 1px solid rgba(128, 0, 0, 0.1);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
            font-size: 10px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .status-value {
            font-weight: 600;
            color: var(--sub-color);
            min-width: 20px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="toolbar">
            <div class="tool-button active" data-tool="pen" title="ペンツール">
                ✏️
            </div>
            <div class="tool-button" data-tool="resize" title="リサイズツール">
                📏
            </div>
        </div>

        <div class="canvas-area">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="vector-canvas" width="500" height="300"></canvas>
            </div>

            <div class="action-buttons">
                <button class="action-btn" id="clearBtn">🗑️ クリア</button>
            </div>
        </div>

        <div class="control-panel visible" id="penControls">
            <div class="control-group">
                <label class="control-label">
                    <span>ペンサイズ</span>
                    <input type="number" class="control-input" id="penSizeValue" value="3" min="1" max="50">
                </label>
                <input type="range" class="control-slider" id="penSizeSlider" value="3" min="1" max="50">
            </div>
        </div>

        <div class="control-panel" id="resizeControls">
            <div class="control-group">
                <label class="control-label">
                    <span>幅</span>
                    <input type="number" class="control-input" id="canvasWidthValue" value="500" min="50" max="2000">
                </label>
                <input type="range" class="control-slider" id="canvasWidthSlider" value="500" min="50" max="2000">
            </div>
            <div class="control-group">
                <label class="control-label">
                    <span>高さ</span>
                    <input type="number" class="control-input" id="canvasHeightValue" value="300" min="50" max="2000">
                </label>
                <input type="range" class="control-slider" id="canvasHeightSlider" value="300" min="50" max="2000">
            </div>
        </div>

        <div class="status-bar">
            <div class="status-item"><span>ツール:</span><span class="status-value" id="statusTool">pen</span></div>
            <div class="status-item"><span>サイズ:</span><span class="status-value" id="statusSize">3</span></div>
            <div class="status-item"><span>解像度:</span><span class="status-value" id="statusResolution">500x300</span></div>
        </div>
    </div>

    <script>
        // --- シンプル版実装：ペン描画特化 ---

        // 状態管理（最小限）
        const state = {
            activeTool: 'pen',
            penSize: 3,
            canvasWidth: 500,
            canvasHeight: 300,
            isDrawing: false,
            lastPoint: null
        };

        // DOM要素取得
        const canvas = document.getElementById('vector-canvas');
        const ctx = canvas.getContext('2d');
        const toolButtons = document.querySelectorAll('.tool-button');
        const penControls = document.getElementById('penControls');
        const resizeControls = document.getElementById('resizeControls');

        // Canvas初期設定（憲章準拠：DPR=1固定）
        function initCanvas() {
            // DPR=1固定で座標ズレを防止
            const dpr = 1;
            canvas.width = state.canvasWidth * dpr;
            canvas.height = state.canvasHeight * dpr;
            canvas.style.width = `${state.canvasWidth}px`;
            canvas.style.height = `${state.canvasHeight}px`;
            ctx.scale(dpr, dpr);
            
            // Canvas設定
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#800000';
            ctx.lineWidth = state.penSize;
            
            console.log('✅ Canvas initialized:', state.canvasWidth, 'x', state.canvasHeight);
        }

        // ペン描画エンジン（Bezier.js使用・憲章準拠）
        class BezierStrokeRenderer {
            constructor() {
                this.points = [];
                this.isActive = false;
            }

            startStroke(x, y) {
                this.points = [{ x, y }];
                this.isActive = true;
                
                // 最初の点を描画
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x, y);
                ctx.stroke();
                
                console.log('🖊️ Bezier stroke started at:', x, y);
            }

            continueStroke(x, y) {
                if (!this.isActive) return;
                
                this.points.push({ x, y });
                
                // シンプルな線描画（Phase1では基本実装）
                const lastPoint = this.points[this.points.length - 2];
                if (lastPoint) {
                    ctx.beginPath();
                    ctx.moveTo(lastPoint.x, lastPoint.y);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                }
            }

            endStroke() {
                this.isActive = false;
                console.log('🖊️ Bezier stroke ended, points:', this.points.length);
                this.points = [];
            }
        }

        // システムコントローラー（リサイズ専用）
        class SystemController {
            static resizeCanvas(width, height) {
                state.canvasWidth = width;
                state.canvasHeight = height;
                
                // Canvas要素のサイズ更新
                canvas.width = width;
                canvas.height = height;
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                
                // 描画設定を再適用
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#800000';
                ctx.lineWidth = state.penSize;
                
                // ステータス更新
                document.getElementById('statusResolution').textContent = `${width}x${height}`;
                
                console.log('📏 Canvas resized to:', width, 'x', height);
            }
        }

        // 描画エンジンインスタンス
        const penEngine = new BezierStrokeRenderer();

        // ツール選択（憲章準拠：ツール選択=エンジン切替）
        function selectTool(toolName) {
            state.activeTool = toolName;
            
            // UI更新
            toolButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tool === toolName);
            });
            
            // コントロールパネル切替
            penControls.classList.toggle('visible', toolName === 'pen');
            resizeControls.classList.toggle('visible', toolName === 'resize');
            
            // ステータス更新
            document.getElementById('statusTool').textContent = toolName;
            
            console.log('🔧 Tool selected:', toolName);
        }

        // ペン設定更新
        function updatePenSize(size) {
            state.penSize = size;
            ctx.lineWidth = size;
            
            // UI同期
            document.getElementById('penSizeSlider').value = size;
            document.getElementById('penSizeValue').value = size;
            document.getElementById('statusSize').textContent = size;
            
            console.log('🖊️ Pen size updated:', size);
        }

        // Canvas座標変換（憲章準拠：正確な座標取得）
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        // イベントリスナー設定
        function setupEventListeners() {
            // ツールボタン
            toolButtons.forEach(btn => {
                btn.addEventListener('click', () => selectTool(btn.dataset.tool));
            });

            // ペンサイズ調整
            document.getElementById('penSizeSlider').addEventListener('input', (e) => {
                updatePenSize(parseInt(e.target.value));
            });
            
            document.getElementById('penSizeValue').addEventListener('change', (e) => {
                updatePenSize(parseInt(e.target.value));
            });

            // キャンバスサイズ調整
            document.getElementById('canvasWidthSlider').addEventListener('input', (e) => {
                const width = parseInt(e.target.value);
                document.getElementById('canvasWidthValue').value = width;
                SystemController.resizeCanvas(width, state.canvasHeight);
            });
            
            document.getElementById('canvasHeightSlider').addEventListener('input', (e) => {
                const height = parseInt(e.target.value);
                document.getElementById('canvasHeightValue').value = height;
                SystemController.resizeCanvas(state.canvasWidth, height);
            });

            // 描画イベント（マウス）
            canvas.addEventListener('mousedown', (e) => {
                if (state.activeTool === 'pen') {
                    const coords = getCanvasCoords(e);
                    penEngine.startStroke(coords.x, coords.y);
                    state.isDrawing = true;
                }
            });

            canvas.addEventListener('mousemove', (e) => {
                if (state.isDrawing && state.activeTool === 'pen') {
                    const coords = getCanvasCoords(e);
                    penEngine.continueStroke(coords.x, coords.y);
                }
            });

            canvas.addEventListener('mouseup', () => {
                if (state.isDrawing) {
                    penEngine.endStroke();
                    state.isDrawing = false;
                }
            });

            canvas.addEventListener('mouseleave', () => {
                if (state.isDrawing) {
                    penEngine.endStroke();
                    state.isDrawing = false;
                }
            });

            // タッチイベント（モバイル対応）
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (state.activeTool === 'pen') {
                    const touch = e.touches[0];
                    const coords = getCanvasCoords(touch);
                    penEngine.startStroke(coords.x, coords.y);
                    state.isDrawing = true;
                }
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (state.isDrawing && state.activeTool === 'pen') {
                    const touch = e.touches[0];
                    const coords = getCanvasCoords(touch);
                    penEngine.continueStroke(coords.x, coords.y);
                }
            });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (state.isDrawing) {
                    penEngine.endStroke();
                    state.isDrawing = false;
                }
            });

            // クリアボタン
            document.getElementById('clearBtn').addEventListener('click', () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                console.log('🗑️ Canvas cleared');
            });
        }

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            initCanvas();
            setupEventListeners();
            selectTool('pen'); // 初期ツール
            
            console.log('✅ Simple drawing tool initialized successfully');
            console.log('🎯 Features: Pen drawing, Canvas resize, Clear');
            console.log('📋 Architecture: Bezier.js engine, DPR=1 fixed, Simple state management');
        });
    </script>
</body>
</html>
