<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL お絵かきツール v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffee;
            color: #800000;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .tool-panel {
            width: 48px;
            background-color: #f0e0d6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px;
            gap: 12px;
            box-shadow: 1px 0 3px rgba(128, 0, 0, 0.1);
            border-right: 1px solid rgba(128, 0, 0, 0.2);
        }
        .tool-button {
            width: 32px;
            height: 32px;
            border: none;
            background-color: transparent;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            color: #800000;
            border: 1px solid transparent;
        }
        .tool-button:hover {
            background-color: rgba(128, 0, 0, 0.1);
            border-color: rgba(128, 0, 0, 0.3);
        }
        .tool-button.active {
            background-color: #800000;
            color: #f0e0d6;
            border-color: #600000;
        }
        .pen-size-popup {
            position: absolute;
            left: 56px;
            top: 60px;
            background: #f0e0d6;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 4px 12px rgba(128, 0, 0, 0.2);
            border: 1px solid rgba(128, 0, 0, 0.3);
            display: none;
            min-width: 120px;
            z-index: 1000;
        }
        .pen-size-popup.show {
            display: block;
        }
        .size-label {
            font-size: 11px;
            color: #800000;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .size-slider {
            width: 100%;
            margin-bottom: 8px;
            accent-color: #800000;
        }
        .size-value {
            font-size: 12px;
            text-align: center;
            background: rgba(128, 0, 0, 0.1);
            color: #800000;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(128, 0, 0, 0.2);
        }
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffee;
            overflow: hidden;
            padding: 20px;
        }
        #drawing-canvas {
            cursor: crosshair;
            touch-action: none;
            display: block;
            border: 2px solid #800000;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.15);
            max-width: 100%;
            max-height: 100%;
            background-color: #f0e0d6;
        }
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background-color: rgba(240, 224, 214, 0.95);
            border-top: 1px solid rgba(128, 0, 0, 0.3);
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 11px;
            color: #800000;
            gap: 16px;
            backdrop-filter: blur(8px);
        }
        .pressure-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pressure-bar {
            width: 50px;
            height: 4px;
            background-color: rgba(128, 0, 0, 0.2);
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid rgba(128, 0, 0, 0.3);
        }
        .pressure-fill {
            height: 100%;
            background: linear-gradient(90deg, #800000, #a00000);
            transition: width 0.05s ease-out;
            width: 0%;
            border-radius: 1px;
        }
        .color-preview {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #800000;
            border: 2px solid rgba(128, 0, 0, 0.3);
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="tool-panel">
        <button id="pen-tool" class="tool-button active" title="ペン">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 256 256"><path d="m227.31,73.37L182.63,28.68a16,16,0,0,0-22.63,0L36.69,152A15.86,15.86,0,0,0,32,163.31V208a16,16,0,0,0,16,16H92.69A15.86,15.86,0,0,0,104,219.31L227.31,96a16,16,0,0,0,0-22.63ZM92.69,208H48V163.31l88-88L180.69,120ZM192,108.68,147.31,64l24-24L216,84.68Z"></path></svg>
        </button>
        <div id="pen-size-popup" class="pen-size-popup">
            <div class="size-label">ペンサイズ</div>
            <input type="range" id="size-slider" class="size-slider" min="1" max="50" value="5"/>
            <div id="size-value" class="size-value">5px</div>
        </div>
        <div class="color-preview"></div>
    </div>
    <div class="canvas-container">
        <canvas id="drawing-canvas"></canvas>
    </div>
    <div class="status-bar">
        <span id="pen-status">ペン: 5px</span>
        <div class="pressure-indicator">
            <span>筆圧:</span>
            <div class="pressure-bar"><div class="pressure-fill"></div></div>
        </div>
        <span id="canvas-info">512×512</span>
        <span id="render-tech">WebGL + Perfect Freehand</span>
        <span id="fps-counter">60fps</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/twgl.js/5.5.4/twgl-full.min.js"></script>
    <script type="module">
        // Perfect Freehandをインポート
        const { getStroke } = await import('https://esm.sh/perfect-freehand@1.2.2');

        // WebGLシェーダー定義
        const vertexShaderSource = `
            attribute vec2 a_position;
            attribute vec4 a_color;
            
            uniform vec2 u_resolution;
            
            varying vec4 v_color;
            
            void main() {
                vec2 zeroToOne = a_position / u_resolution;
                vec2 zeroToTwo = zeroToOne * 2.0;
                vec2 clipSpace = zeroToTwo - 1.0;
                gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
                v_color = a_color;
            }
        `;

        const fragmentShaderSource = `
            precision mediump float;
            varying vec4 v_color;
            
            void main() {
                gl_FragColor = v_color;
            }
        `;

        // 状態管理
        class DrawingState {
            constructor() {
                this.penSize = 5;
                this.penColor = [0.502, 0, 0, 1.0];
                this.strokes = [];
                this.currentStroke = null;
                this.isDrawing = false;
                this.currentPressure = 0;
            }
        }

        // WebGL描画エンジン
        class WebGLRenderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.gl = twgl.getContext(canvas);
                if (!this.gl) throw new Error('WebGLはサポートされていません');
                
                this.programInfo = twgl.createProgramInfo(this.gl, [vertexShaderSource, fragmentShaderSource]);
                this.init();
            }

            init() {
                const { gl, canvas } = this;
                canvas.width = 512;
                canvas.height = 512;
                canvas.style.width = '512px';
                canvas.style.height = '512px';
                
                gl.viewport(0, 0, 512, 512);
                gl.clearColor(0.941, 0.878, 0.839, 1.0); // #f0e0d6
                gl.enable(gl.BLEND);
                gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
                this.clear();
            }

            clear() {
                this.gl.clear(this.gl.COLOR_BUFFER_BIT);
            }

            strokeToWebGLArrays(points, size, color) {
                if (points.length < 2) return null;

                try {
                    const strokePoints = getStroke(points, {
                        size: size,
                        thinning: 0.6,
                        smoothing: 0.4,
                        streamline: 0.1,
                        easing: (t) => Math.sin((t * Math.PI) / 2),
                        start: { taper: 20, cap: true },
                        end: { taper: 80, cap: true },
                    });

                    if (strokePoints.length < 3) return null;

                    const positions = [];
                    const colors = [];
                    
                    // 三角形を生成
                    for (let i = 1; i < strokePoints.length - 1; i++) {
                        positions.push(
                            strokePoints[0][0], strokePoints[0][1],
                            strokePoints[i][0], strokePoints[i][1],
                            strokePoints[i + 1][0], strokePoints[i + 1][1]
                        );
                        for (let j = 0; j < 3; j++) {
                            colors.push(...color);
                        }
                    }

                    return {
                        a_position: { numComponents: 2, data: new Float32Array(positions) },
                        a_color: { numComponents: 4, data: new Float32Array(colors) },
                    };
                } catch (error) {
                    console.warn('Perfect Freehand処理エラー:', error);
                    return null;
                }
            }

            renderStroke(points, size, color) {
                const { gl, programInfo } = this;
                const arrays = this.strokeToWebGLArrays(points, size, color);
                
                if (arrays) {
                    const bufferInfo = twgl.createBufferInfoFromArrays(gl, arrays);
                    gl.useProgram(programInfo.program);
                    twgl.setBuffersAndAttributes(gl, programInfo, bufferInfo);
                    twgl.setUniforms(programInfo, { u_resolution: [512, 512] });
                    twgl.drawBufferInfo(gl, bufferInfo);
                }
            }

            redraw(state) {
                this.clear();
                
                // 完成済みストローク
                state.strokes.forEach(stroke => {
                    this.renderStroke(stroke.points, stroke.size, stroke.color);
                });
                
                // 現在描画中のストローク
                if (state.currentStroke && state.currentStroke.points.length > 1) {
                    this.renderStroke(
                        state.currentStroke.points,
                        state.currentStroke.size,
                        state.currentStroke.color
                    );
                }
            }
        }

        // UI制御
        class DrawingUI {
            constructor() {
                this.state = new DrawingState();
                this.canvas = document.getElementById('drawing-canvas');
                this.renderer = new WebGLRenderer(this.canvas);
                this.isPointerDown = false;
                this.animationId = null;
                this.fpsCounter = 0;
                this.lastFpsTime = 0;
                
                this.setupEventListeners();
                this.updateUI();
            }

            setupEventListeners() {
                // キャンバスイベント
                this.canvas.addEventListener('pointerdown', e => this.handlePointerDown(e));
                this.canvas.addEventListener('pointermove', e => this.handlePointerMove(e));
                this.canvas.addEventListener('pointerup', e => this.handlePointerUp(e));
                this.canvas.addEventListener('pointerleave', e => this.handlePointerUp(e));
                
                // UI イベント
                document.getElementById('pen-tool').addEventListener('click', () => this.toggleSizePopup());
                document.getElementById('size-slider').addEventListener('input', e => {
                    this.state.penSize = parseInt(e.target.value, 10);
                    this.updateUI();
                });
                
                // 外部クリックでポップアップを閉じる
                document.addEventListener('click', e => {
                    if (!e.target.closest('.tool-panel')) {
                        this.hideSizePopup();
                    }
                });
                
                // キーボードショートカット
                document.addEventListener('keydown', e => {
                    if (e.key === '[') {
                        e.preventDefault();
                        this.state.penSize = Math.max(1, this.state.penSize - 1);
                        this.updateUI();
                    } else if (e.key === ']') {
                        e.preventDefault();
                        this.state.penSize = Math.min(50, this.state.penSize + 1);
                        this.updateUI();
                    }
                });
            }

            getPoint(e) {
                const rect = this.canvas.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top,
                    pressure: e.pointerType === 'pen' ? e.pressure : 0.5,
                };
            }

            handlePointerDown(e) {
                e.preventDefault();
                this.isPointerDown = true;
                this.canvas.setPointerCapture(e.pointerId);
                
                const { x, y, pressure } = this.getPoint(e);
                this.state.currentStroke = {
                    points: [[x, y, pressure]],
                    size: this.state.penSize,
                    color: this.state.penColor
                };
                this.state.isDrawing = true;
                this.state.currentPressure = pressure;
                this.requestRedraw();
                this.updatePressureDisplay();
            }

            handlePointerMove(e) {
                if (!this.isPointerDown) return;
                e.preventDefault();
                
                const { x, y, pressure } = this.getPoint(e);
                this.state.currentStroke.points.push([x, y, pressure]);
                this.state.currentPressure = pressure;
                this.requestRedraw();
                this.updatePressureDisplay();
            }

            handlePointerUp(e) {
                if (!this.isPointerDown) return;
                e.preventDefault();
                
                this.isPointerDown = false;
                this.canvas.releasePointerCapture(e.pointerId);
                
                if (this.state.currentStroke && this.state.currentStroke.points.length > 1) {
                    this.state.strokes.push(this.state.currentStroke);
                }
                
                this.state.currentStroke = null;
                this.state.isDrawing = false;
                this.state.currentPressure = 0;
                this.updatePressureDisplay();
            }

            requestRedraw() {
                if (this.animationId) return;
                this.animationId = requestAnimationFrame(() => {
                    this.renderer.redraw(this.state);
                    this.updateFPS();
                    this.animationId = null;
                });
            }

            updateFPS() {
                const now = performance.now();
                this.fpsCounter++;
                if (now - this.lastFpsTime >= 1000) {
                    document.getElementById('fps-counter').textContent = `${this.fpsCounter}fps`;
                    this.fpsCounter = 0;
                    this.lastFpsTime = now;
                }
            }

            updateUI() {
                document.getElementById('pen-status').textContent = `ペン: ${this.state.penSize}px`;
                document.getElementById('size-slider').value = this.state.penSize;
                document.getElementById('size-value').textContent = `${this.state.penSize}px`;
                
                const colorStr = `rgb(${this.state.penColor.slice(0, 3).map(c => Math.round(c * 255)).join(',')})`;
                document.querySelector('.color-preview').style.backgroundColor = colorStr;
            }
            
            updatePressureDisplay() {
                document.querySelector('.pressure-fill').style.width = `${this.state.currentPressure * 100}%`;
            }

            toggleSizePopup() {
                document.getElementById('pen-size-popup').classList.toggle('show');
            }

            hideSizePopup() {
                document.getElementById('pen-size-popup').classList.remove('show');
            }
        }

        // アプリケーション起動
        const app = new DrawingUI();
        console.log('✅ WebGL描画エンジン初期化完了 (twgl.js + Perfect Freehand)');
    </script>
</body>
</html>
