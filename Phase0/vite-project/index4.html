<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モダンブラウザお絵かきツール v7.1 - 修正版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bezier-js/6.1.4/bezier.min.js"></script>
    <script src="https://unpkg.com/phosphor-icons@1.4.2/src/index.js"></script>
    <style>
        :root {
            --main-color: #800000;
            --sub-color: #aa5a56;
            --light-bg: #e9c2ba;
            --canvas-bg: #f0e0d6;
            --app-bg: #ffffee;
            --text-color: #800000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--app-bg);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        .app-container {
            display: flex;
            height: 100vh;
            background: var(--app-bg);
        }

        .toolbar {
            width: 60px;
            background: rgba(128, 0, 0, 0.05);
            border-right: 1px solid rgba(128, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        .tool-button {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--main-color);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--main-color);
            font-size: 16px;
        }

        .tool-button:hover {
            background: rgba(128, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        .tool-button.active {
            background: var(--main-color);
            color: white;
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.3);
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .canvas-wrapper {
            position: relative;
            background: var(--canvas-bg);
            border: 1px solid var(--main-color);
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.15);
            cursor: crosshair;
            touch-action: none;
        }

        #drawingCanvas {
            display: block;
            image-rendering: pixelated;
        }

        .control-panel {
            position: absolute;
            top: 15px;
            left: 75px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(128, 0, 0, 0.2);
            border-radius: 8px;
            padding: 16px;
            width: 280px;
            box-shadow: 0 8px 24px rgba(128, 0, 0, 0.15);
            display: none;
        }

        .control-panel.visible { 
            display: block; 
        }

        .control-group { 
            margin-bottom: 12px; 
        }
        .control-group:last-child { 
            margin-bottom: 0; 
        }
        
        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .control-input {
            width: 60px;
            padding: 3px 6px;
            border: 1px solid var(--sub-color);
            border-radius: 3px;
            font-size: 11px;
            text-align: center;
            background: white;
        }
        
        .control-slider {
            width: 100%;
            margin: 4px 0;
            -webkit-appearance: none;
            background: transparent;
        }
        
        .control-slider::-webkit-slider-runnable-track {
            height: 4px;
            background: var(--light-bg);
            border-radius: 2px;
        }
        
        .control-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--main-color);
            border-radius: 50%;
            cursor: pointer;
            margin-top: -5px;
        }

        .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: rgba(128, 0, 0, 0.05);
            border-top: 1px solid rgba(128, 0, 0, 0.1);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
            font-size: 10px;
            color: var(--text-color);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .status-value {
            font-weight: 600;
            color: var(--sub-color);
            min-width: 20px;
            font-size: 10px;
        }

        .action-buttons {
            position: absolute;
            top: 10px;
            right: 15px;
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--main-color);
            border-radius: 4px;
            color: var(--main-color);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover {
            background: var(--main-color);
            color: white;
        }

        .debug-info {
            position: absolute;
            top: 50px;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--main-color);
            border-radius: 4px;
            padding: 8px;
            font-size: 10px;
            font-family: monospace;
            color: var(--text-color);
            max-width: 200px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="toolbar">
            <div class="tool-button active" data-tool="pen" title="ペンツール">
                <i class="ph-pen"></i>
            </div>
            <div class="tool-button" data-tool="resize" title="リサイズツール">
                <i class="ph-resize"></i>
            </div>
        </div>

        <div class="canvas-area">
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="drawingCanvas" width="500" height="300"></canvas>
            </div>
            
            <div class="action-buttons">
                <div class="action-btn" id="clearBtn">
                    <i class="ph-trash"></i>
                    クリア
                </div>
                <div class="action-btn" id="undoBtn">
                    <i class="ph-arrow-counter-clockwise"></i>
                    取り消し
                </div>
            </div>

            <div class="debug-info" id="debugInfo">
                <div>入力方式: <span id="inputType">-</span></div>
                <div>描画中: <span id="drawingStatus">No</span></div>
                <div>ポインタID: <span id="pointerId">-</span></div>
                <div>イベント: <span id="lastEvent">-</span></div>
                <div>座標: <span id="coordinates">-</span></div>
            </div>
        </div>

        <div class="control-panel" id="penControls">
            <div class="control-group">
                <div class="control-label">
                    <span>ペンサイズ</span>
                    <input type="number" class="control-input" id="penSizeValue" value="3" min="1" max="50">
                </div>
                <input type="range" class="control-slider" id="penSizeSlider" min="1" max="50" value="3">
            </div>
            <div class="control-group">
                <div class="control-label">
                    <span>不透明度</span>
                    <input type="number" class="control-input" id="opacityValue" value="100" min="1" max="100">
                </div>
                <input type="range" class="control-slider" id="opacitySlider" min="1" max="100" value="100">
            </div>
        </div>

        <div class="control-panel" id="resizeControls">
            <div class="control-group">
                <div class="control-label">
                    <span>幅</span>
                    <input type="number" class="control-input" id="canvasWidthValue" value="500" min="50" max="2000">
                </div>
                <input type="range" class="control-slider" id="canvasWidthSlider" min="50" max="2000" value="500">
            </div>
            <div class="control-group">
                <div class="control-label">
                    <span>高さ</span>
                    <input type="number" class="control-input" id="canvasHeightValue" value="300" min="50" max="2000">
                </div>
                <input type="range" class="control-slider" id="canvasHeightSlider" min="50" max="2000" value="300">
            </div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <span>描画エンジン:</span>
                <span class="status-value">Bezier.js</span>
            </div>
            <div class="status-item">
                <span>筆圧:</span>
                <span class="status-value" id="pressureDisplay">0.5</span>
            </div>
            <div class="status-item">
                <span>傾きX:</span>
                <span class="status-value" id="tiltXDisplay">0°</span>
            </div>
            <div class="status-item">
                <span>傾きY:</span>
                <span class="status-value" id="tiltYDisplay">0°</span>
            </div>
            <div class="status-item">
                <span>FPS:</span>
                <span class="status-value" id="fpsDisplay">0</span>
            </div>
            <div class="status-item">
                <span>解像度:</span>
                <span class="status-value" id="resolutionDisplay">500×300</span>
            </div>
            <div class="status-item">
                <span>ストローク数:</span>
                <span class="status-value" id="strokeCountDisplay">0</span>
            </div>
        </div>
    </div>

    <script>
        // --- SERVICE CONTAINER ---
        class ServiceContainer {
            constructor() {
                this.services = new Map();
            }
            
            register(name, instance) {
                this.services.set(name, instance);
                return this;
            }
            
            get(name) {
                return this.services.get(name) || null;
            }
        }

        // --- STORES ---
        class CanvasStore {
            constructor() {
                this.state = { width: 500, height: 300 };
                this.listeners = [];
            }
            
            getState() { 
                return this.state; 
            }
            
            setState(newState) {
                this.state = { ...this.state, ...newState };
                this.notify();
            }
            
            subscribe(listener) {
                this.listeners.push(listener);
            }
            
            notify() {
                this.listeners.forEach(l => l(this.state));
            }
        }

        class ToolStore {
            constructor() {
                this.state = { currentTool: 'pen', penSize: 3, opacity: 100 };
                this.listeners = [];
            }
            
            getState() { 
                return this.state; 
            }
            
            setState(newState) {
                this.state = { ...this.state, ...newState };
                this.notify();
            }
            
            subscribe(listener) {
                this.listeners.push(listener);
            }
            
            notify() {
                this.listeners.forEach(l => l(this.state));
            }
        }

        class StrokeStore {
            constructor() {
                this.strokes = [];
                this.currentStroke = null;
                this.listeners = [];
            }
            
            addStroke(stroke) {
                this.strokes.push([...stroke]);
                this.currentStroke = null;
                this.notify();
            }
            
            setCurrentStroke(stroke) {
                this.currentStroke = stroke ? [...stroke] : null;
                this.notify();
            }
            
            clear() {
                this.strokes = [];
                this.currentStroke = null;
                this.notify();
            }
            
            undo() {
                if (this.strokes.length > 0) {
                    this.strokes.pop();
                    this.notify();
                }
            }
            
            getAllStrokes() {
                return this.strokes;
            }
            
            getCurrentStroke() {
                return this.currentStroke;
            }
            
            getStrokeCount() {
                return this.strokes.length;
            }
            
            subscribe(listener) {
                this.listeners.push(listener);
            }
            
            notify() {
                this.listeners.forEach(l => l());
            }
        }

        // --- ACTIONS ---
        class CanvasActions {
            constructor(canvasStore) {
                this.canvasStore = canvasStore;
            }
            
            updateSize(width, height) {
                this.canvasStore.setState({ width, height });
            }
        }

        class ToolActions {
            constructor(toolStore) {
                this.toolStore = toolStore;
            }
            
            setCurrentTool(tool) {
                this.toolStore.setState({ currentTool: tool });
            }
            
            setPenSize(size) {
                this.toolStore.setState({ penSize: Math.max(1, Math.min(50, size)) });
            }
            
            setOpacity(opacity) {
                this.toolStore.setState({ opacity: Math.max(1, Math.min(100, opacity)) });
            }
        }

        class StrokeActions {
            constructor(strokeStore) {
                this.strokeStore = strokeStore;
                this.isDrawing = false;
            }
            
            startStroke(point) {
                this.isDrawing = true;
                this.strokeStore.setCurrentStroke([point]);
            }
            
            addPoint(point) {
                if (!this.isDrawing) return;
                const current = this.strokeStore.getCurrentStroke();
                if (current) {
                    current.push(point);
                    this.strokeStore.setCurrentStroke(current);
                }
            }
            
            endStroke() {
                if (!this.isDrawing) return;
                
                const current = this.strokeStore.getCurrentStroke();
                if (current && current.length > 0) {
                    this.strokeStore.addStroke(current);
                }
                this.isDrawing = false;
            }
            
            clear() {
                this.strokeStore.clear();
            }
            
            undo() {
                this.strokeStore.undo();
            }
        }

        // --- BEZIER RENDERER (Bezier.js統合) ---
        class BezierRenderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                this.ctx.imageSmoothingEnabled = false;
            }

            renderAll(strokeStore, toolState) {
                this.clear();
                
                strokeStore.getAllStrokes().forEach(stroke => {
                    if (stroke && stroke.length > 0) {
                        this.renderStroke(stroke, toolState);
                    }
                });
                
                const currentStroke = strokeStore.getCurrentStroke();
                if (currentStroke && currentStroke.length > 0) {
                    this.renderStroke(currentStroke, toolState);
                }
            }

            renderStroke(path, toolState) {
                if (!path || path.length === 0) return;
                
                this.ctx.globalAlpha = toolState.opacity / 100;
                this.ctx.strokeStyle = '#800000';
                
                if (path.length === 1) {
                    this.renderPoint(path[0], toolState);
                } else if (path.length === 2) {
                    this.renderLine(path[0], path[1], toolState);
                } else {
                    this.renderBezierPath(path, toolState);
                }
            }

            renderPoint(point, toolState) {
                const radius = this.calculateWidth(point.pressure, toolState) / 2;
                this.ctx.fillStyle = '#800000';
                this.ctx.beginPath();
                this.ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
                this.ctx.fill();
            }

            renderLine(p1, p2, toolState) {
                this.ctx.lineWidth = this.calculateWidth(p1.pressure, toolState);
                this.ctx.beginPath();
                this.ctx.moveTo(p1.x, p1.y);
                this.ctx.lineTo(p2.x, p2.y);
                this.ctx.stroke();
            }

            renderBezierPath(path, toolState) {
                if (path.length < 3) return;
                
                // Bezier.js の期待通りの正確軌跡描画
                this.ctx.beginPath();
                this.ctx.moveTo(path[0].x, path[0].y);
                
                for (let i = 1; i < path.length - 1; i++) {
                    const p0 = path[i - 1];
                    const p1 = path[i];
                    const p2 = path[i + 1];
                    
                    const cp1x = p0.x + (p1.x - p0.x) * 0.3;
                    const cp1y = p0.y + (p1.y - p0.y) * 0.3;
                    const cp2x = p1.x - (p2.x - p1.x) * 0.3;
                    const cp2y = p1.y - (p2.y - p1.y) * 0.3;
                    
                    this.ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p1.x, p1.y);
                    this.ctx.lineWidth = this.calculateWidth(p1.pressure, toolState);
                }
                
                if (path.length > 2) {
                    this.ctx.lineTo(path[path.length - 1].x, path[path.length - 1].y);
                }
                
                this.ctx.stroke();
            }

            calculateWidth(pressure, toolState) {
                return Math.max(1, toolState.penSize * pressure);
            }

            clear() {
                this.ctx.fillStyle = '#f0e0d6';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        // --- IMPROVED INPUT HANDLER ---
        class InputHandler {
            constructor(element, strokeActions) {
                this.element = element;
                this.strokeActions = strokeActions;
                this.isDrawing = false;
                this.activePointerId = null;
                this.capturedPointers = new Set();
                this.setupEvents();
            }

            setupEvents() {
                // ポインターイベントのリスナー設定
                this.element.addEventListener('pointerdown', (e) => this.handlePointerDown(e));
                this.element.addEventListener('pointermove', (e) => this.handlePointerMove(e));
                this.element.addEventListener('pointerup', (e) => this.handlePointerUp(e));
                this.element.addEventListener('pointercancel', (e) => this.handlePointerCancel(e));
                
                // pointerleaveは除外（ペンの浮き上がりで意図しない終了を防ぐ）
                // this.element.addEventListener('pointerleave', (e) => this.handlePointerLeave(e));
                
                // タッチアクション無効化
                this.element.style.touchAction = 'none';
            }

            getCanvasPoint(e) {
                const rect = this.element.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top,
                    pressure: e.pressure || 0.5,
                    tiltX: e.tiltX || 0,
                    tiltY: e.tiltY || 0
                };
            }

            handlePointerDown(e) {
                e.preventDefault();
                
                // デバッグ情報更新
                this.updateDebugInfo('pointerdown', e);
                
                const toolState = serviceContainer.get('toolStore').getState();
                if (toolState.currentTool !== 'pen') return;
                
                // 既に描画中の場合は終了
                if (this.isDrawing && this.activePointerId !== null) {
                    this.endCurrentStroke();
                }
                
                this.isDrawing = true;
                this.activePointerId = e.pointerId;
                
                // ポインターキャプチャ設定
                try {
                    this.element.setPointerCapture(e.pointerId);
                    this.capturedPointers.add(e.pointerId);
                } catch (error) {
                    // キャプチャに失敗しても描画は継続
                }
                
                this.strokeActions.startStroke(this.getCanvasPoint(e));
            }

            handlePointerMove(e) {
                const point = this.getCanvasPoint(e);
                this.updateStatusDisplay(point);
                this.updateDebugInfo('pointermove', e);
                
                // 描画中かつ正しいポインターIDの場合のみ処理
                if (!this.isDrawing || this.activePointerId !== e.pointerId) return;
                
                this.strokeActions.addPoint(point);
            }

            handlePointerUp(e) {
                this.updateDebugInfo('pointerup', e);
                
                // 描画中かつ正しいポインターIDの場合のみ処理
                if (!this.isDrawing || this.activePointerId !== e.pointerId) return;
                
                this.endCurrentStroke();
                this.releasePointerCapture(e.pointerId);
            }

            handlePointerCancel(e) {
                this.updateDebugInfo('pointercancel', e);
                
                // キャンセルされた場合も描画終了
                if (this.isDrawing && this.activePointerId === e.pointerId) {
                    this.endCurrentStroke();
                }
                this.releasePointerCapture(e.pointerId);
            }

            endCurrentStroke() {
                if (this.isDrawing) {
                    this.strokeActions.endStroke();
                    this.isDrawing = false;
                    this.activePointerId = null;
                    
                    // デバッグ情報更新
                    document.getElementById('drawingStatus').textContent = 'No';
                    document.getElementById('pointerId').textContent = '-';
                }
            }

            releasePointerCapture(pointerId) {
                if (this.capturedPointers.has(pointerId)) {
                    try {
                        this.element.releasePointerCapture(pointerId);
                    } catch (error) {
                        // エラーを無視（既に解放済みの場合）
                    }
                    this.capturedPointers.delete(pointerId);
                }
            }

            updateStatusDisplay(point) {
                document.getElementById('pressureDisplay').textContent = point.pressure.toFixed(2);
                document.getElementById('tiltXDisplay').textContent = point.tiltX + '°';
                document.getElementById('tiltYDisplay').textContent = point.tiltY + '°';
            }

            updateDebugInfo(eventType, e) {
                document.getElementById('inputType').textContent = e.pointerType || 'unknown';
                document.getElementById('drawingStatus').textContent = this.isDrawing ? 'Yes' : 'No';
                document.getElementById('pointerId').textContent = e.pointerId || '-';
                document.getElementById('lastEvent').textContent = eventType;
                document.getElementById('coordinates').textContent = `${Math.round(e.clientX)},${Math.round(e.clientY)}`;
            }
        }

        // --- FPS MONITOR ---
        class FPSCounter {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.fps = 0;
                this.display = document.getElementById('fpsDisplay');
            }
            
            update() {
                this.frameCount++;
                const currentTime = performance.now();
                
                if (currentTime - this.lastTime >= 1000) {
                    this.fps = this.frameCount;
                    this.frameCount = 0;
                    this.lastTime = currentTime;
                    this.display.textContent = this.fps;
                }
                
                requestAnimationFrame(() => this.update());
            }
            
            start() {
                this.update();
            }
        }

        // --- UI CONTROLLER ---
        class UIController {
            constructor(toolActions, canvasActions, strokeActions) {
                this.toolActions = toolActions;
                this.canvasActions = canvasActions;
                this.strokeActions = strokeActions;
                this.setupToolbar();
                this.setupControls();
                this.setupActions();
            }

            setupToolbar() {
                document.querySelectorAll('.tool-button').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const tool = e.currentTarget.dataset.tool;
                        this.setActiveTool(tool);
                    });
                });
            }

            setActiveTool(tool) {
                document.querySelectorAll('.tool-button').forEach(btn => btn.classList.remove('active'));
                document.querySelector(`[data-tool="${tool}"]`).classList.add('active');
                
                document.querySelectorAll('.control-panel').forEach(panel => panel.classList.remove('visible'));
                const panel = document.getElementById(tool + 'Controls');
                if (panel) panel.classList.add('visible');
                
                this.toolActions.setCurrentTool(tool);
            }

            setupControls() {
                this.setupSliderControl('penSize', (v) => this.toolActions.setPenSize(v));
                this.setupSliderControl('opacity', (v) => this.toolActions.setOpacity(v));
                this.setupSliderControl('canvasWidth', (v) => this.updateCanvasWidth(v));
                this.setupSliderControl('canvasHeight', (v) => this.updateCanvasHeight(v));
            }
            
            setupSliderControl(id, action) {
                const valueInput = document.getElementById(id + 'Value');
                const slider = document.getElementById(id + 'Slider');

                const syncValues = (value) => {
                    valueInput.value = value;
                    slider.value = value;
                    action(parseInt(value));
                };

                valueInput.addEventListener('change', (e) => syncValues(e.target.value));
                slider.addEventListener('input', (e) => syncValues(e.target.value));
            }
            
            setupActions() {
                document.getElementById('clearBtn').addEventListener('click', () => {
                    this.strokeActions.clear();
                });
                
                document.getElementById('undoBtn').addEventListener('click', () => {
                    this.strokeActions.undo();
                });
            }

            updateCanvasWidth(width) {
                const canvasStore = serviceContainer.get('canvasStore');
                const currentHeight = canvasStore.getState().height;
                this.canvasActions.updateSize(parseInt(width), currentHeight);
            }
