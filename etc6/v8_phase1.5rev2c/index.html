<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 ふたば☆ちゃんねる風ベクターお絵描きツール - PixiJS v8.12.0</title>
    <!-- 🚀 v8.12.0移行方針: 
         - WebGPU対応・リアルタイム描画実現
         - Container階層によるレイヤー管理
         - 初回クリック問題解決・遅延なし描画
         - フォールバック削除・v8機能フル活用
         - node_modules読み込み・ローカル運用対応
         - 🎨 クリスタ風フレームレスキャンバス実装 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --futaba-maroon: #800000;
            --futaba-light-maroon: #aa5a56;
            --futaba-medium: #cf9c97;
            --futaba-light-medium: #e9c2ba;      
            --futaba-cream: #f0e0d6;
            --futaba-background: #ffffee;
            
            --text-primary: #2c1810;
            --text-secondary: #5d4037;
            --text-inverse: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: var(--futaba-background);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 50px 1fr;
            height: 100vh;
            width: 100vw;
            gap: 0;
        }
        
        .sidebar {
            background: var(--futaba-cream);
            border-right: 2px solid var(--futaba-light-medium);
            display: flex;
            flex-direction: column;
            padding: 12px 6px;
            gap: 4px;
            overflow-y: auto;
            position: relative;
            z-index: 100;
        }
        
        .tool-button {
            width: 36px;
            height: 36px;
            border: 2px solid var(--futaba-light-medium);
            background: var(--futaba-background);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--futaba-maroon);
            position: relative;
            user-select: none;
        }
        
        .tool-button svg {
            width: 20px;
            height: 20px;
        }
        
        /* ふたば風統一アイコンスタイル */
        .futaba-icon {
            width: 20px;
            height: 20px;
            stroke: var(--futaba-maroon);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        
        .tool-button:hover {
            background: var(--futaba-medium);
            border-color: var(--futaba-light-maroon);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(128, 0, 0, 0.2);
        }
        
        .tool-button.active {
            background: var(--futaba-maroon);
            color: var(--text-inverse);
            border-color: var(--futaba-maroon);
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.3);
        }
        
        /* アクティブ状態のアイコンスタイル */
        .tool-button.active .futaba-icon {
            stroke: var(--text-inverse);
        }
        
        .tool-button.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        /* 無効状態のアイコンスタイル */
        .tool-button.disabled .futaba-icon {
            opacity: 0.4;
        }
        
        .tool-button.disabled:hover {
            transform: none;
            box-shadow: none;
        }
        
        .tool-separator {
            height: 1px;
            background: var(--futaba-light-medium);
            margin: 4px 2px;
        }
        
        .canvas-area {
            background: var(--futaba-background);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* 🎨 クリスタ風フレームレス・キャンバスコンテナ */
        .canvas-container {
            background: transparent;
            /* 🚫 枠線完全除去 - クリスタ風シンプル表示 */
            border: none;
            outline: none;
            box-shadow: none;
            border-radius: 0;
            overflow: visible;
            position: relative;
            /* キャンバス背景：ふたばクリーム（デフォルトレイヤー0）*/
            background-color: var(--futaba-cream);
        }
        
        #canvas-container {
            display: block;
            /* 🚫 枠線・アウトライン完全除去 */
            border: none;
            outline: none;
            box-shadow: none;
            /* 透明背景 - Canvas要素の背景色を活かす */
            background: transparent;
        }
        
        /* 🎨 Canvas要素自体も完全フレームレス */
        #canvas-container canvas {
            display: block;
            cursor: crosshair;
            /* 🚫 Canvas要素の枠線・アウトライン完全除去 */
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            /* Canvas背景は app-core.js で設定（ふたばクリーム） */
        }
        
        .status-panel {
            position: fixed;
            bottom: 20px;
            left: 70px;
            right: 20px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-medium);
            border-radius: 12px;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.1);
            z-index: 50;
        }
        
        .status-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* ショートカットヒント表示 */
        .shortcut-hints {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-medium);
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 10px;
            color: var(--text-secondary);
            z-index: 60;
            max-width: 200px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        
        .shortcut-hints:hover {
            opacity: 1;
        }
        
        .shortcut-hint {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }
        
        .shortcut-hint:last-child {
            margin-bottom: 0;
        }
        
        .shortcut-key {
            font-weight: bold;
            color: var(--futaba-maroon);
        }
        
        /* v8専用デバッグ情報表示 */
        .v8-status {
            position: fixed;
            top: 20px;
            left: 70px;
            background: var(--futaba-medium);
            border: 2px solid var(--futaba-maroon);
            border-radius: 8px;
            padding: 8px 12px;
            font-family: monospace;
            font-size: 10px;
            color: var(--text-primary);
            z-index: 70;
            opacity: 0.9;
        }
        
        .v8-status .v8-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .v8-status .v8-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
        }
        
        .v8-status .v8-dot.webgpu {
            background: #2196F3;
        }
        
        .v8-status .v8-dot.error {
            background: #F44336;
        }
        
        /* ローディング表示 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--futaba-background);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: monospace;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--futaba-light-medium);
            border-top: 4px solid var(--futaba-maroon);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: var(--futaba-maroon);
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .loading-version {
            color: var(--text-secondary);
            font-size: 12px;
        }
        
        /* 🎨 Phase2準備：透明度チェッカーパターン（レイヤー0削除時に表示）*/
        .transparency-checker {
            background-image: 
                linear-gradient(45deg, #ffffff 25%, transparent 25%),
                linear-gradient(-45deg, #ffffff 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ffffff 75%),
                linear-gradient(-45deg, transparent 75%, #ffffff 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            background-color: #e0e0e0;
            /* Phase2実装時まで非表示 */
            display: none;
        }
    </style>
</head>
<body>
    <!-- ローディング画面 -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">🚀 PixiJS v8.12.0 Loading...</div>
        <div class="loading-version">WebGPU・Container階層・リアルタイム描画準備中</div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <!-- アイコンはJavaScriptで動的に生成・配置 -->
            <div class="tool-button disabled" id="download-tool" title="ダウンロード"></div>
            <div class="tool-button disabled" id="resize-tool" title="リサイズ"></div>
            
            <div class="tool-separator"></div>
                   
            <div class="tool-button disabled" id="palette-tool" title="カラーパレット"></div>
            <div class="tool-button active" id="pen-tool" title="v8ベクターペン (P)"></div>
            <div class="tool-button" id="eraser-tool" title="v8消しゴム (E)"></div>
            
            <div class="tool-separator"></div>
            
            <div class="tool-button disabled" id="fill-tool" title="塗りつぶし"></div>
            <div class="tool-button disabled" id="select-tool" title="範囲選択"></div>
            
            <div class="tool-separator"></div>
            
            <div class="tool-button" id="layers-tool" title="v8レイヤー"></div>
            <div class="tool-button disabled" id="settings-tool" title="v8設定"></div>
        </div>
        
        <div class="canvas-area">
            <div class="canvas-container">
                <!-- 🎨 フレームレス・キャンバスコンテナ（クリスタ風） -->
                <div id="canvas-container"></div>
            </div>
        </div>
    </div>
    
    <!-- v8専用ステータス表示 -->
    <div class="v8-status" id="v8-status">
        <div class="v8-indicator">
            <span class="v8-dot" id="v8-dot"></span>
            <span id="v8-renderer-type">v8 Loading...</span>
        </div>
    </div>
    
    <!-- ショートカットヒント表示 -->
    <div class="shortcut-hints">
        <div class="shortcut-hint">
            <span>v8ペン:</span>
            <span class="shortcut-key">P</span>
        </div>
        <div class="shortcut-hint">
            <span>v8消しゴム:</span>
            <span class="shortcut-key">E</span>
        </div>
        <div class="shortcut-hint">
            <span>パン:</span>
            <span class="shortcut-key">Space</span>
        </div>
        <div class="shortcut-hint">
            <span>リセット:</span>
            <span class="shortcut-key">Ctrl+0</span>
        </div>
        <div class="shortcut-hint">
            <span>取消:</span>
            <span class="shortcut-key">Ctrl+Z</span>
        </div>
        <div class="shortcut-hint">
            <span>やり直し:</span>
            <span class="shortcut-key">Ctrl+Y</span>
        </div>
    </div>
    
    <div class="status-panel">
        <div class="status-group">
            <div class="status-item">Canvas: <span id="canvas-info">400×400px</span></div>
            <div class="status-item">Tool: <span id="current-tool">v8ベクターペン</span></div>
            <div class="status-item">Color: <span id="current-color">#800000</span></div>
            <div class="status-item">座標: <span id="coordinates">x: 0, y: 0</span></div>
        </div>
        
        <div class="status-group">
            <div class="status-item">Phase: <span id="phase-info">v8.12.0</span></div>
            <div class="status-item">Renderer: <span id="renderer-info">WebGPU/WebGL</span></div>
            <div class="status-item">Layers: <span id="layer-count">Container</span></div>
            <div class="status-item">Mode: <span id="realtime-mode">Realtime</span></div>
        </div>
    </div>

    <!-- 🚀 node_modules統合・ローカル読み込み - CORS制限回避 -->

    <!-- PixiJS v8.12.0 本体 - node_modules読み込み -->
    <script src="./node_modules/pixi.js/dist/pixi.min.js"></script>

    <!-- @pixi/ui: UIコンポーネント -->
    <script src="./node_modules/@pixi/ui/dist/ui.min.js"></script>

    <!-- GSAP: アニメーション（継続使用） -->
    <script src="./node_modules/gsap/dist/gsap.min.js"></script>

    <!-- CDNフォールバック（node_modules読み込み失敗時） -->
    <script>
        // PixiJS v8.12.0 読み込み確認・CDNフォールバック
        if (typeof PIXI === 'undefined') {
            console.warn('⚠️ node_modules/pixi.js 読み込み失敗 - CDNフォールバック実行');
            document.write('<script src="https://unpkg.com/pixi.js@8.12.0/dist/pixi.min.js"><\/script>');
        }
        
        // GSAP 読み込み確認・CDNフォールバック
        if (typeof gsap === 'undefined') {
            console.warn('⚠️ node_modules/gsap 読み込み失敗 - CDNフォールバック実行');
            document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"><\/script>');
        }
    </script>

    <!-- 🚀 v8対応読み込み順序 -->
 
    <!-- Base Utilities (v8対応) -->
    <script src="./js/utils/error-manager.js"></script>
    <script src="./js/utils/config-manager.js"></script>
    <script src="./js/utils/event-bus.js"></script>
    <script src="./js/utils/coordinate-manager.js"></script>
    <script src="./js/utils/navigation-manager.js"></script>
    <script src="./js/utils/record-manager.js"></script>
    <script src="./js/utils/shortcut-manager.js"></script>
    <script src="./js/utils/minimal-deps.js"></script>
    
    <!-- Managers (v8対応) -->
    <script src="./managers/canvas-manager.js"></script>
    
    <!-- Tools (v8対応) -->
    <script src="./tools/abstract-tool.js"></script>
    <script src="./tools/pen-tool.js"></script>
    <script src="./tools/eraser-tool.js"></script>
    
    <!-- Tool Manager (v8対応) -->
    <script src="./managers/tool-manager.js"></script>
    
    <!-- Application Core (v8対応) -->
    <script src="./js/app-core.js"></script>
    <script src="./js/tegaki-application.js"></script>
    <script src="./js/main.js"></script>
    
    <!-- Assets (継続使用) -->
    <script src="./assets/icons.js"></script>
    
    <!-- Debug (v8対応) -->
    <script src="./debug/phase15-integration-test.js"></script>
    
    <!-- Bootstrap (v8対応・最後) -->
    <script src="./js/bootstrap.js"></script>

    <!-- v8デバッグ用（開発時のみ・修正版） -->
    <script>
        // ローディング画面制御
        window.hideLoadingScreen = function() {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 500);
            }
        };
        
        // v8対応デバッグ関数（修正版・getV8FeatureStatusエラー修正）
        window.debugTegakiV8 = function() {
            if (window.Tegaki?.TegakiApplicationInstance) {
                const app = window.Tegaki.TegakiApplicationInstance;
                
                // 🚨修正：安全なメソッド呼び出し
                const debugInfo = app.getDebugInfo?.() || {};
                const v8FeatureStatus = app.getV8FeatureStatus?.() || {};
                
                console.log('🚀 v8デバッグ情報:', debugInfo);
                console.log('🎯 v8機能状況:', v8FeatureStatus);
                
                // v8レンダラー情報
                const rendererInfo = {
                    type: app.pixiApp?.renderer?.type || 'unknown',
                    webgpu: app.pixiApp?.renderer?.type === 'webgpu',
                    version: window.PIXI ? PIXI.VERSION : 'not loaded',
                    canvas: app.pixiApp?.canvas || null
                };
                console.log('🖥️ レンダラー:', rendererInfo);
                
                // v8Manager状況
                const managers = ['NavigationManager', 'RecordManager', 'CoordinateManager'];
                managers.forEach(name => {
                    const instance = window.Tegaki[`${name}Instance`];
                    if (instance?.getDebugInfo) {
                        console.log(`🔧 ${name}:`, instance.getDebugInfo());
                    }
                });
                
                return rendererInfo;
            } else {
                console.warn('⚠️ TegakiApplication未初期化');
                return null;
            }
        };

        // v8統合テスト実行
        window.runV8IntegrationTest = function() {
            console.log('🧪 v8.12.0統合テスト開始');
            
            // v8基盤テスト
            const v8Tests = [
                {
                    name: 'PixiJS v8.12.0 読み込み',
                    test: () => !!window.PIXI && PIXI.VERSION.startsWith('8.')
                },
                {
                    name: 'TegakiApplication初期化',
                    test: () => !!window.Tegaki?.TegakiApplicationInstance?.pixiApp
                },
                {
                    name: 'レンダラー初期化',
                    test: () => !!window.Tegaki?.TegakiApplicationInstance?.pixiApp?.renderer
                },
                {
                    name: 'v8準備完了',
                    test: () => window.Tegaki.TegakiApplicationInstance?.isReady?.() === true
                },
                {
                    name: 'Canvas表示',
                    test: () => !!document.querySelector('#canvas-container canvas')
                }
            ];
            
            let passCount = 0;
            v8Tests.forEach((testCase, i) => {
                const result = testCase.test();
                const status = result ? '✅ PASS' : '❌ FAIL';
                console.log(`Test ${i+1} (${testCase.name}):`, status);
                if (result) passCount++;
            });
            
            console.log(`📊 テスト結果: ${passCount}/${v8Tests.length} PASS`);
            
            // v8描画テスト
            const toolManager = window.Tegaki?.TegakiApplicationInstance?.getToolManager?.();
            if (toolManager?.getCurrentTool?.()) {
                const tool = toolManager.getCurrentTool();
                console.log('🖊️ 現在ツール v8状況:', tool.getDebugInfo?.() || 'デバッグ情報なし');
            }
            
            return { passCount, totalTests: v8Tests.length };
        };
        
        // v8ステータス表示更新
        window.updateV8Status = function(rendererType, isWebGPU) {
            const statusEl = document.getElementById('v8-renderer-type');
            const dotEl = document.getElementById('v8-dot');
            
            if (statusEl && dotEl) {
                statusEl.textContent = `v8.12.0 ${rendererType}`;
                if (isWebGPU) {
                    dotEl.className = 'v8-dot webgpu';
                } else {
                    dotEl.className = 'v8-dot';
                }
            }
        };
        
        // 初期化完了後の自動状況確認（修正版・エラー処理強化）
        document.addEventListener('DOMContentLoaded', function() {
            // PixiJS v8.12.0読み込み確認
            if (window.PIXI) {
                console.log(`🚀 PixiJS v${PIXI.VERSION} loaded from node_modules`);
                if (PIXI.VERSION.startsWith('8.')) {
                    console.log('✅ PixiJS v8.12.0 confirmed');
                } else {
                    console.error('❌ PixiJS v8.12.0 required, got v' + PIXI.VERSION);
                }
            } else {
                console.error('❌ PixiJS not loaded - check node_modules/pixi.js installation');
            }
            
            // 初期化完了後のテスト実行（修正版・エラー処理強化）
            setTimeout(function() {
                if (window.Tegaki?.TegakiApplicationInstance) {
                    console.log('📊 v8.12.0初期化後状況確認');
                    
                    // 🚨修正：安全なデバッグ呼び出し
                    try {
                        const debugResult = window.debugTegakiV8();
                        
                        // ローディング画面を隠す
                        window.hideLoadingScreen();
                        
                        // ステータス表示を更新
                        if (debugResult) {
                            window.updateV8Status(debugResult.type, debugResult.webgpu);
                        }
                    } catch (debugError) {
                        console.error('❌ デバッグ情報取得エラー:', debugError);
                        
                        // エラーでもローディング画面を隠す
                        window.hideLoadingScreen();
                        window.updateV8Status('Error', false);
                        const dotEl = document.getElementById('v8-dot');
                        if (dotEl) dotEl.className = 'v8-dot error';
                    }
                } else {
                    console.warn('⚠️ TegakiApplication v8初期化未完了');
                    
                    // 初期化失敗時もローディング画面を隠す（エラー状態で）
                    setTimeout(() => {
                        window.hideLoadingScreen();
                        window.updateV8Status('Error', false);
                        const dotEl = document.getElementById('v8-dot');
                        if (dotEl) dotEl.className = 'v8-dot error';
                    }, 1000);
                }
            }, 2000);
        });
    </script>
</body>
</html>
