<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モダンお絵かきツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phosphor-icons/1.4.2/phosphor.min.js"></script>
    <style>
        :root {
            --main-color: #800000;
            --sub-color: #aa5a56;
            --light-bg: #e9c2ba;
            --canvas-bg: #f0e0d6;
            --app-bg: #ffffee;
            --text-color: #800000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--app-bg);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            display: flex;
            height: 100vh;
            background: var(--app-bg);
        }

        /* 左サイドツールバー */
        .sidebar {
            width: 60px;
            background: rgba(128, 0, 0, 0.05);
            border-right: 1px solid var(--sub-color);
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        .tool-button {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--main-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tool-button:hover {
            background: var(--light-bg);
            transform: translateY(-1px);
        }

        .tool-button.active {
            background: var(--main-color);
            color: white;
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.25);
        }

        .tool-button i {
            font-size: 16px;
        }

        /* メインキャンバスエリア */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--app-bg);
            overflow: hidden;
        }

        .canvas-wrapper {
            background: var(--canvas-bg);
            border: 1px solid var(--main-color);
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.15);
            cursor: crosshair;
        }

        #drawingCanvas {
            display: block;
            image-rendering: pixelated;
            background: var(--canvas-bg);
        }

        /* フローティングコントロールパネル */
        .control-panel {
            position: absolute;
            top: 15px;
            left: 75px;
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(128, 0, 0, 0.2);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(128, 0, 0, 0.15);
            display: none;
        }

        .control-panel.show {
            display: block;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 6px;
        }

        .number-input {
            width: 60px;
            padding: 3px 6px;
            border: 1px solid var(--sub-color);
            border-radius: 3px;
            font-size: 11px;
            text-align: center;
        }

        .slider {
            width: 100%;
            margin: 4px 0;
            -webkit-appearance: none;
            height: 4px;
            background: var(--light-bg);
            border-radius: 2px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--main-color);
            border-radius: 50%;
            cursor: pointer;
        }

        .slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--main-color);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* アクションボタンエリア */
        .action-buttons {
            position: absolute;
            top: 10px;
            right: 15px;
            display: flex;
            gap: 8px;
        }

        .action-button {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--main-color);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
        }

        .action-button:hover {
            background: var(--main-color);
            color: white;
        }

        .action-button i {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左サイドツールバー -->
        <div class="sidebar">
            <div class="tool-button active" data-tool="pen">
                <i class="ph-pen"></i>
            </div>
            <div class="tool-button" data-tool="eraser">
                <i class="ph-eraser"></i>
            </div>
            <div class="tool-button" data-tool="resize">
                <i class="ph-arrows-out-simple"></i>
            </div>
        </div>

        <!-- メインキャンバスエリア -->
        <div class="canvas-area">
            <div class="canvas-wrapper">
                <canvas id="drawingCanvas" width="500" height="300"></canvas>
            </div>
        </div>

        <!-- フローティングコントロールパネル -->
        <div id="controlPanel" class="control-panel">
            <!-- ペンコントロール -->
            <div id="penControls" class="tool-controls">
                <div class="control-group">
                    <div class="control-label">
                        <span>ペンサイズ</span>
                        <input type="number" id="penSize" class="number-input" value="3" min="1" max="50">
                    </div>
                    <input type="range" id="penSizeSlider" class="slider" min="1" max="50" value="3">
                </div>
                <div class="control-group">
                    <div class="control-label">
                        <span>不透明度</span>
                        <input type="number" id="penOpacity" class="number-input" value="100" min="1" max="100">
                    </div>
                    <input type="range" id="penOpacitySlider" class="slider" min="1" max="100" value="100">
                </div>
            </div>

            <!-- 消しゴムコントロール -->
            <div id="eraserControls" class="tool-controls" style="display: none;">
                <div class="control-group">
                    <div class="control-label">
                        <span>消しゴムサイズ</span>
                        <input type="number" id="eraserSize" class="number-input" value="10" min="1" max="50">
                    </div>
                    <input type="range" id="eraserSizeSlider" class="slider" min="1" max="50" value="10">
                </div>
                <div class="control-group">
                    <div class="control-label">
                        <span>透明度</span>
                        <input type="number" id="eraserOpacity" class="number-input" value="100" min="1" max="100">
                    </div>
                    <input type="range" id="eraserOpacitySlider" class="slider" min="1" max="100" value="100">
                </div>
            </div>

            <!-- リサイズコントロール -->
            <div id="resizeControls" class="tool-controls" style="display: none;">
                <div class="control-group">
                    <div class="control-label">
                        <span>幅</span>
                        <input type="number" id="canvasWidth" class="number-input" value="500" min="50" max="2000">
                    </div>
                    <input type="range" id="canvasWidthSlider" class="slider" min="50" max="2000" value="500">
                </div>
                <div class="control-group">
                    <div class="control-label">
                        <span>高さ</span>
                        <input type="number" id="canvasHeight" class="number-input" value="300" min="50" max="2000">
                    </div>
                    <input type="range" id="canvasHeightSlider" class="slider" min="50" max="2000" value="300">
                </div>
            </div>
        </div>

        <!-- アクションボタンエリア -->
        <div class="action-buttons">
            <button class="action-button" id="clearButton">
                <i class="ph-trash"></i>
                <span>クリア</span>
            </button>
            <button class="action-button" id="undoButton">
                <i class="ph-arrow-counter-clockwise"></i>
                <span>取り消し</span>
            </button>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
