                        '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>' :
                        '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off-icon lucide-eye-off"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>';

                    const deleteIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="m18 6-12 12"/><path d="m6 6 12 12"/></svg>';

                    layerItem.innerHTML = `
                        <div class="layer-name">${layer.name}</div>
                        <div class="layer-visibility ${layer.visible ? '' : 'hidden'}" data-action="toggle-visibility">
                            ${eyeIcon}
                        </div>
                        <div class="layer-delete-button" data-action="delete-layer">
                            ${deleteIcon}
                        </div>
                    `;

                    layerItem.addEventListener('click', (e) => {
                        const action = e.target.closest('[data-action]')?.dataset.action;
                        if (action === 'toggle-visibility') {
                            this.toggleLayerVisibility(layer.id);
                            e.stopPropagation();
                        } else if (action === 'delete-layer') {
                            this.deleteLayer(layer.id);
                            e.stopPropagation();
                        } else {
                            this.setActiveLayer(layer.id);
                        }
                    });

                    layerList.appendChild(layerItem);
                });
            }

            updateStatusDisplay() {
                const activeLayer = this.getActiveLayer();
                const element = document.getElementById('current-layer');
                if (element && activeLayer) {
                    element.textContent = activeLayer.name;
                }
            }
        }

        // ==== HammerJSPositionManager: Transform統合版 ====
        class HammerJSPositionManager {
            constructor(transformSystem) {
                this.transform = transformSystem;
                this.container = document.getElementById('canvas-container');
                this.state = { 
                    panning: false,
                    initialized: false,
                    gestureActive: false,
                    lastDelta: { x: 0, y: 0 }
                };
                this.hammer = null;
            }

            initialize(ticker) {
                this.ticker = ticker;
                this.ticker.add(() => this.updatePosition());
                this.setupHammerJS();

                this.ensureInitialPosition();
                this.state.initialized = true;

                log('🔨 HammerJS Position Manager (Transform) initialized');
            }

            setupHammerJS() {
                this.hammer = new Hammer(this.container);

                this.hammer.get('pan').set({ 
                    direction: Hammer.DIRECTION_ALL,
                    threshold: 5,
                    pointers: 1
                });

                this.hammer.on('panstart', (e) => this.onPanStart(e));
                this.hammer.on('panmove', (e) => this.onPanMove(e));
                this.hammer.on('panend pancancel', (e) => this.onPanEnd(e));

                log('🔨 HammerJS gestures configured with Transform');
            }

            onPanStart(event) {
                if (!window.futabaApp.spacePressed) return;

                if (event.srcEvent.pointerType === 'pen' && event.srcEvent.pressure === 0) {
                    return;
                }

                this.state.panning = true;
                this.state.gestureActive = true;
                this.state.lastDelta.x = event.deltaX || 0;
                this.state.lastDelta.y = event.deltaY || 0;

                log('🔨 Pan started with Transform system');
            }

            onPanMove(event) {
                if (!this.state.panning || !window.futabaApp.spacePressed) return;

                if (event.srcEvent.pointerType === 'pen' && event.srcEvent.pressure === 0) {
                    return;
                }

                const { deltaX, deltaY } = event;
                const actualDeltaX = deltaX - this.state.lastDelta.x;
                const actualDeltaY = deltaY - this.state.lastDelta.y;

                if (Math.abs(actualDeltaX) < 0.5 && Math.abs(actualDeltaY) < 0.5) {
                    return;
                }

                this.transform.moveViewport(actualDeltaX, actualDeltaY);

                this.state.lastDelta.x = deltaX;
                this.state.lastDelta.y = deltaY;
            }

            onPanEnd(event) {
                if (!this.state.panning) return;

                this.state.panning = false;
                this.state.gestureActive = false;

                log('🔨 Pan ended');
            }

            ensureInitialPosition() {
                this.transform.applyViewportTransform();
            }

            updatePosition() {
                this.transform.updateTransforms();
            }

            moveByArrows(dx, dy) {
                this.transform.moveViewport(dx, dy);
            }

            reset() {
                this.transform.resetViewport();
                this.state.panning = false;
                this.state.gestureActive = false;
            }

            screenToWorld(x, y) {
                return this.transform.screenToWorld({ x, y });
            }

            worldToScreen(x, y) {
                return this.transform.worldToScreen({ x, y });
            }

            destroy() {
                if (this.hammer) {
                    this.hammer.destroy();
                    this.hammer = null;
                }
            }
        }

        // ==== DrawingTools: Transform対応版 ====
        class DrawingTools {
            constructor(drawingEngine, layerManager, transformSystem) {
                this.engine = drawingEngine;
                this.layers = layerManager;
                this.transform = transformSystem;
                this.currentTool = 'pen';
                this.brushSize = 16.0;
                this.brushColor = 0x800000;
                this.opacity = 0.85;
                this.drawing = { active: false, path: null, lastPoint: null };
            }

            selectTool(tool) {
                this.currentTool = tool;
            }

            setBrushSize(size) {
                this.brushSize = utils.clamp(Math.round(size * 10) / 10, 0.1, 100);
            }

            setOpacity(opacity) {
                this.opacity = utils.clamp(Math.round(opacity * 1000) / 1000, 0, 1);
            }

            startDrawing(canvasX, canvasY, isPanning) {
                if (isPanning) return false;

                this.drawing.active = true;
                this.drawing.lastPoint = { x: canvasX, y: canvasY };

                const color = this.currentTool === 'eraser' ? 0xf0e0d6 : this.brushColor;
                const alpha = this.currentTool === 'eraser' ? 1.0 : this.opacity;

                this.drawing.path = this.engine.createPath(canvasX, canvasY, this.brushSize, color, alpha);
                return true;
            }

            continueDrawing(canvasX, canvasY, isPanning) {
                if (!this.drawing.active || !this.drawing.path || isPanning) return;

                this.engine.extendPath(this.drawing.path, canvasX, canvasY);
                this.drawing.lastPoint = { x: canvasX, y: canvasY };
            }

            stopDrawing() {
                if (this.drawing.path) {
                    this.drawing.path.isComplete = true;
                }
                this.drawing = { active: false, path: null, lastPoint: null };
            }
        }

        // ==== UnifiedUIController: UI管理統合版 ====
        class UnifiedUIController {
            constructor(drawingTools, drawingEngine, layerManager, transformSystem) {
                this.tools = drawingTools;
                this.engine = drawingEngine;
                this.layers = layerManager;
                this.transform = transformSystem;
                this.activePopup = null;
                this.sliders = new Map();
                this.dragState = { active: false, offset: { x: 0, y: 0 } };
            }

            initialize() {
                this.layers.ui = this;
                this.setupEventDelegation();
                this.setupSliders();
                this.setupResize();
                this.updateCanvasInfo();

                setTimeout(() => this.layers.updateLayerUI(), 100);
            }

            setupEventDelegation() {
                document.addEventListener('click', (e) => {
                    const toolButton = e.target.closest('.tool-button');
                    if (toolButton && !toolButton.classList.contains('disabled')) {
                        this.handleToolClick(toolButton);
                        return;
                    }

                    const layerAddBtn = e.target.closest('#add-layer-btn');
                    if (layerAddBtn) {
                        const newLayer = this.layers.createLayer();
                        this.layers.setActiveLayer(newLayer.id);
                        return;
                    }

                    if (!e.target.closest('.popup-panel') && 
                        !e.target.closest('.tool-button') &&
                        !e.target.closest('.layer-panel-container')) {
                        this.closeAllPopups();
                    }
                });

                document.querySelectorAll('.popup-panel').forEach(popup => {
                    const title = popup.querySelector('.popup-title');
                    if (title) {
                        title.style.cursor = 'move';
                        title.addEventListener('mousedown', (e) => this.startDrag(e, popup));
                    }
                });

                document.addEventListener('mousemove', (e) => this.onDrag(e));
                document.addEventListener('mouseup', () => this.stopDrag());
            }

            handleToolClick(button) {
                const toolId = button.id;
                
                const toolMap = {
                    'pen-tool': () => {
                        this.activateTool('pen');
                        this.togglePopup('pen-settings');
                    },
                    'eraser-tool': () => {
                        this.activateTool('eraser');
                        this.closeAllPopups();
                    },
                    'resize-tool': () => {
                        this.togglePopup('resize-settings');
                    }
                };
                
                const handler = toolMap[toolId];
                if (handler) handler();
            }

            activateTool(tool) {
                this.tools.selectTool(tool);
                
                document.querySelectorAll('.tool-button').forEach(btn => btn.classList.remove('active'));
                const toolBtn = document.getElementById(tool + '-tool');
                if (toolBtn) toolBtn.classList.add('active');
                
                const toolNames = { pen: 'ベクターペン', eraser: '消しゴム' };
                const toolElement = document.getElementById('current-tool');
                if (toolElement) {
                    toolElement.textContent = toolNames[tool] || tool;
                }
                
                const canvas = this.engine.app.canvas;
                canvas.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair';
            }

            togglePopup(popupId) {
                const popup = document.getElementById(popupId);
                if (!popup) return;
                
                if (this.activePopup && this.activePopup !== popup) {
                    this.activePopup.classList.remove('show');
                }
                
                const isVisible = popup.classList.contains('show');
                popup.classList.toggle('show', !isVisible);
                this.activePopup = isVisible ? null : popup;
            }

            startDrag(e, popup) {
                this.dragState.active = popup;
                const rect = popup.getBoundingClientRect();
                this.dragState.offset.x = e.clientX - rect.left;
                this.dragState.offset.y = e.clientY - rect.top;
                e.preventDefault();
            }

            onDrag(e) {
                if (!this.dragState.active) return;
                
                const x = utils.clamp(e.clientX - this.dragState.offset.x, 0, 
                    window.innerWidth - this.dragState.active.offsetWidth);
                const y = utils.clamp(e.clientY - this.dragState.offset.y, 0, 
                    window.innerHeight - this.dragState.active.offsetHeight);
                
                this.dragState.active.style.left = x + 'px';
                this.dragState.active.style.top = y + 'px';
            }

            stopDrag() {
                this.dragState.active = false;
            }

            setupSliders() {
                this.createSlider('pen-size-slider', 0.1, 100, 16.0, (value) => {
                    this.tools.setBrushSize(value);
                    return value.toFixed(1) + 'px';
                });
                
                this.createSlider('pen-opacity-slider', 0, 100, 85.0, (value) => {
                    this.tools.setOpacity(value / 100);
                    return value.toFixed(1) + '%';
                });
            }

            createSlider(sliderId, min, max, initial, callback) {
                const container = document.getElementById(sliderId);
                if (!container) return;

                const track = container.querySelector('.slider-track');
                const handle = container.querySelector('.slider-handle');
                const valueDisplay = container.parentNode.querySelector('.slider-value');

                if (!track || !handle || !valueDisplay) return;

                const slider = {
                    value: initial, min, max, callback, track, handle, valueDisplay, dragging: false
                };

                this.sliders.set(sliderId, slider);

                const update = (value) => {
                    slider.value = utils.clamp(value, min, max);
                    const percentage = ((slider.value - min) / (max - min)) * 100;
                    
                    track.style.width = percentage + '%';
                    handle.style.left = percentage + '%';
                    valueDisplay.textContent = callback(slider.value);
                };

                const getValue = (clientX) => {
                    const rect = container.getBoundingClientRect();
                    const percentage = utils.clamp((clientX - rect.left) / rect.width, 0, 1);
                    return min + (percentage * (max - min));
                };

                container.addEventListener('mousedown', (e) => {
                    slider.dragging = true;
                    update(getValue(e.clientX));
                    e.preventDefault();
                });

                document.addEventListener('mousemove', (e) => {
                    if (slider.dragging) update(getValue(e.clientX));
                });

                document.addEventListener('mouseup', () => {
                    slider.dragging = false;
                });

                update(initial);
            }

            setupResize() {
                const applyButton = document.getElementById('apply-resize');
                if (applyButton) {
                    applyButton.addEventListener('click', () => this.applyResize());
                }
            }

            applyResize() {
                const widthInput = document.getElementById('canvas-width');
                const heightInput = document.getElementById('canvas-height');

                if (widthInput && heightInput) {
                    const width = parseInt(widthInput.value);
                    const height = parseInt(heightInput.value);

                    if (width >= 100 && width <= 4096 && height >= 100 && height <= 4096) {
                        this.engine.resize(width, height);

                        this.layers.layers.items.forEach(layer => {
                            if (layer.isBackground && layer.backgroundGraphics) {
                                layer.backgroundGraphics.clear();
                                layer.backgroundGraphics.rect(0, 0, width, height);
                                layer.backgroundGraphics.fill(0xf0e0d6);
                            }
                        });

                        this.updateCanvasInfo();
                        this.closeAllPopups();

                        if (this.layers.historyManager) {
                            setTimeout(() => {
                                this.layers.historyManager.createSnapshot(`キャンバスを${width}×${height}にリサイズ`);
                            }, 100);
                        }
                    }
                }
            }

            updateCanvasInfo() {
                const element = document.getElementById('canvas-info');
                if (element) {
                    element.textContent = `${APP_CONFIG.canvas.width}×${APP_CONFIG.canvas.height}px`;
                }
            }

            updateCoordinates(x, y) {
                const element = document.getElementById('coordinates');
                if (element) {
                    element.textContent = `x: ${Math.round(x)}, y: ${Math.round(y)}`;
                }
            }

            closeAllPopups() {
                document.querySelectorAll('.popup-panel').forEach(popup => {
                    popup.classList.remove('show');
                });
                this.activePopup = null;
            }
        }

        // ==== DrawingEngine: Transform統合版 ====
        class DrawingEngine {
            constructor(transformSystem) {
                this.transform = transformSystem;
                this.app = null;
                this.containers = { camera: null, world: null, ui: null };
                this.paths = [];
                this.tools = null;
                this.layerManager = null;
            }

            async initialize() {
                this.app = new PIXI.Application();
                await this.app.init({
                    width: APP_CONFIG.canvas.width,
                    height: APP_CONFIG.canvas.height,
                    background: 0xf0e0d6,
                    backgroundAlpha: 1,
                    antialias: APP_CONFIG.rendering.antialias,
                    resolution: APP_CONFIG.rendering.resolution,
                    autoDensity: false
                });

                const container = document.getElementById('drawing-canvas');
                container.appendChild(this.app.canvas);

                this.setupContainers();
                this.setupInteraction();

                return true;
            }

            setupContainers() {
                this.containers.camera = new PIXI.Container();
                this.containers.world = new PIXI.Container();
                this.containers.ui = new PIXI.Container();

                const maskGraphics = new PIXI.Graphics();
                maskGraphics.rect(0, 0, APP_CONFIG.canvas.width, APP_CONFIG.canvas.height);
                maskGraphics.fill(0x000000);
                this.app.stage.addChild(maskGraphics);
                this.containers.camera.mask = maskGraphics;

                this.containers.camera.addChild(this.containers.world);
                this.app.stage.addChild(this.containers.camera);
                this.app.stage.addChild(this.containers.ui);

                this.containers.world.x = 0;
                this.containers.world.y = 0;
                this.containers.world.scale.set(1);
            }

            setupInteraction() {
                this.containers.camera.eventMode = "static";
                this.containers.camera.hitArea = new PIXI.Rectangle(0, 0, APP_CONFIG.canvas.width, APP_CONFIG.canvas.height);

                this.containers.camera.on('pointerdown', (e) => this.onPointerDown(e));
                this.containers.camera.on('pointermove', (e) => this.onPointerMove(e));
                this.containers.camera.on('pointerup', (e) => this.onPointerUp(e));
                this.containers.camera.on('pointerupoutside', (e) => this.onPointerUp(e));
                this.containers.camera.on('pointercancel', (e) => this.onPointerUp(e));
            }

            onPointerDown(event) {
                const spacePressed = window.futabaApp.spacePressed;
                const originalEvent = event.data.originalEvent;

                if (spacePressed) {
                    event.stopPropagation();
                } else {
                    if (originalEvent.pointerType === 'pen' && originalEvent.pressure === 0) {
                        return;
                    }

                    this.tools.startDrawing(event.global.x, event.global.y, spacePressed);
                }
            }

            onPointerMove(event) {
                const spacePressed = window.futabaApp.spacePressed;
                const originalEvent = event.data.originalEvent;

                if (spacePressed) {
                    if (window.futabaApp.ui) {
                        window.futabaApp.ui.updateCoordinates(event.global.x, event.global.y);
                    }
                    return;
                } else {
                    if (originalEvent.pointerType === 'pen' && originalEvent.pressure === 0) {
                        return;
                    }

                    this.tools.continueDrawing(event.global.x, event.global.y, spacePressed);
                    if (window.futabaApp.ui) {
                        window.futabaApp.ui.updateCoordinates(event.global.x, event.global.y);
                    }
                }
            }

            onPointerUp(event) {
                const spacePressed = window.futabaApp.spacePressed;

                if (!spacePressed) {
                    this.tools.stopDrawing();
                }
            }

            createPath(x, y, size, color, opacity) {
                const path = {
                    id: `path_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                    graphics: new PIXI.Graphics(),
                    points: [],
                    color, size, opacity,
                    isComplete: false
                };

                path.graphics.circle(x, y, size / 2);
                path.graphics.fill({ color: path.color, alpha: path.opacity });

                path.points.push({ x, y, size });

                this.layerManager.addPathToActiveLayer(path);
                this.paths.push(path);
                return path;
            }

            extendPath(path, x, y) {
                if (!path || path.points.length === 0) return;

                const lastPoint = utils.last(path.points);
                const distance = Math.sqrt((x - lastPoint.x) ** 2 + (y - lastPoint.y) ** 2);

                if (distance < 1.5) return;

                const steps = Math.max(1, Math.ceil(distance / 1.5));
                for (let i = 1; i <= steps; i++) {
                    const t = i / steps;
                    const px = lastPoint.x + (x - lastPoint.x) * t;
                    const py = lastPoint.y + (y - lastPoint.y) * t;

                    path.graphics.circle(px, py, path.size / 2);
                    path.graphics.fill({ color: path.color, alpha: path.opacity });
                }

                path.points.push({ x, y, size: path.size });
            }

            resize(newWidth, newHeight) {
                APP_CONFIG.canvas.width = newWidth;
                APP_CONFIG.canvas.height = newHeight;

                this.app.renderer.resize(newWidth, newHeight);

                if (this.containers.camera.mask) {
                    this.containers.camera.mask.clear();
                    this.containers.camera.mask.rect(0, 0, newWidth, newHeight);
                    this.containers.camera.mask.fill(0x000000);
                }

                this.containers.camera.hitArea = new PIXI.Rectangle(0, 0, newWidth, newHeight);
            }

            clear() {
                this.paths.forEach(path => path.graphics.destroy());
                this.paths = [];

                this.layerManager.layers.items.forEach(layer => {
                    layer.paths = [];
                    layer.container.removeChildren();
                });
            }
        }

        // ==== SystemMonitor: パフォーマンス監視（Phase 2強化） ====
        class SystemMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
            }

            start() {
                const update = () => {
                    this.frameCount++;
                    const currentTime = performance.now();

                    if (currentTime - this.lastTime >= 1000) {
                        const fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                        const element = document.getElementById('fps');
                        if (element) {
                            element.textContent = fps;
                        }

                        this.frameCount = 0;
                        this.lastTime = currentTime;
                    }

                    requestAnimationFrame(update);
                };

                update();
            }
        }

        // ==== AppController: メインアプリケーション制御（Phase 2完成版） ====
        class AppController {
            constructor() {
                this.spacePressed = false;
                
                // Transform中心設計
                this.transformSystem = new TransformSystem();
                this.engine = new DrawingEngine(this.transformSystem);
                this.positionManager = new HammerJSPositionManager(this.transformSystem);
                this.layerManager = new LayerManager(this.engine, this.transformSystem);
                this.tools = new DrawingTools(this.engine, this.layerManager, this.transformSystem);
                this.ui = new UnifiedUIController(this.tools, this.engine, this.layerManager, this.transformSystem);
                this.monitor = new SystemMonitor();

                // Phase 2: 強化された履歴管理
                this.historyManager = new EnhancedTransformHistoryManager(this.transformSystem, this.layerManager);
                this.shortcutManager = new ShortcutManager(this, this.historyManager);
            }

            async initialize() {
                await this.engine.initialize();
                
                // 相互参照設定
                this.engine.tools = this.tools;
                this.engine.layerManager = this.layerManager;
                this.layerManager.setHistoryManager(this.historyManager);

                // 初期化順序（Transform中心）
                this.layerManager.initialize();
                this.positionManager.initialize(this.engine.app.ticker);
                this.ui.initialize();
                this.monitor.start();

                // Phase 2: 強化された履歴・ショートカット初期化
                this.historyManager.initialize();
                this.shortcutManager.initialize();

                this.setupInputHandlers();

                return true;
            }

            setupInputHandlers() {
                window.addEventListener('blur', () => {
                    this.spacePressed = false;
                });

                window.addEventListener('beforeunload', () => {
                    if (this.positionManager && this.positionManager.destroy) {
                        this.positionManager.destroy();
                    }
                });
            }
        }

        // ==== Application Bootstrap ====
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // ライブラリチェック
                const requiredLibs = {
                    pixi: window.PIXI,
                    gsap: window.gsap,
                    Hammer: window.Hammer
                };

                for (const [name, lib] of Object.entries(requiredLibs)) {
                    if (!lib) {
                        throw new Error(`Library ${name} not found`);
                    }
                }

                // アプリケーション初期化
                window.futabaApp = new AppController();
                await window.futabaApp.initialize();

                console.log('🎨 Futaba Drawing Tool v8-Phase2 - Enhanced History System Complete!');
                console.log('✅ Phase 2 改修完了:');
                console.log('  - Transform履歴システム強化（差分記録最適化）');
                console.log('  - インテリジェントな記録戦略（時間・変更量・重要度ベース）');
                console.log('  - メモリ使用量制限とガベージコレクション');
                console.log('  - 将来のアニメーション・キーフレーム基盤');
                console.log('  - パフォーマンス監視強化（Memory表示追加）');

            } catch (error) {
                console.error('💥 Application startup failed:', error);
                const canvasArea = document.querySelector('.canvas-area');
                if (canvasArea) {
                    canvasArea.innerHTML = `
                        <div style="text-align: center; color: var(--futaba-maroon); font-size: 18px; padding: 40px;">
                            <div>⚠️ アプリケーションの初期化に失敗しました</div>
                            <div style="font-size: 14px; margin-top: 10px;">
                                ブラウザのコンソールでエラー詳細を確認してください
                            </div>
                        </div>
                    `;
                }
            }
        });
    </script>
