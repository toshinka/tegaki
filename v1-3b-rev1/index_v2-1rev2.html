<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>トシンカ手描きツール v2-1rev2</title>
    <link rel="stylesheet" href="style_v2-1rev1.css">
    <style>
        /* ここに追加CSSを書いてもOKです（デフォルトはstyle_v2-1rev1.css を参照） */
    </style>
</head>
<body>
    <div id="top-bar"></div>
    <div id="canvas-area">
        <div id="canvas-container">
            <!-- レイヤーcanvas、合成canvas、額縁canvasがここに動的追加されます -->
            <canvas id="drawingCanvas" width="344" height="135" class="main-canvas"></canvas>
        </div>
    </div>
    <div id="tool-bar"></div>
    <div id="pen-settings"></div>
    <div id="current-layer-info"></div>

    <script src="PenSettingsManager_v2-1rev1.js"></script>
    <script src="ToolManager_v2-1rev1.js"></script>
    <script src="ShortcutManager_v2-1rev1.js"></script>
    <script src="TopBarManager_v2-1rev1.js"></script>
    <script src="LayerManager_v2-1rev2.js"></script>
    <script src="CanvasManager_v2-1rev2.js"></script>
    <script>
        // アプリ本体の簡易起動例
        class ToshinkaTegakiTool {
            constructor() {
                this.penSettingsManager = new PenSettingsManager(this);
                this.toolManager = new ToolManager(this);
                this.shortcutManager = new ShortcutManager(this);
                this.topBarManager = new TopBarManager(this);
                this.layerManager = new LayerManager(this);
                this.canvasManager = new CanvasManager(this);
                // ... 必要に応じて初期化処理
                this.layerManager.setupInitialLayers();
                this.canvasManager.requestRender();
            }
        }
        window.addEventListener('DOMContentLoaded', () => {
            window.toshinkaApp = new ToshinkaTegakiTool();
        });
    </script>
</body>
</html>
