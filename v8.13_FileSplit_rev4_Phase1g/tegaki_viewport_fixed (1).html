<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Viewport統合版 - PixiJS v8.13 お絵かきツール</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --futaba-maroon: #800000;
            --futaba-light-maroon: #aa5a56;
            --futaba-medium: #cf9c97;
            --futaba-light-medium: #e9c2ba;
            --futaba-cream: #f0e0d6;
            --futaba-background: #ffffee;
            --text-primary: #2c1810;
            --text-secondary: #5d4037;
            --text-inverse: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: var(--futaba-background);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 50px 1fr;
            height: 100vh;
            width: 100vw;
            gap: 0;
        }
        
        .sidebar {
            background: var(--futaba-cream);
            border-right: 2px solid var(--futaba-light-medium);
            display: flex;
            flex-direction: column;
            padding: 12px 6px;
            gap: 4px;
            overflow-y: auto;
            position: relative;
            z-index: 100;
        }
        
        .tool-button {
            width: 36px;
            height: 36px;
            border: 2px solid var(--futaba-light-medium);
            background: var(--futaba-background);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--futaba-maroon);
            position: relative;
            user-select: none;
        }
        
        .tool-button svg { width: 20px; height: 20px; stroke: #800000; }
        
        .tool-button:hover {
            background: var(--futaba-medium);
            border-color: var(--futaba-light-maroon);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(128, 0, 0, 0.2);
        }
        
        .tool-button.active {
            background: var(--futaba-maroon);
            color: var(--text-inverse);
            border-color: var(--futaba-maroon);
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.3);
        }
        
        .tool-button.active svg { stroke: #ffffff; }
        
        .tool-separator {
            height: 1px;
            background: var(--futaba-light-medium);
            margin: 4px 2px;
        }
        
        .canvas-area {
            background: var(--futaba-background);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #drawing-canvas {
            border: none;
            display: block;
            cursor: crosshair;
            touch-action: none;
        }
        
        .layer-panel-container {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        
        .layer-add-button {
            width: 36px;
            height: 36px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-light-medium);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.1);
            pointer-events: all;
        }
        
        .layer-add-button:hover {
            background: var(--futaba-medium);
            transform: scale(1.1);
        }
        
        .layer-add-button svg { width: 18px; height: 18px; stroke: #800000; }
        
        .layer-panel-items {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: transparent;
            border-radius: 8px;
            padding: 8px;
            pointer-events: all;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .layer-item {
            width: 180px;
            height: 64px;
            background: var(--futaba-cream);
            border: 1px solid var(--futaba-light-medium);
            border-radius: 6px;
            padding: 6px 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            display: grid;
            grid-template-columns: 20px 1fr 48px;
            grid-template-rows: 1fr 1fr;
            gap: 4px 8px;
            align-items: center;
            user-select: none;
            position: relative;
            box-shadow: 0 1px 2px rgba(128, 0, 0, 0.05);
        }
        
        .layer-item:hover {
            border-color: var(--futaba-medium);
            background: var(--futaba-background);
        }
        
        .layer-item.active {
            border-color: var(--futaba-maroon);
            background: var(--futaba-light-medium);
            box-shadow: 0 2px 4px rgba(128, 0, 0, 0.15);
        }
        
        .layer-visibility {
            grid-column: 1;
            grid-row: 1 / 3;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s ease;
            align-self: center;
        }
        
        .layer-visibility:hover { background: var(--futaba-light-medium); }
        .layer-visibility svg { width: 16px; height: 16px; stroke: #800000; }
        .layer-visibility.hidden svg { opacity: 0.3; }
        
        .layer-opacity {
            grid-column: 2;
            grid-row: 1;
            font-size: 10px;
            color: var(--text-secondary);
            font-family: monospace;
            align-self: start;
            margin-top: 2px;
        }
        
        .layer-name {
            grid-column: 2;
            grid-row: 2;
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            align-self: end;
            margin-bottom: 2px;
        }
        
        .layer-thumbnail {
            grid-column: 3;
            grid-row: 1 / 3;
            width: 48px;
            height: 48px;
            background: var(--futaba-background);
            border: 1px solid var(--futaba-light-medium);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: center;
        }
        
        .layer-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 3px;
        }
        
        .layer-thumbnail-placeholder {
            width: 24px;
            height: 24px;
            background: var(--futaba-light-medium);
            border-radius: 2px;
            opacity: 0.5;
        }
        
        .status-panel {
            position: fixed;
            bottom: 20px;
            left: 70px;
            right: 20px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-medium);
            border-radius: 12px;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.1);
            z-index: 50;
        }
        
        .status-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .popup-panel {
            position: fixed;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-maroon);
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(128, 0, 0, 0.3);
            padding: 20px;
            z-index: 2000;
            backdrop-filter: blur(12px);
            display: none;
            user-select: none;
            min-width: 280px;
        }
        
        .popup-panel.show { display: block; }
        
        .popup-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--futaba-maroon);
            margin-bottom: 16px;
            text-align: center;
            border-bottom: 2px solid var(--futaba-light-medium);
            padding-bottom: 8px;
        }
        
        .setting-group { margin-bottom: 16px; }
        
        .setting-label {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .action-button {
            padding: 10px 16px;
            border: 2px solid var(--futaba-maroon);
            border-radius: 8px;
            background: var(--futaba-background);
            color: var(--futaba-maroon);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            width: 100%;
        }
        
        .action-button:hover {
            background: var(--futaba-maroon);
            color: var(--text-inverse);
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
    </style>
</head>
<body>

                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 21h8"/><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>

    <!-- PixiJS v8.13読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.13.0/dist/pixi.min.js"></script>
    
    <!-- Viewportライブラリ -->
    <script>
    // pixi-viewportが読み込まれるまで待機、失敗時はfallback
    function loadViewport() {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/pixi-viewport/dist/viewport.min.js';
            script.onload = () => {
                if (window.Viewport || window.viewport) {
                    resolve();
                } else {
                    reject(new Error('viewport not found'));
                }
            };
            script.onerror = reject;
            document.head.appendChild(script);
        });
    }
    </script>
    
    <script>
(function() {
    'use strict';
    
    console.log('Script starting...');
    
    // === 設定 ===
    const CANVAS_W = 400;
    const CANVAS_H = 400;
    const WORLD_W = 5000;
    const WORLD_H = 5000;
    
    const ENGINE_CONFIG = {
        canvas: { width: CANVAS_W, height: CANVAS_H },
        world: { width: WORLD_W, height: WORLD_H },
        pen: { size: 16, opacity: 0.85, color: 0x800000 },
        eraser: { size: 20 },
        debug: true
    };
    
    const log = (...args) => {
        if (ENGINE_CONFIG.debug) console.log(...args);
    };
    
    // グローバルアプリケーション状態
    let app = null;
    let viewport = null;
    let world = null;
    let uiContainer = null;
    let backgroundManager = null;
    let layerManager = null;
    let drawingSystem = null;
    let inputManager = null;

    // === シンプルなviewport fallback (pixi-viewportが読み込めない場合) ===
    class SimpleViewport extends PIXI.Container {
        constructor(options) {
            super();
            this.options = options;
            this.screenWidth = options.screenWidth;
            this.screenHeight = options.screenHeight;
            this.worldWidth = options.worldWidth;
            this.worldHeight = options.worldHeight;
            this.scaled = 1;
        }
        
        drag() { return this; }
        pinch() { return this; }
        wheel() { return this; }
        decelerate() { return this; }
        
        moveCenter(x, y) {
            this.x = this.screenWidth/2 - x;
            this.y = this.screenHeight/2 - y;
        }
        
        toWorld(screenPoint) {
            return this.toLocal(screenPoint);
        }
        
        get center() {
            return {
                x: (this.screenWidth/2 - this.x),
                y: (this.screenHeight/2 - this.y)
            };
        }
        
        resize(screenWidth, screenHeight) {
            this.screenWidth = screenWidth;
            this.screenHeight = screenHeight;
        }
        
        setZoom(zoom, center) {
            this.scale.set(zoom);
            this.scaled = zoom;
        }
    }

    // === PixiJS初期化 ===
    async function createApp(containerEl) {
        console.log('Creating PIXI app...');
        
        const pixiApp = new PIXI.Application();
        
        await pixiApp.init({
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundAlpha: 0,
            resolution: window.devicePixelRatio || 1,
            antialias: true,
            eventMode: 'static',
            eventFeatures: {
                move: true,
                globalMove: true,
                click: true,
                wheel: true,
            }
        });
        
        containerEl.innerHTML = '';
        containerEl.appendChild(pixiApp.canvas);
        
        console.log('PIXI app created, canvas size:', pixiApp.canvas.width, 'x', pixiApp.canvas.height);
        
        return pixiApp;
    }

    // === 背景管理 ===
    class BackgroundManager {
        constructor() {
            this.bgCanvas = document.createElement('canvas');
            this.bgCanvas.width = CANVAS_W;
            this.bgCanvas.height = CANVAS_H;
            this.bgCtx = this.bgCanvas.getContext('2d');
            
            this.bgTexture = null;
            this.bgSprite = null;
            
            this.initBackground();
            log('BackgroundManager initialized');
        }
        
        initBackground() {
            // futaba-cream (#f0e0d6) で初期化
            this.bgCtx.fillStyle = '#f0e0d6';
            this.bgCtx.fillRect(0, 0, this.bgCanvas.width, this.bgCanvas.height);
            
            // PIXI Textureとして利用
            this.bgTexture = PIXI.Texture.from(this.bgCanvas);
            this.bgSprite = new PIXI.Sprite(this.bgTexture);
            
            // ワールド中央に配置
            this.bgSprite.anchor.set(0.5, 0.5);
            this.bgSprite.position.set(WORLD_W / 2, WORLD_H / 2);
            this.bgSprite.label = 'backgroundSprite';
        }
        
        getSprite() {
            return this.bgSprite;
        }
        
        eraseAt(worldX, worldY, radius = ENGINE_CONFIG.eraser.size) {
            // ワールド座標をcanvas座標に変換
            const canvasX = worldX - (WORLD_W / 2 - CANVAS_W / 2);
            const canvasY = worldY - (WORLD_H / 2 - CANVAS_H / 2);
            
            if (canvasX < -radius || canvasX > CANVAS_W + radius ||
                canvasY < -radius || canvasY > CANVAS_H + radius) {
                return;
            }
            
            this.bgCtx.save();
            this.bgCtx.globalCompositeOperation = 'destination-out';
            this.bgCtx.beginPath();
            this.bgCtx.arc(canvasX, canvasY, radius, 0, Math.PI * 2);
            this.bgCtx.fill();
            this.bgCtx.restore();
            
            if (this.bgTexture?.baseTexture) {
                this.bgTexture.baseTexture.update();
            }
        }
        
        floodFill(worldX, worldY, fillColor = '#f0e0d6') {
            // バケツ塗り（シンプル実装）
            const canvasX = Math.round(worldX - (WORLD_W / 2 - CANVAS_W / 2));
            const canvasY = Math.round(worldY - (WORLD_H / 2 - CANVAS_H / 2));
            
            if (canvasX < 0 || canvasX >= CANVAS_W || canvasY < 0 || canvasY >= CANVAS_H) {
                return;
            }
            
            // 簡単な塗りつぶし（デモ用）
            this.bgCtx.fillStyle = fillColor;
            this.bgCtx.beginPath();
            this.bgCtx.arc(canvasX, canvasY, 30, 0, Math.PI * 2);
            this.bgCtx.fill();
            
            if (this.bgTexture?.baseTexture) {
                this.bgTexture.baseTexture.update();
            }
        }
    }

    // === レイヤー管理システム ===
    class LayerManager {
        constructor(bgManager) {
            this.layers = [];
            this.activeLayerIndex = -1;
            this.layerCounter = 0;
            this.backgroundManager = bgManager;
            this.thumbnailUpdateQueue = new Set();
            log('LayerManager initialized');
        }

        createLayer(name, isBackground = false) {
            const layer = new PIXI.Container();
            const layerId = `layer_${this.layerCounter++}`;
            
            layer.label = layerId;
            layer.layerData = {
                id: layerId,
                name: name,
                visible: true,
                opacity: 1.0,
                isBackground: isBackground
            };

            // 背景レイヤーの場合は背景スプライトを追加
            if (isBackground && this.backgroundManager) {
                layer.addChild(this.backgroundManager.getSprite());
            }

            this.layers.push(layer);
            log('Layer created:', name, 'isBackground:', isBackground);
            return { layer, index: this.layers.length - 1 };
        }

        setActiveLayer(index) {
            if (index >= 0 && index < this.layers.length) {
                this.activeLayerIndex = index;
                this.updateLayerPanelUI();
                this.updateStatusDisplay();
                log('Active layer set to:', index);
            }
        }

        getActiveLayer() {
            return this.activeLayerIndex >= 0 ? this.layers[this.activeLayerIndex] : null;
        }

        updateLayerPanelUI() {
            const layerList = document.getElementById('layer-list');
            if (!layerList) return;

            const items = layerList.querySelectorAll('.layer-item');
            items.forEach((item, index) => {
                const reverseIndex = this.layers.length - 1 - index;
                item.classList.toggle('active', reverseIndex === this.activeLayerIndex);
            });
        }

        updateStatusDisplay() {
            const statusElement = document.getElementById('current-layer');
            if (statusElement && this.activeLayerIndex >= 0) {
                const layer = this.layers[this.activeLayerIndex];
                statusElement.textContent = layer.layerData.name;
            }
        }

        requestThumbnailUpdate(layerIndex) {
            this.thumbnailUpdateQueue.add(layerIndex);
        }

        processThumbnailUpdates() {
            if (!app?.renderer || this.thumbnailUpdateQueue.size === 0) return;

            this.thumbnailUpdateQueue.forEach(layerIndex => {
                this.updateThumbnail(layerIndex);
            });
            this.thumbnailUpdateQueue.clear();
        }

        updateThumbnail(layerIndex) {
            if (!app?.renderer || layerIndex < 0 || layerIndex >= this.layers.length) return;

            const layer = this.layers[layerIndex];
            const layerItems = document.querySelectorAll('.layer-item');
            
            const panelIndex = this.layers.length - 1 - layerIndex;
            const layerItem = layerItems[panelIndex];
            
            if (!layerItem) return;

            try {
                const thumbW = 48;
                const thumbH = 48;
                
                let base64;
                
                if (layer.layerData.isBackground && this.backgroundManager) {
                    // 背景レイヤーは直接canvasから
                    const thumbCanvas = document.createElement('canvas');
                    thumbCanvas.width = thumbW;
                    thumbCanvas.height = thumbH;
                    const thumbCtx = thumbCanvas.getContext('2d');
                    thumbCtx.drawImage(this.backgroundManager.bgCanvas, 0, 0, thumbW, thumbH);
                    base64 = thumbCanvas.toDataURL();
                } else {
                    // 通常レイヤー
                    const rt = PIXI.RenderTexture.create({ width: thumbW, height: thumbH });
                    
                    const originalTransform = {
                        x: layer.x,
                        y: layer.y,
                        scaleX: layer.scale.x,
                        scaleY: layer.scale.y
                    };

                    layer.scale.set(0.1, 0.1);
                    layer.position.set(thumbW / 2, thumbH / 2);

                    app.renderer.render({ container: layer, target: rt });

                    layer.scale.set(originalTransform.scaleX, originalTransform.scaleY);
                    layer.position.set(originalTransform.x, originalTransform.y);

                    const canvas = app.renderer.extract.canvas(rt);
                    base64 = canvas.toDataURL();
                    
                    rt.destroy();
                }
                
                const thumbnail = layerItem.querySelector('.layer-thumbnail');
                if (thumbnail) {
                    thumbnail.innerHTML = '';
                    const img = document.createElement('img');
                    img.src = base64;
                    img.alt = 'Layer thumbnail';
                    thumbnail.appendChild(img);
                }
                
            } catch (error) {
                log('Failed to update thumbnail:', error);
                const thumbnail = layerItem.querySelector('.layer-thumbnail');
                if (thumbnail) {
                    thumbnail.innerHTML = '<div class="layer-thumbnail-placeholder"></div>';
                }
            }
        }
    }

    // === 描画システム ===
    class DrawingSystem {
        constructor(layerMgr, bgManager) {
            this.layerManager = layerMgr;
            this.backgroundManager = bgManager;
            this.isDrawing = false;
            this.currentStroke = null;
            this.currentTool = 'pen';
            log('DrawingSystem initialized');
        }

        setTool(tool) {
            this.currentTool = tool;
            log('Tool changed to:', tool);
        }

        handleClick(worldPoint) {
            if (this.currentTool === 'bucket') {
                // バケツツールは背景レイヤーにのみ適用
                const activeLayer = this.layerManager.getActiveLayer();
                if (activeLayer?.layerData.isBackground) {
                    this.backgroundManager.floodFill(worldPoint.x, worldPoint.y);
                    this.layerManager.requestThumbnailUpdate(this.layerManager.activeLayerIndex);
                }
            }
        }

        startDrawing(worldPoint) {
            const activeLayer = this.layerManager.getActiveLayer();
            if (!activeLayer) return;

            this.isDrawing = true;
            log('Drawing started at:', worldPoint);
            
            if (this.currentTool === 'eraser' && activeLayer.layerData.isBackground) {
                // 背景の消しゴム処理
                this.backgroundManager.eraseAt(worldPoint.x, worldPoint.y);
                return;
            }

            // 通常の描画処理
            this.currentStroke = new PIXI.Graphics();
            this.currentStroke.moveTo(worldPoint.x, worldPoint.y);
            activeLayer.addChild(this.currentStroke);
        }

        continueDrawing(worldPoint) {
            if (!this.isDrawing) return;
            
            const activeLayer = this.layerManager.getActiveLayer();
            if (!activeLayer) return;

            if (this.currentTool === 'eraser' && activeLayer.layerData.isBackground) {
                // 背景の消しゴム処理
                this.backgroundManager.eraseAt(worldPoint.x, worldPoint.y);
                return;
            }

            if (!this.currentStroke) return;
            
            if (this.currentTool === 'pen') {
                this.currentStroke.stroke({
                    width: ENGINE_CONFIG.pen.size,
                    color: ENGINE_CONFIG.pen.color,
                    alpha: ENGINE_CONFIG.pen.opacity,
                    cap: 'round',
                    join: 'round'
                });
                this.currentStroke.lineTo(worldPoint.x, worldPoint.y);
            } else if (this.currentTool === 'eraser') {
                // 通常レイヤーの消しゴム（白で描画）
                this.currentStroke.stroke({
                    width: ENGINE_CONFIG.eraser.size,
                    color: 0xffffff,
                    alpha: 1.0,
                    cap: 'round',
                    join: 'round'
                });
                this.currentStroke.lineTo(worldPoint.x, worldPoint.y);
            }
        }

        endDrawing() {
            if (!this.isDrawing) return;
            
            this.isDrawing = false;
            this.currentStroke = null;
            
            if (this.layerManager.activeLayerIndex >= 0) {
                this.layerManager.requestThumbnailUpdate(this.layerManager.activeLayerIndex);
            }
            
            log('Drawing ended');
        }
    }

    // === 入力管理システム ===
    class InputManager {
        constructor() {
            this.keys = new Set();
            this.setupEventListeners();
            log('InputManager initialized');
        }

        setupEventListeners() {
            document.addEventListener('keydown', (e) => this.handleKeyDown(e));
            document.addEventListener('keyup', (e) => this.handleKeyUp(e));
            document.addEventListener('mousemove', (e) => this.updateCoordinates(e));
        }

        setupPixiEvents() {
            if (!app?.stage) return;

            app.stage.eventMode = 'static';
            app.stage.hitArea = new PIXI.Rectangle(-10000, -10000, 20000, 20000);

            let isDrawing = false;

            const handlePointerUp = () => {
                if (isDrawing) {
                    drawingSystem.endDrawing();
                    isDrawing = false;
                }
            };

            window.addEventListener('pointerup', handlePointerUp);
            window.addEventListener('pointercancel', handlePointerUp);

            app.stage.on('pointerdown', (e) => {
                // スクリーン座標をワールド座標に変換
                const worldPoint = viewport ? viewport.toWorld(e.global) : e.global;
                
                // クリック系ツール処理
                drawingSystem.handleClick(worldPoint);
                
                // 描画系ツール処理
                if (drawingSystem.currentTool === 'pen' || drawingSystem.currentTool === 'eraser') {
                    drawingSystem.startDrawing(worldPoint);
                    isDrawing = true;
                }
            });

            app.stage.on('pointermove', (e) => {
                if (!isDrawing) return;
                
                const worldPoint = viewport ? viewport.toWorld(e.global) : e.global;
                drawingSystem.continueDrawing(worldPoint);
            });

            log('Pixi events setup complete');
        }

        handleKeyDown(e) {
            const ignoreInputs = ['INPUT', 'TEXTAREA'];
            if (ignoreInputs.includes(e.target?.tagName || '')) return;
            
            this.keys.add(e.code);

            // ツール切り替え
            if (e.code === 'KeyP') {
                document.getElementById('pen-tool')?.click();
                e.preventDefault();
            }
            if (e.code === 'KeyE') {
                document.getElementById('eraser-tool')?.click();
                e.preventDefault();
            }
            if (e.code === 'KeyB') {
                document.getElementById('bucket-tool')?.click();
                e.preventDefault();
            }
            if (e.code === 'KeyC') {
                document.getElementById('center-tool')?.click();
                e.preventDefault();
            }
            if (e.code === 'KeyR') {
                document.getElementById('reset-tool')?.click();
                e.preventDefault();
            }

            // 反転操作
            if (e.code === 'KeyH') {
                if (this.keys.has('ShiftLeft') || this.keys.has('ShiftRight')) {
                    this.flipVertically();
                } else {
                    this.flipHorizontally();
                }
                e.preventDefault();
            }
        }

        handleKeyUp(e) {
            this.keys.delete(e.code);
        }

        updateCoordinates(e) {
            const coordsElement = document.getElementById('coordinates');
            if (coordsElement) {
                coordsElement.textContent = `x: ${e.clientX}, y: ${e.clientY}`;
            }
        }

        // 変形操作
        centerViewport() {
            if (viewport) {
                viewport.moveCenter(WORLD_W / 2, WORLD_H / 2);
            }
            this.updateViewportStatus();
        }

        resetTransform() {
            if (viewport) {
                if (viewport.setZoom) {
                    viewport.setZoom(1, true);
                }
                viewport.moveCenter(WORLD_W / 2, WORLD_H / 2);
            }
            this.updateViewportStatus();
        }

        flipHorizontally() {
            if (viewport) {
                const center = viewport.center;
                viewport.scale.x *= -1;
                viewport.moveCenter(center.x, center.y);
            }
        }

        flipVertically() {
            if (viewport) {
                const center = viewport.center;
                viewport.scale.y *= -1;
                viewport.moveCenter(center.x, center.y);
            }
        }

        updateViewportStatus() {
            const statusElement = document.getElementById('viewport-info');
            if (statusElement && viewport) {
                const center = viewport.center;
                const x = Math.round(center.x);
                const y = Math.round(center.y);
                const scale = viewport.scale.x.toFixed(1);
                statusElement.textContent = `x:${x} y:${y} s:${scale} r:0°`;
            }
        }
    }

    // === UI管理システム ===
    class UIManager {
        constructor() {
            this.activeTools = { current: 'pen' };
            this.setupToolButtons();
            this.setupControlButtons();
            log('UIManager initialized');
        }

        setupToolButtons() {
            const tools = ['pen', 'eraser', 'bucket'];
            
            tools.forEach(tool => {
                const button = document.getElementById(`${tool}-tool`);
                if (button) {
                    button.addEventListener('click', () => this.setActiveTool(tool));
                }
            });

            // コントロールボタン
            const centerTool = document.getElementById('center-tool');
            const resetTool = document.getElementById('reset-tool');
            
            if (centerTool) {
                centerTool.addEventListener('click', () => {
                    inputManager.centerViewport();
                    this.showTransformPanel();
                });
            }
            
            if (resetTool) {
                resetTool.addEventListener('click', () => {
                    inputManager.resetTransform();
                    this.showTransformPanel();
                });
            }
        }

        setupControlButtons() {
            const centerBtn = document.getElementById('center-btn');
            const resetBtn = document.getElementById('reset-transform-btn');
            const flipHBtn = document.getElementById('flip-h-btn');
            const flipVBtn = document.getElementById('flip-v-btn');

            if (centerBtn) centerBtn.addEventListener('click', () => inputManager.centerViewport());
            if (resetBtn) resetBtn.addEventListener('click', () => inputManager.resetTransform());
            if (flipHBtn) flipHBtn.addEventListener('click', () => inputManager.flipHorizontally());
            if (flipVBtn) flipVBtn.addEventListener('click', () => inputManager.flipVertically());

            // パネル外クリックで閉じる
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.popup-panel') && !e.target.closest('#center-tool') && !e.target.closest('#reset-tool')) {
                    this.hideTransformPanel();
                }
            });
        }

        setActiveTool(toolName) {
            document.querySelectorAll('.tool-button').forEach(btn => {
                btn.classList.remove('active');
            });

            const toolButton = document.getElementById(`${toolName}-tool`);
            if (toolButton) {
                toolButton.classList.add('active');
            }

            if (drawingSystem) {
                drawingSystem.setTool(toolName);
            }

            this.activeTools.current = toolName;

            const statusElement = document.getElementById('current-tool');
            if (statusElement) {
                const toolNames = {
                    'pen': 'ベクターペン',
                    'eraser': '消しゴム',
                    'bucket': 'バケツ'
                };
                statusElement.textContent = toolNames[toolName] || toolName;
            }
        }

        showTransformPanel() {
            const panel = document.getElementById('transform-panel');
            if (panel) {
                panel.classList.add('show');
            }
        }

        hideTransformPanel() {
            const panel = document.getElementById('transform-panel');
            if (panel) {
                panel.classList.remove('show');
            }
        }
    }

    // === レイヤーパネル管理 ===
    function setupLayerPanel() {
        const addLayerBtn = document.getElementById('add-layer-btn');
        if (addLayerBtn) {
            addLayerBtn.addEventListener('click', () => {
                addNewLayer();
            });
        }
    }

    function addLayerToPanel(name, active = false) {
        const layerList = document.getElementById("layer-list");
        if (!layerList) return;

        const item = document.createElement("div");
        item.className = "layer-item" + (active ? " active" : "");
        item.innerHTML = `
            <div class="layer-visibility">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </div>
            <div class="layer-opacity">100%</div>
            <div class="layer-name">${name}</div>
            <div class="layer-thumbnail"><div class="layer-thumbnail-placeholder"></div></div>
        `;

        item.addEventListener('click', (e) => {
            if (e.target.closest('.layer-visibility')) {
                toggleLayerVisibility(item);
                return;
            }
            selectLayer(item);
        });

        layerList.insertBefore(item, layerList.firstChild);
    }

    function addNewLayer() {
        if (!layerManager || !world) return;
        
        const layerCount = layerManager.layers.length;
        const { layer, index } = layerManager.createLayer(`レイヤー${layerCount}`);
        
        world.addChild(layer);
        addLayerToPanel(layer.layerData.name, false);
        layerManager.setActiveLayer(index);
        layerManager.requestThumbnailUpdate(index);
    }

    function selectLayer(item) {
        document.querySelectorAll('.layer-item').forEach(li => li.classList.remove('active'));
        item.classList.add('active');

        const items = Array.from(document.querySelectorAll('.layer-item'));
        const index = items.indexOf(item);
        if (index >= 0 && layerManager) {
            const actualIndex = layerManager.layers.length - 1 - index;
            layerManager.setActiveLayer(actualIndex);
        }
    }

    function toggleLayerVisibility(item) {
        const visibilityBtn = item.querySelector('.layer-visibility');
        const isHidden = visibilityBtn.classList.toggle('hidden');
        
        const svg = visibilityBtn.querySelector('svg');
        if (isHidden) {
            svg.innerHTML = `
                <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/>
                <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/>
                <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/>
                <path d="m2 2 20 20"/>
            `;
        } else {
            svg.innerHTML = `
                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                <circle cx="12" cy="12" r="3"/>
            `;
        }
        
        const items = Array.from(document.querySelectorAll('.layer-item'));
        const index = items.indexOf(item);
        if (index >= 0 && layerManager) {
            const actualIndex = layerManager.layers.length - 1 - index;
            const layer = layerManager.layers[actualIndex];
            if (layer) {
                layer.visible = !isHidden;
            }
        }
    }

    // === 初期レイヤー作成 ===
    function createInitialLayers() {
        if (!layerManager || !world) return;
        
        // 背景レイヤー0
        const { layer: bgLayer, index: bgIndex } = layerManager.createLayer("背景", true);
        world.addChild(bgLayer);
        addLayerToPanel(bgLayer.layerData.name, false);

        // 通常レイヤー1
        const { layer: normalLayer, index: normalIndex } = layerManager.createLayer("レイヤー1");
        world.addChild(normalLayer);
        addLayerToPanel(normalLayer.layerData.name, true);

        layerManager.setActiveLayer(normalIndex);
        
        // サムネイル更新
        layerManager.requestThumbnailUpdate(bgIndex);
        layerManager.requestThumbnailUpdate(normalIndex);
        
        log('Initial layers created');
    }

    // === ステージ構成 ===
    function setupStage() {
        if (!app) return;
        
        // ワールドコンテナ（全レイヤーがここに入る）
        world = new PIXI.Container();
        world.label = 'world';
        
        // UIコンテナ（カメラフレーム等、viewport影響を受けない）
        uiContainer = new PIXI.Container();
        uiContainer.label = 'uiContainer';
        uiContainer.sortableChildren = true;
        
        try {
            // Viewportを試行
            const ViewportClass = window.Viewport || window.viewport?.Viewport;
            if (ViewportClass) {
                viewport = new ViewportClass({
                    screenWidth: app.renderer.width,
                    screenHeight: app.renderer.height,
                    worldWidth: WORLD_W,
                    worldHeight: WORLD_H,
                    interaction: app.renderer.plugins.interaction
                });
                
                viewport.drag().pinch().wheel().decelerate();
                log('Using pixi-viewport');
            } else {
                throw new Error('pixi-viewport not available');
            }
        } catch (error) {
            // フォールバック
            viewport = new SimpleViewport({
                screenWidth: app.renderer.width,
                screenHeight: app.renderer.height,
                worldWidth: WORLD_W,
                worldHeight: WORLD_H
            });
            log('Using simple viewport fallback');
        }
        
        // ステージ構成: stage > viewport > world + stage > uiContainer
        app.stage.addChild(viewport);
        app.stage.addChild(uiContainer);
        viewport.addChild(world);
        
        // カメラフレーム（UI層、viewport影響を受けない）
        const cameraFrame = new PIXI.Graphics();
        cameraFrame.label = 'cameraFrame';
        cameraFrame.zIndex = 1000;
        uiContainer.addChild(cameraFrame);
        
        function drawCameraFrame() {
            cameraFrame.clear();
            const x = (app.renderer.width - CANVAS_W) / 2;
            const y = (app.renderer.height - CANVAS_H) / 2;
            cameraFrame.position.set(x, y);
            cameraFrame.rect(0, 0, CANVAS_W, CANVAS_H);
            cameraFrame.stroke({ width: 2, color: 0xffffff, alpha: 0.8 });
        }
        
        drawCameraFrame();
        
        // リサイズ対応
        function handleResize() {
            app.renderer.resize(window.innerWidth, window.innerHeight);
            viewport.resize(app.renderer.width, app.renderer.height);
            drawCameraFrame();
        }
        
        window.addEventListener('resize', handleResize);
        
        // 初期位置：キャンバス中央にビューポートを配置
        viewport.moveCenter(WORLD_W / 2, WORLD_H / 2);
        
        log('Stage setup complete');
    }

    // === メイン初期化 ===
    async function initializeApp() {
        try {
            console.log('Initializing app...');
            
            // 依存関係チェック
            if (typeof PIXI === 'undefined') {
                throw new Error('PIXI not loaded');
            }
            
            const canvasElement = document.getElementById("drawing-canvas");
            if (!canvasElement) {
                throw new Error('drawing-canvas element not found');
            }
            
            // PIXI初期化
            app = await createApp(canvasElement);
            
            // ステージ構成
            setupStage();
            
            // システム初期化
            backgroundManager = new BackgroundManager();
            layerManager = new LayerManager(backgroundManager);
            drawingSystem = new DrawingSystem(layerManager, backgroundManager);
            inputManager = new InputManager();
            
            // UI初期化
            const uiManager = new UIManager();
            
            // イベント設定
            inputManager.setupPixiEvents();
            
            // 初期レイヤー作成
            createInitialLayers();
            
            // レイヤーパネル設定
            setupLayerPanel();
            
            // ステータス表示初期化
            const dprElement = document.getElementById('dpr-info');
            if (dprElement) {
                dprElement.textContent = (window.devicePixelRatio || 1).toFixed(1);
            }
            
            const canvasInfo = document.getElementById('canvas-info');
            if (canvasInfo) {
                canvasInfo.textContent = `${CANVAS_W}×${CANVAS_H}px`;
            }
            
            // Ticker: FPS・サムネイル更新・ビューポート状態更新
            app.ticker.add(() => {
                const fpsElement = document.getElementById("fps");
                if (fpsElement) {
                    fpsElement.textContent = Math.round(app.ticker.FPS);
                }
                
                if (layerManager) {
                    layerManager.processThumbnailUpdates();
                }
                
                if (inputManager) {
                    inputManager.updateViewportStatus();
                }
            });
            
            console.log("App initialized successfully");
            
        } catch (error) {
            console.error('Failed to initialize app:', error);
            
            // エラー表示
            const canvasElement = document.getElementById("drawing-canvas");
            if (canvasElement) {
                canvasElement.innerHTML = `<div style="color: red; padding: 20px; text-align: center;">
                    初期化エラー: ${error.message}<br>
                    コンソールを確認してください
                </div>`;
            }
        }
    }

    // === 起動処理 ===
    async function startApp() {
        console.log('Starting app...');
        
        // pixi-viewportの読み込みを試行（失敗してもfallbackで続行）
        try {
            await loadViewport();
            console.log('pixi-viewport loaded successfully');
        } catch (error) {
            console.warn('pixi-viewport failed to load, using fallback:', error.message);
        }
        
        // アプリ初期化
        await initializeApp();
    }

    // DOM読み込み完了後に開始
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', startApp);
    } else {
        startApp();
    }

    // デバッグ用グローバルメソッド
    window.debugApp = () => {
        console.log("=== App Debug Info ===");
        console.log("PIXI:", typeof PIXI !== 'undefined');
        console.log("app:", !!app);
        console.log("viewport:", !!viewport);
        console.log("world:", !!world);
        console.log("backgroundManager:", !!backgroundManager);
        console.log("layerManager:", !!layerManager);
        console.log("drawingSystem:", !!drawingSystem);
        console.log("inputManager:", !!inputManager);
        
        if (app) {
            console.log("Canvas size:", app.canvas.width, 'x', app.canvas.height);
            console.log("Renderer size:", app.renderer.width, 'x', app.renderer.height);
        }
        
        if (layerManager) {
            console.log("Layers count:", layerManager.layers.length);
            console.log("Active layer:", layerManager.activeLayerIndex);
        }
    };

})();
