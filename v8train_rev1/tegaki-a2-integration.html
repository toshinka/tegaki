<script>
/**
 * 🚂 A2-Integration（統合制御車両）
 * @provides: イベント配線、車両間API、全体制御
 * @depends: A1-Core
 * @role: 統合層
 * 
 * v7rev2完全移植：メインアプリケーションクラスの初期化部分、
 * 車両間のデータ受け渡し、イベントハンドリングの配線
 */

// ==== Tool System (v7rev2完全移植) ====
class ToolSystem {
    constructor() {
        this.currentTool = 'pen';
        this.brushSize = 16.0;        // Symbol Dictionary準拠
        this.brushColor = 0x800000;   // ふたば茶
        this.opacity = 0.85;          // 85%
        this.pressure = 0.5;          // 50%
        this.smoothing = 0.3;         // 30%
        this.isDrawing = false;
        this.currentPath = null;
        this.lastPoint = null;
    }
    
    setTool(tool) {
        this.currentTool = tool;
    }
    
    setBrushSize(size) {
        this.brushSize = Math.max(0.1, Math.min(100, Math.round(size * 10) / 10));
    }
    
    setOpacity(opacity) {
        this.opacity = Math.max(0, Math.min(1, Math.round(opacity * 1000) / 1000));
    }
    
    setPressure(pressure) {
        this.pressure = Math.max(0, Math.min(1, Math.round(pressure * 1000) / 1000));
    }
    
    setSmoothing(smoothing) {
        this.smoothing = Math.max(0, Math.min(1, Math.round(smoothing * 1000) / 1000));
    }
    
    startDrawing(engine, x, y) {
        this.isDrawing = true;
        this.lastPoint = { x, y };
        this.currentPath = engine.createPath(x, y, this.brushSize, this.brushColor, this.opacity, this.currentTool);
    }
    
    continueDrawing(engine, x, y) {
        if (!this.isDrawing || !this.currentPath) return;
        
        engine.drawLine(this.currentPath, x, y);
        this.lastPoint = { x, y };
    }
    
    stopDrawing() {
        if (this.currentPath) {
            this.currentPath.isComplete = true;
        }
        this.isDrawing = false;
        this.currentPath = null;
        this.lastPoint = null;
    }
}

// ==== Main Application Integration (v7rev2完全移植) ====
class FutabaDrawingTool {
    constructor() {
        this.engine = new window.TegakiA1Core.DrawingEngine(400, 400);
        this.toolSystem = new ToolSystem();
        this.ui = null;           // B1-UIで初期化
        this.monitor = null;      // B2-Statusで初期化
    }
    
    async init() {
        console.log('🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8 統合制御初期化開始');
        
        await this.engine.init();
        this.setupCanvasEvents();
        this.setupResizeHandlers();
        this.updateCanvasInfo();
        
        console.log('✅ A2-Integration 初期化完了');
    }
    
    setupCanvasEvents() {
        this.engine.app.stage.on('pointerdown', (event) => {
            if (this.ui && this.ui.activePopup) return;
            
            const point = this.engine.getLocalPointerPosition(event);
            this.toolSystem.startDrawing(this.engine, point.x, point.y);
        });
        
        this.engine.app.stage.on('pointermove', (event) => {
            const point = this.engine.getLocalPointerPosition(event);
            
            // 座標表示更新
            const coordsElement = document.getElementById('coordinates');
            if (coordsElement) {
                coordsElement.textContent = `x: ${Math.round(point.x)}, y: ${Math.round(point.y)}`;
            }
            
            // 筆圧モニター更新（簡易実装）
            if (this.toolSystem.isDrawing) {
                const pressure = Math.min(100, this.toolSystem.pressure * 100 + Math.random() * 20);
                const pressureElement = document.getElementById('pressure-monitor');
                if (pressureElement) {
                    pressureElement.textContent = pressure.toFixed(1) + '%';
                }
            }
            
            // 描画続行
            if (!this.ui || !this.ui.activePopup) {
                this.toolSystem.continueDrawing(this.engine, point.x, point.y);
            }
        });
        
        this.engine.app.stage.on('pointerup', () => {
            this.toolSystem.stopDrawing();
            // 筆圧モニターをリセット
            const pressureElement = document.getElementById('pressure-monitor');
            if (pressureElement) {
                pressureElement.textContent = '0.0%';
            }
        });
        
        this.engine.app.stage.on('pointerupoutside', () => {
            this.toolSystem.stopDrawing();
            // 筆圧モニターをリセット
            const pressureElement = document.getElementById('pressure-monitor');
            if (pressureElement) {
                pressureElement.textContent = '0.0%';
            }
        });
    }
    
    setupResizeHandlers() {
        const applyResizeBtn = document.getElementById('apply-resize');
        if (applyResizeBtn) {
            applyResizeBtn.addEventListener('click', () => {
                this.applyResize(false);
            });
        }
        
        const applyResizeCenterBtn = document.getElementById('apply-resize-center');
        if (applyResizeCenterBtn) {
            applyResizeCenterBtn.addEventListener('click', () => {
                this.applyResize(true);
            });
        }
    }
    
    applyResize(centerContent) {
        const width = parseInt(document.getElementById('canvas-width').value);
        const height = parseInt(document.getElementById('canvas-height').value);
        this.engine.resize(width, height, centerContent);
        this.updateCanvasInfo();
        if (this.ui) {
            this.ui.closeAllPopups();
        }
    }
    
    updateCanvasInfo() {
        const canvasInfoElement = document.getElementById('canvas-info');
        if (canvasInfoElement) {
            canvasInfoElement.textContent = `${this.engine.width}×${this.engine.height}px`;
        }
    }
}

// A2-Integration車両をグローバルエクスポート
window.TegakiA2Integration = {
    ToolSystem,
    FutabaDrawingTool
};
