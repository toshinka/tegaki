<script>
/**
 * 🚋 B2-Status（ステータス表示車両）
 * @provides: ステータスバー、FPS監視、座標表示
 * @depends: A1-Core, A2-Integration
 * @role: 監視・表示
 * 
 * v7rev2完全移植：PerformanceMonitorクラス、ステータスバー更新ロジック、
 * リアルタイム情報表示
 */

// ==== Performance Monitor (v7rev2完全移植) ====
class PerformanceMonitor {
    constructor() {
        this.frameCount = 0;
        this.lastTime = performance.now();
    }
    
    start() {
        const update = () => {
            this.frameCount++;
            const currentTime = performance.now();
            
            if (currentTime - this.lastTime >= 1000) {
                const fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                const fpsElement = document.getElementById('fps');
                if (fpsElement) {
                    fpsElement.textContent = fps;
                }
                
                this.frameCount = 0;
                this.lastTime = currentTime;
            }
            
            requestAnimationFrame(update);
        };
        
        update();
    }
}

// ==== Status Controller ====
class StatusController {
    constructor() {
        this.monitor = new PerformanceMonitor();
        this.gpuUsageSimulator = 45; // 初期値
        this.memoryUsageSimulator = 1.2; // 初期値 GB
    }
    
    init() {
        this.monitor.start();
        this.startStatusUpdates();
        this.initializeStaticStatus();
    }
    
    initializeStaticStatus() {
        // 初期ステータス値の設定（Symbol Dictionary準拠）
        const elements = {
            'canvas-info': '400×400px',
            'current-tool': 'ベクターペン',
            'current-color': '#800000',
            'coordinates': 'x: 0, y: 0',
            'pressure-monitor': '0.0%',
            'gpu-usage': '45%',
            'memory-usage': '1.2GB'
        };
        
        Object.entries(elements).forEach(([id, value]) => {
            const element = document.getElementById(id);
            if (element) {
                element.textContent = value;
            }
        });
    }
    
    startStatusUpdates() {
        // GPU使用率とメモリ使用量のシミュレーション（v7rev2準拠）
        setInterval(() => {
            // GPU使用率の更新（40-50%の範囲で変動）
            this.gpuUsageSimulator += (Math.random() - 0.5) * 2;
            this.gpuUsageSimulator = Math.max(40, Math.min(50, this.gpuUsageSimulator));
            
            const gpuElement = document.getElementById('gpu-usage');
            if (gpuElement) {
                gpuElement.textContent = Math.round(this.gpuUsageSimulator) + '%';
            }
            
            // メモリ使用量の更新（1.0-1.5GBの範囲で変動）
            this.memoryUsageSimulator += (Math.random() - 0.5) * 0.02;
            this.memoryUsageSimulator = Math.max(1.0, Math.min(1.5, this.memoryUsageSimulator));
            
            const memoryElement = document.getElementById('memory-usage');
            if (memoryElement) {
                memoryElement.textContent = this.memoryUsageSimulator.toFixed(1) + 'GB';
            }
        }, 2000); // 2秒間隔で更新
    }
    
    updateCanvasInfo(width, height) {
        const element = document.getElementById('canvas-info');
        if (element) {
            element.textContent = `${width}×${height}px`;
        }
    }
    
    updateCurrentTool(toolName) {
        const element = document.getElementById('current-tool');
        if (element) {
            element.textContent = toolName;
        }
    }
    
    updateCurrentColor(color) {
        const element = document.getElementById('current-color');
        if (element) {
            element.textContent = color;
        }
    }
    
    updateCoordinates(x, y) {
        const element = document.getElementById('coordinates');
        if (element) {
            element.textContent = `x: ${Math.round(x)}, y: ${Math.round(y)}`;
        }
    }
    
    updatePressure(pressure) {
        const element = document.getElementById('pressure-monitor');
        if (element) {
            element.textContent = pressure.toFixed(1) + '%';
        }
    }
    
    resetPressure() {
        const element = document.getElementById('pressure-monitor');
        if (element) {
            element.textContent = '0.0%';
        }
    }
}

// B2-Status車両をグローバルエクスポート
window.TegakiB2Status = {
    PerformanceMonitor,
    StatusController
};
</script>
