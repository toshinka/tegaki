<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8A1 - スター型Hub版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --futaba-maroon: #800000;
            --futaba-light-maroon: #aa5a56;
            --futaba-medium: #cf9c97;
            --futaba-light-medium: #e9c2ba;
            --futaba-cream: #f0e0d6;
            --futaba-background: #ffffee;
            
            --text-primary: #2c1810;
            --text-secondary: #5d4037;
            --text-inverse: #ffffff;
            
            /* レイヤーUI専用色 */
            --layer-bg: rgba(240, 224, 214, 0.95);
            --layer-item-bg: rgba(255, 255, 238, 0.9);
            --layer-item-active: rgba(170, 90, 86, 0.2);
            --layer-border: rgba(207, 156, 151, 0.3);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: var(--futaba-background);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-size: 12px;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 50px 1fr;
            height: 100vh;
            width: 100vw;
            gap: 0;
        }
        
        .sidebar {
            background: var(--futaba-cream);
            border-right: 2px solid var(--futaba-light-medium);
            display: flex;
            flex-direction: column;
            padding: 12px 6px;
            gap: 4px;
            overflow-y: auto;
            position: relative;
            z-index: 100;
        }
        
        .tool-button {
            width: 36px;
            height: 36px;
            border: 2px solid var(--futaba-light-medium);
            background: var(--futaba-background);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--futaba-maroon);
            position: relative;
            user-select: none;
        }
        
        .tool-button :is(img, svg) {
            width: 20px;
            height: 20px;
        }
        
        .tool-button:hover {
            background: var(--futaba-medium);
            border-color: var(--futaba-light-maroon);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(128, 0, 0, 0.2);
        }
        
        .tool-button.active {
            background: var(--futaba-maroon);
            color: var(--text-inverse);
            border-color: var(--futaba-maroon);
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.3);
        }
        
        .tool-button.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .tool-button.disabled:hover {
            transform: none;
            box-shadow: none;
        }
        
        .tool-separator {
            height: 1px;
            background: var(--futaba-light-medium);
            margin: 4px 2px;
        }
        
        .canvas-area {
            background: var(--futaba-background);
            position: relative;
            overflow: visible;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }
        
        .canvas-container {
            background: var(--futaba-cream);
            display: inline-block;
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.1);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            touch-action: none;
            overflow: hidden;
        }
        
        /* チェッカーボードオーバーレイ */
        .checkerboard-overlay {
            position: absolute;
            inset: 0;
            background-size: 16px 16px;
            background-image:
                linear-gradient(45deg, #eee 25%, transparent 25%),
                linear-gradient(-45deg, #eee 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #eee 75%),
                linear-gradient(-45deg, transparent 75%, #eee 75%);
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        canvas {
            border: none;
            display: block;
            cursor: crosshair;
            touch-action: none;
            position: relative;
            z-index: 2;
        }
        
        /* レイヤーパネル（B2_interface衛星で管理） */
        .layer-panel {
            position: fixed;
            right: 12px;
            top: 60px;
            width: 200px;
            background: var(--layer-bg);
            border: 1px solid var(--layer-border);
            border-radius: 12px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 24px rgba(128, 0, 0, 0.15);
            z-index: 200;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: opacity 0.2s ease;
        }
        
        .layer-panel.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        /* ステータスパネル */
        .status-panel {
            position: fixed;
            bottom: 20px;
            left: 70px;
            right: 20px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-medium);
            border-radius: 12px;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.1);
            z-index: 50;
        }
        
        .status-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* 初期化メッセージ */
        .init-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-maroon);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: var(--futaba-maroon);
            font-size: 14px;
            box-shadow: 0 8px 24px rgba(128, 0, 0, 0.15);
            z-index: 1000;
        }
        
        .init-success {
            color: #006600;
            border-color: #006600;
        }
        
        .init-error {
            color: #cc0000;
            border-color: #cc0000;
        }
        
        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--layer-border);
            border-radius: 50%;
            border-top-color: var(--futaba-maroon);
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="sidebar">
            <div class="tool-button" id="resize-tool" title="リサイズ">
                <img src="https://cdn.jsdelivr.net/npm/@tabler/icons/icons/outline/resize.svg" alt="resize">
            </div>
            
            <div class="tool-button active" id="layer-tool" title="レイヤー">
                <img src="https://cdn.jsdelivr.net/npm/lucide-static/icons/layers.svg" alt="layers">
            </div>
            
            <div class="tool-separator"></div>
                   
            <div class="tool-button" id="pen-tool" title="ベクターペン">
                <img src="https://cdn.jsdelivr.net/npm/lucide-static/icons/pencil-line.svg" alt="pen">
            </div>
            
            <div class="tool-button" id="eraser-tool" title="消しゴム">
                <img src="https://cdn.jsdelivr.net/npm/lucide-static/icons/eraser.svg" alt="eraser">
            </div>
        </div>
        
        <div class="canvas-area">
            <div class="canvas-container" id="canvas-container">
                <div class="checkerboard-overlay" id="checkerboard-overlay"></div>
                <div id="drawing-canvas"></div>
            </div>
        </div>
        
        <!-- レイヤーパネル（B2_interface衛星で制御） -->
        <div class="layer-panel hidden" id="layer-panel">
            <!-- 動的に生成される -->
        </div>
    </div>
    
    <!-- ステータスパネル -->
    <div class="status-panel">
        <div class="status-group">
            <div class="status-item">Hub: <span id="hub-status">🚀 起動中</span></div>
            <div class="status-item">衛星: <span id="satellite-count">0/4</span></div>
            <div class="status-item">Tool: <span id="current-tool">ペン</span></div>
            <div class="status-item">Layer: <span id="current-layer">背景</span></div>
        </div>
        
        <div class="status-group">
            <div class="status-item">Canvas: <span id="canvas-info">400×400px</span></div>
            <div class="status-item">FPS: <span id="fps">0</span></div>
        </div>
    </div>
    
    <!-- 初期化メッセージ -->
    <div class="init-message" id="init-message">
        <div class="spinner"></div>
        スター型アーキテクチャを初期化中...
    </div>

    <!-- PixiJS v8 and Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.0.5/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    
    <script>
        /**
         * 🌟 ふたば☆ちゃんねる風ベクターお絵かきツール v8A1
         * スター型アーキテクチャ - 主星Hub
         * 
         * 【責務】: 衛星の統制・調整・ルーティング
         * - AppBootstrap（ライブラリ初期化）
         * - SatelliteOrchestrator（衛星管理）
         * - EventDispatcher（イベント配信）
         * - 基本DOM操作
         */
        
        // ==== Configuration ====
        const HUB_CONFIG = {
            version: '8.0.A1-star-hub',
            satellites: {
                A1: { name: 'A1_state_satellite.js', required: true },
                B1: { name: 'B1_drawing_satellite.js', required: true },
                B2: { name: 'B2_interface_satellite.js', required: true },
                B3: { name: 'B3_tools_satellite.js', required: true }
            },
            canvas: { width: 400, height: 400 },
            debug: true
        };
        
        // ==== Utility Functions ====
        const log = (message, ...args) => {
            if (HUB_CONFIG.debug) console.log(`🌟 Hub: ${message}`, ...args);
        };
        
        const showMessage = (message, type = 'info') => {
            const messageEl = document.getElementById('init-message');
            if (messageEl) {
                messageEl.innerHTML = message;
                messageEl.className = `init-message ${type === 'success' ? 'init-success' : type === 'error' ? 'init-error' : ''}`;
            }
        };
        
        const hideMessage = () => {
            const messageEl = document.getElementById('init-message');
            if (messageEl) {
                messageEl.style.display = 'none';
            }
        };
        
        // ==== AppBootstrap: Library Management ====
        class AppBootstrap {
            static checkLibraries() {
                const required = { 
                    pixi: window.PIXI, 
                    gsap: window.gsap 
                };
                
                return Object.entries(required).every(([name, lib]) => {
                    if (!lib) {
                        console.error(`❌ Library ${name} not found`);
                        showMessage(`❌ ライブラリ ${name} が見つかりません`, 'error');
                        return false;
                    }
                    log(`✅ Library ${name} loaded`);
                    return true;
                });
            }
            
            static init() {
                log(`🚀 Bootstrap: Initializing v${HUB_CONFIG.version}`);
                showMessage('📚 ライブラリを確認中...', 'info');
                return this.checkLibraries();
            }
        }
        
        // ==== EventDispatcher: 衛星間のイベント配信 ====
        class EventDispatcher {
            constructor() {
                this.subscribers = new Map();
                this.eventHistory = [];
                this.maxHistorySize = 100;
            }
            
            subscribe(event, callback, satelliteId = 'unknown') {
                if (!this.subscribers.has(event)) {
                    this.subscribers.set(event, []);
                }
                
                this.subscribers.get(event).push({
                    callback,
                    satelliteId,
                    timestamp: Date.now()
                });
                
                log(`📡 Event subscription: ${event} from ${satelliteId}`);
            }
            
            unsubscribe(event, callback) {
                if (this.subscribers.has(event)) {
                    const callbacks = this.subscribers.get(event);
                    const index = callbacks.findIndex(sub => sub.callback === callback);
                    if (index !== -1) {
                        callbacks.splice(index, 1);
                        log(`📡 Event unsubscription: ${event}`);
                    }
                }
            }
            
            dispatch(event, data, sourceId = 'hub') {
                // イベント履歴に記録
                this.eventHistory.push({
                    event,
                    data,
                    sourceId,
                    timestamp: Date.now()
                });
                
                // 履歴サイズ制限
                if (this.eventHistory.length > this.maxHistorySize) {
                    this.eventHistory.shift();
                }
                
                // 購読者に配信
                if (this.subscribers.has(event)) {
                    this.subscribers.get(event).forEach(subscriber => {
                        try {
                            subscriber.callback(data, sourceId);
                        } catch (error) {
                            console.error(`📡 Event dispatch error: ${event} to ${subscriber.satelliteId}`, error);
                        }
                    });
                }
                
                log(`📡 Event dispatched: ${event} from ${sourceId}`, data);
            }
            
            getEventHistory(count = 10) {
                return this.eventHistory.slice(-count);
            }
        }
        
        // ==== SatelliteOrchestrator: 衛星管理 ====
        class SatelliteOrchestrator {
            constructor(eventDispatcher) {
                this.eventDispatcher = eventDispatcher;
                this.satellites = new Map();
                this.loadQueue = [];
                this.loadedCount = 0;
                this.totalCount = 0;
                this.initializationPromise = null;
            }
            
            async initializeSatellites() {
                if (this.initializationPromise) {
                    return this.initializationPromise;
                }
                
                this.initializationPromise = this._doInitialize();
                return this.initializationPromise;
            }
            
            async _doInitialize() {
                try {
                    log('🛰️ Starting satellite initialization');
                    showMessage('🛰️ 衛星を初期化中...', 'info');
                    
                    // 衛星スクリプトの読み込み
                    await this.loadAllSatellites();
                    
                    // A1衛星（状態管理）を最初に初期化
                    await this.initializeStateSatellite();
                    
                    // 他の衛星を順次初期化
                    await this.initializeOtherSatellites();
                    
                    // 衛星間の接続確認
                    this.verifyConnections();
                    
                    log('🛰️ All satellites initialized successfully');
                    showMessage('✅ スター型システム初期化完了', 'success');
                    
                    setTimeout(hideMessage, 2000);
                    return true;
                    
                } catch (error) {
                    console.error('🛰️ Satellite initialization failed:', error);
                    showMessage(`❌ 衛星初期化失敗: ${error.message}`, 'error');
                    return false;
                }
            }
            
            async loadAllSatellites() {
                this.totalCount = Object.keys(HUB_CONFIG.satellites).length;
                this.updateSatelliteCount();
                
                const loadPromises = Object.entries(HUB_CONFIG.satellites).map(
                    ([id, config]) => this.loadSatellite(id, config)
                );
                
                await Promise.all(loadPromises);
                log(`🛰️ All ${this.totalCount} satellites loaded`);
            }
            
            loadSatellite(satelliteId, config) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = config.name;
                    
                    script.onload = () => {
                        this.loadedCount++;
                        this.updateSatelliteCount();
                        log(`📥 Satellite loaded: ${satelliteId} (${config.name})`);
                        resolve();
                    };
                    
                    script.onerror = () => {
                        const error = new Error(`Failed to load satellite: ${config.name}`);
                        console.error('📥 Satellite load error:', error);
                        
                        if (config.required) {
                            reject(error);
                        } else {
                            log(`⚠️ Optional satellite ${satelliteId} failed to load`);
                            resolve();
                        }
                    };
                    
                    document.head.appendChild(script);
                    log(`📤 Loading satellite: ${satelliteId} (${config.name})`);
                });
            }
            
            async initializeStateSatellite() {
                if (!window.A1StateSatellite) {
                    throw new Error('A1StateSatellite not found');
                }
                
                const stateSatellite = new window.A1StateSatellite();
                const success = await stateSatellite.initialize();
                
                if (!success) {
                    throw new Error('A1StateSatellite initialization failed');
                }
                
                this.satellites.set('A1', {
                    instance: stateSatellite,
                    managers: stateSatellite.getManagers(),
                    status: 'initialized'
                });
                
                log('🛰️ A1StateSatellite initialized');
            }
            
            async initializeOtherSatellites() {
                // B1: 描画衛星
                if (window.B1DrawingSatellite) {
                    const drawingSatellite = new window.B1DrawingSatellite();
                    await drawingSatellite.initialize(this.getStateManager(), this.eventDispatcher);
                    this.satellites.set('B1', {
                        instance: drawingSatellite,
                        status: 'initialized'
                    });
                    log('🛰️ B1DrawingSatellite initialized');
                }
                
                // B2: UI衛星
                if (window.B2InterfaceSatellite) {
                    const interfaceSatellite = new window.B2InterfaceSatellite();
                    await interfaceSatellite.initialize(this.getStateManager(), this.eventDispatcher);
                    this.satellites.set('B2', {
                        instance: interfaceSatellite,
                        status: 'initialized'
                    });
                    log('🛰️ B2InterfaceSatellite initialized');
                }
                
                // B3: ツール衛星
                if (window.B3ToolsSatellite) {
                    const toolsSatellite = new window.B3ToolsSatellite();
                    await toolsSatellite.initialize(this.getStateManager(), this.eventDispatcher);
                    this.satellites.set('B3', {
                        instance: toolsSatellite,
                        status: 'initialized'
                    });
                    log('🛰️ B3ToolsSatellite initialized');
                }
            }
            
            verifyConnections() {
                const requiredSatellites = ['A1'];
                const missing = requiredSatellites.filter(id => !this.satellites.has(id));
                
                if (missing.length > 0) {
                    throw new Error(`Required satellites missing: ${missing.join(', ')}`);
                }
                
                // 状態管理衛星の動作確認
                const stateManager = this.getStateManager();
                if (!stateManager || !stateManager.validateState()) {
                    throw new Error('StateManager validation failed');
                }
                
                log('🔗 All satellite connections verified');
            }
            
            getStateManager() {
                const a1 = this.satellites.get('A1');
                return a1 ? a1.managers.state : null;
            }
            
            getLayerManager() {
                const a1 = this.satellites.get('A1');
                return a1 ? a1.managers.layer : null;
            }
            
            getToolManager() {
                const a1 = this.satellites.get('A1');
                return a1 ? a1.managers.tool : null;
            }
            
            getHistoryManager() {
                const a1 = this.satellites.get('A1');
                return a1 ? a1.managers.history : null;
            }
            
            getSatellite(id) {
                return this.satellites.get(id);
            }
            
            updateSatelliteCount() {
                const statusEl = document.getElementById('satellite-count');
                if (statusEl) {
                    statusEl.textContent = `${this.loadedCount}/${this.totalCount}`;
                }
            }
            
            dumpStatus() {
                console.group('🛰️ SatelliteOrchestrator: Status');
                console.log('Loaded satellites:', Array.from(this.satellites.keys()));
                console.log('Event history:', this.eventDispatcher.getEventHistory());
                
                this.satellites.forEach((satellite, id) => {
                    console.log(`${id}:`, satellite.status);
                });
                
                console.groupEnd();
            }
        }
        
        // ==== HubController: 主星統合制御 ====
        class HubController {
            constructor() {
                this.eventDispatcher = new EventDispatcher();
                this.orchestrator = new SatelliteOrchestrator(this.eventDispatcher);
                this.initialized = false;
                this.spacePressed = false;
            }
            
            async initialize() {
                try {
                    log('🌟 HubController: Starting initialization');
                    this.updateHubStatus('初期化中...');
                    
                    // 衛星システムの初期化
                    const success = await this.orchestrator.initializeSatellites();
                    
                    if (!success) {
                        throw new Error('Satellite initialization failed');
                    }
                    
                    // イベントハンドラーの設定
                    this.setupEventHandlers();
                    
                    // 状態変更の購読
                    this.subscribeToStateChanges();
                    
                    this.initialized = true;
                    this.updateHubStatus('✅ 動作中');
                    
                    log('🌟 HubController: Initialization complete');
                    console.log('🎨 Futaba Drawing Tool v8A1 - Star Architecture Ready!');
                    console.log('📊 System Status:');
                    console.log('  🌟 Hub: Operational');
                    console.log('  🛰️ A1 State Satellite: Active');
                    console.log('  🛰️ B-Series Satellites: Loading...');
                    
                    return true;
                    
                } catch (error) {
                    console.error('🌟 HubController: Initialization failed:', error);
                    this.updateHubStatus('❌ 初期化失敗');
                    return false;
                }
            }
            
            setupEventHandlers() {
                // スペースキーハンドリング
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        this.spacePressed = true;
                        this.orchestrator.getStateManager()?.setSpacePressed(true);
                        e.preventDefault();
                    }
                    
                    // ショートカット処理
                    this.handleShortcuts(e);
                });
                
                document.addEventListener('keyup', (e) => {
                    if (e.code === 'Space') {
                        this.spacePressed = false;
                        this.orchestrator.getStateManager()?.setSpacePressed(false);
                    }
                });
                
                // ツールボタンイベント
                this.setupToolButtons();
                
                // ウィンドウイベント
                window.addEventListener('blur', () => {
                    this.spacePressed = false;
                    this.orchestrator.getStateManager()?.setSpacePressed(false);
                });
            }
            
            setupToolButtons() {
                const toolButtons = [
                    { id: 'pen-tool', tool: 'pen' },
                    { id: 'eraser-tool', tool: 'eraser' },
                    { id: 'layer-tool', tool: 'layer' },
                    { id: 'resize-tool', tool: 'resize' }
                ];
                
                toolButtons.forEach(({ id, tool }) => {
                    const button = document.getElementById(id);
                    if (button) {
                        button.addEventListener('click', () => {
                            this.selectTool(tool);
                        });
                    }
                });
            }
            
            handleShortcuts(e) {
                if (e.ctrlKey || e.metaKey) {
                    switch (e.key.toLowerCase()) {
                        case 'z':
                            e.preventDefault();
                            if (e.shiftKey) {
                                this.orchestrator.getHistoryManager()?.redo();
                            } else {
                                this.orchestrator.getHistoryManager()?.undo();
                            }
                            break;
                            
                        case 'y':
                            e.preventDefault();
                            this.orchestrator.getHistoryManager()?.redo();
                            break;
                            
                        case 'n':
                            e.preventDefault();
                            this.orchestrator.getLayerManager()?.addLayer();
                            break;
                    }
                }
                
                // 数字キーでツール切り替え
                const toolMap = {
                    '1': 'pen',
                    '2': 'eraser',
                    '3': 'layer',
                    '4': 'resize'
                };
                
                if (toolMap[e.key]) {
                    this.selectTool(toolMap[e.key]);
                }
            }
            
            selectTool(tool) {
                const toolManager = this.orchestrator.getToolManager();
                if (toolManager && toolManager.selectTool(tool)) {
                    this.updateToolButtons(tool);
                }
            }
            
            updateToolButtons(activeTool) {
                document.querySelectorAll('.tool-button').forEach(button => {
                    button.classList.remove('active');
                });
                
                const toolButtonMap = {
                    'pen': 'pen-tool',
                    'eraser': 'eraser-tool',
                    'layer': 'layer-tool',
                    'resize': 'resize-tool'
                };
                
                const activeButtonId = toolButtonMap[activeTool];
                if (activeButtonId) {
                    const activeButton = document.getElementById(activeButtonId);
                    if (activeButton) {
                        activeButton.classList.add('active');
                    }
                }
            }
            
            subscribeToStateChanges() {
                const stateManager = this.orchestrator.getStateManager();
                if (!stateManager) return;
                
                // レイヤー変更の購読
                stateManager.subscribe('layer.activated', (data) => {
                    this.updateCurrentLayer(data.layer.name);
                });
                
                // ツール変更の購読
                stateManager.subscribe('tool.changed', (data) => {
                    this.updateCurrentTool(data.tool);
                    this.updateToolButtons(data.tool);
                });
                
                // チェッカーボード表示の購読
                stateManager.subscribe('ui.checkerboard.changed', (data) => {
                    this.updateCheckerboard(data.visible);
                });
            }
            
            updateHubStatus(status) {
                const statusEl = document.getElementById('hub-status');
                if (statusEl) {
                    statusEl.textContent = status;
                }
            }
            
            updateCurrentTool(tool) {
                const toolNames = {
                    pen: 'ペン',
                    eraser: '消しゴム',
                    layer: 'レイヤー',
                    resize: 'リサイズ'
                };
                
                const toolEl = document.getElementById('current-tool');
                if (toolEl) {
                    toolEl.textContent = toolNames[tool] || tool;
                }
            }
            
            updateCurrentLayer(layerName) {
                const layerEl = document.getElementById('current-layer');
                if (layerEl) {
                    layerEl.textContent = layerName || '不明';
                }
            }
            
            updateCheckerboard(visible) {
                const overlay = document.getElementById('checkerboard-overlay');
                if (overlay) {
                    overlay.style.opacity = visible ? '1' : '0';
                }
            }
            
            // デバッグメソッド
            dumpSystemStatus() {
                console.group('🌟 Hub System Status');
                console.log('Hub initialized:', this.initialized);
                console.log('Space pressed:', this.spacePressed);
                this.orchestrator.dumpStatus();
                
                const stateManager = this.orchestrator.getStateManager();
                if (stateManager) {
                    stateManager.dumpState();
                }
                
                console.groupEnd();
            }
        }
        
        // ==== Application Bootstrap ====
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // ライブラリ初期化
                if (!AppBootstrap.init()) {
                    throw new Error('Library initialization failed');
                }
                
                // Hub制御システム起動
                window.futabaHub = new HubController();
                const success = await window.futabaHub.initialize();
                
                if (!success) {
                    throw new Error('Hub initialization failed');
                }
                
                // デバッグ用グローバル関数
                if (HUB_CONFIG.debug) {
                    window.dumpHub = () => window.futabaHub.dumpSystemStatus();
                    console.log('🔧 Debug: Use dumpHub() to inspect system status');
                }
                
            } catch (error) {
                console.error('💥 Application startup failed:', error);
                showMessage(`💥 起動失敗: ${error.message}`, 'error');
            }
        });
    </script>
</body>
</html>
