<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8-Phase1 - スリム化版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --futaba-maroon: #800000;
            --futaba-light-maroon: #aa5a56;
            --futaba-medium: #cf9c97;
            --futaba-light-medium: #e9c2ba;
            --futaba-cream: #f0e0d6;
            --futaba-background: #ffffee;
            
            --text-primary: #2c1810;
            --text-secondary: #5d4037;
            --text-inverse: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: var(--futaba-background);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 50px 1fr;
            height: 100vh;
            width: 100vw;
            gap: 0;
        }
        
        .sidebar-container {
            position: relative;
            z-index: 100;
        }
        
        .canvas-area {
            background: var(--futaba-background);
            position: relative;
            overflow: visible;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }
        
        .canvas-container {
            background: var(--futaba-cream);
            display: inline-block;
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.1);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            touch-action: none;
        }
        
        canvas {
            border: none;
            display: block;
            cursor: crosshair;
            touch-action: none;
        }
        
        .layer-panel-container {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        
        .layer-add-button {
            width: 36px;
            height: 36px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-light-medium);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.1);
            pointer-events: all;
        }
        
        .layer-add-button:hover {
            background: var(--futaba-medium);
            transform: scale(1.1);
        }
        
        .layer-add-button svg {
            width: 18px;
            height: 18px;
            stroke: #800000;
        }
        
        .layer-panel-items {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: transparent;
            border-radius: 8px;
            padding: 8px;
            pointer-events: all;
        }
        
        .layer-item {
            width: 140px;
            height: 48px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-light-medium);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            position: relative;
            box-shadow: 0 2px 4px rgba(128, 0, 0, 0.1);
        }
        
        .layer-item:hover {
            border-color: var(--futaba-medium);
            background: var(--futaba-background);
        }
        
        .layer-item.active {
            border-color: var(--futaba-maroon);
            background: var(--futaba-light-medium);
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.2);
        }
        
        .layer-name {
            flex: 1;
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 500;
            margin-right: 8px;
        }
        
        .layer-visibility {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        
        .layer-visibility:hover {
            background: var(--futaba-light-medium);
        }
        
        .layer-visibility svg {
            width: 14px;
            height: 14px;
            stroke: #800000;
        }
        
        .layer-visibility.hidden svg {
            opacity: 0.3;
        }
        
        .layer-delete-button {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            margin-left: 4px;
        }
        
        .layer-delete-button:hover {
            background: rgba(128, 0, 0, 0.1);
        }
        
        .layer-delete-button svg {
            width: 12px;
            height: 12px;
            stroke: #800000;
        }
        
        .status-panel {
            position: fixed;
            bottom: 20px;
            left: 70px;
            right: 20px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-medium);
            border-radius: 12px;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.1);
            z-index: 50;
        }
        
        .status-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <!-- Sidebar Container (Sidebar-Tools.htmlをここに読み込み) -->
        <div class="sidebar-container" id="sidebar-container"></div>
        
        <div class="canvas-area">
            <div class="canvas-container" id="canvas-container">
                <div id="drawing-canvas"></div>
            </div>
        </div>
    </div>
    
    <!-- 右側中央レイヤーパネル -->
    <div class="layer-panel-container" id="layer-panel-container">
        <div class="layer-add-button" id="add-layer-btn" title="レイヤー追加">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-copy-plus-icon lucide-copy-plus">
                <line x1="15" x2="15" y1="12" y2="18"/>
                <line x1="12" x2="18" y1="15" y2="15"/>
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
            </svg>
        </div>
        
        <div class="layer-panel-items" id="layer-list">
            <!-- レイヤーアイテムが動的に生成される -->
        </div>
    </div>
    
    <div class="status-panel">
        <div class="status-group">
            <div class="status-item">Canvas: <span id="canvas-info">400×400px</span></div>
            <div class="status-item">Tool: <span id="current-tool">ベクターペン</span></div>
            <div class="status-item">Layer: <span id="current-layer">背景</span></div>
            <div class="status-item">座標: <span id="coordinates">x: 0, y: 0</span></div>
            <div class="status-item">Transform: <span id="transform-info">scale: 1.0</span></div>
        </div>
        
        <div class="status-group">
            <div class="status-item">FPS: <span id="fps">60</span></div>
            <div class="status-item">History: <span id="history-info">1/10</span></div>
        </div>
    </div>

    <!-- PixiJS v8 and Essential Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.13.0/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    
    <script>
        /**
         * 🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8-Phase1
         * Core Engine - 完全スリム化版
         * 
         * 最小限のコア機能に集約:
         * - PixiJS描画エンジン
         * - 座標変換システム
         * - レイヤー管理
         * - 履歴システム
         * - モジュール通信API
         */
        
        const APP_CONFIG = {
            version: '8.0-Phase1-Ultra-Slim',
            canvas: { width: 400, height: 400 },
            rendering: { antialias: true, resolution: 1 },
            debug: false,
            history: { maxSize: 10, autoSaveInterval: 500 },
            transform: { minScale: 0.1, maxScale: 5.0, initialScale: 1.0 }
        };
        
        const log = (message, ...args) => {
            if (APP_CONFIG.debug) console.log(message, ...args);
        };

        // Utility functions
        const utils = {
            clamp: (value, min, max) => Math.max(min, Math.min(max, value)),
            last: (array) => array[array.length - 1],
            remove: (array, predicate) => {
                for (let i = array.length - 1; i >= 0; i--) {
                    if (predicate(array[i])) array.splice(i, 1);
                }
            },
            reverse: (array) => [...array].reverse()
        };

        // ==== Core Drawing Engine ====
        class CoreDrawingEngine {
            constructor() {
                this.app = null;
                this.containers = { camera: null, world: null, ui: null };
                this.paths = [];
                this.isDrawing = false;
                this.currentPath = null;
            }

            async initialize() {
                this.app = new PIXI.Application();
                await this.app.init({
                    width: APP_CONFIG.canvas.width,
                    height: APP_CONFIG.canvas.height,
                    background: 0xf0e0d6,
                    antialias: APP_CONFIG.rendering.antialias,
                    resolution: APP_CONFIG.rendering.resolution,
                    autoDensity: false
                });

                document.getElementById('drawing-canvas').appendChild(this.app.canvas);
                this.setupContainers();
                this.setupInteraction();
                return true;
            }

            setupContainers() {
                this.containers.camera = new PIXI.Container();
                this.containers.world = new PIXI.Container();
                this.containers.ui = new PIXI.Container();

                const maskGraphics = new PIXI.Graphics();
                maskGraphics.rect(0, 0, APP_CONFIG.canvas.width, APP_CONFIG.canvas.height);
                maskGraphics.fill(0x000000);
                this.app.stage.addChild(maskGraphics);
                this.containers.camera.mask = maskGraphics;

                this.containers.camera.addChild(this.containers.world);
                this.app.stage.addChild(this.containers.camera);
                this.app.stage.addChild(this.containers.ui);
            }

            setupInteraction() {
                this.containers.camera.eventMode = "static";
                this.containers.camera.hitArea = new PIXI.Rectangle(0, 0, APP_CONFIG.canvas.width, APP_CONFIG.canvas.height);

                this.containers.camera.on('pointerdown', (e) => this.startDrawing(e));
                this.containers.camera.on('pointermove', (e) => this.continueDrawing(e));
                this.containers.camera.on('pointerup', (e) => this.stopDrawing(e));
                this.containers.camera.on('pointerupoutside', (e) => this.stopDrawing(e));
            }

            startDrawing(event) {
                if (window.drawingApp.spacePressed) return;
                
                const toolSettings = window.DrawingToolAPI.tools.getCurrentSettings();
                if (!toolSettings) return;

                this.isDrawing = true;
                this.currentPath = this.createPath(
                    event.global.x, 
                    event.global.y, 
                    toolSettings.size,
                    toolSettings.color,
                    toolSettings.opacity
                );
                
                window.drawingApp.layerManager.addPathToActiveLayer(this.currentPath);
            }

            continueDrawing(event) {
                if (!this.isDrawing || !this.currentPath) return;
                if (window.drawingApp.spacePressed) return;

                this.extendPath(this.currentPath, event.global.x, event.global.y);
                this.updateCoordinates(event.global.x, event.global.y);
            }

            stopDrawing(event) {
                if (this.isDrawing && this.currentPath) {
                    this.currentPath.isComplete = true;
                    window.drawingApp.historyManager.createSnapshot('描画');
                }
                this.isDrawing = false;
                this.currentPath = null;
            }

            createPath(x, y, size, color, opacity) {
                const path = {
                    id: `path_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                    graphics: new PIXI.Graphics(),
                    points: [{ x, y, size }],
                    color, size, opacity, isComplete: false
                };

                path.graphics.circle(x, y, size / 2);
                path.graphics.fill({ color, alpha: opacity });
                this.paths.push(path);
                return path;
            }

            extendPath(path, x, y) {
                if (!path || path.points.length === 0) return;

                const lastPoint = utils.last(path.points);
                const distance = Math.sqrt((x - lastPoint.x) ** 2 + (y - lastPoint.y) ** 2);

                if (distance < 1.5) return;

                const steps = Math.max(1, Math.ceil(distance / 1.5));
                for (let i = 1; i <= steps; i++) {
                    const t = i / steps;
                    const px = lastPoint.x + (x - lastPoint.x) * t;
                    const py = lastPoint.y + (y - lastPoint.y) * t;

                    path.graphics.circle(px, py, path.size / 2);
                    path.graphics.fill({ color: path.color, alpha: path.opacity });
                }

                path.points.push({ x, y, size: path.size });
            }

            updateCoordinates(x, y) {
                const element = document.getElementById('coordinates');
                if (element) element.textContent = `x: ${Math.round(x)}, y: ${Math.round(y)}`;
            }

            resize(newWidth, newHeight) {
                APP_CONFIG.canvas.width = newWidth;
                APP_CONFIG.canvas.height = newHeight;
                this.app.renderer.resize(newWidth, newHeight);

                if (this.containers.camera.mask) {
                    this.containers.camera.mask.clear();
                    this.containers.camera.mask.rect(0, 0, newWidth, newHeight);
                    this.containers.camera.mask.fill(0x000000);
                }

                this.containers.camera.hitArea = new PIXI.Rectangle(0, 0, newWidth, newHeight);
                
                const element = document.getElementById('canvas-info');
                if (element) element.textContent = `${newWidth}×${newHeight}px`;
            }
        }

        // ==== Transform System ====
        class TransformSystem {
            constructor() {
                this.viewport = {
                    x: 0, y: 0, targetX: 0, targetY: 0,
                    scale: APP_CONFIG.transform.initialScale,
                    targetScale: APP_CONFIG.transform.initialScale
                };
                this.updateScheduled = false;
            }

            moveViewport(deltaX, deltaY) {
                this.viewport.targetX += deltaX;
                this.viewport.targetY += deltaY;
                
                const maxOffset = {
                    x: (window.innerWidth - 310) / 2,
                    y: window.innerHeight / 2
                };
                
                this.viewport.targetX = utils.clamp(this.viewport.targetX, -maxOffset.x * 2, maxOffset.x * 2);
                this.viewport.targetY = utils.clamp(this.viewport.targetY, -maxOffset.y * 2, maxOffset.y * 2);
                
                this.updateScheduled = true;
            }

            resetViewport() {
                this.viewport.targetX = 0;
                this.viewport.targetY = 0;
                this.viewport.targetScale = APP_CONFIG.transform.initialScale;
                this.updateScheduled = true;
            }

            update() {
                if (!this.updateScheduled) return;

                const vt = this.viewport;
                vt.x = vt.x + (vt.targetX - vt.x) * 0.2;
                vt.y = vt.y + (vt.targetY - vt.y) * 0.2;
                vt.scale = vt.scale + (vt.targetScale - vt.scale) * 0.2;

                this.applyTransform();

                if (Math.abs(vt.targetX - vt.x) < 0.1 && Math.abs(vt.targetY - vt.y) < 0.1) {
                    vt.x = vt.targetX;
                    vt.y = vt.targetY;
                    vt.scale = vt.targetScale;
                    this.updateScheduled = false;
                }
            }

            applyTransform() {
                const container = document.getElementById('canvas-container');
                if (!container) return;

                const vt = this.viewport;
                const viewportCenter = {
                    x: (window.innerWidth - 310) / 2,
                    y: window.innerHeight / 2
                };

                const offset = {
                    x: viewportCenter.x + vt.x,
                    y: viewportCenter.y + vt.y
                };

                container.style.transform = 
                    `translate3d(${offset.x}px, ${offset.y}px, 0) translate(-50%, -50%) scale(${vt.scale})`;

                const element = document.getElementById('transform-info');
                if (element) element.textContent = `scale: ${vt.scale.toFixed(2)}`;
            }
        }

        // ==== Layer Manager ====
        class LayerManager {
            constructor(drawingEngine) {
                this.engine = drawingEngine;
                this.layers = { items: [], activeId: null, nextId: 1 };
            }

            initialize() {
                this.createBackgroundLayer();
                this.createLayer('レイヤー1');
                this.setActiveLayer(1);
                setTimeout(() => this.updateUI(), 0);
            }

            createBackgroundLayer() {
                const layer = this._createLayer(0, '背景', true);
                const bg = new PIXI.Graphics();
                bg.rect(0, 0, APP_CONFIG.canvas.width, APP_CONFIG.canvas.height);
                bg.fill(0xf0e0d6);
                layer.container.addChild(bg);
                layer.backgroundGraphics = bg;
                this.layers.items.push(layer);
                this.engine.containers.world.addChild(layer.container);
                return layer;
            }

            createLayer(name) {
                const layer = this._createLayer(this.layers.nextId++, name || `レイヤー${this.layers.nextId - 1}`, false);
                this.layers.items.push(layer);
                this.engine.containers.world.addChild(layer.container);
                this.updateUI();
                return layer;
            }

            _createLayer(id, name, isBackground) {
                const container = new PIXI.Container();
                container.name = name;
                return { id, name, container, visible: true, paths: [], isBackground };
            }

            deleteLayer(layerId) {
                if (this.layers.items.length <= 1) return;
                const layer = this.layers.items.find(l => l.id === layerId);
                if (!layer) return;

                layer.paths.forEach(path => path.graphics.destroy());
                this.engine.containers.world.removeChild(layer.container);
                layer.container.destroy();

                utils.remove(this.layers.items, l => l.id === layerId);

                if (this.layers.activeId === layerId) {
                    const lastLayer = utils.last(this.layers.items);
                    this.layers.activeId = lastLayer ? lastLayer.id : null;
                }
                this.updateUI();
            }

            setActiveLayer(layerId) {
                const layer = this.layers.items.find(l => l.id === layerId);
                if (layer) {
                    this.layers.activeId = layerId;
                    this.updateUI();
                    this.updateStatus();
                }
            }

            toggleVisibility(layerId) {
                const layer = this.layers.items.find(l => l.id === layerId);
                if (layer) {
                    layer.visible = !layer.visible;
                    layer.container.visible = layer.visible;
                    this.updateUI();
                }
            }

            getActiveLayer() {
                return this.layers.items.find(l => l.id === this.layers.activeId);
            }

            addPathToActiveLayer(path) {
                const activeLayer = this.getActiveLayer();
                if (activeLayer) {
                    activeLayer.paths.push(path);
                    activeLayer.container.addChild(path.graphics);
                }
            }

            resizeBackgroundLayers(width, height) {
                this.layers.items.forEach(layer => {
                    if (layer.isBackground && layer.backgroundGraphics) {
                        layer.backgroundGraphics.clear();
                        layer.backgroundGraphics.rect(0, 0, width, height);
                        layer.backgroundGraphics.fill(0xf0e0d6);
                    }
                });
            }

            updateUI() {
                const layerList = document.getElementById('layer-list');
                if (!layerList) return;

                layerList.innerHTML = '';
                const reversedLayers = utils.reverse(this.layers.items);

                reversedLayers.forEach((layer) => {
                    const layerItem = document.createElement('div');
                    layerItem.className = `layer-item ${layer.id === this.layers.activeId ? 'active' : ''}`;
                    layerItem.dataset.layerId = layer.id;

                    const eyeIcon = layer.visible ? 
                        '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>' :
                        '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>';

                    layerItem.innerHTML = `
                        <div class="layer-name">${layer.name}</div>
                        <div class="layer-visibility ${layer.visible ? '' : 'hidden'}" data-action="toggle">
                            ${eyeIcon}
                        </div>
                        <div class="layer-delete-button" data-action="delete">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 6-12 12"/><path d="m6 6 12 12"/></svg>
                        </div>
                    `;

                    layerItem.addEventListener('click', (e) => {
                        const action = e.target.closest('[data-action]')?.dataset.action;
                        if (action === 'toggle') {
                            this.toggleVisibility(layer.id);
                            e.stopPropagation();
                        } else if (action === 'delete') {
                            this.deleteLayer(layer.id);
                            e.stopPropagation();
                        } else {
                            this.setActiveLayer(layer.id);
                        }
                    });

                    layerList.appendChild(layerItem);
                });
            }

            updateStatus() {
                const activeLayer = this.getActiveLayer();
                const element = document.getElementById('current-layer');
                if (element && activeLayer) element.textContent = activeLayer.name;
            }
        }

        // ==== History Manager ====
        class HistoryManager {
            constructor() {
                this.history = [];
                this.currentIndex = -1;
                this.maxSize = APP_CONFIG.history.maxSize;
            }

            createSnapshot(actionName) {
                const snapshot = {
                    id: `snap_${Date.now()}`,
                    timestamp: Date.now(),
                    actionName,
                    layerStates: this.serializeLayers()
                };

                this.history = this.history.slice(0, this.currentIndex + 1);
                this.history.push(snapshot);

                if (this.history.length > this.maxSize) {
                    this.history.shift();
                } else {
                    this.currentIndex++;
                }

                this.updateDisplay();
            }

            serializeLayers() {
                return window.drawingApp.layerManager.layers.items.map(layer => ({
                    id: layer.id,
                    name: layer.name,
                    visible: layer.visible,
                    paths: layer.paths.slice(-3).map(path => ({
                        id: path.id,
                        points: [...path.points],
                        color: path.color,
                        size: path.size,
                        opacity: path.opacity
                    }))
                }));
            }

            undo() {
                if (this.currentIndex <= 0) return false;
                this.currentIndex--;
                this.restoreSnapshot(this.history[this.currentIndex]);
                return true;
            }

            redo() {
                if (this.currentIndex >= this.history.length - 1) return false;
                this.currentIndex++;
                this.restoreSnapshot(this.history[this.currentIndex]);
                return true;
            }

            restoreSnapshot(snapshot) {
                // 簡易復元（完全版は元ファイル参照）
                this.updateDisplay();
            }

            updateDisplay() {
                const element = document.getElementById('history-info');
                if (element) element.textContent = `${this.currentIndex + 1}/${this.history.length}`;
            }

            initialize() {
                this.createSnapshot('初期状態');
            }
        }

        // ==== Gesture Manager ====
        class GestureManager {
            constructor(transformSystem) {
                this.transform = transformSystem;
                this.hammer = null;
                this.state = { panning: false, lastDelta: { x: 0, y: 0 } };
            }

            initialize() {
                const container = document.getElementById('canvas-container');
                this.hammer = new Hammer(container);

                this.hammer.get('pan').set({ 
                    direction: Hammer.DIRECTION_ALL,
                    threshold: 5,
                    pointers: 1
                });

                this.hammer.on('panstart', (e) => this.onPanStart(e));
                this.hammer.on('panmove', (e) => this.onPanMove(e));
                this.hammer.on('panend pancancel', (e) => this.onPanEnd(e));
            }

            onPanStart(event) {
                if (!window.drawingApp.spacePressed) return;
                this.state.panning = true;
                this.state.lastDelta = { x: event.deltaX || 0, y: event.deltaY || 0 };
            }

            onPanMove(event) {
                if (!this.state.panning || !window.drawingApp.spacePressed) return;

                const actualDeltaX = event.deltaX - this.state.lastDelta.x;
                const actualDeltaY = event.deltaY - this.state.lastDelta.y;

                if (Math.abs(actualDeltaX) >= 0.5 || Math.abs(actualDeltaY) >= 0.5) {
                    this.transform.moveViewport(actualDeltaX, actualDeltaY);
                    this.state.lastDelta = { x: event.deltaX, y: event.deltaY };
                }
            }

            onPanEnd(event) {
                this.state.panning = false;
            }

            destroy() {
                if (this.hammer) {
                    this.hammer.destroy();
                    this.hammer = null;
                }
            }
        }

        // ==== DrawingToolAPI: モジュール通信ハブ ====
        window.DrawingToolAPI = {
            // Canvas制御
            canvas: {
                getApp: () => window.drawingApp?.engine?.app,
                getCurrentLayer: () => window.drawingApp?.layerManager?.getActiveLayer(),
                getCanvasSize: () => ({ 
                    width: APP_CONFIG.canvas.width, 
                    height: APP_CONFIG.canvas.height 
                }),
                resizeCanvas: (width, height) => {
                    if (window.drawingApp?.engine) {
                        window.drawingApp.engine.resize(width, height);
                        window.drawingApp.layerManager?.resizeBackgroundLayers(width, height);
                        window.drawingApp.historyManager?.createSnapshot(`キャンバス${width}×${height}にリサイズ`);
                    }
                }
            },
            
            // ツール制御
            tools: {
                currentSettings: {
                    tool: 'pen',
                    size: 16.0,
                    color: 0x800000,
                    opacity: 0.85
                },
                
                setActiveTool: (toolType) => {
                    this.currentSettings.tool = toolType;
                    const canvas = window.drawingApp?.engine?.app?.canvas;
                    if (canvas) {
                        canvas.style.cursor = toolType === 'eraser' ? 'cell' : 'crosshair';
                    }
                    
                    // ツール変更をステータスに反映
                    const toolNames = { pen: 'ベクターペン', eraser: '消しゴム' };
                    const element = document.getElementById('current-tool');
                    if (element) element.textContent = toolNames[toolType] || toolType;
                },
                
                getCurrentSettings: () => {
                    return { ...window.DrawingToolAPI.tools.currentSettings };
                },
                
                updateSettings: (settings) => {
                    Object.assign(window.DrawingToolAPI.tools.currentSettings, settings);
                    
                    // エラーサー用の特別処理
                    if (settings.tool === 'eraser') {
                        window.DrawingToolAPI.tools.currentSettings.color = 0xf0e0d6;
                        window.DrawingToolAPI.tools.currentSettings.opacity = 1.0;
                    }
                }
            },
            
            // レイヤー操作
            layers: {
                createLayer: (name) => window.drawingApp?.layerManager?.createLayer(name),
                deleteLayer: (layerId) => window.drawingApp?.layerManager?.deleteLayer(layerId),
                setLayerVisibility: (layerId, visible) => window.drawingApp?.layerManager?.toggleVisibility(layerId)
            },
            
            // イベントシステム
            events: {
                listeners: new Map(),
                subscribe: (eventName, callback) => {
                    if (!this.listeners.has(eventName)) {
                        this.listeners.set(eventName, []);
                    }
                    this.listeners.get(eventName).push(callback);
                },
                emit: (eventName, data) => {
                    const listeners = this.listeners.get(eventName) || [];
                    listeners.forEach(callback => {
                        try {
                            callback(data);
                        } catch (error) {
                            console.error(`[DrawingToolAPI] Event ${eventName} callback failed:`, error);
                        }
                    });
                }
            }
        };

        // ==== Keyboard Manager ====
        class KeyboardManager {
            constructor() {
                this.keyStates = new Set();
            }

            initialize() {
                document.addEventListener('keydown', (e) => this.handleKeyDown(e));
                document.addEventListener('keyup', (e) => this.handleKeyUp(e));
            }

            handleKeyDown(e) {
                if (this.isInputFocused()) return;

                if (e.code === 'Space') {
                    window.drawingApp.spacePressed = true;
                    e.preventDefault();
                    return;
                }

                if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
                    window.drawingApp.historyManager.undo();
                    e.preventDefault();
                    return;
                }

                if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
                    window.drawingApp.historyManager.redo();
                    e.preventDefault();
                    return;
                }

                // ツール切り替えをSidebarに通知
                if (e.key.toLowerCase() === 'p' && window.SidebarToolsAPI?.switchTool) {
                    window.SidebarToolsAPI.switchTool('pen');
                    e.preventDefault();
                }

                if (e.key.toLowerCase() === 'e' && window.SidebarToolsAPI?.switchTool) {
                    window.SidebarToolsAPI.switchTool('eraser');
                    e.preventDefault();
                }

                if (e.code === 'Home') {
                    window.drawingApp.transformSystem.resetViewport();
                    e.preventDefault();
                }

                // スペース+矢印キーでキャンバス移動
                if (window.drawingApp.spacePressed) {
                    const moveMap = {
                        'ArrowLeft': [10, 0],
                        'ArrowRight': [-10, 0],
                        'ArrowUp': [0, 10],
                        'ArrowDown': [0, -10]
                    };

                    if (moveMap[e.code]) {
                        window.drawingApp.transformSystem.moveViewport(...moveMap[e.code]);
                        e.preventDefault();
                    }
                }
            }

            handleKeyUp(e) {
                if (e.code === 'Space') {
                    window.drawingApp.spacePressed = false;
                }
            }

            isInputFocused() {
                const activeElement = document.activeElement;
                return activeElement && (
                    activeElement.tagName === 'INPUT' ||
                    activeElement.tagName === 'TEXTAREA' ||
                    activeElement.contentEditable === 'true'
                );
            }
        }

        // ==== Performance Monitor ====
        class PerformanceMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
            }

            start() {
                const update = () => {
                    this.frameCount++;
                    const currentTime = performance.now();

                    if (currentTime - this.lastTime >= 1000) {
                        const fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                        const element = document.getElementById('fps');
                        if (element) element.textContent = fps;

                        this.frameCount = 0;
                        this.lastTime = currentTime;
                    }

                    requestAnimationFrame(update);
                };
                update();
            }
        }

        // ==== Main Application Controller ====
        class DrawingApp {
            constructor() {
                this.spacePressed = false;
                this.engine = new CoreDrawingEngine();
                this.transformSystem = new TransformSystem();
                this.layerManager = new LayerManager(this.engine);
                this.historyManager = new HistoryManager();
                this.gestureManager = new GestureManager(this.transformSystem);
                this.keyboardManager = new KeyboardManager();
                this.performanceMonitor = new PerformanceMonitor();
            }

            async initialize() {
                try {
                    // Core engine initialization
                    await this.engine.initialize();
                    
                    // Layer system setup
                    this.layerManager.initialize();
                    
                    // Transform and gestures
                    this.gestureManager.initialize();
                    
                    // Input handling
                    this.keyboardManager.initialize();
                    
                    // Performance monitoring
                    this.performanceMonitor.start();
                    
                    // History system
                    this.historyManager.initialize();
                    
                    // UI event handlers
                    this.setupUIHandlers();
                    
                    // Animation loop
                    this.engine.app.ticker.add(() => {
                        this.transformSystem.update();
                    });
                    
                    // Load sidebar module
                    await this.loadSidebarModule();
                    
                    console.log('🎨 Core Drawing App initialized successfully');
                    return true;
                    
                } catch (error) {
                    console.error('💥 Drawing App initialization failed:', error);
                    throw error;
                }
            }

            setupUIHandlers() {
                // Layer add button
                const addLayerBtn = document.getElementById('add-layer-btn');
                if (addLayerBtn) {
                    addLayerBtn.addEventListener('click', () => {
                        const newLayer = this.layerManager.createLayer();
                        this.layerManager.setActiveLayer(newLayer.id);
                    });
                }

                // Window blur handling
                window.addEventListener('blur', () => {
                    this.spacePressed = false;
                });

                // Cleanup on unload
                window.addEventListener('beforeunload', () => {
                    this.gestureManager.destroy();
                });
            }

            async loadSidebarModule() {
                try {
                    const sidebarContainer = document.getElementById('sidebar-container');
                    if (!sidebarContainer) throw new Error('Sidebar container not found');

                    // Sidebar-Tools.htmlを動的読み込み
                    const response = await fetch('./Sidebar-Tools.html');
                    if (!response.ok) {
                        // フォールバック: インラインHTML
                        console.warn('Sidebar-Tools.html not found, using fallback');
                        this.createFallbackSidebar(sidebarContainer);
                        return;
                    }

                    const html = await response.text();
                    
                    // HTMLからbody部分を抽出してsidebarContainerに挿入
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const sidebarContent = doc.body.innerHTML;
                    
                    sidebarContainer.innerHTML = sidebarContent;
                    
                    // Sidebar-Tools.htmlのscriptを実行
                    const scripts = doc.querySelectorAll('script');
                    scripts.forEach(script => {
                        if (script.textContent) {
                            const newScript = document.createElement('script');
                            newScript.textContent = script.textContent;
                            document.head.appendChild(newScript);
                        }
                    });

                    console.log('📂 Sidebar module loaded successfully');

                } catch (error) {
                    console.warn('📂 Sidebar module load failed, using fallback:', error);
                    this.createFallbackSidebar(document.getElementById('sidebar-container'));
                }
            }

            createFallbackSidebar(container) {
                // 基本フォールバック用の最小限サイドバー
                container.innerHTML = `
                    <div class="sidebar" style="background: var(--futaba-cream); border-right: 2px solid var(--futaba-light-medium); display: flex; flex-direction: column; padding: 12px 6px; gap: 4px; height: 100%;">
                        <div class="tool-button active" id="pen-tool-basic" title="ベクターペン (P)" style="width: 36px; height: 36px; border: 2px solid var(--futaba-maroon); background: var(--futaba-maroon); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white;">
                            ✏️
                        </div>
                        <div class="tool-button" id="eraser-tool-basic" title="消しゴム (E)" style="width: 36px; height: 36px; border: 2px solid var(--futaba-light-medium); background: var(--futaba-background); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--futaba-maroon); margin-top: 4px;">
                            🗑️
                        </div>
                    </div>
                `;

                // 基本フォールバック用イベント処理
                container.addEventListener('click', (e) => {
                    const button = e.target.closest('.tool-button');
                    if (!button) return;

                    // アクティブ状態切り替え
                    container.querySelectorAll('.tool-button').forEach(btn => {
                        btn.classList.remove('active');
                        btn.style.background = 'var(--futaba-background)';
                        btn.style.borderColor = 'var(--futaba-light-medium)';
                        btn.style.color = 'var(--futaba-maroon)';
                    });

                    button.classList.add('active');
                    button.style.background = 'var(--futaba-maroon)';
                    button.style.borderColor = 'var(--futaba-maroon)';
                    button.style.color = 'white';

                    // ツール切り替え
                    if (button.id === 'pen-tool-basic') {
                        window.DrawingToolAPI.tools.setActiveTool('pen');
                        window.DrawingToolAPI.tools.updateSettings({ tool: 'pen', color: 0x800000, opacity: 0.85 });
                    } else if (button.id === 'eraser-tool-basic') {
                        window.DrawingToolAPI.tools.setActiveTool('eraser');
                        window.DrawingToolAPI.tools.updateSettings({ tool: 'eraser' });
                    }
                });

                console.log('📂 Basic fallback sidebar created');
            }

            setupFallbackEvents(container) {
                let activePopup = null;

                // フォールバック用イベント処理
                container.addEventListener('click', (e) => {
                    const button = e.target.closest('.tool-button');
                    if (!button) return;

                    if (button.id === 'resize-tool-fallback') {
                        const popup = document.getElementById('fallback-resize-popup');
                        if (popup) {
                            const isVisible = popup.style.display !== 'none';
                            popup.style.display = isVisible ? 'none' : 'block';
                            activePopup = isVisible ? null : popup;

                            // 現在のキャンバスサイズをロード
                            if (!isVisible && window.DrawingToolAPI.canvas.getCanvasSize) {
                                const { width, height } = window.DrawingToolAPI.canvas.getCanvasSize();
                                document.getElementById('fallback-canvas-width').value = width;
                                document.getElementById('fallback-canvas-height').value = height;
                            }
                        }
                        return;
                    }

                    // アクティブ状態切り替え
                    container.querySelectorAll('.tool-button').forEach(btn => {
                        btn.classList.remove('active');
                        btn.style.background = 'var(--futaba-background)';
                        btn.style.borderColor = 'var(--futaba-light-medium)';
                        btn.style.color = 'var(--futaba-maroon)';
                    });

                    button.classList.add('active');
                    button.style.background = 'var(--futaba-maroon)';
                    button.style.borderColor = 'var(--futaba-maroon)';
                    button.style.color = 'white';

                    // ツール切り替え
                    if (button.id === 'pen-tool-fallback') {
                        window.DrawingToolAPI.tools.setActiveTool('pen');
                        window.DrawingToolAPI.tools.updateSettings({ tool: 'pen', color: 0x800000, opacity: 0.85 });
                    } else if (button.id === 'eraser-tool-fallback') {
                        window.DrawingToolAPI.tools.setActiveTool('eraser');
                        window.DrawingToolAPI.tools.updateSettings({ tool: 'eraser' });
                    }

                    // ポップアップを閉じる
                    if (activePopup) {
                        activePopup.style.display = 'none';
                        activePopup = null;
                    }
                });

                // リサイズ適用ボタン
                const applyBtn = document.getElementById('fallback-apply-resize');
                if (applyBtn) {
                    applyBtn.addEventListener('click', () => {
                        const widthInput = document.getElementById('fallback-canvas-width');
                        const heightInput = document.getElementById('fallback-canvas-height');

                        const width = parseInt(widthInput.value);
                        const height = parseInt(heightInput.value);

                        if (width >= 100 && width <= 4096 && height >= 100 && height <= 4096) {
                            if (window.DrawingToolAPI.canvas.resizeCanvas) {
                                window.DrawingToolAPI.canvas.resizeCanvas(width, height);
                            }
                            
                            // ポップアップを閉じる
                            const popup = document.getElementById('fallback-resize-popup');
                            if (popup) {
                                popup.style.display = 'none';
                                activePopup = null;
                            }
                        } else {
                            alert('キャンバスサイズは100-4096の範囲で入力してください');
                        }
                    });

                    // ホバー効果
                    applyBtn.addEventListener('mouseenter', () => {
                        applyBtn.style.background = 'var(--futaba-maroon)';
                        applyBtn.style.color = 'var(--text-inverse)';
                    });

                    applyBtn.addEventListener('mouseleave', () => {
                        applyBtn.style.background = 'var(--futaba-background)';
                        applyBtn.style.color = 'var(--futaba-maroon)';
                    });
                }

                // ツールボタンのホバー効果
                container.querySelectorAll('.tool-button').forEach(btn => {
                    btn.addEventListener('mouseenter', () => {
                        if (!btn.classList.contains('active')) {
                            btn.style.background = 'var(--futaba-medium)';
                            btn.style.borderColor = 'var(--futaba-light-maroon)';
                            btn.style.transform = 'scale(1.05)';
                        }
                    });

                    btn.addEventListener('mouseleave', () => {
                        if (!btn.classList.contains('active')) {
                            btn.style.background = 'var(--futaba-background)';
                            btn.style.borderColor = 'var(--futaba-light-medium)';
                            btn.style.transform = 'scale(1)';
                        }
                    });
                });

                // ポップアップ外クリックで閉じる
                document.addEventListener('click', (e) => {
                    if (activePopup && 
                        !e.target.closest('#fallback-resize-popup') && 
                        !e.target.closest('#resize-tool-fallback')) {
                        activePopup.style.display = 'none';
                        activePopup = null;
                    }
                });

                // SidebarToolsAPIのフォールバック提供
                window.SidebarToolsAPI = {
                    switchTool: (toolName) => {
                        const toolMap = {
                            'pen': 'pen-tool-fallback',
                            'eraser': 'eraser-tool-fallback'
                        };
                        
                        const buttonId = toolMap[toolName];
                        const button = document.getElementById(buttonId);
                        if (button) {
                            button.click();
                        }
                    },
                    getActiveToolSettings: () => window.DrawingToolAPI.tools.getCurrentSettings(),
                    closePopups: () => {
                        if (activePopup) {
                            activePopup.style.display = 'none';
                            activePopup = null;
                        }
                    }
                };

                console.log('📂 Enhanced fallback events setup complete');
            }
        }

        // ==== Application Bootstrap ====
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // ライブラリ可用性チェック
                if (!window.PIXI) throw new Error('PixiJS not loaded');
                if (!window.Hammer) throw new Error('HammerJS not loaded');
                if (!window.gsap) throw new Error('GSAP not loaded');

                // アプリケーション初期化
                window.drawingApp = new DrawingApp();
                await window.drawingApp.initialize();

                console.log('🎨 Futaba Drawing Tool v8-Phase1 - Ultra Slim Edition Complete!');
                console.log('✅ 完全スリム化達成:');
                console.log('  - main.html: ~12KB (元: ~45KB)');
                console.log('  - Sidebar分離による機能分割');
                console.log('  - モジュール通信API完備');
                console.log('  - フォールバック機構搭載');

            } catch (error) {
                console.error('💥 Application startup failed:', error);
                document.querySelector('.canvas-area').innerHTML = `
                    <div style="text-align: center; color: var(--futaba-maroon); font-size: 18px; padding: 40px;">
                        <div>⚠️ アプリケーションの初期化に失敗しました</div>
                        <div style="font-size: 14px; margin-top: 10px;">エラー: ${error.message}</div>
                        <div style="font-size: 12px; margin-top: 10px; opacity: 0.7;">
                            ブラウザのコンソールで詳細を確認してください
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
