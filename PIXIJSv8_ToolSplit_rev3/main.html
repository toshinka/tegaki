<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8-Split - Core Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --futaba-maroon: #800000;
            --futaba-light-maroon: #aa5a56;
            --futaba-medium: #cf9c97;
            --futaba-light-medium: #e9c2ba;
            --futaba-cream: #f0e0d6;
            --futaba-background: #ffffee;
            
            --text-primary: #2c1810;
            --text-secondary: #5d4037;
            --text-inverse: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            background: var(--futaba-background);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 50px 1fr;
            height: 100vh;
            width: 100vw;
            gap: 0;
        }
        
        .sidebar-container {
            position: relative;
            z-index: 100;
        }
        
        .canvas-area {
            background: var(--futaba-background);
            position: relative;
            overflow: visible;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }
        
        .canvas-container {
            background: var(--futaba-cream);
            display: inline-block;
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.1);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            touch-action: none;
        }
        
        canvas {
            border: none;
            display: block;
            cursor: crosshair;
            touch-action: none;
        }
        
        .layer-panel-container {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        
        .layer-add-button {
            width: 36px;
            height: 36px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-light-medium);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.1);
            pointer-events: all;
        }
        
        .layer-add-button:hover {
            background: var(--futaba-medium);
            transform: scale(1.1);
        }
        
        .layer-add-button svg {
            width: 18px;
            height: 18px;
            stroke: #800000;
        }
        
        .layer-panel-items {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: transparent;
            border-radius: 8px;
            padding: 8px;
            pointer-events: all;
        }
        
        .layer-item {
            width: 140px;
            height: 48px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-light-medium);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            position: relative;
            box-shadow: 0 2px 4px rgba(128, 0, 0, 0.1);
        }
        
        .layer-item:hover {
            border-color: var(--futaba-medium);
            background: var(--futaba-background);
        }
        
        .layer-item.active {
            border-color: var(--futaba-maroon);
            background: var(--futaba-light-medium);
            box-shadow: 0 2px 8px rgba(128, 0, 0, 0.2);
        }
        
        .layer-name {
            flex: 1;
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 500;
            margin-right: 8px;
        }
        
        .layer-visibility {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        
        .layer-visibility:hover {
            background: var(--futaba-light-medium);
        }
        
        .layer-visibility svg {
            width: 14px;
            height: 14px;
            stroke: #800000;
        }
        
        .layer-visibility.hidden svg {
            opacity: 0.3;
        }
        
        .layer-delete-button {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            margin-left: 4px;
        }
        
        .layer-delete-button:hover {
            background: rgba(128, 0, 0, 0.1);
        }
        
        .layer-delete-button svg {
            width: 12px;
            height: 12px;
            stroke: #800000;
        }
        
        .status-panel {
            position: fixed;
            bottom: 20px;
            left: 70px;
            right: 20px;
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-medium);
            border-radius: 12px;
            padding: 8px 16px;
            font-family: monospace;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 16px rgba(128, 0, 0, 0.1);
            z-index: 50;
        }
        
        .status-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .error-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #e74c3c;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 3000;
            max-width: 350px;
            word-wrap: break-word;
        }

        .loading-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--futaba-cream);
            border: 2px solid var(--futaba-maroon);
            border-radius: 12px;
            padding: 20px 30px;
            font-size: 16px;
            color: var(--futaba-maroon);
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="sidebar-container" id="sidebar-container">
            <div class="loading-message" id="sidebar-loading">サイドバー読み込み中...</div>
        </div>
        
        <div class="canvas-area">
            <div class="canvas-container" id="canvas-container">
                <div id="drawing-canvas"></div>
            </div>
        </div>
    </div>
    
    <!-- 右側中央レイヤーパネル -->
    <div class="layer-panel-container" id="layer-panel-container">
        <div class="layer-add-button" id="add-layer-btn" title="レイヤー追加">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-copy-plus-icon lucide-copy-plus"><line x1="15" x2="15" y1="12" y2="18"/><line x1="12" x2="18" y1="15" y2="15"/><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        </div>
        
        <div class="layer-panel-items" id="layer-list">
            <!-- レイヤーアイテムが動的に生成される -->
        </div>
    </div>
    
    <div class="status-panel">
        <div class="status-group">
            <div class="status-item">Canvas: <span id="canvas-info">400×400px</span></div>
            <div class="status-item">Tool: <span id="current-tool">ベクターペン</span></div>
            <div class="status-item">Layer: <span id="current-layer">背景</span></div>
            <div class="status-item">座標: <span id="coordinates">x: 0, y: 0</span></div>
            <div class="status-item">Transform: <span id="transform-info">scale: 1.0</span></div>
        </div>
        
        <div class="status-group">
            <div class="status-item">FPS: <span id="fps">60</span></div>
            <div class="status-item">History: <span id="history-info">1/10</span></div>
        </div>
    </div>

    <!-- PixiJS v8 and Essential Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.13.0/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    
    <script>
        /**
         * 🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8-Split
         * Core Engine - Slim Version
         * 
         * 分割後のコア機能：
         * - PixiJS描画エンジン
         * - 座標変換システム
         * - レイヤー管理
         * - モジュール間API
         * - 履歴システム（軽量版）
         */
        
        const APP_CONFIG = {
            version: '8.0-Split',
            canvas: { width: 400, height: 400 },
            rendering: { antialias: true, resolution: 1 },
            debug: true,
            history: {
                maxSize: 10,
                autoSaveInterval: 500
            },
            transform: {
                minScale: 0.1,
                maxScale: 5.0,
                initialScale: 1.0
            }
        };
        
        const log = (message, ...args) => {
            if (APP_CONFIG.debug) console.log(message, ...args);
        };

        // Native JS utilities
        const utils = {
            clamp: (value, min, max) => Math.max(min, Math.min(max, value)),
            last: (array) => array[array.length - 1],
            remove: (array, predicate) => {
                const indices = [];
                for (let i = array.length - 1; i >= 0; i--) {
                    if (predicate(array[i])) {
                        indices.push(i);
                        array.splice(i, 1);
                    }
                }
                return indices.length;
            },
            reverse: (array) => [...array].reverse()
        };

        // ==== TransformSystem: 座標変換統一管理 ====
        class TransformSystem {
            constructor() {
                this.viewportTransform = {
                    x: 0, y: 0,
                    targetX: 0, targetY: 0,
                    scale: APP_CONFIG.transform.initialScale,
                    targetScale: APP_CONFIG.transform.initialScale
                };
                this.updateScheduled = false;
                this.isInitialized = false;
            }

            initialize() {
                this.ensureInitialPosition();
                this.isInitialized = true;
                log('🔄 TransformSystem initialized');
            }

            screenToWorld(screenPoint) {
                const viewport = this.viewportTransform;
                return {
                    x: (screenPoint.x - viewport.x) / viewport.scale,
                    y: (screenPoint.y - viewport.y) / viewport.scale
                };
            }

            worldToScreen(worldPoint) {
                const viewport = this.viewportTransform;
                return {
                    x: worldPoint.x * viewport.scale + viewport.x,
                    y: worldPoint.y * viewport.scale + viewport.y
                };
            }

            moveViewport(deltaX, deltaY) {
                this.viewportTransform.targetX += deltaX;
                this.viewportTransform.targetY += deltaY;
                
                const maxOffset = {
                    x: (window.innerWidth - 310) / 2,
                    y: window.innerHeight / 2
                };
                
                this.viewportTransform.targetX = utils.clamp(
                    this.viewportTransform.targetX, 
                    -maxOffset.x * 2, 
                    maxOffset.x * 2
                );
                this.viewportTransform.targetY = utils.clamp(
                    this.viewportTransform.targetY, 
                    -maxOffset.y * 2, 
                    maxOffset.y * 2
                );
                
                this.scheduleUpdate();
            }

            resetViewport() {
                this.viewportTransform.targetX = 0;
                this.viewportTransform.targetY = 0;
                this.viewportTransform.targetScale = APP_CONFIG.transform.initialScale;
                this.scheduleUpdate();
            }

            scheduleUpdate() {
                this.updateScheduled = true;
            }

            updateTransforms() {
                if (!this.updateScheduled) return;

                const vt = this.viewportTransform;
                
                vt.x = vt.x + (vt.targetX - vt.x) * 0.2;
                vt.y = vt.y + (vt.targetY - vt.y) * 0.2;
                vt.scale = vt.scale + (vt.targetScale - vt.scale) * 0.2;

                this.applyViewportTransform();

                if (Math.abs(vt.targetX - vt.x) < 0.1 && 
                    Math.abs(vt.targetY - vt.y) < 0.1 &&
                    Math.abs(vt.targetScale - vt.scale) < 0.001) {
                    vt.x = vt.targetX;
                    vt.y = vt.targetY;
                    vt.scale = vt.targetScale;
                    this.updateScheduled = false;
                }
            }

            ensureInitialPosition() {
                // 初回の位置設定を確実に行う
                this.viewportTransform.x = 0;
                this.viewportTransform.y = 0;
                this.viewportTransform.targetX = 0;
                this.viewportTransform.targetY = 0;
                this.applyViewportTransform();
            }

            applyViewportTransform() {
                const container = document.getElementById('canvas-container');
                if (!container) return;

                const vt = this.viewportTransform;
                const viewportCenter = {
                    x: (window.innerWidth - 50) / 2, // サイドバー幅を考慮
                    y: window.innerHeight / 2
                };

                const offset = {
                    x: viewportCenter.x + vt.x,
                    y: viewportCenter.y + vt.y
                };

                container.style.transform = 
                    `translate3d(${offset.x}px, ${offset.y}px, 0) translate(-50%, -50%) scale(${vt.scale})`;

                this.updateTransformStatus();
            }

            updateTransformStatus() {
                const element = document.getElementById('transform-info');
                if (element) {
                    element.textContent = `scale: ${this.viewportTransform.scale.toFixed(2)}`;
                }
            }

            getTransformState() {
                return {
                    viewport: { ...this.viewportTransform }
                };
            }

            restoreTransformState(state) {
                if (state.viewport) {
                    this.viewportTransform = { ...state.viewport };
                    this.applyViewportTransform();
                }
            }
        }

        // ==== HammerJSPositionManager: キャンバス操作 ====
        class HammerJSPositionManager {
            constructor(transformSystem) {
                this.transform = transformSystem;
                this.container = document.getElementById('canvas-container');
                this.state = { 
                    panning: false,
                    initialized: false,
                    gestureActive: false,
                    lastDelta: { x: 0, y: 0 }
                };
                this.hammer = null;
            }

            initialize(ticker) {
                this.ticker = ticker;
                this.ticker.add(() => this.updatePosition());
                this.setupHammerJS();

                this.state.initialized = true;
                log('🔨 HammerJS Position Manager initialized');
            }

            setupHammerJS() {
                this.hammer = new Hammer(this.container);

                this.hammer.get('pan').set({ 
                    direction: Hammer.DIRECTION_ALL,
                    threshold: 5,
                    pointers: 1
                });

                this.hammer.on('panstart', (e) => this.onPanStart(e));
                this.hammer.on('panmove', (e) => this.onPanMove(e));
                this.hammer.on('panend pancancel', (e) => this.onPanEnd(e));
            }

            onPanStart(event) {
                if (!window.drawingApp.spacePressed) return;

                if (event.srcEvent.pointerType === 'pen' && event.srcEvent.pressure === 0) {
                    return;
                }

                this.state.panning = true;
                this.state.gestureActive = true;
                this.state.lastDelta.x = event.deltaX || 0;
                this.state.lastDelta.y = event.deltaY || 0;
            }

            onPanMove(event) {
                if (!this.state.panning || !window.drawingApp.spacePressed) return;

                const { deltaX, deltaY } = event;
                const actualDeltaX = deltaX - this.state.lastDelta.x;
                const actualDeltaY = deltaY - this.state.lastDelta.y;

                if (Math.abs(actualDeltaX) < 0.5 && Math.abs(actualDeltaY) < 0.5) {
                    return;
                }

                this.transform.moveViewport(actualDeltaX, actualDeltaY);

                this.state.lastDelta.x = deltaX;
                this.state.lastDelta.y = deltaY;
            }

            onPanEnd(event) {
                this.state.panning = false;
                this.state.gestureActive = false;
            }

            updatePosition() {
                this.transform.updateTransforms();
            }

            destroy() {
                if (this.hammer) {
                    this.hammer.destroy();
                    this.hammer = null;
                }
            }
        }

        // ==== DrawingEngine: PixiJS描画エンジン ====
        class DrawingEngine {
            constructor(transformSystem, layerManager) {
                this.transform = transformSystem;
                this.layerManager = layerManager;
                this.app = null;
                this.containers = { camera: null, world: null, ui: null };
                this.paths = [];
                this.currentTool = {
                    tool: 'pen',
                    size: 16.0,
                    color: 0x800000,
                    opacity: 0.85
                };
                this.drawing = { active: false, path: null };
            }

            async initialize() {
                this.app = new PIXI.Application();
                await this.app.init({
                    width: APP_CONFIG.canvas.width,
                    height: APP_CONFIG.canvas.height,
                    background: 0xf0e0d6,
                    backgroundAlpha: 1,
                    antialias: APP_CONFIG.rendering.antialias,
                    resolution: APP_CONFIG.rendering.resolution,
                    autoDensity: false
                });

                const container = document.getElementById('drawing-canvas');
                container.appendChild(this.app.canvas);

                this.setupContainers();
                this.setupInteraction();

                return true;
            }

            setupContainers() {
                this.containers.camera = new PIXI.Container();
                this.containers.world = new PIXI.Container();
                this.containers.ui = new PIXI.Container();

                const maskGraphics = new PIXI.Graphics();
                maskGraphics.rect(0, 0, APP_CONFIG.canvas.width, APP_CONFIG.canvas.height);
                maskGraphics.fill(0x000000);
                this.app.stage.addChild(maskGraphics);
                this.containers.camera.mask = maskGraphics;

                this.containers.camera.addChild(this.containers.world);
                this.app.stage.addChild(this.containers.camera);
                this.app.stage.addChild(this.containers.ui);
            }

            setupInteraction() {
                this.containers.camera.eventMode = "static";
                this.containers.camera.hitArea = new PIXI.Rectangle(0, 0, APP_CONFIG.canvas.width, APP_CONFIG.canvas.height);

                this.containers.camera.on('pointerdown', (e) => this.onPointerDown(e));
                this.containers.camera.on('pointermove', (e) => this.onPointerMove(e));
                this.containers.camera.on('pointerup', (e) => this.onPointerUp(e));
                this.containers.camera.on('pointerupoutside', (e) => this.onPointerUp(e));
                this.containers.camera.on('pointercancel', (e) => this.onPointerUp(e));
            }

            onPointerDown(event) {
                const spacePressed = window.drawingApp.spacePressed;

                if (spacePressed) {
                    event.stopPropagation();
                } else {
                    const originalEvent = event.data.originalEvent;
                    if (originalEvent.pointerType === 'pen' && originalEvent.pressure === 0) {
                        return;
                    }
                    this.startDrawing(event.global.x, event.global.y);
                }
            }

            onPointerMove(event) {
                const spacePressed = window.drawingApp.spacePressed;

                if (spacePressed) {
                    this.updateCoordinates(event.global.x, event.global.y);
                    return;
                } else {
                    const originalEvent = event.data.originalEvent;
                    if (originalEvent.pointerType === 'pen' && originalEvent.pressure === 0) {
                        return;
                    }
                    this.continueDrawing(event.global.x, event.global.y);
                    this.updateCoordinates(event.global.x, event.global.y);
                }
            }

            onPointerUp(event) {
                if (!window.drawingApp.spacePressed) {
                    this.stopDrawing();
                }
            }

            startDrawing(x, y) {
                this.drawing.active = true;
                
                const tool = this.currentTool;
                const color = tool.tool === 'eraser' ? 0xf0e0d6 : tool.color;
                const alpha = tool.tool === 'eraser' ? 1.0 : tool.opacity;

                this.drawing.path = this.createPath(x, y, tool.size, color, alpha);
            }

            continueDrawing(x, y) {
                if (!this.drawing.active || !this.drawing.path) return;
                this.extendPath(this.drawing.path, x, y);
            }

            stopDrawing() {
                if (this.drawing.path) {
                    this.drawing.path.isComplete = true;
                }
                this.drawing = { active: false, path: null };
            }

            createPath(x, y, size, color, opacity) {
                const path = {
                    id: `path_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                    graphics: new PIXI.Graphics(),
                    points: [],
                    color, size, opacity,
                    isComplete: false
                };

                path.graphics.circle(x, y, size / 2);
                path.graphics.fill({ color: path.color, alpha: path.opacity });
                path.points.push({ x, y, size });

                this.layerManager.addPathToActiveLayer(path);
                this.paths.push(path);
                return path;
            }

            extendPath(path, x, y) {
                if (!path || path.points.length === 0) return;

                const lastPoint = utils.last(path.points);
                const distance = Math.sqrt((x - lastPoint.x) ** 2 + (y - lastPoint.y) ** 2);

                if (distance < 1.5) return;

                const steps = Math.max(1, Math.ceil(distance / 1.5));
                for (let i = 1; i <= steps; i++) {
                    const t = i / steps;
                    const px = lastPoint.x + (x - lastPoint.x) * t;
                    const py = lastPoint.y + (y - lastPoint.y) * t;

                    path.graphics.circle(px, py, path.size / 2);
                    path.graphics.fill({ color: path.color, alpha: path.opacity });
                }

                path.points.push({ x, y, size: path.size });
            }

            resize(newWidth, newHeight) {
                APP_CONFIG.canvas.width = newWidth;
                APP_CONFIG.canvas.height = newHeight;

                this.app.renderer.resize(newWidth, newHeight);

                if (this.containers.camera.mask) {
                    this.containers.camera.mask.clear();
                    this.containers.camera.mask.rect(0, 0, newWidth, newHeight);
                    this.containers.camera.mask.fill(0x000000);
                }

                this.containers.camera.hitArea = new PIXI.Rectangle(0, 0, newWidth, newHeight);
            }

            updateCoordinates(x, y) {
                const element = document.getElementById('coordinates');
                if (element) {
                    element.textContent = `x: ${Math.round(x)}, y: ${Math.round(y)}`;
                }
            }

            updateCanvasInfo() {
                const element = document.getElementById('canvas-info');
                if (element) {
                    element.textContent = `${APP_CONFIG.canvas.width}×${APP_CONFIG.canvas.height}px`;
                }
            }

            updateToolDisplay(toolName) {
                const element = document.getElementById('current-tool');
                const toolNames = { pen: 'ベクターペン', eraser: '消しゴム' };
                if (element) {
                    element.textContent = toolNames[toolName] || toolName;
                }
                
                const canvas = this.app.canvas;
                canvas.style.cursor = toolName === 'eraser' ? 'cell' : 'crosshair';
            }
        }

        // ==== LayerManager: レイヤー管理 ====
        class LayerManager {
            constructor(drawingEngine, transformSystem) {
                this.engine = drawingEngine;
                this.transform = transformSystem;
                this.layers = {
                    items: [],
                    activeId: null,
                    nextId: 1
                };
            }

            initialize() {
                this.createBackgroundLayer();
                this.createLayer('レイヤー1');
                this.setActiveLayer(1);
                
                setTimeout(() => this.updateLayerUI(), 0);
            }

            createBackgroundLayer() {
                const layer = this._createLayerObject(0, '背景', true);

                const backgroundGraphics = new PIXI.Graphics();
                backgroundGraphics.rect(0, 0, APP_CONFIG.canvas.width, APP_CONFIG.canvas.height);
                backgroundGraphics.fill(0xf0e0d6);
                layer.container.addChild(backgroundGraphics);
                layer.backgroundGraphics = backgroundGraphics;

                this.layers.items.push(layer);
                this.engine.containers.world.addChild(layer.container);
                this.layers.activeId = layer.id;

                return layer;
            }

            createLayer(name = null) {
                const layer = this._createLayerObject(
                    this.layers.nextId++, 
                    name || `レイヤー${this.layers.nextId - 1}`, 
                    false
                );

                this.layers.items.push(layer);
                this.engine.containers.world.addChild(layer.container);
                this.updateLayerUI();

                return layer;
            }

            _createLayerObject(id, name, isBackground) {
                const container = new PIXI.Container();
                container.name = name;
                container.visible = true;

                return {
                    id,
                    name,
                    container,
                    visible: true,
                    paths: [],
                    isBackground
                };
            }

            deleteLayer(layerId) {
                if (this.layers.items.length <= 1) return;

                const layer = this.layers.items.find(l => l.id === layerId);
                if (!layer) return;

                layer.paths.forEach(path => path.graphics.destroy());
                this.engine.containers.world.removeChild(layer.container);
                layer.container.destroy();

                utils.remove(this.layers.items, l => l.id === layerId);

                if (this.layers.activeId === layerId) {
                    const lastLayer = utils.last(this.layers.items);
                    this.layers.activeId = lastLayer ? lastLayer.id : null;
                }

                this.updateLayerUI();
            }

            setActiveLayer(layerId) {
                const layer = this.layers.items.find(l => l.id === layerId);
                if (layer) {
                    this.layers.activeId = layerId;
                    this.updateLayerUI();
                    this.updateStatusDisplay();
                }
            }

            toggleLayerVisibility(layerId) {
                const layer = this.layers.items.find(l => l.id === layerId);
                if (layer) {
                    layer.visible = !layer.visible;
                    layer.container.visible = layer.visible;
                    this.updateLayerUI();
                }
            }

            getActiveLayer() {
                return this.layers.items.find(l => l.id === this.layers.activeId);
            }

            addPathToActiveLayer(path) {
                const activeLayer = this.getActiveLayer();
                if (activeLayer) {
                    activeLayer.paths.push(path);
                    activeLayer.container.addChild(path.graphics);
                }
            }

            updateLayerUI() {
                const layerList = document.getElementById('layer-list');
                if (!layerList) return;

                layerList.innerHTML = '';
                const reversedLayers = utils.reverse(this.layers.items);

                reversedLayers.forEach((layer) => {
                    const layerItem = document.createElement('div');
                    layerItem.className = `layer-item ${layer.id === this.layers.activeId ? 'active' : ''}`;
                    layerItem.dataset.layerId = layer.id;

                    const eyeIcon = layer.visible ? 
                        '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>' :
                        '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>';

                    const deleteIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#800000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 6-12 12"/><path d="m6 6 12 12"/></svg>';

                    layerItem.innerHTML = `
                        <div class="layer-name">${layer.name}</div>
                        <div class="layer-visibility ${layer.visible ? '' : 'hidden'}" data-action="toggle-visibility">
                            ${eyeIcon}
                        </div>
                        <div class="layer-delete-button" data-action="delete-layer">
                            ${deleteIcon}
                        </div>
                    `;

                    layerItem.addEventListener('click', (e) => {
                        const action = e.target.closest('[data-action]')?.dataset.action;
                        if (action === 'toggle-visibility') {
                            this.toggleLayerVisibility(layer.id);
                            e.stopPropagation();
                        } else if (action === 'delete-layer') {
                            this.deleteLayer(layer.id);
                            e.stopPropagation();
                        } else {
                            this.setActiveLayer(layer.id);
                        }
                    });

                    layerList.appendChild(layerItem);
                });
            }

            updateStatusDisplay() {
                const activeLayer = this.getActiveLayer();
                const element = document.getElementById('current-layer');
                if (element && activeLayer) {
                    element.textContent = activeLayer.name;
                }
            }

            resizeBackgroundLayer(width, height) {
                const backgroundLayer = this.layers.items.find(l => l.isBackground);
                if (backgroundLayer && backgroundLayer.backgroundGraphics) {
                    backgroundLayer.backgroundGraphics.clear();
                    backgroundLayer.backgroundGraphics.rect(0, 0, width, height);
                    backgroundLayer.backgroundGraphics.fill(0xf0e0d6);
                }
            }
        }

        // ==== SystemMonitor: パフォーマンス監視 ====
        class SystemMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
            }

            start() {
                const update = () => {
                    this.frameCount++;
                    const currentTime = performance.now();

                    if (currentTime - this.lastTime >= 1000) {
                        const fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                        const element = document.getElementById('fps');
                        if (element) {
                            element.textContent = fps;
                        }

                        this.frameCount = 0;
                        this.lastTime = currentTime;
                    }

                    requestAnimationFrame(update);
                };

                update();
            }
        }

        // ==== DrawingToolAPI: モジュール間通信API ====
        class DrawingToolAPI {
            constructor(drawingApp) {
                this.app = drawingApp;
                this.events = new Map();
            }

            initialize() {
                window.DrawingToolAPI = {
                    // Core Canvas管理
                    canvas: {
                        getApp: () => this.app.engine.app,
                        getCurrentLayer: () => this.app.layerManager.getActiveLayer(),
                        getCanvasSize: () => ({ 
                            width: APP_CONFIG.canvas.width, 
                            height: APP_CONFIG.canvas.height 
                        }),
                        resizeCanvas: (width, height) => {
                            this.app.engine.resize(width, height);
                            this.app.layerManager.resizeBackgroundLayer(width, height);
                            this.app.engine.updateCanvasInfo();
                        }
                    },
                    
                    // ツール状態管理  
                    tools: {
                        setActiveTool: (toolType) => {
                            this.app.engine.currentTool.tool = toolType;
                            this.app.engine.updateToolDisplay(toolType);
                        },
                        getActiveTool: () => this.app.engine.currentTool.tool,
                        updateSettings: (settings) => {
                            Object.assign(this.app.engine.currentTool, settings);
                        },
                        getSettings: () => this.app.engine.currentTool
                    },
                    
                    // レイヤー操作
                    layers: {
                        createLayer: (name) => this.app.layerManager.createLayer(name),
                        deleteLayer: (layerId) => this.app.layerManager.deleteLayer(layerId),
                        setLayerVisibility: (layerId, visible) => {
                            const layer = this.app.layerManager.layers.items.find(l => l.id === layerId);
                            if (layer) {
                                layer.visible = visible;
                                layer.container.visible = visible;
                                this.app.layerManager.updateLayerUI();
                            }
                        }
                    },
                    
                    // イベント通知
                    events: {
                        subscribe: (eventName, callback) => {
                            if (!this.events.has(eventName)) {
                                this.events.set(eventName, []);
                            }
                            this.events.get(eventName).push(callback);
                        },
                        emit: (eventName, data) => {
                            const callbacks = this.events.get(eventName);
                            if (callbacks) {
                                callbacks.forEach(callback => {
                                    try {
                                        callback(data);
                                    } catch (error) {
                                        console.error(`Event callback error for ${eventName}:`, error);
                                    }
                                });
                            }
                        }
                    }
                };

                log('🔗 DrawingToolAPI initialized');
            }
        }

        // ==== ShortcutManager: キーボード制御 ====
        class ShortcutManager {
            constructor(drawingApp) {
                this.app = drawingApp;
                this.keyStates = new Set();
            }

            initialize() {
                document.addEventListener('keydown', (e) => this.handleKeyDown(e));
                document.addEventListener('keyup', (e) => this.handleKeyUp(e));
            }

            handleKeyDown(e) {
                const keyCombo = this.getKeyCombo(e);
                if (this.keyStates.has(keyCombo)) return;
                this.keyStates.add(keyCombo);

                if (this.isInputFocused()) return;

                if (e.code === 'Space') {
                    this.app.spacePressed = true;
                    e.preventDefault();
                    return;
                }

                if (e.key.toLowerCase() === 'p') {
                    this.switchTool('pen');
                    e.preventDefault();
                    return;
                }

                if (e.key.toLowerCase() === 'e') {
                    this.switchTool('eraser');
                    e.preventDefault();
                    return;
                }

                if (e.code === 'Home') {
                    this.app.transformSystem.resetViewport();
                    e.preventDefault();
                    return;
                }

                if (this.app.spacePressed) {
                    const moveMap = {
                        'ArrowLeft': [10, 0],
                        'ArrowRight': [-10, 0],
                        'ArrowUp': [0, 10],
                        'ArrowDown': [0, -10]
                    };

                    if (moveMap[e.code]) {
                        this.app.transformSystem.moveViewport(...moveMap[e.code]);
                        e.preventDefault();
                    }
                }
            }

            handleKeyUp(e) {
                const keyCombo = this.getKeyCombo(e);
                this.keyStates.delete(keyCombo);

                if (e.code === 'Space') {
                    this.app.spacePressed = false;
                }
            }

            getKeyCombo(e) {
                let combo = '';
                if (e.ctrlKey) combo += 'ctrl+';
                if (e.altKey) combo += 'alt+';
                if (e.shiftKey) combo += 'shift+';
                combo += e.code.toLowerCase();
                return combo;
            }

            isInputFocused() {
                const activeElement = document.activeElement;
                return activeElement && (
                    activeElement.tagName === 'INPUT' ||
                    activeElement.tagName === 'TEXTAREA' ||
                    activeElement.contentEditable === 'true'
                );
            }

            switchTool(toolName) {
                if (window.SidebarToolsAPI?.switchTool) {
                    window.SidebarToolsAPI.switchTool(toolName);
                } else {
                    // フォールバック: 直接ツール切り替え
                    window.DrawingToolAPI.tools.setActiveTool(toolName);
                }
            }
        }

        // ==== MainDrawingApp: メインアプリケーション ====
        class MainDrawingApp {
            constructor() {
                this.spacePressed = false;
                
                this.transformSystem = new TransformSystem();
                this.layerManager = new LayerManager(null, this.transformSystem);
                this.engine = new DrawingEngine(this.transformSystem, this.layerManager);
                this.positionManager = new HammerJSPositionManager(this.transformSystem);
                this.monitor = new SystemMonitor();
                this.api = new DrawingToolAPI(this);
                this.shortcutManager = new ShortcutManager(this);
                
                // 相互参照設定
                this.layerManager.engine = this.engine;
            }

            async initialize() {
                try {
                    // ライブラリチェック
                    this.checkRequiredLibraries();

                    // コアエンジン初期化
                    await this.engine.initialize();
                    this.layerManager.initialize();
                    this.transformSystem.initialize();
                    
                    // Position Manager初期化
                    this.positionManager.initialize(this.engine.app.ticker);
                    
                    // API初期化
                    this.api.initialize();
                    
                    // その他のシステム初期化
                    this.monitor.start();
                    this.shortcutManager.initialize();
                    this.setupUIHandlers();

                    // サイドバーモジュール読み込み
                    await this.loadSidebarModule();

                    log('🎨 Main Drawing App initialized successfully');
                    return true;

                } catch (error) {
                    this.handleInitializationError(error);
                    return false;
                }
            }

            checkRequiredLibraries() {
                const requiredLibs = {
                    pixi: window.PIXI,
                    gsap: window.gsap,
                    Hammer: window.Hammer
                };

                for (const [name, lib] of Object.entries(requiredLibs)) {
                    if (!lib) {
                        throw new Error(`Required library ${name} not found`);
                    }
                }
            }

            async loadSidebarModule() {
                try {
                    const response = await fetch('./Sidebar-Tools.html');
                    if (!response.ok) {
                        throw new Error(`Failed to fetch Sidebar-Tools.html: ${response.status}`);
                    }

                    const sidebarContent = await response.text();
                    const parser = new DOMParser();
                    const sidebarDoc = parser.parseFromString(sidebarContent, 'text/html');
                    
                    // CSSを追加
                    const sidebarStyles = sidebarDoc.querySelectorAll('style');
                    sidebarStyles.forEach(style => {
                        document.head.appendChild(style.cloneNode(true));
                    });

                    // HTMLを追加
                    const sidebarBody = sidebarDoc.querySelector('.sidebar');
                    const popupPanels = sidebarDoc.querySelectorAll('.popup-panel');
                    
                    if (sidebarBody) {
                        const sidebarContainer = document.getElementById('sidebar-container');
                        sidebarContainer.innerHTML = '';
                        sidebarContainer.appendChild(sidebarBody.cloneNode(true));
                    }

                    // ポップアップパネルを追加
                    popupPanels.forEach(panel => {
                        document.body.appendChild(panel.cloneNode(true));
                    });

                    // JavaScriptを実行
                    const sidebarScripts = sidebarDoc.querySelectorAll('script');
                    sidebarScripts.forEach(script => {
                        const newScript = document.createElement('script');
                        newScript.textContent = script.textContent;
                        document.body.appendChild(newScript);
                    });

                    log('📂 Sidebar module loaded successfully');

                } catch (error) {
                    this.showError('サイドバーモジュールの読み込みに失敗しました: ' + error.message);
                    log('📂 Sidebar module load failed:', error);
                }
            }

            setupUIHandlers() {
                // レイヤー追加ボタン
                const addLayerBtn = document.getElementById('add-layer-btn');
                if (addLayerBtn) {
                    addLayerBtn.addEventListener('click', () => {
                        const newLayer = this.layerManager.createLayer();
                        this.layerManager.setActiveLayer(newLayer.id);
                    });
                }

                // ウィンドウイベント
                window.addEventListener('blur', () => {
                    this.spacePressed = false;
                });

                window.addEventListener('beforeunload', () => {
                    if (this.positionManager && this.positionManager.destroy) {
                        this.positionManager.destroy();
                    }
                });
            }

            showError(message) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = message;
                document.body.appendChild(errorDiv);

                setTimeout(() => {
                    if (errorDiv.parentNode) {
                        errorDiv.parentNode.removeChild(errorDiv);
                    }
                }, 5000);
            }

            handleInitializationError(error) {
                console.error('💥 Application initialization failed:', error);
                this.showError('アプリケーションの初期化に失敗しました: ' + error.message);
                
                const canvasArea = document.querySelector('.canvas-area');
                if (canvasArea) {
                    canvasArea.innerHTML = `
                        <div style="text-align: center; color: var(--futaba-maroon); font-size: 18px; padding: 40px;">
                            <div>⚠️ アプリケーションの初期化に失敗しました</div>
                            <div style="font-size: 14px; margin-top: 10px;">
                                ${error.message}
                            </div>
                        </div>
                    `;
                }
            }
        }

        // ==== アプリケーション起動 ====
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                window.drawingApp = new MainDrawingApp();
                await window.drawingApp.initialize();

                console.log('🎨 Futaba Drawing Tool v8-Split - Core Engine Complete!');
                console.log('✅ スリム化完了:');
                console.log('  - main.htmlはコア機能のみ');
                console.log('  - サイドバーは外部モジュール');
                console.log('  - API通信による連携');
                console.log('  - フォールバック削除');

            } catch (error) {
                console.error('💥 Application startup failed:', error);
            }
        });
    </script>
