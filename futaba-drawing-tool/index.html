<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 ふたば☆ちゃんねる風ベクターお絵描きツール v0.9 - プレビュー改善版</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-layout">
        <div class="sidebar">
            <div class="tool-button disabled" id="download-tool" title="ダウンロード">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7,10 12,15 17,10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            </div>
            
            <div class="tool-button" id="resize-tool" data-popup="resize-settings" title="リサイズ">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <path d="M8 12h8"/>
                    <path d="M12 8v8"/>
                </svg>
            </div>
            
            <div class="tool-separator"></div>
                   
            <div class="tool-button disabled" id="palette-tool" title="カラーパレット">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="13.5" cy="6.5" r=".5"/>
                    <circle cx="17.5" cy="10.5" r=".5"/>
                    <circle cx="8.5" cy="7.5" r=".5"/>
                    <circle cx="6.5" cy="12.5" r=".5"/>
                    <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
                </svg>
            </div>
     
            <div class="tool-button active" id="pen-tool" data-popup="pen-settings" title="ベクターペン">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 21v-4a4 4 0 1 1 4 4h-4"/>
                    <path d="M21 3a16 16 0 0 0 -12.8 10.2"/>
                    <path d="M21 3a16 16 0 0 1 -10.2 12.8"/>
                    <path d="M10.6 9a9 9 0 0 1 4.4 4.4"/>
                </svg>
            </div>
            
            <div class="tool-button" id="eraser-tool" title="消しゴム">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 20h-10.5l-4.21-4.3a1 1 0 0 1 0-1.41l10-10a1 1 0 0 1 1.41 0l5 5a1 1 0 0 1 0 1.41L11.5 20"/>
                    <path d="M18 13.3l-6.3-6.3"/>
                </svg>
            </div>
            
            <div class="tool-separator"></div>
            
            <div class="tool-button disabled" id="fill-tool" title="塗りつぶし">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 11H5m14 0a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2m14 0V9a2 2 0 0 0-2-2M5 11V9a2 2 0 0 1 2-2m0 0V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2M7 7h10"/>
                </svg>
            </div>
            
            <div class="tool-button disabled" id="select-tool" title="範囲選択">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
                    <path d="M9 9h6v6H9z"/>
                </svg>
            </div>
            
            <div class="tool-separator"></div>
            
            <div class="tool-button disabled" id="settings-tool" title="設定">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </div>
        </div>
        
        <div class="canvas-area">
            <div class="canvas-container">
                <div id="drawing-canvas"></div>
            </div>
        </div>
    </div>
    
    <div class="popup-panel pen-settings draggable" id="pen-settings" style="left: 60px; top: 100px;">
        <div class="popup-title">ベクターペンツール設定</div>
        
        <div class="setting-group">
            <div class="size-presets" id="size-presets">
                <!-- プリセット項目 - 改善版フレーム付き -->
                <div class="size-preset-item" data-size="1">
                    <div class="size-preview-frame">
                        <div class="size-preview-circle" style="width: 1px; height: 1px;"></div>
                    </div>
                    <div class="size-preview-label">1</div>
                    <div class="size-preview-percent">85%</div>
                </div>
                <div class="size-preset-item" data-size="2">
                    <div class="size-preview-frame">
                        <div class="size-preview-circle" style="width: 2px; height: 2px;"></div>
                    </div>
                    <div class="size-preview-label">2</div>
                    <div class="size-preview-percent">85%</div>
                </div>
                <div class="size-preset-item" data-size="4">
                    <div class="size-preview-frame">
                        <div class="size-preview-circle" style="width: 4px; height: 4px;"></div>
                    </div>
                    <div class="size-preview-label">4</div>
                    <div class="size-preview-percent">85%</div>
                </div>
                <div class="size-preset-item" data-size="8">
                    <div class="size-preview-frame">
                        <div class="size-preview-circle" style="width: 8px; height: 8px;"></div>
                    </div>
                    <div class="
