<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふたば手書きツール</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffee;
            overflow: hidden;
        }
        
        .main-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            position: relative;
        }
        
        /* 左側ツールバー */
        .left-toolbar {
            width: 60px;
            background-color: #f5f5f5;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            padding: 5px;
            gap: 5px;
            box-sizing: border-box;
        }
        
        /* 上部ツールバー */
        .top-toolbar {
            position: absolute;
            top: 0;
            left: 60px;
            right: 0;
            height: 40px;
            background-color: #f5f5f5;
            border-bottom: 1px solid #ccc;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 5px;
            box-sizing: border-box;
        }
        
        /* メインキャンバスエリア */
        .canvas-area {
            position: absolute;
            top: 40px;
            left: 60px;
            right: 0;
            bottom: 0;
            background-color: #ffffee;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* キャンバスコンテナ（ドラッグ可能な白い枠） */
        .canvas-container {
            background-color: white;
            border: 2px solid #ccc;
            padding: 10px;
            cursor: move;
            position: relative;
        }
        
        .canvas-container:hover {
            border-color: #999;
        }
        
        /* メインキャンバス */
        .main-canvas {
            display: block;
            background-color: #f0e0d6;
            cursor: crosshair;
            border: 1px solid #ddd;
        }
        
        /* カラーパレット（左下） */
        .color-palette {
            position: absolute;
            bottom: 10px;
            left: 5px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .color-btn {
            width: 25px;
            height: 25px;
            border: 2px solid #333;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .color-btn.active {
            border-color: #000;
            border-width: 3px;
        }
        
        /* ツールボタン */
        .tool-btn {
            width: 50px;
            height: 35px;
            border: 1px solid #333;
            background: white;
            cursor: pointer;
            font-size: 11px;
            margin: 1px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tool-btn.active {
            background-color: #ddd;
            border-color: #000;
        }
        
        /* サイズボタン */
        .size-btn {
            width: 50px;
            height: 30px;
            border: 1px solid #333;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1px 0;
            font-size: 9px;
        }
        
        .size-btn.active {
            background-color: #ddd;
            border-color: #000;
        }
        
        .size-indicator {
            border-radius: 50%;
            background-color: #333;
        }
        
        /* 上部ツールバーのボタン */
        .top-btn {
            height: 30px;
            padding: 0 10px;
            border: 1px solid #333;
            background: white;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .top-btn:hover {
            background-color: #f0f0f0;
        }
        
        .close-btn {
            background-color: #ff4444;
            color: white;
            border: none;
            margin-left: auto;
        }
        
        .close-btn:hover {
            background-color: #cc3333;
        }
        
        /* セクション分割線 */
        .separator {
            height: 1px;
            background-color: #ccc;
            margin: 5px 0;
        }
        
        /* ラベル */
        .tool-label {
            font-size: 9px;
            text-align: center;
            color: #666;
            margin: 5px 0 2px 0;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 左側ツールバー -->
        <div class="left-toolbar">
            <!-- ツール選択 -->
            <button class="tool-btn active" id="pen-tool">ペン</button>
            <button class="tool-btn" id="eraser-tool">消しゴム</button>
            
            <div class="separator"></div>
            
            <!-- サイズ選択 -->
            <div class="tool-label">サイズ</div>
            <button class="size-btn active" data-size="1">
                <div class="size-indicator" style="width: 2px; height: 2px;"></div>
            </button>
            <button class="size-btn" data-size="3">
                <div class="size-indicator" style="width: 4px; height: 4px;"></div>
            </button>
            <button class="size-btn" data-size="5">
                <div class="size-indicator" style="width: 6px; height: 6px;"></div>
            </button>
            <button class="size-btn" data-size="10">
                <div class="size-indicator" style="width: 10px; height: 10px;"></div>
            </button>
            <button class="size-btn" data-size="30">
                <div class="size-indicator" style="width: 14px; height: 14px;"></div>
            </button>
            
            <!-- カラーパレット -->
            <div class="color-palette">
                <div class="color-btn active" data-color="#800000" style="background-color: #800000;" title="暗赤"></div>
                <div class="color-btn" data-color="#aa5a56" style="background-color: #aa5a56;" title="赤茶"></div>
                <div class="color-btn" data-color="#cf9c97" style="background-color: #cf9c97;" title="中間色"></div>
                <div class="color-btn" data-color="#e9c2ba" style="background-color: #e9c2ba;" title="薄茶"></div>
                <div class="color-btn" data-color="#f0e0d6" style="background-color: #f0e0d6;" title="肌色"></div>
            </div>
        </div>
        
        <!-- 上部ツールバー -->
        <div class="top-toolbar">
            <button class="top-btn" id="undo-btn" title="元に戻す">↶</button>
            <button class="top-btn" id="redo-btn" title="やり直し">↷</button>
            <button class="top-btn" id="clear-btn" title="全消去">全消去</button>
            <button class="top-btn close-btn" id="close-btn">×閉じる</button>
        </div>
        
        <!-- メインキャンバスエリア -->
        <div class="canvas-area">
            <div class="canvas-container" id="canvas-container">
                <canvas id="drawingCanvas" class="main-canvas" width="344" height="135"></canvas>
            </div>
        </div>
    </div>

    <script>
        // ツール初期化フラグ
        if (!window.futabaTegakiInitialized) {
            window.futabaTegakiInitialized = true;

            class FutabaTegakiTool {
                constructor() {
                    this.canvas = document.getElementById('drawingCanvas');
                    this.ctx = this.canvas.getContext('2d');
                    this.canvasContainer = document.getElementById('canvas-container');
                    this.isDrawing = false;
                    this.isDragging = false;
                    this.currentTool = 'pen';
                    this.currentColor = '#800000';
                    this.currentSize = 1;
                    this.lastX = 0;
                    this.lastY = 0;
                    this.history = [];
                    this.historyIndex = -1;
                    
                    // キャンバス移動用
                    this.dragStartX = 0;
                    this.dragStartY = 0;
                    this.canvasStartX = 0;
                    this.canvasStartY = 0;
                    
                    this.initCanvas();
                    this.bindEvents();
                    this.saveState();
                }
                
                initCanvas() {
                    this.ctx.lineCap = 'round';
                    this.ctx.lineJoin = 'round';
                    this.ctx.fillStyle = '#f0e0d6';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }
                
                bindEvents() {
                    // キャンバス描画イベント
                    this.canvas.addEventListener('mousedown', this.startDrawing.bind(this));
                    this.canvas.addEventListener('mousemove', this.draw.bind(this));
                    this.canvas.addEventListener('mouseup', this.stopDrawing.bind(this));
                    this.canvas.addEventListener('mouseleave', this.stopDrawing.bind(this));
                    
                    // キャンバスコンテナのドラッグイベント
                    this.canvasContainer.addEventListener('mousedown', this.startDrag.bind(this));
                    document.addEventListener('mousemove', this.drag.bind(this));
                    document.addEventListener('mouseup', this.stopDrag.bind(this));
                    
                    // タッチイベント
                    this.canvas.addEventListener('touchstart', this.handleTouch.bind(this));
                    this.canvas.addEventListener('touchmove', this.handleTouch.bind(this));
                    this.canvas.addEventListener('touchend', this.stopDrawing.bind(this));
                    
                    // ツールボタン
                    document.getElementById('pen-tool').addEventListener('click', () => this.setTool('pen'));
                    document.getElementById('eraser-tool').addEventListener('click', () => this.setTool('eraser'));
                    
                    // サイズボタン
                    document.querySelectorAll('.size-btn').forEach(btn => {
                        btn.addEventListener('click', () => this.setSize(parseInt(btn.dataset.size)));
                    });
                    
                    // カラーボタン
                    document.querySelectorAll('.color-btn').forEach(btn => {
                        btn.addEventListener('click', () => this.setColor(btn.dataset.color));
                    });
                    
                    // アクションボタン
                    document.getElementById('undo-btn').addEventListener('click', () => this.undo());
                    document.getElementById('redo-btn').addEventListener('click', () => this.redo());
                    document.getElementById('clear-btn').addEventListener('click', () => this.clearCanvas());
                    document.getElementById('close-btn').addEventListener('click', () => this.closeTool());
                }
                
                startDrag(e) {
                    // キャンバス上でのクリックの場合はドラッグしない
                    if (e.target === this.canvas) {
                        return;
                    }
                    
                    this.isDragging = true;
                    this.dragStartX = e.clientX;
                    this.dragStartY = e.clientY;
                    
                    const rect = this.canvasContainer.getBoundingClientRect();
                    this.canvasStartX = rect.left;
                    this.canvasStartY = rect.top;
                    
                    this.canvasContainer.style.position = 'absolute';
                    this.canvasContainer.style.left = this.canvasStartX + 'px';
                    this.canvasContainer.style.top = this.canvasStartY + 'px';
                    this.canvasContainer.style.zIndex = '1000';
                    
                    e.preventDefault();
                }
                
                drag(e) {
                    if (!this.isDragging) return;
                    
                    const deltaX = e.clientX - this.dragStartX;
                    const deltaY = e.clientY - this.dragStartY;
                    
                    const newX = this.canvasStartX + deltaX;
                    const newY = this.canvasStartY + deltaY;
                    
                    this.canvasContainer.style.left = newX + 'px';
                    this.canvasContainer.style.top = newY + 'px';
                }
                
                stopDrag() {
                    if (this.isDragging) {
                        this.isDragging = false;
                        this.canvasContainer.style.cursor = 'move';
                    }
                }
                
                handleTouch(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const mouseEvent = new MouseEvent(e.type.replace('touch', 'mouse'), {
                        clientX: touch.clientX,
                        clientY: touch.clientY
                    });
                    
                    if (e.type === 'touchstart') {
                        this.startDrawing(mouseEvent);
                    } else if (e.type === 'touchmove') {
                        this.draw(mouseEvent);
                    }
                }
                
                startDrawing(e) {
                    this.isDrawing = true;
                    const rect = this.canvas.getBoundingClientRect();
                    this.lastX = e.clientX - rect.left;
                    this.lastY = e.clientY - rect.top;
                    this.canvas.style.cursor = 'crosshair';
                }
                
                draw(e) {
                    if (!this.isDrawing) return;
                    
                    const rect = this.canvas.getBoundingClientRect();
                    const currentX = e.clientX - rect.left;
                    const currentY = e.clientY - rect.top;
                    
                    this.ctx.globalCompositeOperation = this.currentTool === 'eraser' ? 'destination-out' : 'source-over';
                    this.ctx.strokeStyle = this.currentColor;
                    this.ctx.lineWidth = this.currentSize;
                    
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.lastX, this.lastY);
                    this.ctx.lineTo(currentX, currentY);
                    this.ctx.stroke();
                    
                    this.lastX = currentX;
                    this.lastY = currentY;
                }
                
                stopDrawing() {
                    if (this.isDrawing) {
                        this.isDrawing = false;
                        this.saveState();
                    }
                }
                
                setTool(tool) {
                    this.currentTool = tool;
                    document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                    document.getElementById(tool + '-tool').classList.add('active');
                }
                
                setSize(size) {
                    this.currentSize = size;
                    document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
                    document.querySelector(`[data-size="${size}"]`).classList.add('active');
                }
                
                setColor(color) {
                    this.currentColor = color;
                    document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
                    document.querySelector(`[data-color="${color}"]`).classList.add('active');
                }
                
                saveState() {
                    this.historyIndex++;
                    this.history = this.history.slice(0, this.historyIndex);
                    this.history.push(this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height));
                }
                
                undo() {
                    if (this.historyIndex > 0) {
                        this.historyIndex--;
                        this.ctx.putImageData(this.history[this.historyIndex], 0, 0);
                    }
                }
                
                redo() {
                    if (this.historyIndex < this.history.length - 1) {
                        this.historyIndex++;
                        this.ctx.putImageData(this.history[this.historyIndex], 0, 0);
                    }
                }
                
                clearCanvas() {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.fillStyle = '#f0e0d6';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.saveState();
                }
                
                closeTool() {
                    // ふたばの手書きjsエリアに転写
                    const imageData = this.canvas.toDataURL('image/png');
                    
                    const tegakiJs = document.getElementById('oejs');
                    if (tegakiJs) {
                        const tegakiCtx = tegakiJs.getContext('2d');
                        const img = new Image();
                        img.onload = () => {
                            tegakiCtx.clearRect(0, 0, tegakiJs.width, tegakiJs.height);
                            tegakiCtx.drawImage(img, 0, 0);
                        };
                        img.src = imageData;
                    } else {
                        console.log('手書きjsエリア(#oejs)が見つかりません');
                    }
                    
                    console.log('手書きツールを閉じました');
                }
            }
            
            // DOMが読み込まれた後に初期化
            document.addEventListener('DOMContentLoaded', function() {
                new FutabaTegakiTool();
            });
            
            // すでにDOMが読み込まれている場合の処理
            if (document.readyState !== 'loading') {
                new FutabaTegakiTool();
            }
        }
    </script>
</body>
</html>
