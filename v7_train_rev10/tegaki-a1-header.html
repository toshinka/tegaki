<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tegaki v8 列車型 - A-1 ヘッダー</title>
</head>
<body>
    <script>
        /**
         * ============================================================
         * Tegaki v8 列車型構造 - A-1 ヘッダー・ルールブック・ChangeLog
         * ============================================================
         * 
         * 【列車型構造ルール】
         * 1. A列車: A-1 → A-2 → A-3 の順次依存のみ許可
         * 2. B車両: A列車完了後に独立改修可能な機能単位
         * 3. 横断依存・循環参照は完全禁止
         * 4. 車両内部はモジュール化、AIは局所改修のみ
         * 
         * 【改修方針】
         * - PixiJS v8対応 (v7→v8移行)
         * - 単方向依存で肥大化防止
         * - AIコンテキスト負荷軽減
         * - 独立テスト可能な車両設計
         */

        // ============================================================
        // シンボル辞典 - 全車両共通定数
        // ============================================================
        window.TEGAKI_SYMBOLS = {
            // バージョン情報
            VERSION: '8.0.0-train',
            BUILD: '20250902-A1',
            
            // 色定数
            COLORS: {
                FUTABA_MAROON: 0x800000,
                FUTABA_LIGHT_MAROON: 0xaa5a56,
                FUTABA_MEDIUM: 0xcf9c97,
                FUTABA_LIGHT_MEDIUM: 0xe9c2ba,
                FUTABA_CREAM: 0xf0e0d6,
                FUTABA_BACKGROUND: 0xffffee,
                TEXT_PRIMARY: 0x2c1810,
                TEXT_SECONDARY: 0x5d4037,
                TEXT_INVERSE: 0xffffff
            },
            
            // キャンバス定数
            CANVAS: {
                DEFAULT_WIDTH: 400,
                DEFAULT_HEIGHT: 400,
                MIN_SIZE: 100,
                MAX_SIZE: 4096,
                RESOLUTION: 1
            },
            
            // ツール定数
            TOOLS: {
                PEN: 'pen',
                ERASER: 'eraser',
                FILL: 'fill',
                SELECT: 'select'
            },
            
            // ブラシ定数
            BRUSH: {
                MIN_SIZE: 0.1,
                MAX_SIZE: 100,
                DEFAULT_SIZE: 16.0,
                DEFAULT_OPACITY: 0.85,
                DEFAULT_PRESSURE: 0.5,
                DEFAULT_SMOOTHING: 0.3
            },
            
            // UI定数
            UI: {
                SIDEBAR_WIDTH: 50,
                TOOL_BUTTON_SIZE: 36,
                POPUP_Z_INDEX: 2000,
                STATUS_Z_INDEX: 50
            },
            
            // パフォーマンス定数
            PERFORMANCE: {
                TARGET_FPS: 60,
                MIN_DRAW_DISTANCE: 1.5,
                CIRCLE_STEPS_MAX: 10
            }
        };

        // ============================================================
        // グローバル状態管理 - A列車共通データストア
        // ============================================================
        window.TEGAKI_STATE = {
            // 初期化フラグ
            isInitialized: false,
            currentCar: 'A-1',
            
            // Pixiアプリケーション参照
            app: null,
            
            // 現在のツール状態
            currentTool: 'pen',
            brushSize: 16.0,
            brushColor: 0x800000,
            opacity: 0.85,
            pressure: 0.5,
            smoothing: 0.3,
            
            // キャンバス状態
            canvasWidth: 400,
            canvasHeight: 400,
            
            // 描画状態
            isDrawing: false,
            currentPath: null,
            paths: [],
            
            // UI状態
            activePopup: null,
            sliders: new Map(),
            
            // パフォーマンス監視
            frameCount: 0,
            lastFrameTime: 0
        };

        // ============================================================
        // A-1 車両専用関数 - 初期化とルール検証
        // ============================================================
        window.TEGAKI_A1 = {
            /**
             * A-1 車両初期化
             */
            init() {
                console.log('[A-1] ヘッダー車両初期化開始');
                console.log('[A-1] Tegaki v8 列車型構造 - バージョン:', window.TEGAKI_SYMBOLS.VERSION);
                
                // 依存関係チェック
                this.validateDependencies();
                
                // グローバル状態初期化
                this.initializeGlobalState();
                
                // A-2車両のロード準備
                this.prepareForA2();
                
                window.TEGAKI_STATE.currentCar = 'A-1';
                console.log('[A-1] ヘッダー車両初期化完了 - A-2車両ロード待機中');
            },

            /**
             * 依存関係検証
             */
            validateDependencies() {
                // PixiJS v8チェック (今は v7 を使用中だが将来対応)
                if (typeof PIXI === 'undefined') {
                    throw new Error('[A-1] PixiJS が読み込まれていません');
                }
                
                // ブラウザAPI基本チェック
                if (!window.requestAnimationFrame || !document.getElementById) {
                    throw new Error('[A-1] 必要なブラウザAPIが不足しています');
                }
                
                console.log('[A-1] 依存関係検証完了');
            },

            /**
             * グローバル状態初期化
             */
            initializeGlobalState() {
                // 状態リセット
                window.TEGAKI_STATE.isInitialized = false;
                window.TEGAKI_STATE.currentCar = 'A-1';
                window.TEGAKI_STATE.app = null;
                
                // ツール状態初期化
                window.TEGAKI_STATE.currentTool = window.TEGAKI_SYMBOLS.TOOLS.PEN;
                window.TEGAKI_STATE.brushSize = window.TEGAKI_SYMBOLS.BRUSH.DEFAULT_SIZE;
                window.TEGAKI_STATE.brushColor = window.TEGAKI_SYMBOLS.COLORS.FUTABA_MAROON;
                window.TEGAKI_STATE.opacity = window.TEGAKI_SYMBOLS.BRUSH.DEFAULT_OPACITY;
                window.TEGAKI_STATE.pressure = window.TEGAKI_SYMBOLS.BRUSH.DEFAULT_PRESSURE;
                window.TEGAKI_STATE.smoothing = window.TEGAKI_SYMBOLS.BRUSH.DEFAULT_SMOOTHING;
                
                // キャンバス状態初期化
                window.TEGAKI_STATE.canvasWidth = window.TEGAKI_SYMBOLS.CANVAS.DEFAULT_WIDTH;
                window.TEGAKI_STATE.canvasHeight = window.TEGAKI_SYMBOLS.CANVAS.DEFAULT_HEIGHT;
                
                console.log('[A-1] グローバル状態初期化完了');
            },

            /**
             * A-2車両準備
             */
            prepareForA2() {
                // A-2車両が依存する初期化完了フラグ設定
                window.TEGAKI_STATE.a1Ready = true;
                
                // A-2用のHTML要素確認
                const canvasContainer = document.getElementById('drawing-canvas');
                if (!canvasContainer) {
                    console.warn('[A-1] drawing-canvas要素が見つかりません - A-2で作成予定');
                }
                
                console.log('[A-1] A-2車両準備完了');
            }
        };

        // ============================================================
        // ChangeLog
        // ============================================================
        /**
         * v8.0.0-train (20250902-A1)
         * - 列車型構造への移行開始
         * - A-1ヘッダー車両作成
         * - シンボル辞典統合
         * - グローバル状態管理統一
         * - 順次依存構造実装
         * 
         * 次回: A-2車両 (コアマネージャー群)
         * - PixiApplication初期化
         * - EventBus実装
         * - CoordinateManager
         * - ToolManager基盤
         */

        // ============================================================
        // A-1車両自動初期化
        // ============================================================
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                window.TEGAKI_A1.init();
            });
        } else {
            window.TEGAKI_A1.init();
        }
    </script>
</body>
</html>
