<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tegaki v8 列車型 - A-3 統合車両</title>
</head>
<body>
    <script>
        /**
         * ============================================================
         * Tegaki v8 列車型 - A-3統合車両
         * 全車両の統合処理・最終初期化を担当
         * ============================================================
         */

        console.log('[A-3] 🔗 統合車両初期化開始');

        // 統合処理システム
        class IntegrationManager {
            constructor() {
                this.initializationQueue = [];
                this.isIntegrated = false;
            }
            
            async integrate() {
                try {
                    console.log('[A-3] 🎯 車両統合処理開始');
                    
                    // 依存関係チェック
                    await this.checkDependencies();
                    
                    // A-2車両の完全初期化確認
                    await this.ensureA2Ready();
                    
                    // B車両群の初期化
                    await this.initializeBCarriers();
                    
                    // 最終統合処理
                    await this.finalizeIntegration();
                    
                    this.isIntegrated = true;
                    window.TEGAKI_STATE.aTrainReady = true;
                    
                    console.log('[A-3] ✅ A列車統合完了 - 全システム準備完了');
                    
                } catch (error) {
                    console.error('[A-3] ⚠ 統合処理失敗:', error);
                    throw error;
                }
            }
            
            async checkDependencies() {
                // 必須依存関係の確認
                const dependencies = [
                    { name: 'TEGAKI_SYMBOLS', ref: window.TEGAKI_SYMBOLS },
                    { name: 'TEGAKI_STATE', ref: window.TEGAKI_STATE },
                    { name: 'PIXI', ref: window.PIXI },
                    { name: 'drawing-canvas', ref: document.getElementById('drawing-canvas') }
                ];
                
                for (const dep of dependencies) {
                    if (!dep.ref) {
                        throw new Error(`必須依存関係が不足: ${dep.name}`);
                    }
                }
                
                console.log('[A-3] ✅ 依存関係チェック完了');
            }
            
            async ensureA2Ready() {
                // A-2車両の完全初期化を確認・実行
                if (!window.TEGAKI_STATE?.a2Ready) {
                    console.log('[A-3] 🔄 A-2車両初期化実行');
                    
                    if (window.TEGAKI_A2?.init) {
                        await window.TEGAKI_A2.init();
                    }
                    
                    // 再度確認
                    if (!window.TEGAKI_STATE?.a2Ready) {
                        throw new Error('A-2車両初期化に失敗しました');
                    }
                }
                
                console.log('[A-3] ✅ A-2車両準備完了確認');
            }
            
            async initializeBCarriers() {
                // B車両群の初期化（並行実行）
                const bCarriers = [
                    { name: 'B-1', init: window.TEGAKI_B1?.init },
                    { name: 'B-2', init: window.TEGAKI_B2?.init }
                ];
                
                const initPromises = bCarriers.map(async (carrier) => {
                    if (carrier.init) {
                        try {
                            await carrier.init();
                            console.log(`[A-3] ✅ ${carrier.name}車両初期化完了`);
                        } catch (error) {
                            console.warn(`[A-3] ⚠ ${carrier.name}車両初期化失敗:`, error);
                        }
                    }
                });
                
                await Promise.allSettled(initPromises);
                console.log('[A-3] ✅ B車両群初期化処理完了');
            }
            
            async finalizeIntegration() {
                // 最終統合処理
                
                // 1. キャンバス最終確認
                if (!window.TEGAKI_CanvasManager?.isInitialized) {
                    throw new Error('キャンバス管理システムが未初期化です');
                }
                
                // 2. UI統合確認
                const mainLayout = document.querySelector('.main-layout');
                if (!mainLayout) {
                    console.warn('[A-3] ⚠ メインレイアウトが未配置');
                }
                
                // 3. ステータス表示確認
                const statusPanel = document.querySelector('.status-panel');
                if (!statusPanel) {
                    console.warn('[A-3] ⚠ ステータスパネルが未配置');
                }
                
                // 4. 最終状態同期
                this.syncFinalState();
                
                console.log('[A-3] ✅ 最終統合処理完了');
            }
            
            syncFinalState() {
                // 全システムの最終状態同期
                if (window.TEGAKI_CanvasManager && window.TEGAKI_STATE) {
                    const canvas = window.TEGAKI_CanvasManager;
                    const state = window.TEGAKI_STATE;
                    
                    // ツールシステムの状態同期
                    if (canvas.toolSystem) {
                        state.currentTool = canvas.toolSystem.currentTool;
                        state.brushSize = canvas.toolSystem.brushSize;
                        state.brushColor = canvas.toolSystem.brushColor;
                        state.opacity = canvas.toolSystem.opacity;
                        state.pressure = canvas.toolSystem.pressure;
                        state.smoothing = canvas.toolSystem.smoothing;
                    }
                    
                    // キャンバスサイズ同期
                    if (canvas.engine) {
                        state.canvasWidth = canvas.engine.width;
                        state.canvasHeight = canvas.engine.height;
                    }
                    
                    console.log('[A-3] ✅ 最終状態同期完了');
                }
            }
        }

        // A-3車両初期化
        window.TEGAKI_A3 = {
            async init() {
                try {
                    console.log('[A-3] 🚃 A-3統合車両初期化開始');
                    
                    // 統合マネージャー初期化
                    const integrationManager = new IntegrationManager();
                    await integrationManager.integrate();
                    
                    // グローバル参照設定
                    window.TEGAKI_IntegrationManager = integrationManager;
                    
                    // A-3準備完了フラグ
                    window.TEGAKI_STATE.currentCar = 'A-3';
                    
                    console.log('[A-3] ✅ A-3統合車両初期化完了');
                    
                } catch (error) {
                    console.error('[A-3] ⚠ A-3車両初期化失敗:', error);
                    throw error;
                }
            }
        };

        // A-3車両自動初期化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(() => {
                    window.TEGAKI_A3.init().catch(console.error);
                }, 400);
            });
        } else {
            setTimeout(() => {
                window.TEGAKI_A3.init().catch(console.error);
            }, 400);
        }

        console.log('[A-3] 🔗 統合車両ロード完了 - 初期化待機中');
