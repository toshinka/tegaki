<!-- File: tegaki-b2-status.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tegaki v8 列車型 - B-2 ステータス車両</title>
</head>
<body>
    <!-- vector-drawing-tool-v7rev2.html のステータスパネル完全移植 -->
    <div class="status-panel">
        <div class="status-group">
            <div class="status-item">Canvas: <span id="canvas-info">400×400px</span></div>
            <div class="status-item">Tool: <span id="current-tool">ベクターペン</span></div>
            <div class="status-item">Color: <span id="current-color">#800000</span></div>
            <div class="status-item">座標: <span id="coordinates">x: 0, y: 0</span></div>
            <div class="status-item">筆圧: <span id="pressure-monitor">0.0%</span></div>
        </div>
        
        <div class="status-group">
            <div class="status-item">FPS: <span id="fps">60</span></div>
            <div class="status-item">GPU: <span id="gpu-usage">45%</span></div>
            <div class="status-item">Memory: <span id="memory-usage">1.2GB</span></div>
        </div>
    </div>

    <script>
        /**
         * ============================================================
         * B-2 ステータス車両 - PerformanceMonitor（v7完全移植版）
         * ============================================================
         */

        console.log('[B-2] 📊 ステータス車両初期化開始');

        // PerformanceMonitor（元ファイルから完全移植）
        class PerformanceMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
                this.gpuUsageSimulation = 45; // 簡易GPU使用率シミュレーション
                this.memoryUsageSimulation = 1.2; // 簡易メモリ使用量シミュレーション
            }
            
            start() {
                const update = () => {
                    this.frameCount++;
                    const currentTime = performance.now();
                    
                    if (currentTime - this.lastTime >= 1000) {
                        const fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                        
                        // FPS表示更新
                        const fpsElement = document.getElementById('fps');
                        if (fpsElement) {
                            fpsElement.textContent = fps;
                        }
                        
                        // GPU使用率シミュレーション更新
                        this.updateGPUUsage();
                        
                        // メモリ使用量シミュレーション更新
                        this.updateMemoryUsage();
                        
                        this.frameCount = 0;
                        this.lastTime = currentTime;
                    }
                    
                    requestAnimationFrame(update);
                };
                
                update();
            }
            
            updateGPUUsage() {
                // 描画状態に応じてGPU使用率を変動
                const isDrawing = window.TEGAKI_STATE?.isDrawing || false;
                const baseUsage = isDrawing ? 60 : 35;
                const variation = (Math.random() - 0.5) * 20;
                this.gpuUsageSimulation = Math.max(0, Math.min(100, baseUsage + variation));
                
                const gpuElement = document.getElementById('gpu-usage');
                if (gpuElement) {
                    gpuElement.textContent = Math.round(this.gpuUsageSimulation) + '%';
                }
            }
            
            updateMemoryUsage() {
                // パス数に応じてメモリ使用量を変動
                const pathCount = window.TEGAKI_STATE?.paths?.length || 0;
                const baseMemory = 1.0 + (pathCount * 0.001);
                const variation = (Math.random() - 0.5) * 0.2;
                this.memoryUsageSimulation = Math.max(0.5, baseMemory + variation);
                
                const memoryElement = document.getElementById('memory-usage');
                if (memoryElement) {
                    memoryElement.textContent = this.memoryUsageSimulation.toFixed(1) + 'GB';
                }
            }
        }

        // ステータス更新システム
        class StatusUpdater {
            constructor() {
                this.monitor = new PerformanceMonitor();
            }
            
            init() {
                this.monitor.start();
                this.setupStatusWatchers();
                this.updateInitialStatus();
            }
            
            setupStatusWatchers() {
                // グローバル状態の変更を監視してステータス表示を更新
                if (window.TEGAKI_STATE) {
                    // 定期的にステータスを更新
                    setInterval(() => {
                        this.updateToolStatus();
                        this.updateColorStatus();
                    }, 100);
                }
            }
            
            updateInitialStatus() {
                // 初期状態の表示を設定
                const canvasInfoElement = document.getElementById('canvas-info');
                const currentToolElement = document.getElementById('current-tool');
                const currentColorElement = document.getElementById('current-color');
                
                if (canvasInfoElement) {
                    const width = window.TEGAKI_STATE?.canvasWidth || 400;
                    const height = window.TEGAKI_STATE?.canvasHeight || 400;
                    canvasInfoElement.textContent = `${width}×${height}px`;
                }
                
                if (currentToolElement) {
                    const tool = window.TEGAKI_STATE?.currentTool || 'pen';
                    const toolNames = { pen: 'ベクターペン', eraser: '消しゴム' };
                    currentToolElement.textContent = toolNames[tool] || tool;
                }
                
                if (currentColorElement) {
                    const color = window.TEGAKI_STATE?.brushColor || 0x800000;
                    currentColorElement.textContent = '#' + color.toString(16).padStart(6, '0');
                }
            }
            
            updateToolStatus() {
                const currentToolElement = document.getElementById('current-tool');
                if (currentToolElement && window.TEGAKI_STATE) {
                    const tool = window.TEGAKI_STATE.currentTool;
                    const toolNames = { pen: 'ベクターペン', eraser: '消しゴム' };
                    currentToolElement.textContent = toolNames[tool] || tool;
                }
            }
            
            updateColorStatus() {
                const currentColorElement = document.getElementById('current-color');
                if (currentColorElement && window.TEGAKI_STATE) {
                    const color = window.TEGAKI_STATE.brushColor;
                    currentColorElement.textContent = '#' + color.toString(16).padStart(6, '0');
                }
            }
            
            updateCanvasInfo(width, height) {
                const canvasInfoElement = document.getElementById('canvas-info');
                if (canvasInfoElement) {
                    canvasInfoElement.textContent = `${width}×${height}px`;
                }
            }
        }

        // B-2車両初期化
        window.TEGAKI_B2 = {
            async init() {
                try {
                    console.log('[B-2] 🚃 B-2 ステータス車両初期化開始');
                    
                    // A-2車両の準備完了待ち
                    if (!window.TEGAKI_STATE?.a2Ready) {
                        console.log('[B-2] ⏳ A-2車両準備完了待ち');
                        return;
                    }
                    
                    // StatusUpdater初期化
                    const statusUpdater = new StatusUpdater();
                    statusUpdater.init();
                    
                    // グローバル参照設定
                    window.TEGAKI_StatusUpdater = statusUpdater;
                    window.TEGAKI_PerformanceMonitor = statusUpdater.monitor;
                    
                    console.log('[B-2] ✅ B-2 ステータス車両初期化完了');
                    
                } catch (error) {
                    console.error('[B-2] ⚠ B-2車両初期化失敗:', error);
                }
            }
        };

        // B-2車両自動初期化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(() => {
                    window.TEGAKI_B2.init().catch(console.error);
                }, 300);
            });
        } else {
            setTimeout(() => {
                window.TEGAKI_B2.init().catch(console.error);
            }, 300);
        }

        console.log('[B-2] 📊 ステータス車両ロード完了 - 初期化待機中');
    </script>
</body>
</html>
