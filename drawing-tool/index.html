<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モダンお絵かきツール v3.3 - PixiJS v8統一基盤</title>
    <style>
        :root {
            /* ふたば色系統（実装イメージ準拠） */
            --futaba-maroon: #800000;
            --futaba-light-maroon: #aa5a56;
            --futaba-medium: #cf9c97;
            --futaba-light-medium: #e9c2ba;
            --futaba-cream: #f0e0d6;
            --futaba-background: #ffffee;
            
            /* UI基本色 */
            --ui-bg-primary: rgba(128,0,0,0.96);
            --ui-bg-secondary: rgba(170,90,86,0.92);
            --ui-bg-light-medium: rgba(233,194,186,0.85);
            --ui-text-primary: #f0e0d6;
            --ui-text-secondary: #ffffff;
            --ui-border: rgba(240,224,214,0.3);
            --ui-accent: #ffffee;
            
            /* サイズ系統（PixiJS v8統一座標対応） */
            --sidebar-width: 72px;
            --layer-panel-width: 300px;
            --icon-size-normal: 44px;
            --icon-size-active: 48px;
            --border-radius: 16px;
            
            /* Chrome最適化アニメーション */
            --transition-fast: 200ms ease-out;
            --transition-normal: 300ms ease-out;
            --transition-slow: 400ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
            background: var(--futaba-background);
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            height: 100vh;
        }
        
        /* メインレイアウト */
        .app-layout {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr var(--layer-panel-width);
            grid-template-rows: 1fr auto;
            grid-template-areas: 
                "sidebar canvas layer-panel"
                "sidebar timeline layer-panel";
            height: 100vh;
            position: relative;
            overflow: hidden;
            will-change: transform;
            contain: layout style paint;
        }
        
        /* 左側サイドバー（実装イメージ準拠色：淡い優しい感じ） */
        .sidebar {
            grid-area: sidebar;
            background: linear-gradient(135deg, var(--futaba-light-medium) 0%, var(--futaba-medium) 100%);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            z-index: 100;
            transform: translateZ(0);
        }
        
        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 4px 0;
        }
        
        .tool-group + .tool-group {
            border-top: 1px solid var(--ui-border);
            margin-top: 8px;
            padding-top: 12px;
        }
        
        .tool-button {
            width: var(--icon-size-normal);
            height: var(--icon-size-normal);
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--futaba-maroon);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            position: relative;
            margin: 2px auto;
        }
        
        .tool-button:hover {
            background: rgba(255,255,255,0.3);
            color: var(--futaba-maroon);
            transform: scale(1.05);
        }
        
        .tool-button.active {
            background: var(--futaba-maroon);
            color: var(--ui-text-primary);
            width: var(--icon-size-active);
            height: var(--icon-size-active);
            box-shadow: 0 0 0 3px var(--futaba-light-medium);
        }
        
        .tool-button.active::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 80%;
            background: var(--futaba-maroon);
            border-radius: 2px;
        }
        
        /* キャンバス領域 */
        .canvas {
            grid-area: canvas;
            position: relative;
            overflow: hidden;
            background: var(--futaba-background);
            transform: translateZ(0);
        }
        
        #pixi-canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        
        /* 右側レイヤーパネル */
        .layer-panel {
            grid-area: layer-panel;
            background: linear-gradient(135deg, var(--ui-bg-primary) 0%, var(--ui-bg-secondary) 100%);
            box-shadow: -2px 0 8px rgba(0,0,0,0.2);
            transform: translateX(0);
            transition: transform var(--transition-normal);
            will-change: transform;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        
        .layer-panel.hidden {
            transform: translateX(100%);
        }
        
        .layer-panel-header {
            padding: 16px;
            background: rgba(0,0,0,0.1);
            border-bottom: 1px solid var(--ui-border);
        }
        
        .layer-panel-title {
            color: var(--ui-text-primary);
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }
        
        .layer-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .layer-item {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 8px;
            padding: 12px;
            border: 1px solid transparent;
            transition: all var(--transition-fast);
            cursor: pointer;
        }
        
        .layer-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--ui-border);
        }
        
        .layer-item.active {
            background: rgba(255,255,255,0.15);
            border-color: var(--ui-accent);
        }
        
        .layer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .layer-name {
            color: var(--ui-text-primary);
            font-size: 12px;
            flex: 1;
        }
        
        .layer-thumbnail {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            border: 1px solid var(--ui-border);
        }
        
        .layer-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        
        .opacity-slider {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        
        .opacity-value {
            color: var(--ui-text-primary);
            font-size: 10px;
            width: 30px;
            text-align: right;
        }
        
        /* タイムライン（アニメーションモード） */
        .timeline {
            grid-area: timeline;
            background: linear-gradient(135deg, var(--ui-bg-secondary) 0%, var(--ui-bg-light-medium) 100%);
            border-top: 1px solid var(--ui-border);
            padding: 12px;
            transform: translateZ(0);
            display: none; /* 初期状態では非表示 */
        }
        
        .timeline.active {
            display: block;
        }
        
        .timeline-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .timeline-button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            background: var(--futaba-maroon);
            color: var(--ui-text-primary);
            cursor: pointer;
            font-size: 12px;
            transition: all var(--transition-fast);
        }
        
        .timeline-button:hover {
            background: var(--futaba-light-maroon);
        }
        
        .timeline-button.active {
            background: var(--ui-accent);
            color: var(--futaba-maroon);
        }
        
        .frame-strip {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 8px 0;
        }
        
        .frame-item {
            min-width: 64px;
            height: 48px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ui-text-primary);
            font-size: 10px;
        }
        
        .frame-item:hover {
            border-color: var(--ui-border);
        }
        
        .frame-item.active {
            border-color: var(--ui-accent);
            background: rgba(255,255,255,0.1);
        }
        
        /* ポップアップ共通スタイル */
        .popup {
            position: absolute;
            background: var(--futaba-maroon);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid var(--ui-border);
            z-index: 1000;
            min-width: 280px;
            opacity: 0;
            transform: scale(0.9);
            transition: all var(--transition-normal);
            pointer-events: none;
        }
        
        .popup.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        
        .popup-header {
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border-radius: var(--border-radius) var(--border-radius) 0 0;
            cursor: move;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .popup-title {
            color: var(--ui-text-primary);
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }
        
        .popup-close {
            background: none;
            border: none;
            color: var(--ui-text-primary);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            border-radius: 4px;
            transition: all var(--transition-fast);
        }
        
        .popup-close:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .popup-content {
            padding: 16px;
        }
        
        /* ツール設定ポップアップ */
        .tool-settings {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .setting-label {
            color: var(--ui-text-primary);
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .preset-buttons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        
        .preset-button {
            padding: 4px 8px;
            border: 1px solid var(--ui-border);
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            color: var(--ui-text-primary);
            cursor: pointer;
            font-size: 11px;
            transition: all var(--transition-fast);
        }
        
        .preset-button:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .preset-button.active {
            background: var(--ui-accent);
            color: var(--futaba-maroon);
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .slider {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--ui-accent);
            cursor: pointer;
            border: 2px solid var(--futaba-maroon);
        }
        
        .slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--ui-accent);
            cursor: pointer;
            border: 2px solid var(--futaba-maroon);
        }
        
        .slider-value {
            color: var(--ui-text-primary);
            font-size: 11px;
            min-width: 40px;
            text-align: right;
        }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox {
            width: 16px;
            height: 16px;
            border: 1px solid var(--ui-border);
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            position: relative;
        }
        
        .checkbox.checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--ui-accent);
            font-size: 12px;
        }
        
        .checkbox-label {
            color: var(--ui-text-primary);
            font-size: 12px;
            cursor: pointer;
        }
        
        /* HSV色選択ポップアップ */
        .color-picker {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .hsv-wheel {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(
                hsl(0deg, 100%, 50%),
                hsl(60deg, 100%, 50%),
                hsl(120deg, 100%, 50%),
                hsl(180deg, 100%, 50%),
                hsl(240deg, 100%, 50%),
                hsl(300deg, 100%, 50%),
                hsl(360deg, 100%, 50%)
            );
            cursor: crosshair;
            position: relative;
            margin: 0 auto;
        }
        
        .color-presets {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }
        
        .color-swatch {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid var(--ui-border);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .color-swatch:hover {
            transform: scale(1.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .color-swatch.active {
            box-shadow: 0 0 0 2px var(--ui-accent);
        }
        
        /* ローディング・スプラッシュ */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--futaba-maroon);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity var(--transition-slow);
        }
        
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-content {
            text-align: center;
            color: var(--ui-text-primary);
        }
        
        .loading-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        
        .loading-subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 24px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(240,224,214,0.3);
            border-top: 3px solid var(--ui-text-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* レスポンシブ対応 */
        @media (max-width: 1024px) {
            .layer-panel {
                transform: translateX(100%);
            }
            
            .layer-panel.show {
                transform: translateX(0);
            }
            
            .app-layout {
                grid-template-columns: var(--sidebar-width) 1fr;
            }
        }
        
        /* 高DPI対応 */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .layer-thumbnail,
            .frame-item {
                image-rendering: -webkit-optimize-contrast;
                image-rendering: pixelated;
            }
        }
    </style>
</head>
<body>
    <!-- ローディング画面 -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <h1 class="loading-title">PixiJS v8 お絵かきツール</h1>
            <p class="loading-subtitle">Phase1実装 - 統一基盤読み込み中...</p>
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- メインアプリケーション -->
    <div class="app-layout">
        <!-- 左側サイドバー -->
        <div class="sidebar">
            <!-- ファイル操作 -->
            <div class="tool-group">
                <button class="tool-button" id="downloadBtn" title="ダウンロード (Ctrl+S)">📥</button>
                <button class="tool-button" id="resizeBtn" title="リサイズ">⤢</button>
                <button class="tool-button" id="colorBtn" title="カラーパレット">🎨</button>
            </div>
            
            <!-- 描画ツール -->
            <div class="tool-group">
                <button class="tool-button active" id="penBtn" data-tool="pen" title="ペン (P)">✏️</button>
                <button class="tool-button" id="airbrushBtn" data-tool="airbrush" title="エアスプレー (A)">🖌️</button>
                <button class="tool-button" id="blurBtn" data-tool="blur" title="ボカシ (B)">🌫️</button>
            </div>
            
            <!-- 編集ツール -->
            <div class="tool-group">
                <button class="tool-button" id="eraserBtn" data-tool="eraser" title="消しゴム (E)">🗑️</button>
                <button class="tool-button" id="eyedropperBtn" data-tool="eyedropper" title="スポイト (I)">💧</button>
                <button class="tool-button" id="selectBtn" data-tool="select" title="範囲選択 (M)">⬚</button>
            </div>
            
            <!-- 特殊ツール -->
            <div class="tool-group">
                <button class="tool-button" id="fillBtn" data-tool="fill" title="塗りつぶし (G)">🪣</button>
                <button class="tool-button" id="textBtn" data-tool="text" title="テキスト (T)">📝</button>
                <button class="tool-button" id="shapeBtn" data-tool="shape" title="図形">⭕</button>
                <button class="tool-button" id="transformBtn" data-tool="transform" title="変形">✂️</button>
            </div>
            
            <!-- 表示・設定 -->
            <div class="tool-group">
                <button class="tool-button" id="animationBtn" title="アニメーション (F5)">🎬</button>
                <button class="tool-button" id="layerBtn" title="レイヤー (TAB)">📚</button>
                <button class="tool-button" id="settingsBtn" title="設定">⚙️</button>
            </div>
        </div>
        
        <!-- キャンバス領域 -->
        <div class="canvas">
            <canvas id="pixi-canvas"></canvas>
        </div>
        
        <!-- 右側レイヤーパネル -->
        <div class="layer-panel" id="layerPanel">
            <div class="layer-panel-header">
                <h3 class="layer-panel-title">レイヤー</h3>
            </div>
            <div class="layer-list" id="layerList">
                <!-- 初期レイヤー -->
                <div class="layer-item active" data-layer="layer1">
                    <div class="layer-header">
                        <span class="layer-name">👁️ レイヤー1</span>
                        <div class="layer-thumbnail"></div>
                    </div>
                    <div class="layer-controls">
                        <input type="range" class="opacity-slider" min="0" max="100" value="100">
                        <span class="opacity-value">100%</span>
                    </div>
                </div>
                
                <div class="layer-item" data-layer="background">
                    <div class="layer-header">
                        <span class="layer-name">🔒 背景</span>
                        <div class="layer-thumbnail"></div>
                    </div>
                    <div class="layer-controls">
                        <input type="range" class="opacity-slider" min="0" max="100" value="100" disabled>
                        <span class="opacity-value">100%</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- タイムライン（アニメーションモード） -->
        <div class="timeline" id="timeline">
            <div class="timeline-controls">
                <button class="timeline-button active" data-cut="1">カット1</button>
                <button class="timeline-button" data-cut="2">カット2</button>
                <button class="timeline-button" data-cut="3">カット3</button>
                <button class="timeline-button" id="newCutBtn">+新規</button>
                <button class="timeline-button" id="playBtn">▶️</button>
                <button class="timeline-button" id="stopBtn">⏸️</button>
            </div>
            
            <div class="frame-strip" id="frameStrip">
                <div class="frame-item active" data-frame="1">1</div>
                <div class="frame-item" data-frame="2">2</div>
                <div class="frame-item" data-frame="3">3</div>
                <div class="frame-item" data-frame="4">4</div>
                <div class="frame-item" data-frame="5">5</div>
                <div class="frame-item" id="addFrameBtn">+</div>
            </div>
        </div>
    </div>

    <!-- ポップアップ群は main.js で動的生成 -->

    <!-- Phase1.5 メインスクリプト読み込み -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
