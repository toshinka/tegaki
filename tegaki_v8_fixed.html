    <style>

    <!-- PixiJS v8 and Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.0.5/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    
    <script>
        /**
         * 🎨 ふたば☆ちゃんねる風ベクターお絵かきツール v8rev4 - 改修版
         * 座標系統一・履歴管理・オフキャンバス描画完全対応
         */
        
        // ==== Station: Global Configuration and Initialization ====
        class StationManager {
            constructor() {
                this.config = {
                    version: '8.0.4-fixed',
                    pixiVersion: '8.0.5',
                    canvasWidth: 400,
                    canvasHeight: 400,
                    antialias: true,
                    resolution: 1,
                    autoDensity: false
                };
                
                this.libraries = {
                    pixi: window.PIXI,
                    gsap: window.gsap,
                    hammer: window.Hammer
                };
            }
            
            init() {
                console.log(`🚂 Station: Initializing Futaba Drawing Tool v${this.config.version}`);
                console.log(`📦 PixiJS v${this.config.pixiVersion} loaded`);
                
                Object.entries(this.libraries).forEach(([name, lib]) => {
                    if (!lib) {
                        console.error(`⚠ Library ${name} not found`);
                        return false;
                    } else {
                        console.log(`✅ Library ${name} loaded`);
                    }
                });
                
                return true;
            }
        }
        
        // ==== 統一座標管理システム ====
        class CoordinateManager {
            constructor(coreEngine) {
                this.coreEngine = coreEngine;
                this.viewport = { x: 0, y: 0, scale: 1 };
            }
            
            // Screen → World (統一変換)
            screenToWorld(clientX, clientY) {
                const canvasRect = this.coreEngine.app.canvas.getBoundingClientRect();
                const canvasX = clientX - canvasRect.left;
                const canvasY = clientY - canvasRect.top;
                
                // シンプルな一段階変換
                return {
                    x: (canvasX - this.viewport.x) / this.viewport.scale,
                    y: (canvasY - this.viewport.y) / this.viewport.scale
                };
            }
            
            // キャンバス境界判定
            isWorldPointInCanvas(worldX, worldY) {
                return (worldX >= 0 && worldX <= this.coreEngine.config.canvasWidth &&
                        worldY >= 0 && worldY <= this.coreEngine.config.canvasHeight);
            }
            
            // ビューポート更新
            updateViewport(x, y, scale) {
                this.viewport.x = x;
                this.viewport.y = y;
                this.viewport.scale = scale;
            }
        }
        
        // ==== 履歴管理システム ====
        class HistoryManager {
            constructor() {
                this.undoStack = [];
                this.redoStack = [];
                this.maxHistorySize = 50;
            }
            
            // 履歴イベント追加
            pushEvent(eventType, payload, inversePayload) {
                const event = {
                    id: `history_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                    type: eventType,
                    payload: payload,
                    inversePayload: inversePayload,
                    timestamp: Date.now()
                };
                
                this.undoStack.push(event);
                this.redoStack = [];
                
                if (this.undoStack.length > this.maxHistorySize) {
                    this.undoStack.shift();
                }
                
                this.updateStatusDisplay();
            }
            
            // アンドゥ実行
            undo(coreEngine) {
                if (this.undoStack.length === 0) return false;
                
                const event = this.undoStack.pop();
                this.redoStack.push(event);
                
                this.applyInverseEvent(event, coreEngine);
                this.updateStatusDisplay();
                return true;
            }
            
            // リドゥ実行
            redo(coreEngine) {
                if (this.redoStack.length === 0) return false;
                
                const event = this.redoStack.pop();
                this.undoStack.push(event);
                
                this.applyEvent(event, coreEngine);
                this.updateStatusDisplay();
                return true;
            }
            
            applyEvent(event, coreEngine) {
                if (event.type === 'strokeAdd' && event.payload) {
                    // ストローク追加の再実行
                    const strokeData = event.payload;
                    const path = coreEngine.recreatePath(strokeData);
                    coreEngine.paths.push(path);
                }
            }
            
            applyInverseEvent(event, coreEngine) {
                if (event.type === 'strokeAdd' && event.inversePayload) {
                    // ストロークの削除
                    const pathId = event.inversePayload.pathId;
                    const pathIndex = coreEngine.paths.findIndex(p => p.id === pathId);
                    if (pathIndex !== -1) {
                        const path = coreEngine.paths[pathIndex];
                        coreEngine.drawingContainer.removeChild(path.graphics);
                        path.graphics.destroy();
                        coreEngine.paths.splice(pathIndex, 1);
                    }
                }
            }
            
            updateStatusDisplay() {
                const statusElement = document.getElementById('history-status');
                if (statusElement) {
                    statusElement.textContent = `${this.undoStack.length}/${this.maxHistorySize}`;
                }
            }
        }
        
        // ==== 統一描画管理システム ====
        class UnifiedStrokeManager {
            constructor(coreEngine, coordinateManager, historyManager) {
                this.coreEngine = coreEngine;
                this.coordinateManager = coordinateManager;
                this.historyManager = historyManager;
                this.activeStrokes = new Map();
                this.offCanvasEnabled = true;
            }
            
            startStroke(pointerId, clientX, clientY, brushSettings) {
                const worldPos = this.coordinateManager.screenToWorld(clientX, clientY);
                
                const strokeData = {
                    id: `stroke_${pointerId}_${Date.now()}`,
                    pointerId: pointerId,
                    points: [{ x: worldPos.x, y: worldPos.y, timestamp: Date.now() }],
                    brushSettings: { ...brushSettings },
                    isInsideCanvas: this.coordinateManager.isWorldPointInCanvas(worldPos.x, worldPos.y),
                    tempGraphics: null,
                    commitedPath: null
                };
                
                this.activeStrokes.set(pointerId, strokeData);
                this.updateStrokeVisual(strokeData);
            }
            
            continueStroke(pointerId, clientX, clientY) {
                const strokeData = this.activeStrokes.get(pointerId);
                if (!strokeData) return;
                
                const worldPos = this.coordinateManager.screenToWorld(clientX, clientY);
                
                const lastPoint = strokeData.points[strokeData.points.length - 1];
                const distance = Math.sqrt((worldPos.x - lastPoint.x) ** 2 + (worldPos.y - lastPoint.y) ** 2);
                
                if (distance >= 0.8) { // 距離フィルター緩和
                    strokeData.points.push({ x: worldPos.x, y: worldPos.y, timestamp: Date.now() });
                    
                    const nowInside = this.coordinateManager.isWorldPointInCanvas(worldPos.x, worldPos.y);
                    if (!strokeData.isInsideCanvas && nowInside) {
                        this.commitStroke(strokeData);
                    }
                    
                    this.updateStrokeVisual(strokeData);
                }
            }
            
            endStroke(pointerId) {
                const strokeData = this.activeStrokes.get(pointerId);
                if (!strokeData) return;
                
                if (!strokeData.commitedPath) {
                    if (strokeData.isInsideCanvas || !this.offCanvasEnabled) {
                        this.commitStroke(strokeData);
                    } else {
                        this.cleanupTempVisual(strokeData);
                    }
                }
                
                this.activeStrokes.delete(pointerId);
            }
            
            updateStrokeVisual(strokeData) {
                if (strokeData.isInsideCanvas || strokeData.commitedPath) {
                    // キャンバス内描画
                    if (!strokeData.commitedPath) {
                        strokeData.commitedPath = this.coreEngine.createPath(
                            strokeData.points[0].x, strokeData.points[0].y,
                            strokeData.brushSettings.size, strokeData.brushSettings.color,
                            strokeData.brushSettings.opacity, strokeData.brushSettings.tool
                        );
                    }
                    
                    // 最新点まで描画
                    const lastDrawnIndex = strokeData.commitedPath.drawnPointIndex || 1;
                    for (let i = lastDrawnIndex; i < strokeData.points.length; i++) {
                        const point = strokeData.points[i];
                        this.coreEngine.drawLine(strokeData.commitedPath, point.x, point.y);
                    }
                    strokeData.commitedPath.drawnPointIndex = strokeData.points.length;
                } else {
                    // オフキャンバス描画 (プレビュー)
                    this.updateOffCanvasPreview(strokeData);
                }
            }
            
            updateOffCanvasPreview(strokeData) {
                if (strokeData.tempGraphics) {
                    this.coreEngine.app.stage.removeChild(strokeData.tempGraphics);
                    strokeData.tempGraphics.destroy();
                }
                
                strokeData.tempGraphics = new PIXI.Graphics();
                strokeData.tempGraphics.alpha = 0.5;
                
                // 全ポイントを再描画
                strokeData.points.forEach((point, index) => {
                    if (index === 0) {
                        strokeData.tempGraphics.circle(point.x, point.y, strokeData.brushSettings.size / 2);
                        strokeData.tempGraphics.fill({ color: strokeData.brushSettings.color, alpha: strokeData.brushSettings.opacity });
                    } else {
                        const lastPoint = strokeData.points[index - 1];
                        const distance = Math.sqrt((point.x - lastPoint.x) ** 2 + (point.y - lastPoint.y) ** 2);
                        const steps = Math.max(1, Math.ceil(distance / 1.0));
                        
                        for (let i = 1; i <= steps; i++) {
                            const t = i / steps;
                            const px = lastPoint.x + (point.x - lastPoint.x) * t;
                            const py = lastPoint.y + (point.y - lastPoint.y) * t;
                            strokeData.tempGraphics.circle(px, py, strokeData.brushSettings.size / 2);
                            strokeData.tempGraphics.fill({ color: strokeData.brushSettings.color, alpha: strokeData.brushSettings.opacity });
                        }
                    }
                });
                
                this.coreEngine.app.stage.addChildAt(strokeData.tempGraphics, 0);
            }
            
            commitStroke(strokeData) {
                console.log(`✅ Off-canvas stroke committed: ${strokeData.points.length} points`);
                
                if (strokeData.tempGraphics) {
                    this.coreEngine.app.stage.removeChild(strokeData.tempGraphics);
                    strokeData.tempGraphics.destroy();
                    strokeData.tempGraphics = null;
                }
                
                if (strokeData.points.length > 0) {
                    const firstPoint = strokeData.points[0];
                    const realPath = this.coreEngine.createPath(
                        firstPoint.x, firstPoint.y,
                        strokeData.brushSettings.size, strokeData.brushSettings.color,
                        strokeData.brushSettings.opacity, strokeData.brushSettings.tool
                    );
                    
                    for (let i = 1; i < strokeData.points.length; i++) {
                        const point = strokeData.points[i];
                        this.coreEngine.drawLine(realPath, point.x, point.y);
                    }
                    
                    realPath.isComplete = true;
                    strokeData.commitedPath = realPath;
                    
                    // 履歴に追加
                    this.historyManager.pushEvent('strokeAdd', {
                        id: realPath.id,
                        points: [...strokeData.points],
                        brushSettings: strokeData.brushSettings
                    }, {
                        pathId: realPath.id
                    });
                }
            }
            
            cleanupTempVisual(strokeData) {
                if (strokeData.tempGraphics) {
                    this.coreEngine.app.stage.removeChild(strokeData.tempGraphics);
                    strokeData.tempGraphics.destroy();
                }
            }
        }
        
        // ==== 設定管理システム ====
        class SettingsManager {
            constructor() {

                    brushSize: 16.0,
                    opacity: 0.85,
                    color: 0x800000,
                    offCanvasEnabled: true
                };
                this.listeners = new Set();
            }
            
            updateSetting(key, value) {
                if (this.currentSettings[key] !== value) {
                    this.currentSettings[key] = value;
                    this.notifyListeners(key, value);
                }
            }
            
            addListener(callback) {
                this.listeners.add(callback);
            }
            
            notifyListeners(key, value) {
                this.listeners.forEach(callback => callback(key, value));
            }
            
            getCurrentSettings() {
                return { ...this.currentSettings };
            }
        }

                );

                );

                this.setupViewport();

                console.log('✅ Main: Application ready with unified coordinate system and history management');
                
                return this.app;
            }
            
            setupViewport() {
                const canvas = this.app.canvas;
                const hammer = new Hammer(canvas);
                
                hammer.get('pan').set({ direction: Hammer.DIRECTION_ALL });
                hammer.get('pinch').set({ enable: true });
                
                let lastPanX = 0, lastPanY = 0;
                let lastScale = 1;
                
                hammer.on('panstart', (e) => {
                    lastPanX = e.deltaX;
                    lastPanY = e.deltaY;
                });
                
                hammer.on('panmove', (e) => {
                    if (this.toolSystem.isDrawing) return;
                    
                    const deltaX = e.deltaX - lastPanX;
                    const deltaY = e.deltaY - lastPanY;
                    
                    this.coreEngine.drawingContainer.x += deltaX;
                    this.coreEngine.drawingContainer.y += deltaY;
                    
                    // ビューポート更新
                    this.coordinateManager.updateViewport(
                        this.coreEngine.drawingContainer.x,
                        this.coreEngine.drawingContainer.y,
                        this.coreEngine.drawingContainer.scale.x
                    );
                    
                    lastPanX = e.deltaX;
                    lastPanY = e.deltaY;
                });
                
                hammer.on('pinchstart', (e) => {
                    lastScale = e.scale;
                });
                
                hammer.on('pinchmove', (e) => {
                    if (this.toolSystem.isDrawing) return;
                    
                    const scaleChange = e.scale / lastScale;
                    this.coreEngine.drawingContainer.scale.x *= scaleChange;
                    this.coreEngine.drawingContainer.scale.y *= scaleChange;
                    
                    // ビューポート更新
                    this.coordinateManager.updateViewport(
                        this.coreEngine.drawingContainer.x,
                        this.coreEngine.drawingContainer.y,
                        this.coreEngine.drawingContainer.scale.x
                    );
                    
                    lastScale = e.scale;
                });
            }
            
            setupGlobalDrawing() {
                // グローバル描画イベント
                document.addEventListener('pointerdown', this.onGlobalPointerDown.bind(this), true);
                document.addEventListener('pointermove', this.onGlobalPointerMove.bind(this), true);
                document.addEventListener('pointerup', this.onGlobalPointerUp.bind(this), true);
                document.addEventListener('pointercancel', this.onGlobalPointerUp.bind(this), true);
            }
            
            onGlobalPointerDown(event) {
                if (!this.unifiedStrokeManager.offCanvasEnabled || 
                    this.toolSystem.currentTool === 'eraser') return;
                
                const canvasRect = this.coreEngine.app.canvas.getBoundingClientRect();
                const isOutsideCanvas = (
                    event.clientX < canvasRect.left ||
                    event.clientX > canvasRect.right ||
                    event.clientY < canvasRect.top ||
                    event.clientY > canvasRect.bottom
                );
                
                if (isOutsideCanvas) {
                    const brushSettings = this.settingsManager.getCurrentSettings();
                    brushSettings.tool = this.toolSystem.currentTool;
                    
                    this.unifiedStrokeManager.startStroke(
                        event.pointerId, event.clientX, event.clientY, brushSettings
                    );
                    event.preventDefault();
                    event.stopPropagation();
                }
            }
            
            onGlobalPointerMove(event) {
                if (this.unifiedStrokeManager.activeStrokes.has(event.pointerId)) {
                    this.unifiedStrokeManager.continueStroke(
                        event.pointerId, event.clientX, event.clientY
                    );
                    event.preventDefault();
                    event.stopPropagation();
                }
            }
            
            onGlobalPointerUp(event) {
                if (this.unifiedStrokeManager.activeStrokes.has(event.pointerId)) {
                    this.unifiedStrokeManager.endStroke(event.pointerId);
                    event.preventDefault();
                    event.stopPropagation();
                }
            }
            
            setupKeyboardShortcuts() {
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        switch(e.key.toLowerCase()) {
                            case 'z':
                                if (e.shiftKey) {
                                    // Ctrl+Shift+Z = Redo
                                    this.historyManager.redo(this.coreEngine);
                                } else {
                                    // Ctrl+Z = Undo
                                    this.historyManager.undo(this.coreEngine);
                                }
                                e.preventDefault();
                                break;
                            case 'y':
                                // Ctrl+Y = Redo
                                this.historyManager.redo(this.coreEngine);
                                e.preventDefault();
                                break;
                        }
                    }
                });
            }
        }
        
        // ==== A1-Core: Drawing Engine ====
        class CoreEngine {
            constructor(app, config) {
                this.app = app;
                this.config = config;
                this.drawingContainer = null;
                this.paths = [];
            }
            
            async init() {
                console.log('🚂 A1-Core: Initializing drawing engine with unified coordinate system');
                
                this.drawingContainer = new PIXI.Container();
                this.drawingContainer.pivot.set(0, 0);
                this.drawingContainer.position.set(0, 0);
                this.app.stage.addChild(this.drawingContainer);
                
                this.drawingContainer.interactive = true;
                this.drawingContainer.on('pointerdown', this.onPointerDown.bind(this));
                this.drawingContainer.on('pointermove', this.onPointerMove.bind(this));
                this.drawingContainer.on('pointerup', this.onPointerUp.bind(this));
                this.drawingContainer.on('pointerupoutside', this.onPointerUp.bind(this));
                
                this.drawingContainer.hitArea = new PIXI.Rectangle(0, 0, this.config.canvasWidth, this.config.canvasHeight);
                
                return true;
            }
            
            onPointerDown(event) {
                const pos = this.drawingContainer.toLocal(event.data.global);
                if (this.toolSystem) {
                    this.toolSystem.startDrawing(pos.x, pos.y, event.data.pointerId);
                }
            }
            
            onPointerMove(event) {
                const pos = this.drawingContainer.toLocal(event.data.global);
                if (this.toolSystem) {
                    this.toolSystem.updateCoordinates(pos.x, pos.y);
                    this.toolSystem.continueDrawing(pos.x, pos.y, event.data.pointerId);
                }
            }
            
            onPointerUp(event) {
                if (this.toolSystem) {
                    this.toolSystem.stopDrawing(event.data.pointerId);
                }
            }
            
            createPath(x, y, size, color, opacity, tool = 'pen') {
                const path = {
                    id: `path_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                    graphics: new PIXI.Graphics(),
                    points: [],
                    color: color,
                    size: size,
                    opacity: opacity,
                    tool: tool,
                    isComplete: false,
                    createdAt: Date.now(),
                    drawnPointIndex: 0
                };
                
                path.graphics.circle(x, y, size / 2);
                path.graphics.fill({ color: path.color, alpha: path.opacity });
                
                path.points.push({ x, y, size, timestamp: Date.now() });
                
                this.drawingContainer.addChild(path.graphics);
                this.paths.push(path);
                return path;
            }
            
            drawLine(path, x, y) {
                if (!path || path.points.length === 0) return;
                
                const lastPoint = path.points[path.points.length - 1];
                const distance = Math.sqrt((x - lastPoint.x) ** 2 + (y - lastPoint.y) ** 2);
                
                if (distance < 0.8) return; // 緩和された距離フィルター
                
                const steps = Math.max(1, Math.ceil(distance / 1.0));
                for (let i = 1; i <= steps; i++) {
                    const t = i / steps;
                    const px = lastPoint.x + (x - lastPoint.x) * t;
                    const py = lastPoint.y + (y - lastPoint.y) * t;
                    
                    path.graphics.circle(px, py, path.size / 2);
                    path.graphics.fill({ color: path.color, alpha: path.opacity });
                }
                
                path.points.push({ x, y, size: path.size, timestamp: Date.now() });
            }
            
            recreatePath(strokeData) {
                if (!strokeData.points || strokeData.points.length === 0) return null;
                
                const firstPoint = strokeData.points[0];
                const path = {
                    id: strokeData.id,
                    graphics: new PIXI.Graphics(),
                    points: [...strokeData.points],
                    color: strokeData.brushSettings.color,
                    size: strokeData.brushSettings.size,
                    opacity: strokeData.brushSettings.opacity,
                    tool: strokeData.brushSettings.tool,
                    isComplete: true,
                    createdAt: Date.now()
                };
                
                // 全ポイントを再描画
                strokeData.points.forEach((point, index) => {
                    if (index === 0) {
                        path.graphics.circle(point.x, point.y, strokeData.brushSettings.size / 2);
                        path.graphics.fill({ color: strokeData.brushSettings.color, alpha: strokeData.brushSettings.opacity });
                    } else {
                        const lastPoint = strokeData.points[index - 1];
                        const distance = Math.sqrt((point.x - lastPoint.x) ** 2 + (point.y - lastPoint.y) ** 2);
                        const steps = Math.max(1, Math.ceil(distance / 1.0));
                        
                        for (let i = 1; i <= steps; i++) {
                            const t = i / steps;
                            const px = lastPoint.x + (point.x - lastPoint.x) * t;
                            const py = lastPoint.y + (point.y - lastPoint.y) * t;
                            
                            path.graphics.circle(px, py, strokeData.brushSettings.size / 2);
                            path.graphics.fill({ color: strokeData.brushSettings.color, alpha: strokeData.brushSettings.opacity });
                        }
                    }
                });
                
                this.drawingContainer.addChild(path.graphics);
                return path;
            }
            
            resize(newWidth, newHeight, centerContent = false) {
                const oldWidth = this.config.canvasWidth;
                const oldHeight = this.config.canvasHeight;
                
                this.config.canvasWidth = newWidth;
                this.config.canvasHeight = newHeight;
                
                this.app.renderer.resize(newWidth, newHeight);
                this.drawingContainer.hitArea = new PIXI.Rectangle(0, 0, newWidth, newHeight);
                
                if (centerContent && this.paths.length > 0) {
                    const offsetX = (newWidth - oldWidth) / 2;
                    const offsetY = (newHeight - oldHeight) / 2;
                    
                    this.drawingContainer.x += offsetX;
                    this.drawingContainer.y += offsetY;
                }
            }
            
            clear() {
                this.paths.forEach(path => {
                    this.drawingContainer.removeChild(path.graphics);
                    path.graphics.destroy();
                });
                this.paths = [];
            }
        }
        
        // ==== Tool System: Drawing Tools Management ====
        class ToolSystem {
            constructor(coreEngine, settingsManager) {
                this.coreEngine = coreEngine;
                this.settingsManager = settingsManager;
                this.currentTool = 'pen';
                this.isDrawing = false;
                this.currentPath = null;
                this.lastPoint = null;
                
                this.coreEngine.toolSystem = this;
                
                // 設定変更の監視
                this.settingsManager.addListener(this.onSettingChanged.bind(this));
            }
            
            init() {
                console.log('🚂 Tool System: Initializing with settings manager integration');
            }
            
            onSettingChanged(key, value) {
                // 設定変更時の処理
                console.log(`Setting changed: ${key} = ${value}`);
            }
            
            setTool(tool) {
                this.currentTool = tool;
                console.log(`Tool changed to: ${tool}`);
            }
            
            startDrawing(x, y, pointerId) {
                this.isDrawing = true;
                this.lastPoint = { x, y };
                
                const settings = this.settingsManager.getCurrentSettings();
                const drawColor = this.currentTool === 'eraser' ? 0xf0e0d6 : settings.color;
                const drawOpacity = this.currentTool === 'eraser' ? 1.0 : settings.opacity;
                
                this.currentPath = this.coreEngine.createPath(x, y, settings.brushSize, drawColor, drawOpacity, this.currentTool);
            }
            
            continueDrawing(x, y, pointerId) {
                if (!this.isDrawing || !this.currentPath) return;
                
                this.coreEngine.drawLine(this.currentPath, x, y);
                this.lastPoint = { x, y };
            }
            
            stopDrawing(pointerId) {
                if (this.currentPath) {
                    this.currentPath.isComplete = true;
                    
                    // 履歴に追加
                    if (this.coreEngine.historyManager) {
                        const settings = this.settingsManager.getCurrentSettings();
                        this.coreEngine.historyManager.pushEvent('strokeAdd', {
                            id: this.currentPath.id,
                            points: [...this.currentPath.points],
                            brushSettings: {
                                size: settings.brushSize,
                                color: this.currentTool === 'eraser' ? 0xf0e0d6 : settings.color,
                                opacity: this.currentTool === 'eraser' ? 1.0 : settings.opacity,
                                tool: this.currentTool
                            }
                        }, {
                            pathId: this.currentPath.id
                        });
                    }
                }
                
                this.isDrawing = false;
                this.currentPath = null;
                this.lastPoint = null;
            }
            
            updateCoordinates(x, y) {
                const coordsElement = document.getElementById('coordinates');
                if (coordsElement) {
                    coordsElement.textContent = `x: ${Math.round(x)}, y: ${Math.round(y)}`;
                }
            }
            
            get brushSize() {
                return this.settingsManager.currentSettings.brushSize;
            }
            
            get brushColor() {
                return this.settingsManager.currentSettings.color;
            }
            
            get opacity() {
                return this.settingsManager.currentSettings.opacity;
            }
        }
        // ==== B1-UI: User Interface Controller ====
        class UIController {
            constructor(toolSystem, coreEngine, unifiedStrokeManager, historyManager, settingsManager) {
                this.toolSystem = toolSystem;
                this.coreEngine = coreEngine;
                this.unifiedStrokeManager = unifiedStrokeManager;
                this.historyManager = historyManager;
                this.settingsManager = settingsManager;
                this.activePopup = null;
                this.sliders = new Map();
                this.isDragging = false;
                this.dragOffset = { x: 0, y: 0 };
            }
            
            init() {
                console.log('🚂 B1-UI: Initializing with real-time settings integration');
                this.setupToolButtons();
                this.setupPopups();
                this.setupSliders();
                this.setupResizeHandlers();
                this.setupOffCanvasControls();
                this.updateCanvasInfo();
                
                // HistoryManagerに参照を設定
                this.coreEngine.historyManager = this.historyManager;
            }
            
            setupToolButtons() {
                document.querySelectorAll('.tool-button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if (btn.classList.contains('disabled')) return;
                        this.handleToolClick(e.currentTarget);
                    });
                });
            }
            
            handleToolClick(button) {
                const toolId = button.id;
                
                if (toolId === 'pen-tool') {
                    this.setTool('pen');
                    this.togglePopup('pen-settings');
                } else if (toolId === 'eraser-tool') {
                    this.setTool('eraser');
                    this.closeAllPopups();
                } else if (toolId === 'resize-tool') {
                    this.togglePopup('resize-settings');
                }
            }
            
            setTool(tool) {
                this.toolSystem.setTool(tool);
                
                document.querySelectorAll('.tool-button').forEach(btn => btn.classList.remove('active'));
                document.getElementById(tool + '-tool').classList.add('active');
                
                const toolNames = { pen: 'ベクターペン', eraser: '消しゴム' };
                const toolElement = document.getElementById('current-tool');
                if (toolElement) {
                    toolElement.textContent = toolNames[tool] || tool;
                }
                
                const canvas = this.coreEngine.app.canvas;
                canvas.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair';
            }
            
            togglePopup(popupId) {
                const popup = document.getElementById(popupId);
                if (!popup) return;
                
                if (this.activePopup && this.activePopup !== popup) {
                    this.activePopup.classList.remove('show');
                }
                
                const isVisible = popup.classList.contains('show');
                popup.classList.toggle('show', !isVisible);
                this.activePopup = isVisible ? null : popup;
            }
            
            setupPopups() {
                document.querySelectorAll('.popup-panel').forEach(popup => {
                    const title = popup.querySelector('.popup-title');
                    if (title) {
                        title.style.cursor = 'move';
                        title.addEventListener('mousedown', (e) => this.startDrag(e, popup));
                    }
                });
                
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.popup-panel') && !e.target.closest('.tool-button')) {
                        this.closeAllPopups();
                    }
                });
                
                document.addEventListener('mousemove', (e) => this.onDrag(e));
                document.addEventListener('mouseup', () => this.stopDrag());
            }
            
            startDrag(e, popup) {
                this.isDragging = popup;
                const rect = popup.getBoundingClientRect();
                this.dragOffset.x = e.clientX - rect.left;
                this.dragOffset.y = e.clientY - rect.top;
                e.preventDefault();
            }
            
            onDrag(e) {
                if (!this.isDragging) return;
                
                const x = Math.max(0, Math.min(e.clientX - this.dragOffset.x, window.innerWidth - this.isDragging.offsetWidth));
                const y = Math.max(0, Math.min(e.clientY - this.dragOffset.y, window.innerHeight - this.isDragging.offsetHeight));
                
                this.isDragging.style.left = x + 'px';
                this.isDragging.style.top = y + 'px';
            }
            
            stopDrag() {
                this.isDragging = false;
            }
            
            setupSliders() {
                // リアルタイム反映対応スライダー
                this.createSlider('pen-size-slider', 0.1, 100, 16.0, (value) => {
                    this.settingsManager.updateSetting('brushSize', value);
                    return value.toFixed(1) + 'px';
                });
                
                this.createSlider('pen-opacity-slider', 0, 100, 85.0, (value) => {
                    this.settingsManager.updateSetting('opacity', value / 100);
                    return value.toFixed(1) + '%';
                });
            }
            
            createSlider(sliderId, min, max, initial, callback) {
                const container = document.getElementById(sliderId);
                if (!container) return;
                
                const track = container.querySelector('.slider-track');
                const handle = container.querySelector('.slider-handle');
                const valueDisplay = container.parentNode.querySelector('.slider-value');
                
                if (!track || !handle || !valueDisplay) return;
                
                const sliderData = {
                    value: initial,
                    min, max, callback,
                    track, handle, valueDisplay,
                    isDragging: false
                };
                
                this.sliders.set(sliderId, sliderData);
                
                const updateSlider = (value) => {
                    sliderData.value = Math.max(min, Math.min(max, value));
                    const percentage = ((sliderData.value - min) / (max - min)) * 100;
                    
                    track.style.width = percentage + '%';
                    handle.style.left = percentage + '%';
                    valueDisplay.textContent = callback(sliderData.value);
                };
                
                const getValueFromPosition = (clientX) => {
                    const rect = container.getBoundingClientRect();
                    const percentage = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                    return min + (percentage * (max - min));
                };
                
                container.addEventListener('mousedown', (e) => {
                    sliderData.isDragging = true;
                    updateSlider(getValueFromPosition(e.clientX));
                    e.preventDefault();
                });
                
                document.addEventListener('mousemove', (e) => {
                    if (sliderData.isDragging) updateSlider(getValueFromPosition(e.clientX));
                });
                
                document.addEventListener('mouseup', () => {
                    sliderData.isDragging = false;
                });
                
                updateSlider(initial);
            }
            
            setupResizeHandlers() {
                const applyButton = document.getElementById('apply-resize');
                if (applyButton) {
                    applyButton.addEventListener('click', () => this.applyResize());
                }
            }
            
            setupOffCanvasControls() {
                const offCanvasCheckbox = document.getElementById('offcanvas-enabled');
                if (offCanvasCheckbox) {
                    offCanvasCheckbox.addEventListener('change', (e) => {
                        this.unifiedStrokeManager.offCanvasEnabled = e.target.checked;
                        this.settingsManager.updateSetting('offCanvasEnabled', e.target.checked);
                        
                        // ステータス表示更新
                        const statusElement = document.getElementById('offcanvas-status');
                        if (statusElement) {
                            statusElement.textContent = e.target.checked ? 'ON' : 'OFF';
                        }
                    });
                }
            }
            
            applyResize() {
                const widthInput = document.getElementById('canvas-width');
                const heightInput = document.getElementById('canvas-height');
                
                if (widthInput && heightInput) {
                    const width = parseInt(widthInput.value);
                    const height = parseInt(heightInput.value);
                    
                    if (width >= 100 && width <= 4096 && height >= 100 && height <= 4096) {
                        this.coreEngine.resize(width, height, false);
                        this.updateCanvasInfo();
                        this.closeAllPopups();
                    }
                }
            }
            
            updateCanvasInfo() {
                const canvasInfo = document.getElementById('canvas-info');
                if (canvasInfo) {
                    canvasInfo.textContent = `${this.coreEngine.config.canvasWidth}×${this.coreEngine.config.canvasHeight}px`;
                }
            }
            
            closeAllPopups() {
                document.querySelectorAll('.popup-panel').forEach(popup => {
                    popup.classList.remove('show');
                });
                this.activePopup = null;
            }
        }
        
        // ==== Performance Monitor ====
        class PerformanceMonitor {
            constructor() {
                this.frameCount = 0;
                this.lastTime = performance.now();
            }
            
            start() {
                console.log('🚂 Performance Monitor: Starting FPS tracking');
                
                const update = () => {
                    this.frameCount++;
                    const currentTime = performance.now();
                    
                    if (currentTime - this.lastTime >= 1000) {
                        const fps = Math.round((this.frameCount * 1000) / (currentTime - this.lastTime));
                        const fpsElement = document.getElementById('fps');
                        if (fpsElement) {
                            fpsElement.textContent = fps;
                        }
                        
                        this.frameCount = 0;
                        this.lastTime = currentTime;
                    }
                    
                    requestAnimationFrame(update);
                };
                
                update();
            }
        }
        
        // ==== Bootstrap: Application Initialization ====
        class FutabaDrawingTool {
            constructor() {
