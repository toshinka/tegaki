<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToshinkaTegakiTool-v1-4-rev1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Meiryo, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffee;
            overflow: hidden;
            user-select: none;
        }
        
        :root {
            --main-bg-color: rgb(240, 208, 195);
            --dark-brown: #800000;
            --light-brown-border: rgb(220, 188, 175);
            --button-active-bg: white;
            --button-inactive-bg: var(--main-bg-color);
            --layer-list-bg: #fdf5f2;
        }

        .main-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            position: relative;
        }
        
        .left-toolbar {
            position: absolute;
            top: 30px;
            left: 0;
            width: 160px; /* ★幅を広げました */
            background-color: var(--main-bg-color);
            border-right: 1px solid var(--light-brown-border);
            display: flex;
            flex-direction: column;
            padding: 4px;
            gap: 5px;
            box-sizing: border-box;
            align-items: center;
            z-index: 100;
        }
        
        .top-toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30px;
            background-color: var(--main-bg-color);
            border-bottom: 1px solid var(--light-brown-border);
            display: flex;
            align-items: center;
            padding: 0 3px;
            gap: 2px;
            box-sizing: border-box;
            justify-content: space-between;
            z-index: 100;
        }
        
        .canvas-area {
            position: absolute;
            top: 30px;
            left: 160px; /* ★left-toolbarの幅に合わせました */
            right: 0;
            bottom: 0;
            background-color: #ffffee;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .canvas-container {
            position: relative; 
            transform-origin: center;
            width: 344px;
            height: 135px;
            background-color: transparent; 
            border: none;
            padding: 0;
            transition: transform 0.2s ease;
            transform-style: preserve-3d;
        }
        
        .main-canvas {
            display: block;
            background-color: transparent;
            cursor: crosshair;
            touch-action: none;
            position: absolute;
            top: 0; 
            left: 0;
            pointer-events: none;
        }

        .top-left-controls {
            display: flex;
            flex-direction: row;
            gap: 2px;
            align-items: center;
        }
        
        .left-toolbar-group {
            display: flex;
            flex-direction: row;
            gap: 4px;
            width: 100%;
            justify-content: space-between;
        }

        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            justify-content: center;
        }
        
        .color-btn {
            width: 22px;
            height: 22px;
            border: 1px solid var(--dark-brown);
            cursor: pointer;
            border-radius: 3px;
            box-sizing: border-box;
        }
        
        .color-btn.active {
            border-color: var(--button-active-bg);
            border-width: 3px;
            transform: scale(1.1);
        }
        
        .color-mode-display {
            width: 32px;
            height: 32px;
            position: relative;
            cursor: pointer;
            background-color: var(--main-bg-color);
            border: 1px solid var(--light-brown-border);
            box-sizing: border-box;
            border-radius: 3px;
            overflow: hidden;
        }

        #main-color-display {
            width: 22px;
            height: 22px;
            border: 1px solid var(--dark-brown);
            position: absolute;
            box-sizing: border-box;
            top: 1px;
            left: 1px;
            z-index: 2;
        }

        #sub-color-display {
            width: 22px;
            height: 22px;
            border: 1px solid var(--dark-brown);
            position: absolute;
            box-sizing: border-box;
            bottom: 1px;
            right: 1px;
            z-index: 1;
        }

        .tools {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tool-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--light-brown-border);
            background: var(--button-inactive-bg);
            cursor: pointer;
            font-size: 16px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            line-height: 1;
            color: var(--dark-brown);
        }

        .tool-btn.active {
            background-color: var(--button-active-bg);
            color: var(--dark-brown);
            border-color: var(--dark-brown);
        }
        
        .sizes {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            align-items: center;
        }
        
        .size-btn {
            width: 100%; /* ★幅を100%に */
            height: 34px;
            border: 1px solid var(--light-brown-border);
            background: var(--button-inactive-bg);
            cursor: pointer;
            display: flex;
            flex-direction: row; /* ★横並びに */
            align-items: center;
            justify-content: flex-start; /* ★左寄せに */
            padding: 2px 8px;
            box-sizing: border-box;
            border-radius: 3px;
            gap: 8px; /* ★アイコンと数字の間隔 */
        }

        .size-btn.active {
            border-color: var(--dark-brown);
            background-color: var(--button-active-bg);
        }

        .size-indicator { 
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid var(--dark-brown);
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .size-dot {
            border-radius: 50%;
            background-color: var(--dark-brown);
        }

        .size-number {
            font-size: 12px;
            font-weight: bold;
            color: var(--dark-brown);
            line-height: 1;
        }
        
        .top-btn {
            height: 24px;
            padding: 0 6px;
            border: 1px solid var(--light-brown-border);
            background: var(--button-inactive-bg);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            color: var(--dark-brown);
        }
        
        .top-btn:hover {
            background-color: var(--button-active-bg);
            border-color: var(--dark-brown);
        }
        
        .close-btn {
            background-color: #ff4444;
            color: white;
            border: none;
        }
        
        .close-btn:hover {
            background-color: #cc3333;
        }
        
        .separator {
            width: 100%;
            height: 1px;
            background-color: var(--light-brown-border);
            margin: 4px 0;
        }

        #canvas-container {
          transform-origin: center;
        }
        
        /* --- ▼新規追加CSS --- */
        #layer-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        #layer-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #layer-controls .panel-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--dark-brown);
        }
        #layer-list-container {
            background-color: var(--layer-list-bg);
            border: 1px solid var(--light-brown-border);
            border-radius: 3px;
            height: 150px;
            overflow-y: auto;
            padding: 2px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .layer-item {
            padding: 5px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            border-radius: 2px;
            color: #333;
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .layer-item:hover {
            background-color: #eef;
        }
        .layer-item.active {
            background-color: #d8e8ff;
            border-color: #8ab4f8;
            font-weight: bold;
            color: #1967d2;
        }
        #layer-context-menu {
            position: fixed;
            z-index: 1000;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
            padding: 5px;
            display: none;
        }
        #layer-context-menu button {
            background: none;
            border: none;
            padding: 8px 12px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-size: 13px;
        }
        #layer-context-menu button:hover {
            background-color: #f0f0f0;
        }
        #layer-context-menu button:disabled {
            color: #aaa;
            cursor: not-allowed;
            background-color: #f8f8f8;
        }
        /* --- ▲新規追加CSS --- */

    </style>

</head>
<body>
    <div class="main-container">
        <div class="top-toolbar">
            <div class="top-left-controls">
                <button class="tool-btn" id="undo-btn" title="元に戻す (Ctrl+Z)">↶</button>
                <button class="tool-btn" id="redo-btn" title="やり直し (Ctrl+Y)">↷</button>
                <button class="tool-btn" id="clear-btn" title="アクティブレイヤーを消去 (Delete)">&#128465;</button>
                </div>

            <div class="canvas-ops-group" style="display: flex; gap: 2px;">
                <button class="top-btn" id="flip-h-btn" title="左右反転 (H)">⇄</button>
                <button class="top-btn" id="flip-v-btn" title="上下反転 (Shift+H)">⇅</button>
                <button class="top-btn" id="zoom-out-btn" title="縮小 (↓ / Wheel Down)">－</button>
                <button class="top-btn" id="zoom-in-btn" title="拡大 (↑ / Wheel Up)">＋</button>
                <button class="top-btn" id="rotate-btn" title="回転 (Shift+Wheel)">↻</button>
                <button class="top-btn" id="rotate-ccw-btn" title="反時計回りに回転 (Shift+Wheel)">↺</button>
                <button class="top-btn" id="reset-view-btn" title="表示リセット (1)">&#9750;</button>
            </div>
            
            <button class="top-btn close-btn" id="close-btn">×閉じる</button>
        </div>

        <div class="left-toolbar">
            <div class="left-toolbar-group">
                <div class="tools">
                    <button class="tool-btn active" id="pen-tool" title="ペン (P)">&#9998;</button>
                    <button class="tool-btn" id="eraser-tool" title="消しゴム (E)">&#9003;</button>
                    <button class="tool-btn" id="bucket-tool" title="塗りつぶし (G)">&#x1F5F3;</button>
                    <button class="tool-btn" id="move-tool" title="レイヤー変形 (V)">&#10021;</button>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
                    <div class="color-mode-display" title="メイン/サブカラー切り替え (X)">
                        <div id="main-color-display"></div>
                        <div id="sub-color-display"></div>
                    </div>
                    <div class="color-palette">
                        <div class="color-btn active" data-color="#800000" style="background-color: #800000;" title="暗赤"></div>
                        <div class="color-btn" data-color="#aa5a56" style="background-color: #aa5a56;" title="赤茶"></div>
                        <div class="color-btn" data-color="#cf9c97" style="background-color: #cf9c97;" title="中間色"></div>
                        <div class="color-btn" data-color="#e9c2ba" style="background-color: #e9c2ba;" title="薄茶"></div>
                        <div class="color-btn" data-color="#f0e0d6" style="background-color: #f0e0d6;" title="肌色"></div>
                    </div>
                </div>
            </div>

            <div class="separator"></div>

            <div class="sizes">
                <button class="size-btn active" data-size="1">
                    <div class="size-indicator"><div class="size-dot"></div></div>
                    <span class="size-number">1px</span>
                </button>
                <button class="size-btn" data-size="3">
                    <div class="size-indicator"><div class="size-dot"></div></div>
                    <span class="size-number">3px</span>
                </button>
                <button class="size-btn" data-size="5">
                    <div class="size-indicator"><div class="size-dot"></div></div>
                    <span class="size-number">5px</span>
                </button>
                <button class="size-btn" data-size="10">
                    <div class="size-indicator"><div class="size-dot"></div></div>
                    <span class="size-number">10px</span>
                </button>
                <button class="size-btn" data-size="30">
                    <div class="size-indicator"><div class="size-dot"></div></div>
                    <span class="size-number">30px</span>
                </button>
            </div>

            <div class="separator"></div>

            <div id="layer-panel">
                <div id="layer-controls">
                    <span class="panel-title">レイヤー</span>
                    <button id="add-layer-btn" class="tool-btn" title="新規レイヤーを追加">+</button>
                </div>
                <div id="layer-list-container">
                    </div>
            </div>
            </div>
        
        <div class="canvas-area" id="canvas-area">
            <div class="canvas-container" id="canvas-container">
                </div>
        </div>

    </div>
    
    <div id="layer-context-menu">
        <button id="delete-layer-btn">削除</button>
    </div>
    
    <script src="core-v1-4rev1.js"></script>
    <script src="ui-v1-4rev1.js"></script>

</body>
</html>
