<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Drawing Tool - Phase 0</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <div class="app-container">
        <div class="toolbar">
            <h1>Drawing Tool</h1>
            
            <div class="tool-section">
                <h3>Tools</h3>
                <div class="tool-buttons">
                    <button class="tool-btn active" data-tool="pen" title="Pen Tool">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="eraser" title="Eraser Tool">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 20H8l-4-4 9.5-9.5a2.828 2.828 0 1 1 4 4L8 20"/>
                            <path d="M15 5l4 4"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="tool-section color-section">
                <h3>Color</h3>
                <input type="color" class="color-picker" id="colorPicker" value="#000000">
            </div>

            <div class="tool-section size-section">
                <h3>Size</h3>
                <div class="slider-container">
                    <input type="range" class="size-slider" id="sizeSlider" min="1" max="50" value="3">
                    <span class="size-value" id="sizeValue">3px</span>
                </div>
                <div class="brush-preview">
                    <div class="preview-circle" id="brushPreview"></div>
                </div>
            </div>

            <div class="tool-section">
                <button class="clear-btn" id="clearBtn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                        <polyline points="3,6 5,6 21,6"/>
                        <path d="M19,6V20a2,2 0 0,1 -2,2H7a2,2 0 0,1 -2,-2V6m3,0V4a2,2 0 0,1 2,-2h4a2,2 0 0,1 2,2V6"/>
                        <line x1="10" y1="11" x2="10" y2="17"/>
                        <line x1="14" y1="11" x2="14" y2="17"/>
                    </svg>
                    Clear Canvas
                </button>
            </div>
        </div>

        <div class="canvas-container">
            <div class="fps-counter" id="fpsCounter">60 FPS</div>
            <div id="canvasContainer"></div>
        </div>
    </div>

    <script src="./src/main.js" type="module"></script>
</body>
</html>
