<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モダンお絵かきツール v3.2 - PixiJS統一基盤</title>
    
    <!-- PixiJS統一基盤・ふたば色・Chrome API対応 -->
    <style>
        /* PixiJS統一座標対応・ふたば色基調・Chrome最適化 */
        :root {
            /* ふたば色系統 */
            --futaba-maroon: #800000;
            --futaba-light-maroon: #aa5a56;
            --futaba-medium: #cf9c97;
            --futaba-cream: #f0e0d6;
            --futaba-background: #ffffee;
            
            /* PixiJS統一座標系設定 */
            --pixi-coordinate-origin: 0 0;
            --pixi-coordinate-y-direction: 1;
            --pixi-coordinate-scale: 1;
            
            /* Chrome API最適化 */
            --gpu-acceleration: translateZ(0);
            --will-change-transform: transform;
            --will-change-opacity: opacity;
            --contain-layout: layout style paint;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--futaba-background);
            color: var(--futaba-medium);
            overflow: hidden;
            
            /* Chrome最適化 */
            will-change: var(--will-change-transform);
            contain: var(--contain-layout);
        }
        
        #app {
            width: 100vw;
            height: 100vh;
            position: relative;
            
            /* PixiJS統一座標対応 */
            display: grid;
            grid-template-columns: 72px 1fr 300px;
            grid-template-rows: 1fr auto;
            grid-template-areas: 
                "sidebar canvas layer-panel"
                "sidebar timeline layer-panel";
            
            /* Chrome最適化 */
            transform: var(--gpu-acceleration);
            contain: var(--contain-layout);
        }
        
        #canvas {
            grid-area: canvas;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            
            /* PixiJS統一座標系 */
            position: relative;
            overflow: hidden;
            
            /* Chrome最適化 */
            will-change: var(--will-change-transform);
            transform: var(--gpu-acceleration);
        }
        
        /* Phase1デバッグ用スタイル */
        .debug-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            
            background: rgba(128, 0, 0, 0.9);
            color: var(--futaba-cream);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            max-width: 300px;
            
            /* Chrome最適化 */
            will-change: var(--will-change-opacity);
            transform: var(--gpu-acceleration);
        }
        
        /* サイドバー・レイヤーパネル予約スタイル（Phase2用） */
        .sidebar, .layer-panel {
            background: linear-gradient(135deg, var(--futaba-medium) 0%, var(--futaba-light-maroon) 100%);
            
            /* Chrome最適化 */
            will-change: var(--will-change-transform);
            transform: var(--gpu-acceleration);
            contain: var(--contain-layout);
        }
        
        .sidebar {
            grid-area: sidebar;
            width: 72px;
        }
        
        .layer-panel {
            grid-area: layer-panel;
            width: 300px;
        }
        
        /* タイムライン予約スタイル（Phase3用） */
        .timeline {
            grid-area: timeline;
            height: 0;
            background: linear-gradient(135deg, rgba(128, 0, 0, 0.96) 0%, rgba(170, 90, 86, 0.92) 100%);
            transform: translateY(100%);
            transition: height 400ms cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        transform 400ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
            
            /* Chrome最適化 */
            will-change: height, var(--will-change-transform);
            contain: var(--contain-layout);
        }
        
        .timeline.active {
            height: 30vh;
            transform: translateY(0);
        }
        
        /* 読み込み中アニメーション */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            
            background: var(--futaba-medium);
            color: var(--futaba-cream);
            padding: 20px 30px;
            border-radius: 12px;
            font-size: 16px;
            text-align: center;
            
            /* Chrome最適化アニメーション */
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
            100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
        }
        
        /* エラー表示スタイル */
        .error-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            
            background: var(--futaba-medium);
            color: var(--futaba-cream);
            padding: 20px;
            border-radius: 12px;
            font-family: Arial, sans-serif;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            max-width: 400px;
        }
        
        .error-panel h3 {
            margin-bottom: 10px;
        }
        
        .error-panel pre {
            font-size: 12px;
            margin: 10px 0;
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
        }
        
        .error-panel button {
            background: var(--futaba-cream);
            color: var(--futaba-medium);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .error-panel button:hover {
            opacity: 0.8;
        }
        
        /* Chrome最適化動作軽減対応 */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
                will-change: auto !important;
            }
        }
        
        /* 高解像度対応 */
        @media (min-resolution: 2dppx) {
            #canvas {
                image-rendering: -webkit-optimize-contrast;
            }
        }
        
        /* デスクトップ専用最適化 */
        @media (max-width: 1279px) {
            body::before {
                content: "⚠️ 本アプリはデスクトップ専用です（最小解像度: 1280x720px）";
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                background: var(--futaba-medium);
                color: var(--futaba-cream);
                padding: 10px;
                text-align: center;
                z-index: 10000;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- メインアプリケーション -->
    <div id="app">
        <!-- PixiJS統一キャンバス -->
        <canvas id="canvas"></canvas>
        
        <!-- サイドバー予約領域（Phase2実装予定） -->
        <div class="sidebar">
            <!-- Phase2: ツールバー実装予定 -->
        </div>
        
        <!-- レイヤーパネル予約領域（Phase2実装予定） -->
        <div class="layer-panel">
            <!-- Phase2: レイヤー管理実装予定 -->
        </div>
        
        <!-- タイムライン予約領域（Phase3実装予定） -->
        <div class="timeline">
            <!-- Phase3: アニメーション制御実装予定 -->
        </div>
    </div>
    
    <!-- 読み込み中表示 -->
    <div id="loading" class="loading">
        🔥 PixiJS統一基盤初期化中...
    </div>
    
    <!-- JavaScript実行時エラー表示用 -->
    <div id="js-error" style="display: none;" class="error-panel">
        <h3>🚨 JavaScript実行エラー</h3>
        <p>PixiJS統一基盤の実行でエラーが発生しました</p>
        <pre id="error-details"></pre>
        <button onclick="location.reload()">再読み込み</button>
    </div>
    
    <!-- Phase1実装状況表示（開発用） -->
    <script>
        // Phase1実装状況チェック
        console.log('🔥 Phase1実装チェック開始');
        
        // グローバルエラーハンドリング
        window.addEventListener('error', (event) => {
            console.error('💥 グローバルエラー:', event.error);
            
            const errorPanel = document.getElementById('js-error');
            const errorDetails = document.getElementById('error-details');
            const loading = document.getElementById('loading');
            
            if (errorPanel && errorDetails) {
                errorDetails.textContent = event.error ? event.error.stack : event.message;
                errorPanel.style.display = 'block';
            }
            
            if (loading) {
                loading.style.display = 'none';
            }
        });
        
        // Promise未処理エラー
        window.addEventListener('unhandledrejection', (event) => {
            console.error('💥 未処理Promise拒否:', event.reason);
        });
        
        // Phase1初期化完了時の読み込み表示削除
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading && window.modernDrawingApp && window.modernDrawingApp.isInitialized) {
                    loading.style.opacity = '0';
                    setTimeout(() => {
                        loading.style.display = 'none';
                    }, 500);
                }
            }, 2000); // 2秒後に確認
        });
        
        // Phase1準備完了ログ
        console.log('✅ Phase1 HTML基盤準備完了');
        console.log('📐 PixiJS統一座標系CSS準備完了');
        console.log('🎨 ふたば色統合スタイル準備完了');
        console.log('⚡ Chrome API最適化スタイル準備完了');
    </script>
    
    <!-- メインアプリケーション読み込み -->
    <script type="module" src="./src/main.js"></script>
</body>
</html>
